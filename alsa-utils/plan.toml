name = "alsa-utils"
version = "1.2.15.2"
release = 1
description = "ALSA utilities including alsactl, amixer, aplay"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.alsa-project.org"

link_deps = ['alsa-lib', 'ncurses']
build_deps = ['xmlto']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.alsa-project.org/files/pub/utils/alsa-utils-${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/alsa-utils-${VERSION}
./configure --prefix=/usr --sbindir=/usr/bin --disable-alsaloop --disable-bat --disable-xmlto --disable-rst2man'''

[pipeline.compile]
script = '''
cd source/alsa-utils-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/alsa-utils-${VERSION}
DESTDIR=${STAGING_DIR} make install'''

[hooks]
post_install = "alsactl init 2>/dev/null || true"

[[output]]
runtime_deps = ['alsa-ucm-conf', 'alsa-lib', 'ncurses']
