name = "sed"
version = "4.9"
release = 1
description = "Stream editor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/sed/"

build = ['gcc', 'make']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/sed/sed-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)
make html'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install
install -d -m755           ${STAGING_DIR}/usr/share/doc/sed-4.9
install -m644 doc/sed.html ${STAGING_DIR}/usr/share/doc/sed-4.9'''

