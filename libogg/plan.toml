name = "libogg"
version = "1.3.6"
release = 1
description = "Ogg bitstream and framing library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/ogg"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://downloads.xiph.org/releases/ogg/libogg-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libogg-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libogg-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libogg-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

