name = "qt6-svg"
version = "6.11.0"
release = 1
description = "Qt 6 SVG module"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"


[dependencies]
runtime = ["qt6-base"]
build = [
    "cmake",
    "gcc",
    "ninja",
    "qt6-base",
]

[[sources]]
uri = "https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtsvg-everywhere-src-${VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-multiple-definition" -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--allow-multiple-definition" -DCMAKE_MODULE_LINKER_FLAGS="-Wl,--allow-multiple-definition"

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -j$(nproc) -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[lifecycle.fabricate]
