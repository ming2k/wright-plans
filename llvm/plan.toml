[plan]
name = "llvm"
version = "21.1.8"
release = 1
description = "The LLVM Compiler Infrastructure (Optimized for AMD64/Gaming)"
license = "Apache-2.0-with-LLVM-exception"
arch = "x86_64"

[dependencies]
runtime = ["llvm-libs"]
link = ["libedit", "libffi", "libxml2", "zlib", "zstd"]
[sources]
uris = ["https://github.com/llvm/llvm-project/releases/download/llvmorg-${PKG_VERSION}/llvm-project-${PKG_VERSION}.src.tar.xz"]
sha256 = ["SKIP"]

[options]
strip = true
# 针对仅构建部分后端的情况，通常不需要限制并行数
# jobs = 4

[lifecycle.configure]
# 针对本机 CPU 优化
env = { CFLAGS = "-O3 -march=native -pipe", CXXFLAGS = "-O3 -march=native -pipe" }

script = """
cd ${BUILD_DIR}/llvm

# 修复 Python 调用
grep -rl '#!.*python' ../ | xargs sed -i '1s/python$/python3/' || true

cmake -B build -G Ninja \
-DCMAKE_INSTALL_PREFIX=/usr \
-DCMAKE_BUILD_TYPE=Release \
-DCMAKE_SKIP_INSTALL_RPATH=ON \
\
-DLLVM_ENABLE_PROJECTS="clang;lld" \
-DLLVM_ENABLE_RUNTIMES="compiler-rt" \
\
-DLLVM_TARGETS_TO_BUILD="X86;AMDGPU;WebAssembly" \
\
-DLLVM_BUILD_LLVM_DYLIB=ON \
-DLLVM_LINK_LLVM_DYLIB=ON \
-DLLVM_ENABLE_RTTI=ON \
-DLLVM_ENABLE_FFI=ON \
-DLLVM_ENABLE_ZLIB=ON \
-DLLVM_ENABLE_ZSTD=ON \
-DLLVM_ENABLE_LIBEDIT=ON \
-DLLVM_BINUTILS_INCDIR=/usr/include \
\
-DCLANG_DEFAULT_PIE_ON_LINUX=ON \
-DCLANG_LINK_CLANG_DYLIB=ON
"""

[lifecycle.compile]
script = """
cd ${BUILD_DIR}/llvm
ninja -C build -j$(nproc)
"""

[lifecycle.package]
script = """
cd ${BUILD_DIR}/llvm
DESTDIR=${BUILD_DIR}/_install ninja -C build install

# 复制全量
cp -a ${BUILD_DIR}/_install/* ${PKG_DIR}/

# --- 清理属于子包的文件 ---
rm -f ${PKG_DIR}/usr/lib/libLLVM*.so*

rm -rf ${PKG_DIR}/usr/bin/clang*
rm -rf ${PKG_DIR}/usr/bin/git-clang-format
rm -rf ${PKG_DIR}/usr/lib/clang
rm -rf ${PKG_DIR}/usr/include/clang*
rm -rf ${PKG_DIR}/usr/share/clang

rm -rf ${PKG_DIR}/usr/bin/lld*
rm -rf ${PKG_DIR}/usr/bin/ld.lld*
rm -rf ${PKG_DIR}/usr/bin/wasm-ld

if [ ! -f ${PKG_DIR}/usr/bin/llvm-config ]; then
ln -sf llvm-config-${PKG_VERSION%%.*} ${PKG_DIR}/usr/bin/llvm-config
fi
"""

[split.llvm-libs]
description = "LLVM shared libraries"
[split.llvm-libs.dependencies]
link = ["glibc", "libffi", "libedit", "ncurses", "zlib", "zstd"]
[split.llvm-libs.lifecycle.package]
script = """
install -d ${PKG_DIR}/usr/lib
mv -v ${MAIN_PKG_DIR}/usr/lib/libLLVM-*.so ${PKG_DIR}/usr/lib/
mv -v ${MAIN_PKG_DIR}/usr/lib/libLLVM.so* ${PKG_DIR}/usr/lib/
mv -v ${MAIN_PKG_DIR}/usr/lib/libLTO.so* ${PKG_DIR}/usr/lib/
mv -v ${MAIN_PKG_DIR}/usr/lib/libRemarks.so* ${PKG_DIR}/usr/lib/
"""
