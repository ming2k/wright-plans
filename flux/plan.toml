name = "flux"
version = "0.2.0"
release = 1
description = "C23 Vulkan-first graphics library"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ming2k/flux"

build_deps = ['meson', 'ninja', 'glslang', 'pkgconf']
link_deps = ['vulkan-loader', 'glibc', 'fontconfig', 'harfbuzz', 'freetype']

[[sources]]
type = "git"
url = "https://github.com/ming2k/flux.git"
ref = "v${VERSION}"
extract_to = "source"

[pipeline.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release \
    -Dcanvas=true \
    -Dtext=true \
    -Dscene-graph=true \
    -Dcompute=true \
    -Deffect=true \
    -Dexamples=false \
    -Dtests=false'''

[pipeline.compile]
script = '''
cd source
ninja -C build'''

[pipeline.staging]
script = '''
cd source
meson install -C build --destdir "$STAGING_DIR"
# Both libflux and libflux-text must land (typio-host's panel.rs links both),
# and every header flux-sys/wrapper.h includes must be present.
test -f "$STAGING_DIR/usr/lib/libflux.so"
test -f "$STAGING_DIR/usr/lib/libflux_text.so"
test -f "$STAGING_DIR/usr/lib/pkgconfig/flux.pc"
test -f "$STAGING_DIR/usr/lib/pkgconfig/flux-text.pc"
test -f "$STAGING_DIR/usr/include/flux/canvas.h"
test -f "$STAGING_DIR/usr/include/flux/effect.h"
test -f "$STAGING_DIR/usr/include/flux/scene.h"
test -f "$STAGING_DIR/usr/include/flux/compute.h"
test -f "$STAGING_DIR/usr/include/flux-text/text.h"'''

[[output]]
name = "flux"
runtime_deps = ['vulkan-loader', 'glibc', 'fontconfig', 'harfbuzz', 'freetype']
