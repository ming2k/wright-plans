name = "lua"
version = "5.4.7"
release = 4
description = "Powerful lightweight programming language"
license = "MIT"
arch = "x86_64"
url = "https://www.lua.org"

link_deps = ['readline']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.lua.org/ftp/lua-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/lua-${VERSION}
# No configure step needed for Lua; -fPIC is passed via MYCFLAGS in compile stage
true'''

[pipeline.compile]
script = '''
cd source/lua-${VERSION}
make -j$(nproc) linux-readline MYCFLAGS="-fPIC"
# Build shared library from the PIC-compiled archive objects
cd src
${CC:-gcc} -shared -fPIC -Wl,-soname,liblua.so.5.4 \
    $(ar t liblua.a | tr '\n' ' ') \
    -lm -ldl -o liblua.so.5.4'''

[pipeline.staging]
script = '''
cd source/lua-${VERSION}
make INSTALL_TOP=${STAGING_DIR}/usr INSTALL_MAN=${STAGING_DIR}/usr/share/man/man1 install

# Install shared library
install -Dm755 src/liblua.so.5.4 ${STAGING_DIR}/usr/lib/liblua.so.5.4
ln -sf liblua.so.5.4 ${STAGING_DIR}/usr/lib/liblua.so

mkdir -p ${STAGING_DIR}/usr/lib/pkgconfig
cat > ${STAGING_DIR}/usr/lib/pkgconfig/lua5.4.pc << PCEOF
prefix=/usr
exec_prefix=\${prefix}
libdir=\${exec_prefix}/lib
includedir=\${prefix}/include

Name: Lua
Description: Lua language engine
Version: ${VERSION}
Libs: -L\${libdir} -llua
Libs.private: -lm -ldl
Cflags: -I\${includedir}
PCEOF
cp ${STAGING_DIR}/usr/lib/pkgconfig/lua5.4.pc ${STAGING_DIR}/usr/lib/pkgconfig/lua-5.4.pc
cp ${STAGING_DIR}/usr/lib/pkgconfig/lua5.4.pc ${STAGING_DIR}/usr/lib/pkgconfig/lua.pc'''

[[output]]
runtime_deps = ['readline']

[output.hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"
