name = "coreutils"
version = "9.11"
release = 2
description = "Basic utility programs needed by every operating system"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/coreutils/"

link_deps = ['acl', 'attr', 'libcap', 'openssl']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/coreutils/coreutils-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/coreutils-${VERSION}
FORCE_UNSAFE_CONFIGURE=1 ./configure \
--prefix=/usr            \
--sbindir=/usr/bin       \
--libexecdir=/usr/lib    \
--with-openssl           \
--enable-no-install-program=hostname,kill,uptime'''

[lifecycle.compile]
script = '''
cd source/coreutils-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/coreutils-${VERSION}
make DESTDIR=${STAGING_DIR} install
mkdir -p ${STAGING_DIR}/usr/share/man/man8
mv -v ${STAGING_DIR}/usr/share/man/man1/chroot.1 ${STAGING_DIR}/usr/share/man/man8/chroot.8
sed -i 's/"1"/"8"/' ${STAGING_DIR}/usr/share/man/man8/chroot.8'''

[[output]]
runtime_deps = ['acl', 'attr', 'libcap', 'openssl']
