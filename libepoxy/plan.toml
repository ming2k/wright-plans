name = "libepoxy"
version = "1.5.10"
release = 2
description = "Library for handling OpenGL function pointer management"
license = "MIT"
arch = "x86_64"
url = "https://github.com/anholt/libepoxy"

[dependencies]
runtime = ["mesa"]
build = ["meson", "ninja", "pkgconf"]
link = ["mesa", "libglvnd"]

[[sources]]
uri = "https://download.gnome.org/sources/libepoxy/1.5/libepoxy-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build \
--prefix=/usr       \
--buildtype=release \
-D x11=false

'''

[lifecycle.compile]
script = '''
meson compile -C ${BUILD_DIR}/build

'''

[lifecycle.staging]
script = '''
meson install -C ${BUILD_DIR}/build --destdir ${PART_DIR}

'''
