name = "libbytesize"
version = "2.12"
release = 1
description = "Library for working with sizes in bytes"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/storaged-project/libbytesize"

[dependencies]
build = ["gcc", "make", "python-pygments"]
link = ["glib", "mpfr", "pcre2"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/storaged-project/libbytesize/releases/download/${VERSION}/libbytesize-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
