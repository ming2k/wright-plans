name = "tree-sitter"
version = "0.26.8"
release = 1
description = "An incremental parsing system for programming tools"
license = "MIT"
arch = "x86_64"
url = "https://tree-sitter.github.io/tree-sitter/"

[dependencies]
build = ["gcc", "make"]
link = ["glibc"]

[[sources]]
uri = "https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "e6826b7533ec3a885aba598377a6d20b5a6321ff3db76968e960c2352d3a5077"

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc) PREFIX=/usr

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make PREFIX=/usr DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
