name = "librist"
version = "0.2.11"
release = 1
description = "Reliable Internet Stream Transport protocol library"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://code.videolan.org/rist/librist"

link_deps = ['mbedtls']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://code.videolan.org/rist/librist/-/archive/v${VERSION}/librist-v${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/librist-${VERSION}
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D built_tools=false \
    -D test=false'''

[pipeline.compile]
script = '''
cd source/librist-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/librist-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['mbedtls']
