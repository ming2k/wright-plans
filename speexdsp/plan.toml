name = "speexdsp"
version = "1.2.1"
release = 1
description = "Digital signal processing library from the Speex project"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://www.speex.org/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://downloads.xiph.org/releases/speex/speexdsp-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/speexdsp-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/speexdsp-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/speexdsp-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

