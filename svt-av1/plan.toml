name = "svt-av1"
version = "4.1.0"
release = 1
description = "SVT-AV1 is an AV1-compliant software encoder/decoder library"
license = "BSD-3-Clause"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "cmake", "nasm"]
link = []

[[sources]]
uri = "https://gitlab.com/AOMediaCodec/SVT-AV1/-/archive/v4.1.0/SVT-AV1-v4.1.0.tar.gz"
sha256 = "6c4c0c44ff0ba3d136d6f57f3a707f9de8e9c866f50f809c1d22a43f0d8c9583"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DBUILD_DEC=ON \
    -DBUILD_ENC=ON
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
cmake --build build -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} cmake --install build
'''

[lifecycle.fabricate]
