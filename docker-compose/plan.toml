name = "docker-compose"
version = "5.1.0"
release = 1
description = "Docker Compose V2 standalone binary"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/docker/compose"

[dependencies]
runtime = ["podman"]
build = ["go"]

[[sources]]
uri = "https://github.com/docker/compose/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
export PATH=/usr/lib/go/bin:$PATH
export GOPATH=/tmp/go-cache
export GOCACHE=/tmp/go-cache/build
export GOPROXY=https://proxy.golang.org,direct
CGO_ENABLED=0 go build -trimpath \
  -ldflags="-s -w -X github.com/docker/compose/v2/internal.Version=v${PART_VERSION}" \
  -o docker-compose ./cmd

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 docker-compose ${PART_DIR}/usr/bin/docker-compose

# Install as docker CLI plugin
install -dm755 ${PART_DIR}/usr/lib/docker/cli-plugins
ln -s /usr/bin/docker-compose ${PART_DIR}/usr/lib/docker/cli-plugins/docker-compose

'''
