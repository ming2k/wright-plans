name = "flatpak"
version = "1.16.6"
release = 1
description = "Universal app distribution framework (Pure Wayland)"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://flatpak.org"

build_deps = ['meson', 'ninja', 'pkgconf', 'gettext']
link_deps = ['glib', 'libarchive', 'libxml2', 'ostree', 'polkit', 'json-glib', 'curl', 'appstream', 'gdk-pixbuf', 'libjpeg-turbo', 'libfuse3', 'gpgme', 'libseccomp']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/flatpak/flatpak/releases/download/${VERSION}/flatpak-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/flatpak-${VERSION}
meson setup build \
    --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    -Dsystem_bubblewrap=/usr/bin/bwrap \
    -Dsystem_dbus_proxy=/usr/bin/xdg-dbus-proxy \
    -Dsystemd=enabled \
    -Ddbus_config_dir=/usr/share/dbus-1/system.d \
    -Dselinux_module=disabled \
    -Dman=disabled \
    -Ddocbook_docs=disabled \
    -Dxauth=disabled \
    -Dgtkdoc=disabled \
    -Dtests=false \
    -Dinstalled_tests=false'''

[pipeline.compile]
script = '''
cd source/flatpak-${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/flatpak-${VERSION}
meson install -C build --destdir ${STAGING_DIR}
mkdir -p ${STAGING_DIR}/var/lib/flatpak'''

[[output]]
runtime_deps = ['ca-certificates', 'dbus', 'systemd', 'xdg-desktop-portal', 'xdg-desktop-portal-gtk', 'shared-mime-info', 'desktop-file-utils', 'glib', 'libarchive', 'libxml2', 'ostree', 'polkit', 'json-glib', 'curl', 'appstream', 'gdk-pixbuf', 'libjpeg-turbo', 'libfuse3', 'gpgme', 'libseccomp']
hooks.post_install = '''
systemd-sysusers /usr/lib/sysusers.d/flatpak.conf 2>/dev/null || true
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
update-mime-database /usr/share/mime 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
hooks.post_upgrade = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
update-mime-database /usr/share/mime 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
