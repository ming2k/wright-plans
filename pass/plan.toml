name = "pass"
version = "1.7.4"
release = 1
description = "The standard unix password manager"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.passwordstore.org/"

[dependencies]
runtime = ["bash", "gnupg", "git"]
build = ["make"]
optional = [
    { name = "wl-clipboard", description = "copy generated passwords to Wayland clipboard" },
]

[[sources]]
uri = "https://git.zx2c4.com/password-store/snapshot/password-store-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make PREFIX=/usr DESTDIR=${PART_DIR} install

'''
