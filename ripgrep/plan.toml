name = "ripgrep"
version = "15.1.0"
release = 1
description = "Fast line-oriented regex search tool"
license = "MIT OR Unlicense"
arch = "x86_64"
url = "https://github.com/BurntSushi/ripgrep"

[dependencies]
runtime = ["pcre2"]
build = ["rust"]
link = ["gcc", "pcre2", "glibc"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/BurntSushi/ripgrep/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd source
cargo build --release --locked --features pcre2'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/rg ${PART_DIR}/usr/bin/rg

if [ -f doc/rg.1 ]; then
  install -Dm644 doc/rg.1 ${PART_DIR}/usr/share/man/man1/rg.1
fi
if [ -d complete ]; then
  install -Dm644 complete/rg.bash ${PART_DIR}/usr/share/bash-completion/completions/rg || true
  install -Dm644 complete/_rg ${PART_DIR}/usr/share/zsh/site-functions/_rg || true
  install -Dm644 complete/rg.fish ${PART_DIR}/usr/share/fish/vendor_completions.d/rg.fish || true
fi'''

[output]
replaces = ["rg"]
conflicts = ["rg"]
provides = ["rg"]
