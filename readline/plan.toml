name = "readline"
version = "8.3"
release = 1
description = "GNU readline library for command-line editing and history"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://tiswww.case.edu/php/chet/readline/rltop.html"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-001"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-002"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-003"

[options]
ccache = true

[lifecycle.prepare]
script = '''
cd source
patch -Np0 < ${WORKDIR}/readline83-001
patch -Np0 < ${WORKDIR}/readline83-002
patch -Np0 < ${WORKDIR}/readline83-003
sed -i '/MV.*old/d' Makefile.in
sed -i '/{OLDSUFF}/c:' support/shlib-install'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr    --disable-static --with-curses    --docdir=/usr/share/doc/readline-${VERSION}'''

[lifecycle.compile]
script = '''
cd source
make SHLIB_LIBS="-lncursesw"'''

[lifecycle.staging]
script = '''
cd source
make SHLIB_LIBS="-lncursesw" DESTDIR=${PART_DIR} install
install -d ${PART_DIR}/usr/share/doc/readline-${VERSION}
install -v -m644 doc/*.{ps,pdf,html,dvi} ${PART_DIR}/usr/share/doc/readline-${VERSION}/ 2>/dev/null || true'''

[output]
backup = ["/etc/inputrc"]

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"
