name = "python-sphinx"
version = "9.1.0"
release = 1
description = "Python documentation generator"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.sphinx-doc.org/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/s/sphinx/sphinx-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[output]
runtime_deps = ['python:default', 'python-jinja2:default', 'python-pygments:default', 'python-docutils:default', 'python-babel:default', 'python-alabaster:default', 'python-requests:default', 'python-packaging:default', 'sphinxcontrib-applehelp:default', 'sphinxcontrib-devhelp:default', 'sphinxcontrib-htmlhelp:default', 'sphinxcontrib-jsmath:default', 'sphinxcontrib-qthelp:default', 'sphinxcontrib-serializinghtml:default']
