name = "sherpa-onnx"
version = "1.12.29"
release = 1
description = "Speech-to-text, text-to-speech, speaker diarization, and VAD using next-gen Kaldi with onnxruntime"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/k2-fsa/sherpa-onnx"

[dependencies]
build = ["gcc", "cmake", "ninja", "git", "python"]
link = ["onnxruntime"]

[[sources]]
uri = "https://github.com/k2-fsa/sherpa-onnx/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
sed -i "s|    ./|    lib/pkgconfig|" CMakeLists.txt
'''

[lifecycle.configure]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DBUILD_SHARED_LIBS=ON \
  -DSHERPA_ONNX_ENABLE_TESTS=OFF \
  -DSHERPA_ONNX_ENABLE_PYTHON=OFF \
  -DSHERPA_ONNX_ENABLE_JNI=OFF \
  -DSHERPA_ONNX_ENABLE_PORTAUDIO=OFF \
  -DSHERPA_ONNX_ENABLE_WEBSOCKET=OFF \
  -DSHERPA_ONNX_ENABLE_GPU=OFF \
  -DSHERPA_ONNX_ENABLE_C_API=ON \
  -DSHERPA_ONNX_ENABLE_TTS=ON \
  -DSHERPA_ONNX_ENABLE_SPEAKER_DIARIZATION=ON \
  -DSHERPA_ONNX_ENABLE_BINARY=ON \
  -DSHERPA_ONNX_LINK_LIBSTDCPP_STATICALLY=OFF
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install
'''

[lifecycle.fabricate]
script = '''
rm -f ${PART_DIR}/usr/lib/pkgconfig/espeak-ng.pc
rm -rf ${PART_DIR}/usr/share/vim
'''
