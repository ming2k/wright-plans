name = "tzdata"
version = "2025c"
release = 1
description = "Sources for time zone and daylight saving time data"
license = "LicenseRef-tz"
arch = "any"
url = "https://www.iana.org/time-zones"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://data.iana.org/time-zones/releases/tzcode${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://data.iana.org/time-zones/releases/tzdata${VERSION}.tar.gz"

[lifecycle.prepare]
script = '''
cd source
sed -i "s:sbin:bin:g" Makefile'''

[lifecycle.compile]
script = '''
cd source
make CC=gcc LFLAGS="${LDFLAGS}" -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source

# Install tzcode tools (zic, zdump, tzselect)
make CC=gcc DESTDIR=${PART_DIR} install

# Generate zoneinfo database
./zic -b fat -d ${PART_DIR}/usr/share/zoneinfo africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

./zic -b fat -d ${PART_DIR}/usr/share/zoneinfo/posix africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

./zic -b fat -d ${PART_DIR}/usr/share/zoneinfo/right -L leapseconds africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

# POSIX rules (New York — POSIX requires US DST rules)
./zic -b fat -d ${PART_DIR}/usr/share/zoneinfo -p America/New_York

# Reference data files
install -m644 iso3166.tab leap-seconds.list zone1970.tab zone.tab SECURITY ${PART_DIR}/usr/share/zoneinfo

# /etc/localtime is managed by the user, not the package
rm -f ${PART_DIR}/etc/localtime

# License
install -Dm644 LICENSE ${PART_DIR}/usr/share/licenses/tzdata/LICENSE'''
