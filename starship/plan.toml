[plan]
name = "starship"
version = "1.24.2"
release = 1
description = "The minimal, blazing-fast, and infinitely customizable prompt for any shell"
license = "ISC"
arch = "x86_64"
url = "https://starship.rs/"

[dependencies]
build = ["rust"]

[[sources]]
uri = "https://github.com/starship/starship/archive/refs/tags/v${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
env = {CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target"}
script = '''
cd ${BUILD_DIR}
cargo build --release --locked
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/starship ${PKG_DIR}/usr/bin/starship
install -dm755 ${PKG_DIR}/usr/share/bash-completion/completions
install -dm755 ${PKG_DIR}/usr/share/zsh/site-functions
install -dm755 ${PKG_DIR}/usr/share/fish/vendor_completions.d
target/release/starship completions bash > ${PKG_DIR}/usr/share/bash-completion/completions/starship
target/release/starship completions zsh  > ${PKG_DIR}/usr/share/zsh/site-functions/_starship
target/release/starship completions fish > ${PKG_DIR}/usr/share/fish/vendor_completions.d/starship.fish
'''
