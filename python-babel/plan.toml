name = "python-babel"
version = "2.18.0"
release = 1
description = "Internationalization utilities for Python"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://babel.pocoo.org/"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/b/babel/babel-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
