[plan]
name = "ffmpeg"
version = "8.0.1"
release = 1
description = "Complete, cross-platform solution to record, convert and stream audio and video"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://ffmpeg.org"

[dependencies]
build = ["gcc", "make", "nasm", "pkgconf"]
link = [
    "alsa-lib",
    "aom",
    "dav1d",
    "freetype",
    "gnutls",
    "libass",
    "libdrm",
    "libglvnd",
    "libvorbis",
    "libvpx",
    "libwebp",
    "libxml2",
    "mesa",
    "opus",
    "pipewire",
    "vulkan-loader",
    "x264",
    "x265",
    "zlib",
    "bzip2",
    "lz4",
    "zstd",
]

[[sources]]
uri = "https://ffmpeg.org/releases/ffmpeg-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure \
  --prefix=/usr \
  --disable-debug \
  --disable-static \
  --disable-stripping \
  --enable-shared \
  --enable-gpl \
  --enable-version3 \
  --enable-gnutls \
  --enable-libass \
  --enable-libaom \
  --enable-libdav1d \
  --enable-libfreetype \
  --enable-libvorbis \
  --enable-libvpx \
  --enable-libwebp \
  --enable-libx264 \
  --enable-libx265 \
  --enable-libxml2 \
  --enable-libopus \
  --enable-vulkan \
  --enable-libdrm \
  --enable-lto \
  --enable-pic
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
