[plan]
name = "glibc"
version = "2.43"
release = 4
description = "The GNU C Library"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libc/"

[dependencies]
runtime = ["linux-api-headers >= 4.10", "tzdata >= 2025c"]
build = ["bison", "gawk", "gcc", "make", "python", "sed"]

[sources]
uris = [
"https://ftp-gnu-org.ip-connect.vn.ua/libc/glibc-${PKG_VERSION}.tar.gz",
]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = """
# Glibc requires an out-of-tree build
mkdir -pv ${BUILD_DIR}/build
cd ${BUILD_DIR}/build

# _FORTIFY_SOURCE=3 conflicts with --enable-fortify-source
CFLAGS="${CFLAGS/-Wp,-D_FORTIFY_SOURCE=3/}"

cat > configparms << EOF
slibdir=/usr/lib
rtlddir=/usr/lib
sbindir=/usr/bin
rootsbindir=/usr/bin
EOF

../configure                          \\
  --prefix=/usr                       \\
  --libdir=/usr/lib                   \\
  --libexecdir=/usr/lib               \\
  --with-headers=/usr/include         \\
  --enable-bind-now                   \\
  --enable-cet                        \\
  --enable-fortify-source             \\
  --enable-kernel=5.4                 \\
  --enable-multi-arch                 \\
  --enable-stack-protector=strong     \\
  --disable-nscd                      \\
  --disable-profile                   \\
  --disable-werror
"""

[lifecycle.compile]
dockyard = "strict"
script = """
cd ${BUILD_DIR}/build
make -O -j$(nproc)
"""

[lifecycle.check]
dockyard = "none"
optional = true
script = """
cd ${BUILD_DIR}/build
make -O check || true
"""

[lifecycle.package]
dockyard = "none"
script = """
cd ${BUILD_DIR}/build

mkdir -p ${PKG_DIR}/etc

make DESTDIR=${PKG_DIR} install

# Remove stale cache — regenerated by ldconfig post-install
rm -f ${PKG_DIR}/etc/ld.so.cache

# tzselect, zdump, zic are provided by tzdata
rm -f ${PKG_DIR}/usr/bin/{tzselect,zdump,zic}

# Fix hardcoded /usr prefix in ldd so it resolves via /lib symlink
sed '/RTLDLIST=/s@/usr@@g' -i ${PKG_DIR}/usr/bin/ldd

# nsswitch.conf
cat > ${PKG_DIR}/etc/nsswitch.conf << "NSEOF"
# Begin /etc/nsswitch.conf

passwd: files
group: files
shadow: files

hosts: files dns
networks: files

protocols: files
services: files
ethers: files
rpc: files

# End /etc/nsswitch.conf
NSEOF

# ld.so.conf
cat > ${PKG_DIR}/etc/ld.so.conf << "LDEOF"
# Begin /etc/ld.so.conf
/usr/local/lib
/opt/lib

include /etc/ld.so.conf.d/*.conf

LDEOF
mkdir -pv ${PKG_DIR}/etc/ld.so.conf.d
"""

[lifecycle.post_package]
dockyard = "none"
script = """
localedef -i C -f UTF-8 C.UTF-8
localedef -i cs_CZ -f UTF-8 cs_CZ.UTF-8
localedef -i de_DE -f ISO-8859-1 de_DE
localedef -i de_DE@euro -f ISO-8859-15 de_DE@euro
localedef -i de_DE -f UTF-8 de_DE.UTF-8
localedef -i el_GR -f ISO-8859-7 el_GR
localedef -i en_GB -f ISO-8859-1 en_GB
localedef -i en_GB -f UTF-8 en_GB.UTF-8
localedef -i en_HK -f ISO-8859-1 en_HK
localedef -i en_PH -f ISO-8859-1 en_PH
localedef -i en_US -f ISO-8859-1 en_US
localedef -i en_US -f UTF-8 en_US.UTF-8
localedef -i es_ES -f ISO-8859-15 es_ES@euro
localedef -i es_MX -f ISO-8859-1 es_MX
localedef -i fa_IR -f UTF-8 fa_IR
localedef -i fr_FR -f ISO-8859-1 fr_FR
localedef -i fr_FR@euro -f ISO-8859-15 fr_FR@euro
localedef -i fr_FR -f UTF-8 fr_FR.UTF-8
localedef -i is_IS -f ISO-8859-1 is_IS
localedef -i is_IS -f UTF-8 is_IS.UTF-8
localedef -i it_IT -f ISO-8859-1 it_IT
localedef -i it_IT -f ISO-8859-15 it_IT@euro
localedef -i it_IT -f UTF-8 it_IT.UTF-8
localedef -i ja_JP -f EUC-JP ja_JP
localedef -i ja_JP -f UTF-8 ja_JP.UTF-8
localedef -i nl_NL@euro -f ISO-8859-15 nl_NL@euro
localedef -i ru_RU -f KOI8-R ru_RU.KOI8-R
localedef -i ru_RU -f UTF-8 ru_RU.UTF-8
localedef -i se_NO -f UTF-8 se_NO.UTF-8
localedef -i ta_IN -f UTF-8 ta_IN.UTF-8
localedef -i tr_TR -f UTF-8 tr_TR.UTF-8
localedef -i zh_CN -f GB18030 zh_CN.GB18030
localedef -i zh_HK -f BIG5-HKSCS zh_HK.BIG5-HKSCS
localedef -i zh_TW -f UTF-8 zh_TW.UTF-8
"""

[backup]
files = ["/etc/nsswitch.conf", "/etc/ld.so.conf", "/etc/localtime"]

[install_scripts]
post_install = "ldconfig"
post_upgrade = "ldconfig"
