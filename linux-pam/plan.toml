[plan]
name = "linux-pam"
version = "1.7.2"
release = 4
description = "Pluggable Authentication Modules for Linux"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/linux-pam/linux-pam"

[dependencies]
runtime = ["libsystemd"]
build = ["gcc", "meson", "ninja", "pkgconf"]
link = ["glibc"]

[[sources]]
uri = "https://github.com/linux-pam/linux-pam/releases/download/v${PKG_VERSION}/Linux-PAM-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[options]
strip = true

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir -p build
cd build
meson setup .. \
    --prefix=/usr \
    --buildtype=release \
    -Dsbindir=/usr/bin \
    -Dlogind=enabled \
    -Deconf=disabled \
    -Dselinux=disabled \
    -Delogind=disabled \
    -Dpam_userdb=disabled \
    -Dpwaccess=disabled \
    -Dvendordir='' \
    -Ddocs=disabled \
    -Ddocdir=/usr/share/doc/Linux-PAM-${PKG_VERSION}
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PKG_DIR} ninja install

chmod -v 4755 ${PKG_DIR}/usr/bin/unix_chkpwd

rm -rf ${PKG_DIR}/usr/lib/systemd

install -vdm755 ${PKG_DIR}/etc/pam.d

cat > ${PKG_DIR}/etc/pam.d/system-account << 'PAMEOF'
# Begin /etc/pam.d/system-account
account   required    pam_unix.so
# End /etc/pam.d/system-account
PAMEOF

cat > ${PKG_DIR}/etc/pam.d/system-auth << 'PAMEOF'
# Begin /etc/pam.d/system-auth
auth      required    pam_unix.so
# End /etc/pam.d/system-auth
PAMEOF

cat > ${PKG_DIR}/etc/pam.d/system-session << 'PAMEOF'
# Begin /etc/pam.d/system-session
session   required    pam_unix.so
# End /etc/pam.d/system-session
PAMEOF

cat > ${PKG_DIR}/etc/pam.d/system-password << 'PAMEOF'
# Begin /etc/pam.d/system-password
password  required    pam_unix.so       yescrypt shadow try_first_pass
# End /etc/pam.d/system-password
PAMEOF

cat > ${PKG_DIR}/etc/pam.d/other << 'PAMEOF'
# Begin /etc/pam.d/other
auth        required        pam_warn.so
auth        required        pam_deny.so
account     required        pam_warn.so
account     required        pam_deny.so
password    required        pam_warn.so
password    required        pam_deny.so
session     required        pam_warn.so
session     required        pam_deny.so
# End /etc/pam.d/other
PAMEOF
'''


[lifecycle.package]
hooks.post_install = "ldconfig 2>/dev/null || true"
hooks.post_upgrade = "ldconfig 2>/dev/null || true"
backup = [
    "/etc/pam.d/system-account",
    "/etc/pam.d/system-auth",
    "/etc/pam.d/system-session",
    "/etc/pam.d/system-password",
    "/etc/pam.d/other",
]
