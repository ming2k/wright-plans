name = "sphinxcontrib-jsmath"
version = "1.0.1"
release = 1
description = "Sphinx extension for rendering math via JavaScript"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/sphinx-doc/sphinxcontrib-jsmath"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/b2/e8/9ed3830aeed71f17c026a07a5097edcf44b692850ef215b161b8ad875729/sphinxcontrib-jsmath-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
