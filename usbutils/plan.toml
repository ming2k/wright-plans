name = "usbutils"
version = "019"
release = 1
description = "USB device utilities including lsusb"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://github.com/gregkh/usbutils"

link_deps = ['glibc', 'libusb', 'systemd']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/gregkh/usbutils/archive/v${VERSION}/usbutils-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} meson install -C ${WORKDIR}/build'''

[[output]]
runtime_deps = ['hwdata', 'glibc', 'libusb', 'systemd']
