name = "cargo-c"
version = "0.10.20"
release = 2
description = "Helper to build and install C-ABI compatible dynamic and static libraries from Rust"
license = "MIT"
arch = "x86_64"
url = "https://github.com/lu-zero/cargo-c"

link_deps = ['openssl']
build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/lu-zero/cargo-c/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${BUILD_DIR}/.cargo', CARGO_TARGET_DIR = '${BUILD_DIR}/target' }
script = '''
cd source/cargo-c-${VERSION}
LIBGIT2_NO_PKG_CONFIG=1 cargo build --release'''

[lifecycle.staging]
script = '''
cd source/cargo-c-${VERSION}
install -Dm755 target/release/cargo-cbuild   ${STAGING_DIR}/usr/bin/cargo-cbuild
install -Dm755 target/release/cargo-cinstall ${STAGING_DIR}/usr/bin/cargo-cinstall
install -Dm755 target/release/cargo-capi     ${STAGING_DIR}/usr/bin/cargo-capi
install -Dm755 target/release/cargo-ctest    ${STAGING_DIR}/usr/bin/cargo-ctest'''

[[output]]
runtime_deps = ['openssl']
