name = "libadwaita"
version = "1.9.0"
release = 1
description = "Library with common API for Wayland GNOME applications"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
build = ["meson", "ninja"]
link = ["glib", "gtk4"]

[[sources]]
sha256 = "SKIP"
url = "https://download.gnome.org/sources/libadwaita/1.9/libadwaita-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
dockyard = "relaxed"
ENV = "PATH=/usr/bin:/bin"
script = '''
cd source
meson setup build ${WORKDIR} --prefix=/usr --buildtype=release -Dintrospection=enabled -Dvapi=false -Dtests=false -Ddocumentation=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
