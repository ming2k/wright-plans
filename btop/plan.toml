name = "btop"
version = "1.4.6"
release = 1
description = "A monitor of system resources, bpytop ported to C++"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/aristocratos/btop"

link_deps = ['libdrm']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/aristocratos/btop/archive/refs/tags/v${VERSION}/btop-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
script = '''
cd source/btop-${VERSION}
make all -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/btop-${VERSION}
make DESTDIR=${STAGING_DIR} PREFIX=/usr install'''

[[output]]
runtime_deps = ['libdrm']

[output.hooks]
post_install = "setcap 'cap_perfmon=+ep' /usr/bin/btop"
post_upgrade = "setcap 'cap_perfmon=+ep' /usr/bin/btop"
