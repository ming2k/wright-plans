name = "sdl2"
version = "2.32.10"
release = 1
description = "Simple DirectMedia Layer"
license = "Zlib"
arch = "x86_64"
url = "https://www.libsdl.org/"

link_deps = ['alsa-lib', 'dbus', 'libxkbcommon', 'pipewire', 'wayland']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.libsdl.org/release/SDL2-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/SDL2-${VERSION}
./configure \
  --prefix=/usr \
  --disable-static \
  --enable-video-wayland \
  --disable-video-x11 \
  --disable-rpath'''

[pipeline.compile]
script = '''
cd source/SDL2-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/SDL2-${VERSION}
DESTDIR=${STAGING_DIR} make install

rm -f ${STAGING_DIR}/usr/lib/libSDL2.a
test -f ${STAGING_DIR}/usr/lib/pkgconfig/sdl2.pc'''

[[output]]
runtime_deps = ['alsa-lib', 'dbus', 'libxkbcommon', 'pipewire', 'wayland']
