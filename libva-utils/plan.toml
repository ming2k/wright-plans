name = "libva-utils"
version = "2.23.0"
release = 1
description = "Utilities for VA-API, including vainfo"
license = "MIT"
arch = "x86_64"
url = "https://github.com/intel/libva-utils"

link_deps = ['libdrm', 'libva', 'wayland']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/intel/libva-utils/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libva-utils-${VERSION}
meson setup build \
--prefix=/usr                        \
--buildtype=release                  \
-D tests=false'''

[lifecycle.compile]
script = '''
cd source/libva-utils-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/libva-utils-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['libdrm', 'libva', 'wayland']
