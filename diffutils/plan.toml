[plan]
name = "diffutils"
version = "3.12"
release = 1
description = "Programs that show the differences between files or directories"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/diffutils/"

[dependencies]
build = ["gcc", "make"]
[sources]
uris = ["https://ftp.gnu.org/gnu/diffutils/diffutils-3.12.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
