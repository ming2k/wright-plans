name = "alsa-ucm-conf"
version = "1.2.15.3"
release = 1
description = "ALSA Use Case Manager configuration files"
license = "BSD-3-Clause"
arch = "any"
url = "https://github.com/alsa-project/alsa-ucm-conf"

[dependencies]
runtime = ["alsa-lib"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/alsa-project/alsa-ucm-conf/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo "data-only package"'''

[lifecycle.compile]
script = '''
cd source
echo "no build needed"'''

[lifecycle.staging]
script = '''
cd source
mkdir -p ${PART_DIR}/usr/share/alsa
cp -a ucm2 ${PART_DIR}/usr/share/alsa/ucm2'''
