name = "xray"
version = "26.3.27"
release = 3
description = "Platform for building proxies to bypass network restrictions"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/XTLS/Xray-core"

[dependencies]
build = ["go"]
optional = ["v2fly-domain-list-community", "v2fly-geoip", "v2ray-rules-dat"]

[[sources]]
type = "http"
sha256 = "992a4997e6bb846d11469435d687f99ef812fcde1e0a009bb8e95189ea20331d"
url = "https://github.com/XTLS/Xray-core/archive/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.prepare]
isolation = "none"
script = '''
cd source
export PATH=/usr/lib/go/bin:$PATH
export GOPROXY=https://proxy.golang.org,direct
export GOMODCACHE=/tmp/go-mod-cache
rm -rf vendor
go mod vendor'''

[lifecycle.compile]
isolation = "relaxed"
script = '''
cd source
export PATH=/usr/lib/go/bin:$PATH
export CGO_ENABLED=0
export GOCACHE=/tmp/go-cache/build
export GOPROXY=off
export GOSUMDB=off
export GOFLAGS="-trimpath -mod=vendor"
go build -ldflags "-X github.com/xtls/xray-core.codename=xray -X github.com/xtls/xray-core.version=${VERSION} -buildid=" -o xray ./main'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 xray ${PART_DIR}/usr/bin/xray
install -dm755 ${PART_DIR}/etc/xray'''

[output]
backup = ["/etc/xray/config.json"]

[hooks]
post_install = '''
echo ":: Create /etc/xray/config.json before starting xray"
echo ":: Provide your own service file or launcher as needed"
echo ":: This plan does not install a systemd unit"
echo ":: Optional geodata can be installed via v2fly-domain-list-community, v2fly-geoip, or v2ray-rules-dat"
echo ":: Those plans install to their own /usr/share/<plan-name>/ directories"

'''
