name = "talloc"
version = "2.4.4"
release = 1
description = "Hierarchical memory allocator"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://talloc.samba.org/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "55e47994018c13743485544e7206780ffbb3c8495e704a99636503e6e77abf59"
url = "https://download.samba.org/pub/talloc/talloc-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/talloc-${VERSION}
./configure --prefix=/usr --disable-python'''

[pipeline.compile]
script = '''
cd source/talloc-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/talloc-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

