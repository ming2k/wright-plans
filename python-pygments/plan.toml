name = "python-pygments"
version = "2.20.0"
release = 1
description = "Python syntax highlighter"
license = "BSD-2-Clause"
arch = "any"
url = "https://pygments.org/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/p/pygments/pygments-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/pygments-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
