name = "uchardet"
version = "0.0.8"
release = 1
description = "Universal charset detection library"
license = "MPL-1.1"
arch = "x86_64"
url = "https://www.freedesktop.org/software/uchardet/"

[dependencies]
build = ["gcc", "make", "cmake"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.freedesktop.org/software/uchardet/releases/uchardet-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
mkdir -p ${WORKDIR}/build && cd source/build
cmake -DCMAKE_INSTALL_PREFIX=/usr \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
      -DBUILD_STATIC=OFF \
      ..'''

[lifecycle.compile]
script = '''
cd source/build
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
make DESTDIR=${PART_DIR} install'''
