name = "expat"
version = "2.7.3"
release = 1
description = "Stream oriented C library for parsing XML"
license = "MIT"
arch = "x86_64"
url = "https://libexpat.github.io/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/libexpat/libexpat/releases/download/R_2_7_3/expat-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr    \
--disable-static \
--docdir=/usr/share/doc/expat-${VERSION}'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
install -v -m644 doc/*.{html,css} ${PART_DIR}/usr/share/doc/expat-${VERSION}'''
