name = "libxml2"
version = "2.15.1"
release = 1
description = "XML C parser and toolkit"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/libxml2"

[dependencies]
runtime = ["icu", "python"]
build = [
    "doxygen",
    "gcc",
    "icu",
    "meson",
    "ninja",
    "python",
]

[[sources]]
uri = "https://download.gnome.org/sources/libxml2/2.15/libxml2-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir -p build && cd build
meson setup .. --prefix=/usr \
    -D history=enabled \
    -D icu=enabled \
    -D python=enabled \
    -D docs=disabled

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PART_DIR} ninja install

'''

[lifecycle.fabricate]
