name = "luajit"
version = "2.1.1767980792+707c12b"
release = 1
description = "Just-in-time compiler for Lua"
license = "MIT"
arch = "x86_64"
url = "https://luajit.org"

[dependencies]
build = ["make"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/LuaJIT/LuaJIT/archive/707c12b.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo "LuaJIT uses the upstream make-based build"'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) PREFIX=/usr XCFLAGS='-fPIC''''

[lifecycle.staging]
script = '''
cd source
make PREFIX=/usr DESTDIR=${PART_DIR} install

mkdir -p ${PART_DIR}/usr/lib/pkgconfig
cat > ${PART_DIR}/usr/lib/pkgconfig/luajit.pc << PCEOF
prefix=/usr
exec_prefix=\${prefix}
libdir=\${exec_prefix}/lib
includedir=\${prefix}/include/luajit-2.1

Name: LuaJIT
Description: Just-in-time compiler for Lua
Version: ${VERSION}
Libs: -L\${libdir} -lluajit-5.1
Cflags: -I\${includedir}
PCEOF'''

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"
