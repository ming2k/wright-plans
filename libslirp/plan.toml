[plan]
name = "libslirp"
version = "4.9.1"
release = 1
description = "User-mode networking library used by QEMU"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/slirp/libslirp"

[dependencies]
build = ["bash", "python", "meson", "ninja", "pkgconf"]
link = ["glib"]

[[sources]]
uri = "https://gitlab.freedesktop.org/slirp/libslirp/-/archive/v${PART_VERSION}/libslirp-v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
meson setup build \
  --prefix=/usr \
  --buildtype=release \
  -Ddefault_library=shared
"""

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} meson install -C ${BUILD_DIR}/build"

