name = "llama.cpp"
version = "b8693"
release = 3
description = "LLM inference in C/C++"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ggml-org/llama.cpp"

[dependencies]
build = ["gcc", "cmake", "ninja", "pkgconf", "shaderc", "vulkan-headers"]
link = ["openssl", "vulkan-loader"]

[[sources]]
uri = "patches/0001-disable-spirv-opt-for-iq1_m-get_rows-vulkan-shaders.patch"

[[sources]]
uri = "https://github.com/ggml-org/llama.cpp/archive/refs/tags/${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
patch -Np1 < ${FILES_DIR}/0001-disable-spirv-opt-for-iq1_m-get_rows-vulkan-shaders.patch || true
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr/lib/llama.cpp \
  -DBUILD_SHARED_LIBS=OFF \
  -DGGML_NATIVE=OFF \
  -DGGML_VULKAN=ON \
  -DLLAMA_OPENSSL=ON
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install
'''

[lifecycle.fabricate]
script = '''
mkdir -p ${PART_DIR}/usr/bin
for bin in ${PART_DIR}/usr/lib/llama.cpp/bin/*; do
  ln -sf /usr/lib/llama.cpp/bin/$(basename "$bin") ${PART_DIR}/usr/bin/$(basename "$bin")
done

mkdir -p ${PART_DIR}/usr/lib/pkgconfig
ln -sf /usr/lib/llama.cpp/lib/pkgconfig/llama.pc ${PART_DIR}/usr/lib/pkgconfig/llama.pc
'''
