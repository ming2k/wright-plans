name = "libproxy"
version = "0.5.8"
release = 1
description = "Library that provides automatic proxy configuration management"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["duktape", "gsettings-desktop-schemas"]
build = ["gobject-introspection", "meson", "ninja", "pkgconf"]
link = ["glib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/libproxy/libproxy/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Ddocs=false -Dtests=false -Dvapi=false -Dconfig-gnome=true -Dpacrunner-duktape=true'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build'''
