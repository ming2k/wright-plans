name = "libmnl"
version = "1.0.5"
release = 1
description = "Minimalistic Netlink userspace library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.netfilter.org/projects/libmnl/"

[dependencies]
build = ["gcc", "make"]
link = ["glibc"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.netfilter.org/pub/libmnl/libmnl-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
