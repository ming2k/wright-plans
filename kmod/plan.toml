name = "kmod"
version = "34.2"
release = 4
description = "Linux kernel module management tools and library"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git"

link_deps = ['openssl', 'xz', 'zlib', 'zstd']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git/snapshot/kmod-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
isolation = "relaxed"
script = '''
cd source/kmod-${VERSION}
meson setup build          \
  --prefix=/usr            \
  --sbindir=/usr/bin       \
  --buildtype=release      \
  -D manpages=false        \
  -D openssl=enabled       \
  -D xz=enabled            \
  -D zlib=enabled          \
  -D zstd=enabled'''

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/kmod-${VERSION}
meson compile -C build -j$(nproc)'''

[pipeline.staging]
isolation = "relaxed"
script = '''
cd source/kmod-${VERSION}
DESTDIR=${STAGING_DIR} meson install -C build

# Create standard module configuration directories
install -dm755 ${STAGING_DIR}/etc/depmod.d
install -dm755 ${STAGING_DIR}/etc/modprobe.d
install -dm755 ${STAGING_DIR}/usr/lib/depmod.d
install -dm755 ${STAGING_DIR}/usr/lib/modprobe.d'''

[[output]]
runtime_deps = ['openssl', 'xz', 'zlib', 'zstd']
