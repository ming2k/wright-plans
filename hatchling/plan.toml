[plan]
name = "hatchling"
version = "1.29.0"
release = 1
description = "Modern, extensible Python build backend"
license = "MIT"
arch = "x86_64"
url = "https://hatch.pypa.io/"

[dependencies]
build = ["python"]
runtime = ["python", "python-packaging", "python-pathspec", "python-pluggy", "python-trove-classifiers"]

[sources]
uris = ["https://pypi.org/packages/source/h/hatchling/hatchling-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PKG_DIR} --no-build-isolation .
'''
