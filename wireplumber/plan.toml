name = "wireplumber"
version = "0.5.14"
release = 1
description = "Session/policy manager for PipeWire"
license = "MIT"
arch = "x86_64"
url = "https://pipewire.pages.freedesktop.org/wireplumber/"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["glib", "lua", "pipewire", "systemd"]

[[sources]]
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/pipewire/wireplumber/-/archive/${VERSION}/wireplumber-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr                \
--buildtype=release          \
-D doc=disabled              \
-D tests=false               \
-D system-lua=true           \
-D elogind=disabled          \
-D systemd=enabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[hooks]
post_install = "systemctl daemon-reload 2>/dev/null || true"
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
