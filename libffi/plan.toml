name = "libffi"
version = "3.5.2"
release = 1
description = "Portable foreign function interface library"
license = "MIT"
arch = "x86_64"
url = "https://sourceware.org/libffi/"

[dependencies]
build = ["bash", "gcc", "make"]

[[sources]]
uri = "https://github.com/libffi/libffi/releases/download/v${PART_VERSION}/libffi-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
