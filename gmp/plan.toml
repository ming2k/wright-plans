[plan]
name = "gmp"
version = "6.3.0"
release = 2
description = "GNU Multiple Precision Arithmetic Library"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://gmplib.org/"

[dependencies]
build = ["gcc", "m4", "make"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/gmp/gmp-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
sed -i '/long long t1;/,+1s/()/(...)/' configure
'''

[lifecycle.configure]
script = '''
unset CFLAGS CXXFLAGS
cd ${BUILD_DIR}
./configure --prefix=/usr    \
--enable-cxx     \
--disable-static \
--docdir=/usr/share/doc/gmp-6.3.0
'''

[lifecycle.compile]
script = '''
unset CFLAGS CXXFLAGS
cd ${BUILD_DIR}
make -j$(nproc)
make html
'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make check 2>&1 | tee gmp-check-log
awk '/# PASS:/{total+=$3} END{print total}' gmp-check-log
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
make DESTDIR=${PART_DIR} install-html
'''
