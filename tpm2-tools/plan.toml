name = "tpm2-tools"
version = "5.7"
release = 1
description = "The source repository for the Trusted Platform Module (TPM2.0) tools"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/tpm2-software/tpm2-tools"

[dependencies]
runtime = ["tpm2-tss"]
build = ["gcc", "make", "pkgconf"]
link = ["curl", "glibc", "openssl", "tpm2-tss"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/tpm2-software/tpm2-tools/releases/download/${VERSION}/tpm2-tools-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
    --prefix=/usr \
    --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR} DESTDIR=${PART_DIR} install'''
