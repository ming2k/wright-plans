[lifecycle.fabricate.linux-firmware-other]
description = "Firmware files for Linux - miscellaneous remaining firmware"
dependencies.runtime = ["linux-firmware-whence"]
script = '''
FW="${BUILD_DIR}/_installed/usr/lib/firmware"
shopt -s nullglob
mkdir -p ${PART_DIR}/usr/lib/firmware

CLAIMED_DIRS="amdgpu radeon amd-ucode ath3k ar3k ath6k ath10k ath11k ath12k brcm cypress cirrus intel i915 xe ice liquidio mrvl libertas mwlwifi mediatek mellanox netronome nvidia qcom qca rtl_nic rtl_bt rtlwifi rtw88 rtw89 ti-connectivity ti-keystone bnx2 bnx2x qed"

# Copy unclaimed directories
for item in "$FW"/*/; do
dir="$(basename "$item")"
is_claimed=0
for c in ${CLAIMED_DIRS}; do

[ "$dir" = "$c" ] && is_claimed=1 && break
done

[ "$is_claimed" -eq 0 ] && cp -a "$item" ${PART_DIR}/usr/lib/firmware/
done

RALINK_FILES="rt73.bin rt2561.bin rt2561s.bin rt2661.bin rt2860.bin rt2870.bin rt3071.bin rt3290.bin"

# Copy unclaimed top-level files and symlinks
for f in "$FW"/*; do

[ -d "$f" ] && continue
bn="$(basename "$f")"
case "$bn" in
LICEN*|WHENCE|README*) continue ;;
iwlwifi-*|ibt-*|htc_*|ql2*) continue ;;
esac
skip=0
for rf in ${RALINK_FILES}; do

[ "$bn" = "$rf" ] && skip=1 && break
done

[ "$skip" -eq 1 ] && continue
cp -a "$f" ${PART_DIR}/usr/lib/firmware/"$bn"
done

true
'''
