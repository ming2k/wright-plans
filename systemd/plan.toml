    -D mode=release \
    -D install-tests=false \
    -D ldconfig=false \
    -D man=disabled \
    -D rpmmacrosdir=no \
    -D sysvinit-path= \
    -D sysvrcnd-path= \
    -D dbuspolicydir=/usr/share/dbus-1/system.d \
    -D firstboot=true \
    -D sysusers=true \
    -D pam=enabled \
    -D pamconfdir=/usr/lib/pam.d \
    -D logind=true \
    -D networkd=true \
    -D resolve=true \
    -D seccomp=enabled \
    -D libidn2=enabled \
    -D lz4=enabled \
    -D dns-over-tls=openssl \
    -D ukify=auto \
    -D bootloader=enabled \
    -D homed=disabled \
    -D sysupdate=disabled \
    -D audit=disabled \
    -D selinux=disabled \
    -D libcryptsetup=disabled \
    -D default-dnssec=no \
    -D default-kill-user-processes=false \
    -D default-locale='C.UTF-8' \
    -D fallback-hostname='theseus' \
    -D nologin-path=/usr/bin/nologin \
    -D dev-kvm-mode=0660 \
    -D nobody-group=nogroup \
    -D sbat-distro=theseus \
