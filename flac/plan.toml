name = "flac"
version = "1.5.0"
release = 1
description = "Free Lossless Audio Codec"
license = "BSD-3-Clause, GPL-2.0-or-later"
arch = "x86_64"
url = "https://xiph.org/flac/"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["libogg"]

[[sources]]
type = "http"
sha256 = "f2c1c76592a82ffff8413ba3c4a1299b6c7ab06c734dee03fd88630485c2b920"
url = "https://downloads.xiph.org/releases/flac/flac-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --disable-static \
  --disable-rpath \
  --disable-doxygen-docs \
  --disable-examples \
  --disable-thorough-tests \
  --with-ogg=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
