name = "bottom"
version = "0.12.3"
release = 1
description = "Yet another cross-platform graphical process/system monitor"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ClementTsang/bottom"

[dependencies]
build = ["rust"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/ClementTsang/bottom/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
env = {'CARGO_HOME': '${BUILD_DIR}/.cargo', 'CARGO_TARGET_DIR': '${BUILD_DIR}/target'}
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/btm ${PART_DIR}/usr/bin/btm'''
