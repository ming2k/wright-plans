name = "which"
version = "2.23"
release = 1
description = "Utility to show the full path of commands"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://carlowood.github.io/which/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://carlowood.github.io/which/which-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
