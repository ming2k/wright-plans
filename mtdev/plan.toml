name = "mtdev"
version = "1.1.7"
release = 1
description = "Multitouch protocol translation library"
license = "MIT"
arch = "x86_64"
url = "https://bitmath.org/code/mtdev/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://bitmath.org/code/mtdev/mtdev-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
