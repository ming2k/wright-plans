[plan]
name = "python-urllib3"
version = "2.6.3"
release = 1
description = "HTTP library with thread-safe connection pooling and file post support"
license = "MIT"
arch = "x86_64"
url = "https://urllib3.readthedocs.io/"

[dependencies]
runtime = ["python"]
build = ["python", "hatchling", "hatch-vcs"]

[[sources]]
uri = "https://github.com/urllib3/urllib3/archive/${PART_VERSION}/python-urllib3-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
SETUPTOOLS_SCM_PRETEND_VERSION=${PART_VERSION} pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .
'''
