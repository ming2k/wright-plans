name = "ninja"
version = "1.13.2"
release = 1
description = "Small build system with a focus on speed"
license = "Apache-2.0"
arch = "x86_64"
url = "https://ninja-build.org/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ninja-build/ninja/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source/ninja-${VERSION}
python3 configure.py --bootstrap'''

[lifecycle.staging]
script = '''
cd source/ninja-${VERSION}
install -Dm755 ninja ${STAGING_DIR}/usr/bin/ninja
install -Dm644 misc/bash-completion ${STAGING_DIR}/usr/share/bash-completion/completions/ninja'''

[[output]]
runtime_deps = ['python']
