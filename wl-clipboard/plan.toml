name = "wl-clipboard"
version = "2.2.1"
release = 1
description = "Command-line copy/paste utilities for Wayland"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/bugaevc/wl-clipboard"

[dependencies]
build = ["meson", "ninja"]
link = ["wayland", "wayland-protocols"]

[[sources]]
sha256 = "6eb8081207fb5581d1d82c4bcd9587205a31a3d47bea3ebeb7f41aa1143783eb"
url = "https://github.com/bugaevc/wl-clipboard/archive/v${VERSION}/wl-clipboard-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
