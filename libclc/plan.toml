name = "libclc"
version = "19.1.7"
release = 1
description = "OpenCL C library implementation for LLVM"
license = "Apache-2.0"
arch = "x86_64"
url = "https://libclc.llvm.org/"

[dependencies]
runtime = ["llvm"]
build = ["cmake", "llvm", "make"]

[[sources]]
uri = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${PART_VERSION}/llvm-project-${PART_VERSION}.src.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir build-libclc && cd build-libclc
cmake ../libclc                              \
-DCMAKE_INSTALL_PREFIX=/usr            \
-DCMAKE_BUILD_TYPE=Release

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build-libclc
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build-libclc
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
