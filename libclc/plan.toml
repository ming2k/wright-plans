name = "libclc"
version = "19.1.7"
release = 1
description = "OpenCL C library implementation for LLVM"
license = "Apache-2.0"
arch = "x86_64"
url = "https://libclc.llvm.org/"

[dependencies]
build = ["cmake", "llvm", "make"]
runtime = ["glibc"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${VERSION}/llvm-project-${VERSION}.src.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
mkdir build-libclc && cd build-libclc
cmake ../libclc                              \
-DCMAKE_INSTALL_PREFIX=/usr            \
-DCMAKE_BUILD_TYPE=Release'''

[lifecycle.compile]
script = '''
cd source/build-libclc
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build-libclc
make DESTDIR=${PART_DIR} install'''
