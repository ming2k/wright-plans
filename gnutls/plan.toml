name = "gnutls"
version = "3.8.12"
release = 1
description = "A secure communications library implementing SSL/TLS and DTLS"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.gnutls.org/"

link_deps = ['libunistring']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.gnupg.org/ftp/gcrypt/gnutls/v3.8/gnutls-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/gnutls-${VERSION}
./configure --prefix=/usr          \
--disable-static       \
--with-default-trust-store-pkcs11="pkcs11:"'''

[lifecycle.compile]
script = '''
cd source/gnutls-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/gnutls-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['libtasn1', 'nettle', 'p11-kit', 'libunistring']
