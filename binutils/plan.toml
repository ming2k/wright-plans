name = "binutils"
version = "2.46.0"
release = 1
description = "A set of programs to assemble and manipulate binary and object files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/binutils/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/binutils/binutils-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/binutils-${VERSION}
mkdir -v build
cd       build
../configure --prefix=/usr       \
--sysconfdir=/etc   \
--enable-gold       \
--enable-ld=default \
--enable-plugins    \
--enable-shared     \
--disable-werror    \
--enable-64-bit-bfd \
--enable-new-dtags  \
--without-zlib      \
--without-zstd      \
--enable-default-hash-style=gnu'''

[pipeline.compile]
script = '''
cd source/binutils-${VERSION}/build
make tooldir=/usr'''

[pipeline.staging]
script = '''
cd source/binutils-${VERSION}/build
make tooldir=/usr
make DESTDIR=${STAGING_DIR} tooldir=/usr install

# Remove static libraries
rm -fv ${STAGING_DIR}/usr/lib/lib{bfd,ctf,ctf-nobfd,gprofng,opcodes,sframe}.a'''

[[output]]
hooks.post_install = '''
# Clean old binutils residuals
rm -f /usr/lib/libbfd-2.45.so /usr/lib/libbfd-2.44.so /usr/lib/libbfd-2.43.1.so
rm -f /usr/lib/libsframe.so.1.0.0
ldconfig

'''
hooks.post_upgrade = "ldconfig"
