name = "p11-kit"
version = "0.26.2"
release = 3
description = "Library for loading and sharing PKCS#11 modules"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://p11-glue.github.io/p11-glue/p11-kit.html"

link_deps = ['libtasn1', 'libffi']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/p11-glue/p11-kit/releases/download/${VERSION}/p11-kit-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
isolation = "relaxed"
script = '''
meson setup source/p11-kit-${VERSION}/build source/p11-kit-${VERSION} \
--prefix=/usr               \
--buildtype=release         \
-D trust_paths=/etc/ca-certificates/trust-source:/usr/share/ca-certificates/trust-source'''

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/p11-kit-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
isolation = "relaxed"
script = '''
cd source/p11-kit-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install

# Create update-ca-trust script
cat > ${STAGING_DIR}/usr/bin/update-ca-trust << 'SCRIPT'
#!/bin/sh
# Extract CA certificates from p11-kit trust store
# openssl-directory first, then bundle — bundle must come last
# so it isn't deleted by --overwrite on the directory
trust extract --format=openssl-directory --filter=ca-anchors \
  --overwrite --purpose=server-auth /etc/ssl/certs/
trust extract --format=pem-bundle --filter=ca-anchors \
  --overwrite --purpose=server-auth /etc/ssl/certs/ca-certificates.crt
SCRIPT
chmod 755 ${STAGING_DIR}/usr/bin/update-ca-trust

# Link trust-extract-compat to update-ca-trust
ln -sf ../../bin/update-ca-trust ${STAGING_DIR}/usr/libexec/p11-kit/trust-extract-compat'''

[[output]]
runtime_deps = ['libtasn1', 'libffi']
