name = "neovim"
version = "0.12.1"
release = 1
description = "Hyperextensible Vim-based text editor"
license = "Apache-2.0"
arch = "x86_64"
url = "https://neovim.io"
maintainer = "Neovim contributors <neovim@neovim.io>"

[dependencies]
build = [
    "cmake",
    "curl",
    "gcc",
    "gettext",
    "make",
]
link = ["glibc"]
optional = [ "python", "xclip" ]

[[sources]]
uri = "https://github.com/neovim/neovim/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[options]
ccache = true

[lifecycle.configure]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
make CMAKE_BUILD_TYPE=Release CMAKE_INSTALL_PREFIX=/usr deps

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make CMAKE_BUILD_TYPE=Release CMAKE_INSTALL_PREFIX=/usr

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make CMAKE_INSTALL_PREFIX=/usr DESTDIR=${PART_DIR} install

'''

[hooks]
post_install = '''
update-desktop-database -q 2>/dev/null || true

'''
post_upgrade = '''
update-desktop-database -q 2>/dev/null || true

'''

[lifecycle.fabricate]
