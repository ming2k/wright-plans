name = "libavif"
version = "1.3.0"
release = 1
description = "Library for encoding and decoding .avif files"
license = "BSD-2-Clause"
arch = "x86_64"

[dependencies]
build = ["cmake", "ninja", "pkgconf", "gcc"]
link = ["aom", "dav1d", "libpng", "libjpeg-turbo", "libyuv"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/AOMediaCodec/libavif/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DAVIF_CODEC_AOM=SYSTEM -DAVIF_CODEC_DAV1D=SYSTEM -DAVIF_LIBYUV=SYSTEM -DAVIF_BUILD_APPS=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
