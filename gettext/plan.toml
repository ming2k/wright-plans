[plan]
name = "gettext"
version = "0.26"
release = 1
description = "Utilities for internationalization and localization"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gettext/"

[dependencies]
build = ["gcc", "make"]
[sources]
uris = ["https://ftp.gnu.org/gnu/gettext/gettext-0.26.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr    \
--disable-static \
--docdir=/usr/share/doc/gettext-0.26
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
chmod -v 0755 ${PKG_DIR}/usr/lib/preloadable_libintl.so
'''
