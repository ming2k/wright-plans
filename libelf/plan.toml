[plan]
name = "libelf"
version = "0.193"
release = 1
description = "Library for handling ELF files (from elfutils)"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://sourceware.org/elfutils/"

[dependencies]
build = ["gcc", "make"]
link = ["zlib"]
[sources]
uris = ["https://sourceware.org/ftp/elfutils/0.193/elfutils-0.193.tar.bz2"]
sha256 = [
    "7857f44b624f4d8d421df851aaae7b1402cfe6bcdd2d8049f15fc07d3dde7635",
]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr        \
--disable-debuginfod \
--enable-libdebuginfod=dummy
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -C libelf DESTDIR=${PKG_DIR} install
mkdir -p ${PKG_DIR}/usr/lib/pkgconfig
install -vm644 config/libelf.pc ${PKG_DIR}/usr/lib/pkgconfig/libelf.pc
rm -f ${PKG_DIR}/usr/lib/libelf.a
'''
