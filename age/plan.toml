name = "age"
version = "1.3.1"
release = 1
description = "A simple, modern and secure encryption tool"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/FiloSottile/age"


build_deps = ['go']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/FiloSottile/age/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "relaxed"
env = { GOPATH = '${BUILD_DIR}/.go', GOCACHE = '${BUILD_DIR}/.cache/go-build', CGO_ENABLED = '0' }
script = '''
cd source/age-${VERSION}
go build -trimpath -ldflags="-s -w -buildid=" -o age ./cmd/age
go build -trimpath -ldflags="-s -w -buildid=" -o age-keygen ./cmd/age-keygen'''

[lifecycle.staging]
script = '''
cd source/age-${VERSION}
install -Dm755 age ${STAGING_DIR}/usr/bin/age
install -Dm755 age-keygen ${STAGING_DIR}/usr/bin/age-keygen'''

