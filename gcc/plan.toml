name = "gcc"
version = "16.1.0"
release = 2
description = "The GNU Compiler Collection - C and C++ frontends"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://gcc.gnu.org/"

link_deps = ['gcc:gcc-libs', 'gmp', 'mpc', 'mpfr', 'zlib', 'glibc']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/gcc/gcc-${VERSION}/gcc-${VERSION}.tar.xz"
extract_to = "source"

[options]
ccache = true

[pipeline.prepare]
script = '''
cd source/gcc-${VERSION}
sed -e '/m64=/s/lib64/lib/' -i.orig gcc/config/i386/t-linux64
mkdir -v build'''

[pipeline.configure]
script = '''
cd source/gcc-${VERSION}/build
SED=sed \
../configure --prefix=/usr \
    LD=ld \
    --enable-languages=c,c++,jit \
    --enable-default-pie \
    --enable-default-ssp \
    --enable-host-pie \
    --enable-host-shared \
    --disable-multilib \
    --disable-bootstrap \
    --disable-fixincludes \
    --enable-shared \
    --enable-threads=posix \
    --enable-__cxa_atexit \
    --enable-clocale=gnu \
    --enable-gnu-indirect-function \
    --enable-linker-build-id \
    --enable-lto \
    --enable-plugin \
    --enable-install-libiberty \
    --with-system-zlib \
    --with-linker-hash-style=gnu \
    --disable-werror'''

[pipeline.compile]
script = '''
cd source/gcc-${VERSION}/build
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gcc-${VERSION}/build
make DESTDIR=${STAGING_DIR} install
ln -sf gcc ${STAGING_DIR}/usr/bin/cc'''

[[output]]
name = "gcc-libs"
description = "GCC runtime libraries"
include = [
    "/usr/lib/libgcc_s.so*",
    "/usr/lib/libgomp.so*",
    "/usr/lib/libatomic.so*",
    "/usr/lib/libitm.so*",
    "/usr/lib/libasan.so*",
    "/usr/lib/liblsan.so*",
    "/usr/lib/libtsan.so*",
    "/usr/lib/libubsan.so*",
    "/usr/lib/libhwasan.so*",
]
runtime_deps = ['glibc']
hooks.post_install = "ldconfig"
hooks.post_upgrade = "ldconfig"

[[output]]
name = "libstdc++"
description = "GNU C++ standard library"
include = [
    "/usr/lib/libstdc++.so*",
    "/usr/include/c++/**",
    "/usr/share/gdb/auto-load/**",
]
runtime_deps = ['glibc', 'gcc:gcc-libs']
hooks.post_install = "ldconfig"
hooks.post_upgrade = "ldconfig"

[[output]]
name = "libgccjit"
description = "GCC JIT compilation library"
include = [
    "/usr/lib/libgccjit.so*",
    "/usr/include/libgccjit*.h",
]
runtime_deps = ['glibc', 'gcc:gcc-libs', 'gmp', 'mpc', 'mpfr', 'zlib']
hooks.post_install = "ldconfig"
hooks.post_upgrade = "ldconfig"

[[output]]
name = "gcc"
description = "The GNU Compiler Collection - C and C++ compiler"
runtime_deps = ['binutils', 'gcc:gcc-libs', 'gcc:libstdc++']
