name = "libtheora"
version = "1.2.0"
release = 1
description = "Theora video compression reference implementation"
license = "BSD-3-Clause"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["libogg", "libvorbis"]

[[sources]]
type = "http"
sha256 = "279327339903b544c28a92aeada7d0dcfd0397b59c2f368cc698ac56f515906e"
url = "https://downloads.xiph.org/releases/theora/libtheora-1.2.0.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --enable-shared --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
