name = "python-jinja2"
version = "3.1.6"
release = 1
description = "A simple pythonic template language"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://palletsprojects.com/p/jinja/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/j/jinja2/jinja2-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[output]
runtime_deps = ['python-markupsafe:default', 'python:default']
