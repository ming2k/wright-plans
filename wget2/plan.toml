name = "wget2"
version = "2.2.1"
release = 1
description = "GNU Wget2 - a file and recursive website downloader (next-gen wget)"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/wget/"

link_deps = ['gnutls', 'libidn2', 'libpsl', 'nghttp2', 'brotli', 'zstd', 'zlib', 'pcre2', 'gpgme']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/wget/wget2-${VERSION}.tar.lz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/wget2-${VERSION}
./configure --prefix=/usr      \
    --sysconfdir=/etc          \
    --with-ssl=gnutls          \
    --with-brotlidec           \
    --with-zstd                \
    --with-nghttp2'''

[pipeline.compile]
script = '''
cd source/wget2-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/wget2-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['ca-certificates', 'gnutls', 'libidn2', 'libpsl', 'nghttp2', 'brotli', 'zstd', 'zlib', 'pcre2', 'gpgme']
