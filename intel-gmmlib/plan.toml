name = "intel-gmmlib"
version = "22.9.0"
release = 1
description = "Intel Graphics Memory Management Library"
license = "MIT"
arch = "x86_64"
url = "https://github.com/intel/gmmlib"

link_deps = ['glibc']
build_deps = ['cmake']

[[sources]]
type = "http"
sha256 = "6ae262b95540681ad5478c63affb880135f772c95410b092009a6f7dfc04a5ba"
url = "https://github.com/intel/gmmlib/archive/intel-gmmlib-${VERSION}/intel-gmmlib-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/intel-gmmlib-${VERSION}
cmake -B ${WORKDIR}/build -S ${WORKDIR} \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DBUILD_TESTING=ON'''

[pipeline.compile]
script = '''
cd source/intel-gmmlib-${VERSION}
make -C ${WORKDIR}/build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/intel-gmmlib-${VERSION}
make -C ${WORKDIR}/build DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc']
