name = "qt6-wayland"
version = "6.10.2"
release = 1
description = "Qt 6 Wayland platform plugin"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"

[dependencies]
build = [
    "cmake",
    "gcc",
    "ninja",
    "pkgconf",
    "wayland-protocols",
]
link = ["wayland", "qt6-base", "qt6-declarative"]

[[sources]]
uri = "https://download.qt.io/official_releases/qt/6.10/${PART_VERSION}/submodules/qtwayland-everywhere-src-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -j$(nproc) -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[lifecycle.fabricate]
