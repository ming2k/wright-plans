name = "bluez"
version = "5.86"
release = 3
description = "Official Linux Bluetooth protocol stack"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.bluez.org/"

[dependencies]
runtime = ["dbus", "systemd"]
build = ["gcc", "make"]
link = ["glibc", "glib", "dbus", "ell", "alsa-lib", "json-c", "libical", "readline"]

[[sources]]
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/bluetooth/bluez-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
# Remove bundled ell to ensure external ell is used exclusively
rm -rf ell'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    --libexecdir=/usr/lib \
    --enable-library \
    --enable-tools \
    --enable-btpclient \
    --enable-midi \
    --enable-sixaxis \
    --enable-mesh \
    --enable-hid2hci \
    --enable-experimental \
    --enable-datafiles \
    --enable-external-ell \
    --enable-deprecated \
    --disable-manpages \
    --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install

# Intentionally do not install src/main.conf. bluetoothd has sensible built-in
# defaults and upstream's sample main.conf drifts across releases — shipping it
# causes "Failed to set default system config" as bluetoothd rejects keys that
# were removed or renamed. Users can place their own /etc/bluetooth/main.conf
# if they need to override defaults.'''

[hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemctl enable bluetooth.service 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
