name = "alsa-lib"
version = "1.2.15.3"
release = 1
description = "ALSA library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.alsa-project.org"

[[sources]]
uri = "https://www.alsa-project.org/files/pub/lib/alsa-lib-${VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} make install

'''

[lifecycle.fabricate]
