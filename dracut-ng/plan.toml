name = "dracut-ng"
version = "111"
release = 1
description = "Event-driven initramfs infrastructure with UKI support"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/dracut-ng/dracut-ng"


[[sources]]
type = "http"
sha256 = "a6bdbd55e2c40a6dd760f59626a6b70e7c8ee0ea46436b340dcedb6f4e54481b"
url = "https://github.com/dracut-ng/dracut-ng/archive/${VERSION}/dracut-ng-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/dracut-ng-${VERSION}
./configure \
  --prefix=/usr \
  --libdir=/usr/lib \
  --sysconfdir=/etc \
  --sbindir=/usr/bin \
  --systemdsystemunitdir=/usr/lib/systemd/system \
  --disable-documentation'''

[pipeline.compile]
script = '''
cd source/dracut-ng-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/dracut-ng-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['bash', 'coreutils', 'cpio', 'kmod', 'systemd', 'util-linux']
