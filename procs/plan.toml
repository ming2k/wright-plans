name = "procs"
version = "0.14.11"
release = 1
description = "A modern replacement for ps written in Rust"
license = "MIT"
arch = "x86_64"
url = "https://github.com/dalance/procs"


build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/dalance/procs/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${BUILD_DIR}/.cargo', CARGO_TARGET_DIR = '${BUILD_DIR}/target' }
script = '''
cd source/procs-${VERSION}
cargo build --release --locked'''

[pipeline.staging]
script = '''
cd source/procs-${VERSION}
install -Dm755 target/release/procs ${STAGING_DIR}/usr/bin/procs'''

