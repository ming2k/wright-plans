name = "python-pyparsing"
version = "3.3.2"
release = 2
description = "Python parsing module"
license = "MIT"
arch = "any"
url = "https://github.com/pyparsing/pyparsing"

[dependencies]
build = ["python", "setuptools", "wheel"]

[[sources]]
uri = "https://files.pythonhosted.org/packages/source/p/pyparsing/pyparsing-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
echo "python package"

'''

[lifecycle.compile]
script = '''
echo "no build needed"

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --no-build-isolation --break-system-packages --root=${PART_DIR} .

'''

[lifecycle.fabricate]
