name = "man-db"
version = "2.13.1"
release = 3
description = "Programs for finding and viewing man pages"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://man-db.nongnu.org/"

[dependencies]
runtime = ["gdbm", "groff", "libpipeline"]
build = [
    "gcc",
    "gdbm",
    "groff",
    "libpipeline",
    "make",
]

[[sources]]
uri = "https://download.savannah.gnu.org/releases/man-db/man-db-${VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr                           \
--sbindir=/usr/bin                          \
--docdir=/usr/share/doc/man-db-${VERSION} \
--sysconfdir=/etc                       \
--disable-setuid                        \
--enable-cache-owner=bin                \
--with-browser=/usr/bin/lynx            \
--with-vgrind=/usr/bin/vgrind           \
--with-grap=/usr/bin/grap

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make check

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
