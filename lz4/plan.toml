name = "lz4"
version = "1.10.0"
release = 1
description = "Extremely fast lossless compression algorithm"
license = "BSD-2-Clause AND GPL-2.0-only"
arch = "x86_64"
url = "https://lz4.github.io/lz4/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/lz4/lz4/releases/download/v${VERSION}/lz4-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make BUILD_STATIC=no PREFIX=/usr -j$(nproc)

'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make -j1 check

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make BUILD_STATIC=no PREFIX=/usr DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
