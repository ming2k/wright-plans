[plan]
name = "ninja"
version = "1.13.1"
release = 1
description = "Small build system with a focus on speed"
license = "Apache-2.0"
arch = "x86_64"
url = "https://ninja-build.org/"

[dependencies]
build = ["gcc", "python"]

[[sources]]
uri = "https://github.com/ninja-build/ninja/archive/v${PKG_VERSION}/ninja-${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
python3 configure.py --bootstrap --verbose
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 ninja ${PKG_DIR}/usr/bin/ninja
install -Dm644 misc/bash-completion ${PKG_DIR}/usr/share/bash-completion/completions/ninja
install -Dm644 misc/zsh-completion ${PKG_DIR}/usr/share/zsh/site-functions/_ninja
'''
