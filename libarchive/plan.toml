[plan]
name = "libarchive"
version = "3.7.7"
release = 1
description = "Multi-format archive and compression library"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://libarchive.org"

[sources]
uris = ["https://github.com/libarchive/libarchive/releases/download/v${PKG_VERSION}/libarchive-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PKG_DIR} make install
'''
