name = "setuptools"
version = "80.9.0"
release = 1
description = "Python package development process library"
license = "MIT"
arch = "x86_64"
url = "https://setuptools.pypa.io/"

[dependencies]
build = ["python", "wheel"]

[[sources]]
sha256 = "SKIP"
url = "https://pypi.org/packages/source/s/setuptools/setuptools-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
