name = "upower"
version = "1.91.2"
release = 1
description = "Abstraction for enumerating power devices"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/upower/upower"

link_deps = ['glib', 'libgudev', 'libusb', 'polkit']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/upower/upower/-/archive/v${VERSION}/upower-v${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/upower-${VERSION}
meson setup build \
  --prefix=/usr \
  --libexecdir=/usr/libexec \
  --buildtype=release \
  -Dos_backend=linux \
  -Dgtk-doc=false \
  -Dsystemdsystemunitdir=/usr/lib/systemd/system'''

[pipeline.compile]
script = '''
cd source/upower-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/upower-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemctl enable upower.service 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"

[[output]]
runtime_deps = ['systemd', 'glib', 'libgudev', 'libusb', 'polkit']
