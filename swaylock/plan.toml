[plan]
name = "swaylock"
version = "1.8.4"
release = 1
description = "Screen locker for Wayland"
license = "MIT"
arch = "x86_64"
url = "https://github.com/swaywm/swaylock"

[dependencies]
runtime = ["cairo", "gdk-pixbuf"]
build = ["meson", "ninja"]
link = ["libxkbcommon", "linux-pam", "wayland", "wayland-protocols"]

[[sources]]
uri = "https://github.com/swaywm/swaylock/releases/download/v${PART_VERSION}/swaylock-${PART_VERSION}.tar.gz"
sha256 = "aa251d5a8f335fe2ac9ec3cc2a6ac8772aa4dba2ec710ccd415956c6e89b11d3"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dpam=enabled -Dgdk-pixbuf=enabled -Dman-pages=disabled
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install
'''


