[plan]
name = "grim"
version = "1.5.0"
release = 1
description = "Grab images from a Wayland compositor"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/emersion/grim"

[dependencies]
build = ["meson", "ninja", "pkgconf", "scdoc"]
link = ["libjpeg-turbo", "libpng", "pixman", "wayland", "wayland-protocols"]

[[sources]]
uri = "https://gitlab.freedesktop.org/emersion/grim/-/archive/v${PKG_VERSION}/grim-v${PKG_VERSION}.tar.gz"
sha256 = "9e72a98f7621b1f5741b405b8dbd447acf7d300ddb12667ec526db1ce6154eaa"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
  --prefix=/usr \
  --buildtype=release \
  -Djpeg=enabled \
  -Dwerror=false
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = '''
DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install
'''
