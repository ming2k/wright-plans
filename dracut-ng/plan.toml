name = "dracut-ng"
version = "110"
release = 1
description = "Event-driven initramfs infrastructure with UKI support"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/dracut-ng/dracut-ng"

[dependencies]
runtime = ["bash", "coreutils", "cpio", "kmod", "systemd", "util-linux"]
build = ["gcc", "make", "pkgconf", "kmod"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/dracut-ng/dracut-ng/archive/${VERSION}/dracut-ng-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --libdir=/usr/lib \
  --sysconfdir=/etc \
  --sbindir=/usr/bin \
  --systemdsystemunitdir=/usr/lib/systemd/system \
  --disable-documentation'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
