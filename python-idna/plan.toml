[plan]
name = "python-idna"
version = "3.10"
release = 1
description = "Internationalized Domain Names in Applications (IDNA)"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/kjd/idna"

[dependencies]
build = ["python", "flit-core"]
runtime = ["python"]

[sources]
uris = ["https://pypi.org/packages/source/i/idna/idna-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PKG_DIR} --no-build-isolation .
'''
