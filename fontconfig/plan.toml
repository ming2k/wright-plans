name = "fontconfig"
version = "2.17.1"
release = 1
description = "Font configuration and customization library"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/fontconfig/"

[dependencies]
build = [
    "freetype",
    "meson",
    "ninja",
    "pkgconf",
    "gperf",
]
link = ["freetype", "expat"]

[[sources]]
uri = "https://gitlab.freedesktop.org/fontconfig/fontconfig/-/archive/${PART_VERSION}/fontconfig-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
    --prefix=/usr                        \
    --buildtype=release                  \
    --wrap-mode=nofallback               \
    -D doc=disabled                      \
    -D tests=disabled

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[hooks]
post_install = "fc-cache -s 2>/dev/null || true"
post_upgrade = "fc-cache -s 2>/dev/null || true"
