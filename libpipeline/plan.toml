[plan]
name = "libpipeline"
version = "1.5.8"
release = 1
description = "A library for manipulating pipelines of subprocesses in a flexible and convenient way"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://libpipeline.nongnu.org/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://download.savannah.gnu.org/releases/libpipeline/libpipeline-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
