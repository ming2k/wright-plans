name = "gnome-keyring"
version = "50.0"
release = 1
description = "Secret storage service and key manager for GNOME"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/gnome-keyring"

[dependencies]
runtime = ["dbus", "gcr3", "libsecret", "linux-pam", "p11-kit"]
build = ["gettext", "libxslt", "meson", "ninja", "pkgconf"]
link = ["dbus", "gcr3", "glib", "libsecret", "linux-pam", "p11-kit"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/gnome-keyring/50/gnome-keyring-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Dsystemd=disabled -Dssh-agent=true'''

[lifecycle.compile]
script = '''
cd source
meson compile -C build'''

[lifecycle.staging]
script = '''
cd source
meson install -C build --destdir ${PART_DIR}'''

[hooks]
post_install = '''
glib-compile-schemas /usr/share/glib-2.0/schemas 2>/dev/null || true
ldconfig 2>/dev/null || true

'''
post_upgrade = '''
glib-compile-schemas /usr/share/glib-2.0/schemas 2>/dev/null || true
ldconfig 2>/dev/null || true

'''
