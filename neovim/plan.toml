name = "neovim"
version = "0.12.1"
release = 1
description = "Hyperextensible Vim-based text editor"
license = "Apache-2.0"
arch = "x86_64"
url = "https://neovim.io"
maintainer = "Neovim contributors <neovim@neovim.io>"

[dependencies]
build = ["cmake", "curl", "gcc", "gettext", "make"]
link = ["glibc"]
optional = ["python", "xclip"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/neovim/neovim/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[options]
ccache = true

[lifecycle.configure]
isolation = "relaxed"
script = '''
cd source
make CMAKE_BUILD_TYPE=Release CMAKE_INSTALL_PREFIX=/usr deps'''

[lifecycle.compile]
script = '''
cd source
make CMAKE_BUILD_TYPE=Release CMAKE_INSTALL_PREFIX=/usr'''

[lifecycle.staging]
script = '''
cd source
make CMAKE_INSTALL_PREFIX=/usr DESTDIR=${PART_DIR} install'''

[hooks]
post_install = '''
update-desktop-database -q 2>/dev/null || true

'''
post_upgrade = '''
update-desktop-database -q 2>/dev/null || true

'''
