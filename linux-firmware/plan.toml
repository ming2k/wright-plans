[plan]
name = "linux-firmware"
version = "20260221"
release = 2
description = "Firmware files for Linux - complete collection with vendor split packages"
license = "GPL-2.0-only AND GPL-2.0-or-later AND custom"
arch = "any"
url = "https://gitlab.com/kernel-firmware/linux-firmware"
maintainer = "Wright Maintainer <maintainer@example.com>"

[dependencies]

[[sources]]
uri = "https://cdn.kernel.org/pub/linux/kernel/firmware/linux-firmware-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[options]

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
mkdir -p _installed/usr/lib/firmware
./copy-firmware.sh _installed/usr/lib/firmware
'''

[lifecycle.fabricate]
script = '''
mkdir -p ${PART_DIR}/usr/share/doc/linux-firmware
echo "linux-firmware ${PART_VERSION} meta-package" > ${PART_DIR}/usr/share/doc/linux-firmware/README
'''

[lifecycle.fabricate.linux-firmware-whence]
description = "Firmware files for Linux - WHENCE license manifest"
script = '''
cd ${BUILD_DIR}
shopt -s nullglob

mkdir -p ${PART_DIR}/usr/lib/firmware
mkdir -p ${PART_DIR}/usr/share/doc/linux-firmware-whence

install -m644 WHENCE ${PART_DIR}/usr/lib/firmware/WHENCE

[ -f README.md ] && install -m644 README.md ${PART_DIR}/usr/share/doc/linux-firmware-whence/README.md

for f in LICEN*; do
install -m644 "$f" ${PART_DIR}/usr/lib/firmware/"$f"
done
'''

[lifecycle.fabricate.linux-firmware-amdgpu]
description = "Firmware for AMD Radeon GPUs (amdgpu + legacy radeon)"
dependencies.runtime = ["linux-firmware-whence"]
script = '''
FW="${BUILD_DIR}/_installed/usr/lib/firmware"
mkdir -p ${PART_DIR}/usr/lib/firmware

[ -d "$FW/amdgpu" ] && cp -a "$FW/amdgpu" ${PART_DIR}/usr/lib/firmware/

[ -d "$FW/radeon" ] && cp -a "$FW/radeon" ${PART_DIR}/usr/lib/firmware/
'''

