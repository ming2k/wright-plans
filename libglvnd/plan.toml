name = "libglvnd"
version = "1.7.0"
release = 1
description = "The GL Vendor-Neutral Dispatch library"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/glvnd/libglvnd"

build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/glvnd/libglvnd/-/archive/v${VERSION}/libglvnd-v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libglvnd-v${VERSION}
meson setup build \
--prefix=/usr            \
--buildtype=release      \
-Dglx=disabled           \
-Dx11=disabled           \
-Dgles1=false            \
-Dheaders=true'''

[pipeline.compile]
script = '''
cd source/libglvnd-v${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/libglvnd-v${VERSION}
meson install -C build --destdir ${STAGING_DIR}'''
