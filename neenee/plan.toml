name = "neenee"
version = "0.13.0"
release = 1
description = "A Rust-based AI coding agent with a semantic TUI, tool use, and bounded autonomous goals"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ming2k/neenee"

link_deps = ['gcc:gcc-libs', 'glibc']
build_deps = ['rust', 'pkg-config', 'cmake', 'perl']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ming2k/neenee/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/neenee-${VERSION}
cargo build --release --locked -p neenee-code'''

[pipeline.staging]
script = '''
cd source/neenee-${VERSION}
install -Dm755 target/release/neenee-code ${STAGING_DIR}/usr/bin/neenee'''

[[output]]
runtime_deps = ['gcc:gcc-libs', 'glibc']
