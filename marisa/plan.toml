[plan]
name = "marisa"
version = "0.2.7"
release = 1
description = "Matching Algorithm with Recursively Implemented StorAge"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/s-yata/marisa-trie"

[dependencies]
build = ["autoconf", "automake", "libtool", "make"]

[[sources]]
uri = "https://github.com/s-yata/marisa-trie/archive/refs/tags/v${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
autoreconf -fi
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure \
    --prefix=/usr \
    --disable-static \
    --enable-sse2
'''

[lifecycle.compile]
script = "make -C ${BUILD_DIR} -j$(nproc)"

[lifecycle.staging]
script = "make -C ${BUILD_DIR} DESTDIR=${PKG_DIR} install"
