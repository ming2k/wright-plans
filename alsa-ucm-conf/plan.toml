name = "alsa-ucm-conf"
version = "1.2.15.3"
release = 1
description = "ALSA Use Case Manager configuration files"
license = "BSD-3-Clause"
arch = "any"
url = "https://github.com/alsa-project/alsa-ucm-conf"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/alsa-project/alsa-ucm-conf/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/alsa-ucm-conf-${VERSION}
echo "data-only package"'''

[pipeline.compile]
script = '''
cd source/alsa-ucm-conf-${VERSION}
echo "no build needed"'''

[pipeline.staging]
script = '''
cd source/alsa-ucm-conf-${VERSION}
mkdir -p ${STAGING_DIR}/usr/share/alsa
cp -a ucm2 ${STAGING_DIR}/usr/share/alsa/ucm2'''

[[output]]
runtime_deps = ['alsa-lib']
