name = "intel-gmmlib"
version = "22.9.0"
release = 1
description = "Intel Graphics Memory Management Library"
license = "MIT"
arch = "x86_64"
url = "https://github.com/intel/gmmlib"

[dependencies]
build = ["cmake"]
link = ["glibc"]

[[sources]]
sha256 = "6ae262b95540681ad5478c63affb880135f772c95410b092009a6f7dfc04a5ba"
url = "https://github.com/intel/gmmlib/archive/intel-gmmlib-${VERSION}/intel-gmmlib-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B ${WORKDIR}/build -S ${WORKDIR} \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DBUILD_TESTING=ON'''

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR}/build DESTDIR=${PART_DIR} install'''

[lifecycle.fabricate]
script = '''
cd source
install -Dm644 ${WORKDIR}/LICENSE.md ${PART_DIR}/usr/share/licenses/intel-gmmlib/LICENSE.md'''
