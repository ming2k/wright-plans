name = "bash-completion"
version = "2.17.0"
release = 1
description = "Programmable completion for Bash"
license = "GPL-2.0-or-later"
arch = "any"
url = "https://github.com/scop/bash-completion"


[[sources]]
type = "http"
sha256 = "dd9d825e496435fb3beba3ae7bea9f77e821e894667d07431d1d4c8c570b9e58"
url = "https://github.com/scop/bash-completion/releases/download/${VERSION}/bash-completion-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/bash-completion-${VERSION}
./configure --prefix=/usr --sysconfdir=/etc'''

[lifecycle.compile]
script = '''
cd source/bash-completion-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/bash-completion-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

