name = "spirv-headers"
version = "1.4.341.0"
release = 1
description = "Machine-readable parts of the SPIR-V specification"
license = "MIT"
arch = "x86_64"
url = "https://github.com/KhronosGroup/SPIRV-Headers"

[dependencies]
build = ["cmake", "gcc", "make"]

[[sources]]
uri = "https://github.com/KhronosGroup/SPIRV-Headers/archive/refs/tags/vulkan-sdk-${VERSION}.tar.gz"
sha256 = "cab0a654c4917e16367483296b44cdb1d614e3120c721beafcd37e3a8580486c"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
cmake --build build -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} cmake --install build

'''

[lifecycle.fabricate]
