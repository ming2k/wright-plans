name = "aws-cli"
version = "2.34.40"
release = 1
description = "Universal Command Line Interface for Amazon Web Services"
license = "Apache-2.0"
arch = "x86_64"
url = "https://aws.amazon.com/cli/"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-${VERSION}.zip"
extract_to = "source"

[pipeline.staging]
script = '''
# Install AWS CLI dist files
mkdir -p ${STAGING_DIR}/usr/lib/aws-cli
rsync -a source/aws/dist/ ${STAGING_DIR}/usr/lib/aws-cli/

# Create wrapper scripts in /usr/bin
mkdir -p ${STAGING_DIR}/usr/bin
cat > ${STAGING_DIR}/usr/bin/aws << 'EOF'
#!/bin/sh
exec /usr/lib/aws-cli/aws "$@"
EOF
chmod +x ${STAGING_DIR}/usr/bin/aws

cat > ${STAGING_DIR}/usr/bin/aws_completer << 'EOF'
#!/bin/sh
exec /usr/lib/aws-cli/aws_completer "$@"
EOF
chmod +x ${STAGING_DIR}/usr/bin/aws_completer'''

