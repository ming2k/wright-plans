name = "codex"
version = "0.118.0"
release = 1
description = "OpenAI Codex CLI"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/openai/codex"

[dependencies]
build = ["pkgconf", "rust"]
link = ["gcc", "glibc", "openssl"]
optional = ["git"]

[[sources]]
sha256 = "7be18a18f604ad877b47c08d9db00018bd1dbbbd774dc6e1e7ea52dc492d7138"
url = "https://github.com/openai/codex/archive/refs/tags/rust-v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
env = {'CARGO_HOME': '${BUILD_DIR}/.cargo', 'CARGO_TARGET_DIR': '${BUILD_DIR}/target'}
script = '''
cd source/codex-rs
cargo build --release --locked -p codex-cli'''

[lifecycle.staging]
script = '''
cd source/codex-rs
install -Dm755 ${WORKDIR}/target/release/codex ${PART_DIR}/usr/bin/codex

install -dm755 ${PART_DIR}/usr/share/bash-completion/completions
install -dm755 ${PART_DIR}/usr/share/fish/vendor_completions.d
install -dm755 ${PART_DIR}/usr/share/zsh/site-functions

${WORKDIR}/target/release/codex completion bash > ${PART_DIR}/usr/share/bash-completion/completions/codex
${WORKDIR}/target/release/codex completion fish > ${PART_DIR}/usr/share/fish/vendor_completions.d/codex.fish
${WORKDIR}/target/release/codex completion zsh > ${PART_DIR}/usr/share/zsh/site-functions/_codex

install -Dm644 ${WORKDIR}/LICENSE ${PART_DIR}/usr/share/licenses/codex/LICENSE'''
