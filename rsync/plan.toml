name = "rsync"
version = "3.4.1"
release = 1
description = "A fast and versatile file copying tool for remote and local files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://rsync.samba.org/"

[dependencies]
build = ["gcc", "make"]
link = ["openssl", "zlib", "zstd", "lz4"]
optional = ["openssh"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.samba.org/ftp/rsync/src/rsync-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr    \
--disable-xxhash             \
--without-included-popt      \
--without-included-zlib'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
