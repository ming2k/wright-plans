name = "enchant"
version = "2.8.15"
release = 1
description = "Generic spell checking library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/AbiWord/enchant"

[dependencies]
build = [
    "gcc",
    "groff",
    "make",
    "pkgconf",
]
link = ["glib"]

[[sources]]
uri = "https://github.com/AbiWord/enchant/releases/download/v${PART_VERSION}/enchant-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sysconfdir=/etc --disable-static --with-groff

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -dm755 ${PART_DIR}/usr/lib/enchant-2
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
