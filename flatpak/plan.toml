name = "flatpak"
version = "1.16.6"
release = 1
description = "Universal app distribution framework (Pure Wayland)"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://flatpak.org"

[dependencies]
runtime = ["ca-certificates", "dbus", "systemd", "xdg-desktop-portal", "xdg-desktop-portal-gtk", "shared-mime-info", "desktop-file-utils"]
build = ["meson", "ninja", "pkgconf", "libxslt", "gettext", "gobject-introspection", "python-pyparsing", "bubblewrap", "xdg-dbus-proxy"]
link = ["glib", "libarchive", "libxml2", "ostree", "polkit", "json-glib", "curl", "appstream", "gdk-pixbuf", "libjpeg-turbo", "libfuse3", "gpgme", "libseccomp"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/flatpak/flatpak/releases/download/${VERSION}/flatpak-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    -Dsystem_bubblewrap=/usr/bin/bwrap \
    -Dsystem_dbus_proxy=/usr/bin/xdg-dbus-proxy \
    -Dsystemd=enabled \
    -Ddbus_config_dir=/usr/share/dbus-1/system.d \
    -Dselinux_module=disabled \
    -Dman=disabled \
    -Ddocbook_docs=disabled \
    -Dxauth=disabled \
    -Dgtkdoc=disabled \
    -Dtests=false \
    -Dinstalled_tests=false'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
meson install -C ${WORKDIR}/build --destdir ${PART_DIR}
mkdir -p ${PART_DIR}/var/lib/flatpak'''

[hooks]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/flatpak.conf 2>/dev/null || true
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
update-mime-database /usr/share/mime 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
post_upgrade = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
update-mime-database /usr/share/mime 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
