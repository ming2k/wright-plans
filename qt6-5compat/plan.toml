name = "qt6-5compat"
version = "6.11.0"
release = 1
description = "Qt 6 Qt5 compatibility module"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"

link_deps = ['qt6-base']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "e62954646b2749723aa5c7db32faab407358734075590058a01e793382d4c63e"
url = "https://download.qt.io/official_releases/qt/6.11/${VERSION}/submodules/qt5compat-everywhere-src-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/qt5compat-everywhere-src-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_TESTING=OFF \
    -DQT_BUILD_EXAMPLES=OFF \
    -DQT_BUILD_TESTS=OFF'''

[lifecycle.compile]
script = '''
cd source/qt5compat-everywhere-src-${VERSION}
ninja -j$(nproc) -C build'''

[lifecycle.staging]
script = '''
cd source/qt5compat-everywhere-src-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['qt6-base']
