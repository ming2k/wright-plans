name = "wheel"
version = "0.46.1"
release = 1
description = "Built-package format for Python"
license = "MIT"
arch = "x86_64"
url = "https://wheel.readthedocs.io/"

[dependencies]
build = ["flit-core", "python-packaging", "python"]

[[sources]]
sha256 = "SKIP"
url = "https://pypi.org/packages/source/w/wheel/wheel-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
