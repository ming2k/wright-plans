name = "libwebp"
version = "1.6.0"
release = 1
description = "Library for the WebP graphics format"
license = "BSD-3-Clause"
arch = "x86_64"

link_deps = ['libpng']

[[sources]]
type = "http"
sha256 = "e4ab7009bf0629fd11982d4c2aa83964cf244cffba7347ecd39019a9e38c4564"
url = "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libwebp-${VERSION}
./configure --prefix=/usr --disable-static --enable-libwebpmux --enable-libwebpdemux --enable-libwebpextras --enable-swap-16bit-csp'''

[pipeline.compile]
script = "cd source/libwebp-${VERSION} && make -j$(nproc)"

[pipeline.staging]
script = "cd source/libwebp-${VERSION} && make DESTDIR=${STAGING_DIR} install"

[[output]]
runtime_deps = ['libpng']
