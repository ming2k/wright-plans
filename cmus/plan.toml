name = "cmus"
version = "3.0.4"
release = 1
description = "Feature-rich ncurses-based music player"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://github.com/ming2k/cmus"

[dependencies]
runtime = ["pipewire"]
build = ["gcc", "make", "pkgconf"]
link = ["alsa-lib", "flac", "libvorbis", "mpg123", "ncurses", "pipewire"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ming2k/cmus/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  prefix=/usr \
  CONFIG_FFMPEG=n \
  CONFIG_FLAC=y \
  CONFIG_MAD=n \
  CONFIG_MPG123=y \
  CONFIG_OPUS=n \
  CONFIG_PULSE=n \
  CONFIG_PIPEWIRE=y \
  CONFIG_JACK=n \
  CONFIG_MODPLUG=n \
  CONFIG_MP4=n \
  CONFIG_AAC=n'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install

install -vDm644 contrib/_cmus ${PART_DIR}/usr/share/zsh/site-functions/_cmus
install -vDm644 contrib/cmus.bash-completion ${PART_DIR}/usr/share/bash-completion/completions/cmus'''
