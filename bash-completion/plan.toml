name = "bash-completion"
version = "2.17.0"
release = 1
description = "Programmable completion for Bash"
license = "GPL-2.0-or-later"
arch = "any"
url = "https://github.com/scop/bash-completion"

[dependencies]
build = ["make"]

[[sources]]
uri = "https://github.com/scop/bash-completion/releases/download/${PART_VERSION}/bash-completion-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sysconfdir=/etc

'''

[lifecycle.compile]
script = "make -j$(nproc) -C ${BUILD_DIR}"

[lifecycle.staging]
script = "make DESTDIR=${PART_DIR} install -C ${BUILD_DIR}"
