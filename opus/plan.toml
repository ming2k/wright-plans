name = "opus"
version = "1.6.1"
release = 1
description = "Versatile audio codec"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/opus"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://downloads.xiph.org/releases/opus/opus-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/opus-${VERSION}
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source/opus-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/opus-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

