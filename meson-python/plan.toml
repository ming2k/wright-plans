name = "meson-python"
version = "0.19.0"
release = 1
description = "Meson PEP 517 Python build backend"
license = "MIT"
arch = "x86_64"
url = "https://github.com/mesonbuild/meson-python"

[dependencies]
runtime = ["python", "meson", "python-packaging", "python-pyproject-metadata"]
build = ["python", "meson", "python-packaging", "python-pyproject-metadata"]

[[sources]]
uri = "https://pypi.org/packages/source/m/meson_python/meson_python-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .

'''

[lifecycle.fabricate]
