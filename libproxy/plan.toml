name = "libproxy"
version = "0.5.8"
release = 1
description = "Library that provides automatic proxy configuration management"
license = "LGPL-2.1-or-later"
arch = "x86_64"

link_deps = ['glib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/libproxy/libproxy/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libproxy-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Ddocs=false -Dtests=false -Dvapi=false -Dconfig-gnome=true -Dpacrunner-duktape=true'''

[pipeline.compile]
script = '''
cd source/libproxy-${VERSION}
meson compile -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libproxy-${VERSION}
DESTDIR=${STAGING_DIR} meson install -C build'''

[[output]]
runtime_deps = ['duktape', 'gsettings-desktop-schemas', 'glib']
