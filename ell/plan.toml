[plan]
name = "ell"
version = "0.82"
release = 1
description = "Embedded Linux Library"
license = "LGPL-2.1-only"
arch = "x86_64"
url = "https://01.org/ell"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://mirrors.edge.kernel.org/pub/linux/libs/ell/ell-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr \
--enable-shared \
--disable-static
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
