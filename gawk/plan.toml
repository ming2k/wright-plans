[plan]
name = "gawk"
version = "5.3.2"
release = 1
description = "Programs for manipulating text files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gawk/"

[dependencies]
build = ["gcc", "make"]
[sources]
uris = ["https://ftp.gnu.org/gnu/gawk/gawk-5.3.2.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.prepare]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
sed -i 's/extras//' Makefile.in
'''

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
