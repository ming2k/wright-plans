name = "autoconf"
version = "2.73"
release = 1
description = "Package for producing shell scripts that automatically configure software"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/autoconf/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/autoconf/autoconf-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/autoconf-${VERSION}
CONFIG_SHELL=/usr/bin/bash SHELL=/usr/bin/bash /usr/bin/bash ./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/autoconf-${VERSION}
make SHELL=/usr/bin/bash -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/autoconf-${VERSION}
make SHELL=/usr/bin/bash DESTDIR=${STAGING_DIR} install'''
