name = "gflags"
version = "2.2.2"
release = 1
description = "Command-line flags library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/gflags/gflags"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
uri = "https://github.com/gflags/gflags/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
    -DBUILD_SHARED_LIBS=ON \
    -DBUILD_TESTING=OFF \
    -DREGISTER_INSTALL_PREFIX=OFF

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
