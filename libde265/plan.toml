name = "libde265"
version = "1.0.16"
release = 1
description = "Open H.265 video codec implementation"
license = "LGPL-3.0-or-later"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "cmake"]

[[sources]]
type = "http"
sha256 = "b92beb6b53c346db9a8fae968d686ab706240099cdd5aff87777362d668b0de7"
url = "https://github.com/strukturag/libde265/releases/download/v${VERSION}/libde265-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = "cd source && cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DENABLE_SHARED=ON -DENABLE_STATIC=OFF"

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR}/build DESTDIR=${PART_DIR} install'''
