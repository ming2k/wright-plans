[plan]
name = "gst-plugins-good"
version = "1.28.0"
release = 1
description = "GStreamer Good Plugins"
license = "LGPL-2.0-or-later"
arch = "x86_64"

[dependencies]
runtime = ["cairo", "gdk-pixbuf", "gst-plugins-base", "gstreamer"]
build = ["cairo", "gdk-pixbuf", "gst-plugins-base", "gstreamer", "meson", "ninja", "pkgconf"]
link = ["libsoup"]

[[sources]]
uri = "https://gstreamer.freedesktop.org/src/gst-plugins-good/gst-plugins-good-1.28.0.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
export PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/share/pkgconfig
meson setup build --prefix=/usr --libdir=lib -Dtests=disabled -Ddoc=disabled
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PART_DIR} ninja install
'''
