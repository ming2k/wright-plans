name = "mbedtls"
version = "3.6.4"
release = 1
description = "Portable cryptographic and TLS library"
license = "Apache-2.0"
arch = "x86_64"
url = "https://www.trustedfirmware.org/projects/mbed-tls/"

[dependencies]
build = ["cmake", "ninja", "pkgconf", "python"]

[[sources]]
uri = "https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-${PART_VERSION}/mbedtls-${PART_VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DUSE_SHARED_MBEDTLS_LIBRARY=ON \
    -DUSE_STATIC_MBEDTLS_LIBRARY=OFF \
    -DENABLE_PROGRAMS=OFF \
    -DENABLE_TESTING=OFF

'''

[lifecycle.compile]
script = "ninja -j$(nproc) -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
