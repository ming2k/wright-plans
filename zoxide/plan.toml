name = "zoxide"
version = "0.9.9"
release = 1
description = "A smarter cd command"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ajeetdsouza/zoxide"

[dependencies]
build = ["rust"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/ajeetdsouza/zoxide/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
env = {'CARGO_HOME': '${BUILD_DIR}/.cargo', 'CARGO_TARGET_DIR': '${BUILD_DIR}/target'}
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/zoxide ${PART_DIR}/usr/bin/zoxide
install -Dm644 contrib/completions/zoxide.bash ${PART_DIR}/usr/share/bash-completion/completions/zoxide
install -Dm644 contrib/completions/_zoxide     ${PART_DIR}/usr/share/zsh/site-functions/_zoxide
install -Dm644 contrib/completions/zoxide.fish ${PART_DIR}/usr/share/fish/vendor_completions.d/zoxide.fish
install -Dm644 man/man1/*.1 -t ${PART_DIR}/usr/share/man/man1/'''
