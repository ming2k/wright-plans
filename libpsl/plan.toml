name = "libpsl"
version = "0.21.5"
release = 1
description = "Library for accessing the Public Suffix List"
license = "MIT"
arch = "x86_64"
url = "https://github.com/rockdaboot/libpsl"

[dependencies]
build = ["meson", "ninja"]
link = ["libidn2", "libunistring"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/rockdaboot/libpsl/releases/download/${VERSION}/libpsl-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr         \
--buildtype=release'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
