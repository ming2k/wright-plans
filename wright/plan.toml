name = "wright"
version = "5.3.0"
release = 1
description = "Declarative, extensible, sandboxed Linux package manager"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ming2k/wright"

build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ming2k/wright/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "skel-plan.toml"

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/wright-${VERSION}
export CARGO_HOME=${WORKDIR}/.cargo
cargo build --release'''

[pipeline.staging]
script = '''
cd source/wright-${VERSION}
install -Dm755 target/release/wright ${STAGING_DIR}/usr/bin/wright

# Skeleton plan for new packages
install -Dm644 ${WORKDIR}/wright-skel-plan.toml ${STAGING_DIR}/usr/share/wright/skel/plan.toml

# Plans workspace — created here so permissions are managed by the package
install -dm755 ${STAGING_DIR}/var/lib/wright/plans

# Install shell completions
install -dm755 ${STAGING_DIR}/usr/share/bash-completion/completions
install -m644 target/completions/wright.bash ${STAGING_DIR}/usr/share/bash-completion/completions/wright
install -dm755 ${STAGING_DIR}/usr/share/zsh/site-functions
install -m644 target/completions/_wright ${STAGING_DIR}/usr/share/zsh/site-functions/_wright
install -dm755 ${STAGING_DIR}/usr/share/fish/vendor_completions.d
install -m644 target/completions/wright.fish ${STAGING_DIR}/usr/share/fish/vendor_completions.d/wright.fish

# Install man pages
install -dm755 ${STAGING_DIR}/usr/share/man/man1
install -m644 target/man/wright*.1 ${STAGING_DIR}/usr/share/man/man1/'''

[[output]]
runtime_deps = ['ca-certificates']
hooks.post_install = '''
# Group for plan authors — members can edit plans without root
groupadd -r wright 2>/dev/null || true

# Hand the plans directory to the wright group with setgid so new
# plan dirs/files automatically inherit the group
chgrp wright /var/lib/wright/plans
chmod 2775 /var/lib/wright/plans
chmod -R o-w /var/lib/wright/plans/

echo "Add yourself to the wright group to edit plans without sudo:"
echo "  usermod -aG wright \$USER"
'''
hooks.post_upgrade = '''
# Re-apply in case a manual chmod/chown drifted the state
groupadd -r wright 2>/dev/null || true
chgrp wright /var/lib/wright/plans
chmod 2775 /var/lib/wright/plans
chmod -R o-w /var/lib/wright/plans/
'''
