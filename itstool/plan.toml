[plan]
name = "itstool"
version = "2.0.7"
release = 1
description = "ITS-based XML translation tool"
license = "GPL-3.0-or-later"
arch = "any"
url = "https://itstool.org"

[dependencies]
build = ["libxml2", "python"]
runtime = ["libxml2", "python"]

[sources]
uris = ["https://github.com/itstool/itstool/archive/refs/tags/${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
autoreconf -fi
./configure --prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PKG_DIR} make install
'''
