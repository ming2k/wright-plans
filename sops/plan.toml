name = "sops"
version = "3.12.2"
release = 1
description = "Simple and flexible tool for managing secrets"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/getsops/sops"

[dependencies]
build = ["go"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/getsops/sops/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
env = {'GOPATH': '${BUILD_DIR}/.go', 'GOCACHE': '${BUILD_DIR}/.cache/go-build', 'CGO_ENABLED': '0'}
script = '''
cd source
go build -trimpath -ldflags="-s -w -buildid=" -o sops ./cmd/sops'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 sops ${PART_DIR}/usr/bin/sops'''
