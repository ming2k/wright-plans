name = "glslang"
version = "1.4.350.1"
release = 1
description = "Khronos reference GLSL/ESSL compiler and SPIR-V generator"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/KhronosGroup/glslang"


build_deps = ['cmake', 'ninja']

[[sources]]
type = "http"
sha256 = "da3224092779d09e275a993b5d2fe2c178847d1a4a5c802082ab99628c159c20"
url = "https://github.com/KhronosGroup/glslang/archive/refs/tags/vulkan-sdk-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/glslang-vulkan-sdk-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DALLOW_EXTERNAL_SPIRV_TOOLS=ON \
    -DBUILD_SHARED_LIBS=ON'''

[pipeline.compile]
script = '''
cd source/glslang-vulkan-sdk-${VERSION}
cmake --build build -j $(nproc)'''

[pipeline.staging]
script = '''
cd source/glslang-vulkan-sdk-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build'''

