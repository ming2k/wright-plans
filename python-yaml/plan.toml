name = "python-yaml"
version = "6.0.3"
release = 1
description = "YAML parser and emitter for Python"
license = "MIT"
arch = "any"
url = "https://pyyaml.org/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/p/pyyaml/pyyaml-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/pyyaml-${VERSION}
pip3 install --no-index --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

