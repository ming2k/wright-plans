name = "vim"
version = "9.2.0287"
release = 1
description = "Vi Improved, a highly configurable text editor"
license = "custom:vim"
arch = "x86_64"
url = "https://www.vim.org"

[dependencies]
build = ["gcc", "autoconf", "make", "pkgconf"]
link = ["acl", "ncurses", "zlib"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/vim/vim/archive/v${VERSION}/vim-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.prepare]
script = '''
# Allow VIMRCLOC to override the compiled-in vimrc paths at install time
sed -E 's|^.*(#define SYS_.*VIMRC_FILE.*").*$|\1|g' -i ${WORKDIR}/src/feature.h
sed -E 's|^.*(#define VIMRC_FILE.*").*$|\1|g' -i ${WORKDIR}/src/feature.h
(cd source/src && autoconf)'''

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --localstatedir=/var/lib/vim \
  --with-features=huge \
  --with-x=no \
  --disable-gui \
  --disable-gpm \
  --enable-multibyte \
  --enable-cscope \
  --enable-acl \
  --enable-python3interp=dynamic \
  --enable-luainterp=dynamic \
  --enable-perlinterp=dynamic \
  --enable-rubyinterp=dynamic \
  --enable-tclinterp=dynamic \
  --disable-canberra'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source
make -j1 -C ${WORKDIR} VIMRCLOC=/etc DESTDIR=${PART_DIR} install

# Remove files traditionally provided by (n)vi
rm -f ${PART_DIR}/usr/bin/{ex,view}
find ${PART_DIR}/usr/share/man -name 'ex.1' -o -name 'view.1' -o -name 'evim.1' \
  -delete

install -Dm644 ${WORKDIR}/runtime/doc/uganda.txt \
  ${PART_DIR}/usr/share/licenses/vim/license.txt'''
