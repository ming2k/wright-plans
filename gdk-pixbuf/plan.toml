[plan]
name = "gdk-pixbuf"
version = "2.44.5"
release = 5
description = "GNOME image loading library (Modern Glycin Enabled)"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["glycin"]
build = ["meson", "ninja", "pkgconf", "gobject-introspection"]
link = ["glib", "glycin", "libjpeg-turbo", "libpng", "libtiff", "shared-mime-info"]

[[sources]]
uri = "https://download.gnome.org/sources/gdk-pixbuf/2.44/gdk-pixbuf-${PART_VERSION}.tar.xz"
sha256 = "69b93e09139b80c0ee661503d60deb5a5874a31772b5184b9cd5462a4100ab68"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dman=false -Dgtk_doc=false -Dtests=false -Dintrospection=enabled -Dglycin=enabled
'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "meson install -C ${BUILD_DIR}/build --destdir ${PART_DIR}"


[lifecycle.fabricate]
hooks.post_install = "gdk-pixbuf-query-loaders --update-cache 2>/dev/null || true"
hooks.post_upgrade = "gdk-pixbuf-query-loaders --update-cache 2>/dev/null || true"
