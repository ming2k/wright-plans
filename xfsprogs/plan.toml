name = "xfsprogs"
version = "7.0.0"
release = 1
description = "XFS filesystem userspace utilities"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://xfs.wiki.kernel.org"

link_deps = ['util-linux', 'icu', 'inih', 'liburcu']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/utils/fs/xfs/xfsprogs/xfsprogs-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/xfsprogs-${VERSION}
./configure --prefix=/usr --sbindir=/usr/bin --disable-static'''

[lifecycle.compile]
script = '''
cd source/xfsprogs-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/xfsprogs-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['util-linux', 'icu', 'inih', 'liburcu']
