name = "libgcrypt"
version = "1.12.1"
release = 1
description = "GnuPG cryptographic library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gnupg.org/software/libgcrypt/"

link_deps = ['libgpg-error']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libgcrypt-${VERSION}
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source/libgcrypt-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/libgcrypt-${VERSION}
DESTDIR=${STAGING_DIR} make install'''

[[output]]
runtime_deps = ['libgpg-error']
