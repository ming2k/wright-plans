name = "gstreamer"
version = "1.28.2"
release = 1
description = "Streaming media framework"
license = "LGPL-2.0-or-later"
arch = "x86_64"

link_deps = ['glib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "ce5cd44d4ffeafdcc3dddaa072b2179c0b7cb1abf4e6c5d18d4375f8a39fe491"
url = "https://gstreamer.freedesktop.org/src/gstreamer/gstreamer-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.compile]
script = '''
cd source/gstreamer-${VERSION}
# 移除 --libdir=lib，让 meson 自动决定是 lib 还是 lib64
meson setup build --prefix=/usr -Dtests=disabled -Dbenchmarks=disabled -Dintrospection=enabled
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gstreamer-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['libunwind', 'glib']
