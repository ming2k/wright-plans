name = "fuse-overlayfs"
version = "1.16"
release = 1
description = "FUSE overlay filesystem for rootless containers"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/containers/fuse-overlayfs"

link_deps = ['glibc', 'libfuse3']
build_deps = ['autoconf', 'automake', 'libtool']

[[sources]]
type = "http"
sha256 = "45968517603389ead067222d234bc8d8ed33e4b4f8ba16216bdd3e6aedcccea9"
url = "https://github.com/containers/fuse-overlayfs/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.prepare]
isolation = "none"
script = '''
cd source/fuse-overlayfs-${VERSION}
autoreconf -fi'''

[pipeline.configure]
isolation = "none"
env = { ac_cv_path_MD2MAN = '' }
script = '''
cd source/fuse-overlayfs-${VERSION}
./configure --prefix=/usr --bindir=/usr/bin'''

[pipeline.compile]
isolation = "none"
script = '''
cd source/fuse-overlayfs-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
isolation = "none"
script = '''
cd source/fuse-overlayfs-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc', 'libfuse3']
