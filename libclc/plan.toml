[plan]
name = "libclc"
version = "19.1.7"
release = 1
description = "OpenCL C library implementation for LLVM"
license = "Apache-2.0"
arch = "x86_64"
url = "https://libclc.llvm.org/"

[dependencies]
build = ["cmake", "llvm", "make"]
runtime = ["llvm"]
[sources]
uris = ["https://github.com/llvm/llvm-project/releases/download/llvmorg-${PKG_VERSION}/llvm-project-${PKG_VERSION}.src.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
mkdir build-libclc && cd build-libclc
cmake ../libclc                              \
-DCMAKE_INSTALL_PREFIX=/usr            \
-DCMAKE_BUILD_TYPE=Release
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}/build-libclc
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}/build-libclc
make DESTDIR=${PKG_DIR} install
'''
