name = "neomutt"
version = "20260105"
release = 1
description = "Feature-rich command-line email client"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://neomutt.org/"

[dependencies]
runtime = ["ca-certificates", "gnupg"]
build = ["gcc", "gettext", "make", "pkgconf"]
link = ["cyrus-sasl", "gdbm", "gnutls", "gpgme", "krb5", "libidn2", "lua", "ncurses", "pcre2", "sqlite"]

[[sources]]
type = "http"
sha256 = "a78e55a0df62b7f98566676d0ab9041aad89b2384bb5c6f3a96302a5cf49968d"
url = "https://github.com/neomutt/neomutt/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
    --disable-doc \
    --with-lock=fcntl \
    --gnutls \
    --gpgme \
    --gss \
    --sasl \
    --lua \
    --pcre2 \
    --gdbm \
    --sqlite'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
