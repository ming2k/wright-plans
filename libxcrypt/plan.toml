[plan]
name = "libxcrypt"
version = "4.4.38"
release = 1
description = "Modern library for one-way hashing of passwords"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/besser82/libxcrypt/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/besser82/libxcrypt/releases/download/v${PART_VERSION}/libxcrypt-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr                \
--enable-hashes=strong,glibc \
--enable-obsolete-api=no     \
--disable-static             \
--disable-failure-tokens
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make check
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
