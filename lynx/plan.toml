name = "lynx"
version = "2.9.2"
release = 2
description = "Text-mode web browser"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://lynx.invisible-island.net/"

link_deps = ['bzip2', 'ncurses', 'openssl', 'zlib']

[[sources]]
type = "http"
sha256 = "7374b89936d991669e101f4e97f2c9592036e1e8cdaa7bafc259a77ab6fb07ce"
url = "https://invisible-mirror.net/archives/lynx/tarballs/lynx${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/lynx-${VERSION}
sed -i configure \
  -e '/LDFLAGS="-L$cf_add_libdir $LDFLAGS"/d' \
  -e 's;,$BUILD_CC;,$CC_FOR_BUILD;' \
  -e 's;,$BUILD_CFLAGS;,$CFLAGS_FOR_BUILD;' \
  -e 's;,$BUILD_LDFLAGS;,$LDFLAGS_FOR_BUILD;'
./configure \
  --prefix=/usr \
  --with-screen=ncurses \
  --with-build-cc=gcc \
  --enable-widec \
  --with-zlib \
  --with-bzlib \
  --with-ssl \
  --enable-ipv6 \
  cf_cv_header_path_ssl=/usr/include/openssl'''

[lifecycle.compile]
script = '''
cd source/lynx-${VERSION}
make -j$(nproc) BUILD_CC=gcc BUILD_CPP='gcc -E''''

[lifecycle.staging]
script = '''
cd source/lynx-${VERSION}
make DESTDIR=${STAGING_DIR} install

if [ -d ${STAGING_DIR}/usr/etc ]; then
  mkdir -p ${STAGING_DIR}/etc
  cp -a ${STAGING_DIR}/usr/etc/. ${STAGING_DIR}/etc/
  rm -rf ${STAGING_DIR}/usr/etc
fi'''

[[output]]
runtime_deps = ['bzip2', 'ncurses', 'openssl', 'zlib']
