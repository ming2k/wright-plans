[plan]
name = "util-linux"
version = "2.41.3"
release = 5
description = "Miscellaneous system utilities for Linux"
license = "GPL-2.0-only AND GPL-2.0-or-later AND GPL-3.0-or-later AND LGPL-2.1-or-later AND BSD-2-Clause AND BSD-3-Clause AND LicenseRef-PublicDomain"
arch = "x86_64"
url = "https://github.com/util-linux/util-linux"

[dependencies]
build = ["gcc", "meson", "ninja", "pkgconf", "python"]
link = ["glibc", "ncurses", "zlib", "libcap", "linux-pam", "readline"]

[sources]
uris = ["https://www.kernel.org/pub/linux/utils/util-linux/v2.41/util-linux-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = """
cd ${BUILD_DIR}

# Tool ownership policy:
#   login, su, chfn, chsh, newgrp, nologin, vipw/vigr — owned by shadow
#     (better PAM + NSS + /etc/shadow integration)
#   mesg, write — unique to util-linux (terminal messaging)
#   line — obsolete, not built
meson setup build                               \
  --prefix=/usr                                 \
  --buildtype=release                           \
  -D sbindir=/usr/bin                           \
  -D fs-search-path=/usr/bin:/usr/local/bin     \
  -D libuser=disabled                           \
  -D libutempter=disabled                       \
  -D ncurses=disabled                           \
  -D ncursesw=enabled                           \
  -D econf=disabled                             \
  -D build-chfn-chsh=disabled                   \
  -D build-line=disabled                        \
  -D build-login=disabled                       \
  -D build-mesg=enabled                         \
  -D build-newgrp=disabled                      \
  -D build-nologin=disabled                     \
  -D build-su=disabled                          \
  -D build-vipw=disabled                        \
  -D build-write=enabled
"""

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
script = """
DESTDIR=${PKG_DIR} meson install -C ${BUILD_DIR}/build

# Remove static libraries
rm -f ${PKG_DIR}/usr/lib/lib*.a*

# Drop Python bindings (not needed)
rm -rf ${PKG_DIR}/usr/lib/python*
"""

[split.libuuid]
description = "Universally Unique Identifier library"
[split.libuuid.dependencies]
link = ["glibc"]
[split.libuuid.lifecycle.package]
script = """
install -d ${PKG_DIR}/usr/lib
mv -v ${MAIN_PKG_DIR}/usr/lib/libuuid.so* ${PKG_DIR}/usr/lib/
"""

[split.libblkid]
description = "Block device identification library"
[split.libblkid.dependencies]
link = ["glibc", "libuuid"]
[split.libblkid.lifecycle.package]
script = """
install -d ${PKG_DIR}/usr/lib
mv -v ${MAIN_PKG_DIR}/usr/lib/libblkid.so* ${PKG_DIR}/usr/lib/
"""

[split.libmount]
description = "Device mounting library"
[split.libmount.dependencies]
link = ["glibc", "libblkid"]
[split.libmount.lifecycle.package]
script = """
install -d ${PKG_DIR}/usr/lib
mv -v ${MAIN_PKG_DIR}/usr/lib/libmount.so* ${PKG_DIR}/usr/lib/
"""

[split.libsmartcols]
description = "Table or tree formatting library"
[split.libsmartcols.dependencies]
link = ["glibc"]
[split.libsmartcols.lifecycle.package]
script = """
install -d ${PKG_DIR}/usr/lib
mv -v ${MAIN_PKG_DIR}/usr/lib/libsmartcols.so* ${PKG_DIR}/usr/lib/
"""
