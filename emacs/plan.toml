name = "emacs"
release = 1
description = "The extensible, customizable, self-documenting real-time display editor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/emacs/"

link_deps = ['giflib', 'glib', 'glibc', 'gnutls', 'gtk3', 'harfbuzz', 'gcc:libgccjit', 'libjpeg-turbo', 'libpng', 'librsvg', 'libtiff', 'libwebp', 'ncurses', 'pango', 'sqlite', 'tree-sitter', 'zlib']

[[sources]]
type = "git"
url = "https://git.savannah.gnu.org/git/emacs.git"
branch = "master"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
./autogen.sh'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr           \
  --with-tree-sitter                \
  --with-native-compilation         \
  --with-pgtk                       \
  --with-jpeg                       \
  --with-tiff                       \
  --with-gif                        \
  --with-png                        \
  --with-rsvg                       \
  --with-webp                       \
  --with-sqlite3                    \
  --with-cairo                      \
  --with-zlib                       \
  --without-imagemagick             \
  --without-gconf                   \
  --without-gsettings               \
  --with-gnutls                     \
  --disable-silent-rules'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['giflib', 'glib', 'gnutls', 'gtk3', 'harfbuzz', 'gcc:libgccjit', 'libjpeg-turbo', 'libpng', 'librsvg', 'libtiff', 'libwebp', 'ncurses', 'pango', 'sqlite', 'tree-sitter', 'zlib', 'glibc']
