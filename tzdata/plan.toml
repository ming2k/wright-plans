[plan]
name = "tzdata"
version = "2025c"
release = 1
description = "Sources for time zone and daylight saving time data"
license = "LicenseRef-tz"
arch = "any"
url = "https://www.iana.org/time-zones"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://data.iana.org/time-zones/releases/tzcode${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://data.iana.org/time-zones/releases/tzdata${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
sed -i "s:sbin:bin:g" Makefile
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make CC=gcc LFLAGS="${LDFLAGS}" -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}

# Install tzcode tools (zic, zdump, tzselect)
make CC=gcc DESTDIR=${PKG_DIR} install

# Generate zoneinfo database
./zic -b fat -d ${PKG_DIR}/usr/share/zoneinfo africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

./zic -b fat -d ${PKG_DIR}/usr/share/zoneinfo/posix africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

./zic -b fat -d ${PKG_DIR}/usr/share/zoneinfo/right -L leapseconds africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

# POSIX rules (New York — POSIX requires US DST rules)
./zic -b fat -d ${PKG_DIR}/usr/share/zoneinfo -p America/New_York

# Reference data files
install -m644 iso3166.tab leap-seconds.list zone1970.tab zone.tab SECURITY ${PKG_DIR}/usr/share/zoneinfo

# /etc/localtime is managed by the user, not the package
rm -f ${PKG_DIR}/etc/localtime

# License
install -Dm644 LICENSE ${PKG_DIR}/usr/share/licenses/tzdata/LICENSE
'''
