name = "grim"
version = "1.5.0"
release = 1
description = "Grab images from a Wayland compositor"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/emersion/grim"

[dependencies]
build = ["meson", "ninja", "pkgconf", "scdoc"]
link = ["libjpeg-turbo", "libpng", "pixman", "wayland", "wayland-protocols"]

[[sources]]
sha256 = "9e72a98f7621b1f5741b405b8dbd447acf7d300ddb12667ec526db1ce6154eaa"
url = "https://gitlab.freedesktop.org/emersion/grim/-/archive/v${VERSION}/grim-v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
  --prefix=/usr \
  --buildtype=release \
  -Djpeg=enabled \
  -Dwerror=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
