name = "tpm2-tools"
version = "5.7"
release = 2
description = "The source repository for the Trusted Platform Module (TPM2.0) tools"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/tpm2-software/tpm2-tools"

link_deps = ['curl', 'glibc', 'openssl', 'tpm2-tss']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/tpm2-software/tpm2-tools/releases/download/${VERSION}/tpm2-tools-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/tpm2-tools-${VERSION}
./configure \
    --prefix=/usr \
    --disable-static'''

[lifecycle.compile]
script = '''
cd source/tpm2-tools-${VERSION}
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/tpm2-tools-${VERSION}
make -C ${WORKDIR} DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['tpm2-tss', 'curl', 'glibc', 'openssl']
