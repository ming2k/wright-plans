name = "nasm"
version = "2.16.03"
release = 1
description = "The Netwide Assembler"
license = "BSD-2-Clause"
arch = "x86_64"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/nasm-2.16.03.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
