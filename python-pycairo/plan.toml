name = "python-pycairo"
version = "1.29.0"
release = 1
description = "Python bindings for cairo"
license = "LGPL-2.1-only OR MPL-1.1"
arch = "x86_64"
url = "https://pycairo.readthedocs.io/"

[dependencies]
runtime = ["python", "cairo"]
build = ["python", "meson-python", "pkgconf"]
link = ["cairo"]

[[sources]]
sha256 = "SKIP"
url = "https://pypi.org/packages/source/p/pycairo/pycairo-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
