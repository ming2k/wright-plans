name = "intel-media-driver"
version = "25.4.6"
release = 1
description = "Intel Media Driver for VAAPI — Broadwell+ iGPUs"
license = "BSD-3-Clause AND MIT"
arch = "x86_64"
url = "https://github.com/intel/media-driver"

link_deps = ['glibc', 'intel-gmmlib', 'libva']
build_deps = ['cmake']

[[sources]]
type = "http"
sha256 = "e5cf57c66e22359d1ec07d766b04e5da43677b9330999ce0dbf686aac60cf6bb"
url = "https://github.com/intel/media-driver/archive/intel-media-${VERSION}/intel-media-driver-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/intel-media-driver-${VERSION}
cmake -B ${WORKDIR}/build -S ${WORKDIR} \
    -G "Unix Makefiles" \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
    -DMEDIA_BUILD_FATAL_WARNINGS=OFF'''

[pipeline.compile]
script = '''
cd source/intel-media-driver-${VERSION}
make -C ${WORKDIR}/build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/intel-media-driver-${VERSION}
make -C ${WORKDIR}/build DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc', 'intel-gmmlib', 'libva']
