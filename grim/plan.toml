name = "grim"
version = "1.5.0"
release = 1
description = "Grab images from a Wayland compositor"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/emersion/grim"

link_deps = ['libjpeg-turbo', 'libpng', 'pixman', 'wayland']
build_deps = ['wayland-protocols', 'meson', 'ninja']

[[sources]]
type = "http"
sha256 = "9e72a98f7621b1f5741b405b8dbd447acf7d300ddb12667ec526db1ce6154eaa"
url = "https://gitlab.freedesktop.org/emersion/grim/-/archive/v${VERSION}/grim-v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/grim-${VERSION}
meson setup build \
  --prefix=/usr \
  --buildtype=release \
  -Djpeg=enabled \
  -Dwerror=false'''

[lifecycle.compile]
script = '''
cd source/grim-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/grim-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['libjpeg-turbo', 'libpng', 'pixman', 'wayland']
