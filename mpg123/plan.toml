name = "mpg123"
version = "1.33.3"
release = 1
description = "Fast console MPEG audio decoder/player"
license = "LGPL-2.1-only"
arch = "x86_64"
url = "https://www.mpg123.org/"

link_deps = ['alsa-lib']

[[sources]]
type = "http"
sha256 = "6a0c6472dd156e213c2068f40115ebbb73978c2d873e66bae2a250e2d2198d26"
url = "https://deb.debian.org/debian/pool/main/m/mpg123/mpg123_${VERSION}.orig.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/mpg123-${VERSION}
./configure \
  --prefix=/usr \
  --disable-static \
  --with-optimization=0 \
  --with-default-audio=alsa'''

[lifecycle.compile]
script = '''
cd source/mpg123-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/mpg123-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['alsa-lib']
