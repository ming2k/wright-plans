name = "xdg-desktop-portal"
version = "1.20.4"
release = 1
description = "Portal frontend service for Flatpak and other desktop-neutral applications"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["dbus", "systemd"]
build = [
    "gobject-introspection",
    "meson",
    "ninja",
    "pkgconf",
]
link = [
    "glib",
    "gstreamer",
    "gst-plugins-base",
    "json-glib",
    "gdk-pixbuf",
    "libfuse3",
    "pipewire",
]

[[sources]]
uri = "https://github.com/flatpak/xdg-desktop-portal/releases/download/${PART_VERSION}/xdg-desktop-portal-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --sysconfdir=/etc --localstatedir=/var --buildtype=release -Dsystemd=enabled -Dgeoclue=disabled -Dman-pages=disabled -Dtests=disabled

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[lifecycle.fabricate]
