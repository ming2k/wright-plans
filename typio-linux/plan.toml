name = "typio-linux"
version = "0.1.17"
release = 1
description = "Linux host for the Typio input method framework"
license = "MIT"
arch = "x86_64"
url = "https://github.com/typio-ime/typio-linux"

build_deps = ['meson', 'ninja']
link_deps = ['libtypio', 'wayland', 'libxkbcommon', 'dbus', 'pipewire', 'freetype', 'harfbuzz', 'fontconfig', 'flux', 'vulkan-loader']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/typio-ime/typio-linux/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/typio-linux-${VERSION}
meson setup build --prefix=/usr --sysconfdir=/etc --buildtype=release \
    -Denable_systray=true \
    -Denable_voice=true \
    -Dbuild_tests=false'''

[pipeline.compile]
script = '''
cd source/typio-linux-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/typio-linux-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
name = "typio-linux"
runtime_deps = ['libtypio', 'wayland', 'libxkbcommon', 'dbus', 'pipewire', 'freetype', 'harfbuzz', 'fontconfig', 'flux', 'vulkan-loader']
