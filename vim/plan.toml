name = "vim"
version = "9.2.0461"
release = 1
description = "Vi Improved, a highly configurable text editor"
license = "custom:vim"
arch = "x86_64"
url = "https://www.vim.org"

link_deps = ['acl', 'ncurses', 'zlib']
build_deps = ['autoconf']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/vim/vim/archive/v${VERSION}/vim-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.prepare]
script = '''
# Allow VIMRCLOC to override the compiled-in vimrc paths at install time
sed -E 's|^.*(#define SYS_.*VIMRC_FILE.*").*$|\1|g' -i source/vim-${VERSION}/src/feature.h
sed -E 's|^.*(#define VIMRC_FILE.*").*$|\1|g' -i source/vim-${VERSION}/src/feature.h
(cd source/vim-${VERSION}/src && autoconf)'''

[pipeline.configure]
script = '''
cd source/vim-${VERSION}
./configure \
  --prefix=/usr \
  --localstatedir=/var/lib/vim \
  --with-features=huge \
  --with-x=no \
  --disable-gui \
  --disable-gpm \
  --enable-multibyte \
  --enable-cscope \
  --enable-acl \
  --enable-python3interp=dynamic \
  --enable-luainterp=dynamic \
  --enable-perlinterp=dynamic \
  --enable-rubyinterp=dynamic \
  --enable-tclinterp=dynamic \
  --disable-canberra'''

[pipeline.compile]
script = '''
cd source/vim-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/vim-${VERSION}
make -j1 VIMRCLOC=/etc DESTDIR=${STAGING_DIR} install

# Remove files traditionally provided by (n)vi
rm -f ${STAGING_DIR}/usr/bin/{ex,view}
find ${STAGING_DIR}/usr/share/man -name 'ex.1' -o -name 'view.1' -o -name 'evim.1' \
  -delete

install -Dm644 runtime/doc/uganda.txt \
  ${STAGING_DIR}/usr/share/licenses/vim/license.txt'''

[[output]]
runtime_deps = ['acl', 'ncurses', 'zlib']
