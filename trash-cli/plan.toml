name = "trash-cli"
version = "0.24.5.26"
release = 1
description = "Command line trashcan (recycle bin) interface"
license = "GPL-2.0-only"
arch = "any"
url = "https://github.com/andreafrancia/trash-cli"

[dependencies]
runtime = ["python", "python-psutil"]
build = ["python"]

[[sources]]
uri = "https://files.pythonhosted.org/packages/source/t/trash-cli/trash_cli-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --no-build-isolation --break-system-packages --root=${PART_DIR} .

'''

[lifecycle.fabricate]
