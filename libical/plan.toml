name = "libical"
version = "3.0.20"
release = 1
description = "Implementation of the iCalendar protocols and data formats"
license = "LGPL-2.1-only OR MPL-2.0"
arch = "x86_64"
url = "https://github.com/libical/libical"

[dependencies]
build = ["cmake", "ninja"]
link = ["glibc", "glib", "icu", "libxml2"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/libical/libical/archive/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
mkdir -p build && cd build
cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBEXECDIR=lib -DSHARED_ONLY=true -DCMAKE_DISABLE_FIND_PACKAGE_BerkeleyDB=true -DGOBJECT_INTROSPECTION=false -DICAL_GLIB_VAPI=false -DENABLE_GTK_DOC=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja install -C ${WORKDIR}/build'''
