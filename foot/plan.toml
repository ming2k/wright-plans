name = "foot"
version = "1.26.1"
release = 1
description = "A fast, lightweight and minimalistic Wayland terminal emulator"
license = "MIT"
arch = "x86_64"
url = "https://codeberg.org/dnkl/foot"

[dependencies]
runtime = ["fcft", "pixman"]
build = [
    "fcft",
    "gcc",
    "meson",
    "ninja",
    "pixman",
    "tllist",
]
link = [
    "fontconfig",
    "freetype",
    "harfbuzz",
    "libxkbcommon",
    "ncurses",
    "utf8proc",
    "wayland",
    "wayland-protocols",
]

[[sources]]
uri = "https://codeberg.org/dnkl/foot/releases/download/${VERSION}/foot-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dime=true -Dthemes=true -Dwerror=false

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[lifecycle.fabricate]
