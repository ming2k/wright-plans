name = "spirv-tools"
# spirv-tools' native release tag; v2026.2 == vulkan-sdk-1.4.350.1 (same upstream commit).
version = "2026.2"
release = 1
description = "API and commands for processing SPIR-V modules"
license = "Apache-2.0"
arch = "x86_64"


build_deps = ['cmake', 'ninja', 'spirv-headers']

[[sources]]
type = "http"
sha256 = "b4390652e64ab188eede9d556cf183b3c1c4be44d4fcd104b0d4af3bea2712d1"
url = "https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/SPIRV-Tools-${VERSION}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib -DSPIRV_WERROR=OFF -DSPIRV-Headers_SOURCE_DIR=/usr -DSPIRV_SKIP_TESTS=ON'''

[pipeline.compile]
script = '''
cd source/SPIRV-Tools-${VERSION}
cmake --build build -j $(nproc)'''

[pipeline.staging]
script = '''
cd source/SPIRV-Tools-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build'''

