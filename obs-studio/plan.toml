name = "obs-studio"
version = "32.1.0"
release = 1
description = "Free and open source software for video recording and live streaming"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://obsproject.com"

[dependencies]
build = ["cmake >= 3.28", "ninja", "pkgconf", "simde", "swig", "uthash"]
link = ["alsa-lib", "curl", "ffmpeg", "fontconfig", "freetype", "jansson", "libdrm", "libglvnd", "libva", "libxkbcommon", "mbedtls", "mesa", "nlohmann-json", "pciutils", "pipewire", "qt6-base", "qt6-svg", "qt6-wayland", "rnnoise", "speexdsp", "v4l-utils", "vulkan-loader", "wayland", "x264", "zlib"]
runtime = ["xdg-desktop-portal"]
optional = ["srt", "librist", "qrcodegen", "luajit", "python"]

[[sources]]
sha256 = "SKIP"
url = "git+https://github.com/obsproject/obs-studio.git#${VERSION}"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
    -DENABLE_UI=ON \
    -DENABLE_WAYLAND=ON \
    -DENABLE_PIPEWIRE=ON \
    -DENABLE_ALSA=ON \
    -DENABLE_PULSEAUDIO=OFF \
    -DENABLE_JACK=OFF \
    -DENABLE_SNDIO=OFF \
    -DENABLE_V4L2=ON \
    -DENABLE_FREETYPE=ON \
    -DENABLE_SPEEXDSP=ON \
    -DENABLE_RNNOISE=ON \
    -DENABLE_SCRIPTING=ON \
    -DENABLE_VLC=OFF \
    -DENABLE_BROWSER=OFF \
    -DENABLE_VST=ON \
    -DENABLE_AJA=OFF \
    -DENABLE_DECKLINK=OFF \
    -DENABLE_LIBFDK=OFF \
    -DENABLE_HEVC=ON \
    -DENABLE_VIRTUALCAM=OFF \
    -DENABLE_PLUGINS=ON \
    -DENABLE_FFMPEG_LOGGING=OFF \
    -DENABLE_NEW_MPEGTS_OUTPUT=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
