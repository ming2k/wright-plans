name = "seatd"
version = "0.9.1"
release = 1
description = "Minimal seat management daemon"
license = "MIT"
arch = "x86_64"
url = "https://sr.ht/~kennylevinsen/seatd/"

[dependencies]
build = ["meson", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://git.sr.ht/~kennylevinsen/seatd/archive/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/seatd-${VERSION}
meson setup build \
  --prefix=/usr \
  --buildtype=release \
  -Dlibseat-logind=systemd \
  -Dlibseat-builtin=enabled
'''

[lifecycle.compile]
script = '''
cd source/seatd-${VERSION}
ninja -C build
'''

[lifecycle.staging]
script = '''
cd source/seatd-${VERSION}
DESTDIR=${PART_DIR} ninja -C build install
'''

[output]
provides = ["seatd", "libseat"]
conflicts = ["seatd", "libseat"]

[hooks]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/seatd.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
