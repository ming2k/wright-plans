name = "srt"
version = "1.5.4"
release = 1
description = "Secure Reliable Transport protocol library"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/Haivision/srt"

[dependencies]
build = ["cmake", "ninja", "pkgconf"]
link = ["openssl"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/Haivision/srt/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DENABLE_STATIC=OFF \
    -DENABLE_SHARED=ON \
    -DENABLE_APPS=OFF \
    -DUSE_ENCLIB=openssl \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
