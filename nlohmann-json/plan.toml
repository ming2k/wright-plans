name = "nlohmann-json"
version = "3.12.0"
release = 1
description = "JSON for Modern C++ (header-only)"
license = "MIT"
arch = "any"
url = "https://github.com/nlohmann/json"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/nlohmann/json/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DJSON_BuildTests=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
