name = "valgrind"
version = "3.24.0"
release = 1
description = "Instrumentation framework for building dynamic analysis tools"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://valgrind.org/"

[dependencies]
build = ["gcc", "make", "perl"]
link = ["glibc"]
runtime = ["glibc"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://sourceware.org/pub/valgrind/valgrind-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
    --datadir=/usr/share/doc/valgrind-${VERSION} \
    --disable-werror'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
