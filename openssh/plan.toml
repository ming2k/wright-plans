name = "openssh"
version = "10.3p1"
release = 7
description = "Free implementation of the SSH protocol suite"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.openssh.com/portable.html"

[dependencies]
runtime = ["shadow"]
build = ["gcc", "make", "pkgconf"]
link = [
    "glibc",
    "libedit",
    "linux-pam",
    "openssl",
    "zlib",
    "libxcrypt",
]

[[sources]]
uri = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-${VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "sshd.service"
sha256 = "SKIP"

[[sources]]
uri = "ssh-agent.service"
sha256 = "SKIP"

[[sources]]
uri = "ssh-agent.socket"
sha256 = "SKIP"

[[sources]]
uri = "sshd.pam"
sha256 = "SKIP"

[[sources]]
uri = "openssh.tmpfiles"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
# --with-privsep-user=nobody: no dedicated sshd user needed
# --with-security-key-builtin omitted: requires libfido2 (not yet packaged)
# --with-xauth omitted: pure Wayland system, no X11
./configure \
  --prefix=/usr \
  --sysconfdir=/etc/ssh \
  --libexecdir=/usr/lib/ssh \
  --sbindir=/usr/bin \
  --with-privsep-path=/usr/share/empty.sshd \
  --with-privsep-user=nobody \
  --with-pam \
  --with-libedit \
  --with-ssl-engine \
  --disable-lastlog \
  --with-default-path=/usr/bin

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

# ── Systemd system units ──────────────────────────────────────────────────────
install -Dm644 ${FILES_DIR}/sshd.service         ${PART_DIR}/usr/lib/systemd/system/sshd.service

# ── Systemd user units (ssh-agent) ────────────────────────────────────────────
install -Dm644 ${FILES_DIR}/ssh-agent.service    ${PART_DIR}/usr/lib/systemd/user/ssh-agent.service
install -Dm644 ${FILES_DIR}/ssh-agent.socket     ${PART_DIR}/usr/lib/systemd/user/ssh-agent.socket

# ── tmpfiles (privilege separation chroot) ────────────────────────────────────
install -Dm644 ${FILES_DIR}/openssh.tmpfiles     ${PART_DIR}/usr/lib/tmpfiles.d/openssh.conf

# ── Factory defaults (pristine upstream configs for reference) ────────────────
install -Dm644 ${PART_DIR}/etc/ssh/ssh_config     ${PART_DIR}/usr/share/factory/etc/ssh/ssh_config
install -Dm644 ${PART_DIR}/etc/ssh/sshd_config    ${PART_DIR}/usr/share/factory/etc/ssh/sshd_config

# ── PAM configuration ─────────────────────────────────────────────────────────
install -Dm644 ${FILES_DIR}/sshd.pam             ${PART_DIR}/etc/pam.d/sshd

# ── Permissions ───────────────────────────────────────────────────────────────
# ssh-keysign needs setuid for host-based authentication
if [ -e ${PART_DIR}/usr/lib/ssh/ssh-keysign ]; then
  chmod 4755 ${PART_DIR}/usr/lib/ssh/ssh-keysign
fi

'''

[hooks]
post_install = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/openssh.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
post_upgrade = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/openssh.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''

[output]
backup = ["/etc/ssh/ssh_config", "/etc/ssh/sshd_config", "/etc/pam.d/sshd"]
