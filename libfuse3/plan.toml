[plan]
name = "libfuse3"
version = "3.18.1"
release = 6
description = "Filesystem in Userspace"
license = "GPL-2.0-only AND LGPL-2.1-only"
arch = "x86_64"
url = "https://github.com/libfuse/libfuse"

[[sources]]
uri = "https://github.com/libfuse/libfuse/releases/download/fuse-${PKG_VERSION}/fuse-${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
  --prefix=/usr          \
  --sbindir=/usr/bin     \
  --buildtype=release    \
  -D tests=false         \
  -D examples=false      \
  -D useroot=false
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
backup = ["/etc/fuse.conf"]
script = '''
DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install

# Remove legacy init scripts and static device nodes (handled by udev)
rm -rf ${PKG_DIR}/etc/init.d ${PKG_DIR}/dev 2>/dev/null || true

# Allow non-root users to mount FUSE filesystems via fusermount3
chmod u+s ${PKG_DIR}/usr/bin/fusermount3
'''
