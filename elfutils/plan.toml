name = "elfutils"
version = "0.194"
release = 1
description = "Collection of utilities and libraries for handling ELF files and DWARF data"
license = "LGPL-3.0-or-later AND GPL-3.0-or-later"
arch = "x86_64"
url = "https://sourceware.org/elfutils/"

[dependencies]
build = ["gcc", "make"]
link = ["zlib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://sourceware.org/ftp/elfutils/${VERSION}/elfutils-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr        \
            --disable-debuginfod \
            --enable-libdebuginfod=dummy'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
rm -f ${PART_DIR}/usr/lib/lib*.a
rm -rf ${PART_DIR}/usr/etc'''
