name = "brightnessctl"
version = "0.5.1"
release = 1
description = "A program to read and control device brightness"
license = "MIT"
arch = "x86_64"
url = "https://github.com/Hummer12007/brightnessctl"

[dependencies]
runtime = ["systemd"]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/Hummer12007/brightnessctl/archive/${VERSION}/brightnessctl-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source
make ENABLE_SYSTEMD=1'''

[lifecycle.staging]
script = '''
cd source
make install DESTDIR=${PART_DIR} PREFIX=/usr ENABLE_SYSTEMD=1 INSTALL_UDEV_RULES=0'''
