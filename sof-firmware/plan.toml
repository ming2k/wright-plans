name = "sof-firmware"
version = "2025.12.2"
release = 1
description = "Sound Open Firmware"
license = "BSD-3-Clause"
arch = "any"
url = "https://github.com/thesofproject/sof-bin"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/thesofproject/sof-bin/releases/download/v${VERSION}/sof-bin-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/sof-firmware-${VERSION}
echo "firmware package"'''

[lifecycle.compile]
script = '''
cd source/sof-firmware-${VERSION}
echo "no build needed"'''

[lifecycle.staging]
script = '''
cd source/sof-firmware-${VERSION}
mkdir -p ${STAGING_DIR}/usr/lib/firmware/intel
cp -a sof ${STAGING_DIR}/usr/lib/firmware/intel/sof
cp -a sof-ipc4 ${STAGING_DIR}/usr/lib/firmware/intel/sof-ipc4
cp -a sof-ipc4-lib ${STAGING_DIR}/usr/lib/firmware/intel/sof-ipc4-lib
cp -a sof-tplg ${STAGING_DIR}/usr/lib/firmware/intel/sof-tplg
cp -a sof-ace-tplg ${STAGING_DIR}/usr/lib/firmware/intel/sof-ace-tplg
cp -a sof-ipc4-tplg ${STAGING_DIR}/usr/lib/firmware/intel/sof-ipc4-tplg'''
