name = "spice"
version = "0.16.0"
release = 1
description = "SPICE server library for remote display virtualization"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.spice-space.org/"

[dependencies]
build = [
    "meson",
    "ninja",
    "pkgconf",
    "python",
]
link = [
    "glib",
    "pixman",
    "openssl",
    "libjpeg-turbo",
    "opus",
    "zlib",
    "spice-protocol",
]

[[sources]]
uri = "https://www.spice-space.org/download/releases/spice-server/spice-${VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr -Dgstreamer=no -Dsasl=false -Dlz4=false -Dtests=false

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[lifecycle.fabricate]
