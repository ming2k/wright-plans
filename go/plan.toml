name = "go"
version = "1.26.2"
release = 1
description = "The Go programming language"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://go.dev"

[dependencies]
build = ["go-bootstrap", "bash", "gcc", "glibc"]
runtime = ["glibc"]

[[sources]]
uri = "https://go.dev/dl/go${VERSION}.src.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "none"
env = { GOROOT_BOOTSTRAP = "/usr/lib/go-bootstrap", GOOS = "linux", GOARCH = "amd64", CGO_ENABLED = "1" }
script = '''
cd ${BUILD_DIR}/src
./make.bash
'''

[lifecycle.staging]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
mkdir -p ${PART_DIR}/usr/lib
# Copy everything built
cp -a ${BUILD_DIR} ${PART_DIR}/usr/lib/go

# Cleanup things we don't want to distribute
rm -rf ${PART_DIR}/usr/lib/go/pkg/obj
rm -rf ${PART_DIR}/usr/lib/go/pkg/bootstrap
rm -rf ${PART_DIR}/usr/lib/go/pkg/linux_amd64/cmd

mkdir -p ${PART_DIR}/usr/bin
ln -sf ../lib/go/bin/go ${PART_DIR}/usr/bin/go
ln -sf ../lib/go/bin/gofmt ${PART_DIR}/usr/bin/gofmt
'''
