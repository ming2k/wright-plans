name = "slurp"
version = "1.5.0"
release = 1
description = "Select a region in a Wayland compositor"
license = "MIT"
arch = "x86_64"
url = "https://wayland.emersion.fr/slurp/"

[dependencies]
build = ["meson", "ninja", "pkgconf", "scdoc"]
link = ["cairo", "libxkbcommon", "wayland", "wayland-protocols"]

[[sources]]
type = "http"
sha256 = "0fa880d4a93e1c795e3b5929fbea47546df0955bea34fc2f7ffeb1751678f663"
url = "https://github.com/emersion/slurp/archive/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
  --prefix=/usr \
  --buildtype=release'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
