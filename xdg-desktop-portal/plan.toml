[plan]
name = "xdg-desktop-portal"
version = "1.20.3"
release = 1
description = "Portal frontend service for Flatpak and other desktop-neutral applications"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
build = ["gobject-introspection", "meson", "ninja", "pkgconf"]
runtime = ["dbus", "systemd"]
link = ["glib", "gstreamer", "gst-plugins-base", "json-glib", "gdk-pixbuf", "libfuse3", "pipewire"]

[sources]
uris = ["https://github.com/flatpak/xdg-desktop-portal/releases/download/${PKG_VERSION}/xdg-desktop-portal-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    --buildtype=release \
    -Dsystemd=enabled \
    -Dgeoclue=disabled \
    -Dman-pages=disabled \
    -Dtests=disabled
"""

[lifecycle.compile]
script = """
cd ${BUILD_DIR}
ninja -C build
"""

[lifecycle.package]
script = """
cd ${BUILD_DIR}
DESTDIR=${PKG_DIR} ninja -C build install
"""
