name = "libblockdev"
version = "3.4.0"
release = 1
description = "Library for manipulating block devices"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/storaged-project/libblockdev"

link_deps = ['btrfs-progs', 'cryptsetup', 'glib', 'json-glib', 'keyutils', 'kmod', 'libatasmart', 'libbytesize', 'libnvme', 'libyaml', 'lvm2', 'util-linux']
build_deps = ['autoconf', 'automake', 'libtool']

[[sources]]
type = "http"
sha256 = "65ef9a37babd44b85b8ff9b273f90f9f7d5f8ff7b0c76a8edb69240325fd83f4"
url = "https://github.com/storaged-project/libblockdev/releases/download/${VERSION}/libblockdev-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libblockdev-${VERSION}
autoreconf -fi
./configure --prefix=/usr \
  --with-gtk-doc=no \
  --with-escrow=no \
  --with-mpath=no \
  --with-tools=no \
  --with-nvdimm=no \
  --with-nvme=yes \
  --with-smartmontools=no'''

[pipeline.compile]
script = '''
cd source/libblockdev-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libblockdev-${VERSION}
make DESTDIR=${STAGING_DIR} install

if [ -d ${STAGING_DIR}/usr/etc ]; then
  mkdir -p ${STAGING_DIR}/etc
  cp -a ${STAGING_DIR}/usr/etc/. ${STAGING_DIR}/etc/
  rm -rf ${STAGING_DIR}/usr/etc
fi'''

[[output]]
runtime_deps = ['mdadm', 'btrfs-progs', 'cryptsetup', 'glib', 'json-glib', 'keyutils', 'kmod', 'libatasmart', 'libbytesize', 'libnvme', 'libyaml', 'lvm2', 'util-linux']
