name = "qt6-base"
version = "6.11.0"
release = 2
description = "Qt 6 base module (Wayland Only)"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"

link_deps = ['fontconfig:default', 'freetype:default', 'glib:default', 'harfbuzz:default', 'libdrm:default', 'libpng:default', 'libxkbcommon:default', 'openssl:default', 'pcre2:default', 'vulkan-headers:default', 'zlib:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtbase-everywhere-src-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_CXX_FLAGS="-Wno-error" \
    -DINSTALL_BINDIR=bin \
    -DINSTALL_PUBLICBINDIR=bin \
    -DINSTALL_LIBEXECDIR=lib/qt6 \
    -DINSTALL_INCLUDEDIR=include/qt6 \
    -DINSTALL_MKSPECSDIR=lib/qt6/mkspecs \
    -DINSTALL_ARCHDATADIR=lib/qt6 \
    -DINSTALL_DATADIR=share/qt6 \
    -DFEATURE_xcb=OFF \
    -DFEATURE_xcb_xlib=OFF \
    -DQT_FEATURE_xkbcommon_x11=OFF \
    -DQT_FEATURE_openssl_linked=ON \
    -DQT_FEATURE_system_zlib=ON \
    -DQT_FEATURE_system_freetype=ON \
    -DQT_FEATURE_vulkan=ON \
    -DQT_FEATURE_sql=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install'''

[output]
runtime_deps = ['dbus:default', 'double-conversion:default', 'mesa:default', 'pcre2:default']
