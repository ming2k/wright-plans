[plan]
name = "python-mako"
version = "1.3.10"
release = 1
description = "Fast templating language for Python"
license = "MIT"
arch = "x86_64"
url = "https://www.makotemplates.org/"

[dependencies]
build = ["python"]

[[sources]]
uri = "https://files.pythonhosted.org/packages/source/m/mako/mako-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --break-system-packages --no-deps --root=${PART_DIR} --no-build-isolation .
'''
