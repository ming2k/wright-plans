name = "zellij"
version = "0.44.1"
release = 1
description = "A terminal workspace with batteries included"
license = "MIT"
arch = "x86_64"
url = "https://github.com/zellij-org/zellij"

[dependencies]
build = ["rust"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/zellij-org/zellij/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
env = {'CARGO_HOME': '${BUILD_DIR}/.cargo', 'CARGO_TARGET_DIR': '${BUILD_DIR}/target'}
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/zellij ${PART_DIR}/usr/bin/zellij'''
