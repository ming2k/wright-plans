name = "libvpx"
version = "1.16.0"
release = 1
description = "WebM VP8/VP9 codec SDK"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/webmproject/libvpx"

[dependencies]
build = ["gcc", "make", "nasm"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/webmproject/libvpx/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
            --enable-shared \
            --disable-static \
            --enable-vp8 \
            --enable-vp9 \
            --enable-runtime-cpu-detect \
            --enable-postproc'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
