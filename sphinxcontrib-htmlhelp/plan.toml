name = "sphinxcontrib-htmlhelp"
version = "2.1.0"
release = 1
description = "Sphinx extension for HTML help output"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/sphinx-doc/sphinxcontrib-htmlhelp"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/s/sphinxcontrib_htmlhelp/sphinxcontrib_htmlhelp-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/sphinxcontrib-htmlhelp-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
