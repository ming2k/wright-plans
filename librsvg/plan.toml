name = "librsvg"
version = "2.62.1"
release = 2
description = "SVG rendering library using Rust"
license = "LGPL-2.1-or-later"
arch = "x86_64"


[dependencies]
build = [
    "pkgconf",
    "meson",
    "ninja",
    "rust",
    "cargo-c",
    "python",
    "gobject-introspection",
]
link = [
    "cairo",
    "gdk-pixbuf",
    "pango",
    "glib",
    "libxml2",
    "harfbuzz",
    "freetype",
    "fribidi",
]

[[sources]]
uri = "https://download.gnome.org/sources/librsvg/2.62/librsvg-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --libdir=lib --buildtype=release -Dintrospection=enabled -Ddocs=disabled -Dtests=false -Dvala=disabled

'''

[lifecycle.compile]
dockyard = "relaxed"
env = { LD_LIBRARY_PATH = "${BUILD_DIR}/build/librsvg" }
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "meson install -C ${BUILD_DIR}/build --destdir ${PART_DIR}"

[lifecycle.fabricate]
