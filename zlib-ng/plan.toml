name = "zlib-ng"
version = "2.3.3"
release = 2
description = "Zlib replacement with optimizations (non-compat build)"
license = "Zlib"
arch = "x86_64"
url = "https://github.com/zlib-ng/zlib-ng"


build_deps = ['cmake', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/zlib-ng-${VERSION}
cmake -S . -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=None \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DWITH_GTEST=OFF \
  -DBUILD_SHARED_LIBS=ON'''

[pipeline.compile]
script = '''
cd source/zlib-ng-${VERSION}
cmake --build build'''

[pipeline.staging]
script = '''
cd source/zlib-ng-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build
install -Dm 644 LICENSE.md ${STAGING_DIR}/usr/share/licenses/zlib-ng/LICENSE.md
install -Dm 644 README.md ${STAGING_DIR}/usr/share/doc/zlib-ng/README.md'''

