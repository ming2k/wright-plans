name = "hatch-vcs"
version = "0.5.0"
release = 1
description = "Hatch plugin for versioning from VCS (git/hg) tags"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ofek/hatch-vcs"

[dependencies]
runtime = ["python", "hatchling", "setuptools-scm"]
build = ["python", "hatchling"]

[[sources]]
sha256 = "SKIP"
url = "https://pypi.org/packages/source/h/hatch_vcs/hatch_vcs-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
