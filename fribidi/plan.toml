name = "fribidi"
version = "1.0.16"
release = 1
description = "Unicode Bidirectional Algorithm library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/fribidi/fribidi"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/fribidi/fribidi/releases/download/v${VERSION}/fribidi-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr          \
--buildtype=release'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
