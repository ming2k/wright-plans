name = "zlib"
version = "1.3.2"
release = 1
description = "Compression library implementing the deflate format"
license = "Zlib"
arch = "x86_64"
url = "https://zlib.net/"

[dependencies]
build = ["bash", "gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/madler/zlib/releases/download/v${VERSION}/zlib-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
