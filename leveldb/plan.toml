name = "leveldb"
version = "1.23"
release = 1
description = "Fast key-value storage library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/leveldb"

link_deps = ['snappy']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/google/leveldb/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cmake -B ${WORKDIR}/build -S source/leveldb-${VERSION} -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DLEVELDB_BUILD_TESTS=OFF \
    -DLEVELDB_BUILD_BENCHMARKS=OFF'''

[pipeline.compile]
script = '''
ninja -C ${WORKDIR}/build -j$(nproc)'''

[pipeline.staging]
script = '''
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install'''

[[output]]
runtime_deps = ['snappy']
