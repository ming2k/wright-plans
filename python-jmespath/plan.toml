name = "python-jmespath"
version = "1.1.0"
release = 1
description = "JSON Matching Expressions"
license = "MIT"
arch = "x86_64"
url = "https://github.com/jmespath/jmespath.py"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/j/jmespath/jmespath-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source/jmespath-${VERSION}
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
