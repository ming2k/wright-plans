[plan]
name = "xdg-utils"
version = "1.2.1"
release = 1
description = "Tools to assist applications with desktop integration tasks"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/xdg-utils/"

[dependencies]
build = ["gcc", "make", "lynx", "xmlto", "docbook-xml"]

[[sources]]
uri = "https://gitlab.freedesktop.org/xdg/xdg-utils/-/archive/v${PKG_VERSION}/xdg-utils-v${PKG_VERSION}.tar.bz2"
sha256 = "93d510dccf328378f012fe195b4574c2fac1cd65a74d0852d6eaa72e5a2065a7"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
sed -i 's#^XMLTO[[:space:]]*=.*#XMLTO           = /usr/bin/xmlto --skip-validation#' scripts/Makefile
export LYNX_CFG=/etc/lynx.cfg
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
