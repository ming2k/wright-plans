name = "xkeyboard-config"
version = "2.46"
release = 1
description = "X Keyboard Configuration Database"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/XKeyboardConfig/"

[dependencies]
build = ["meson", "ninja"]

[[sources]]
uri = "https://www.x.org/pub/individual/data/xkeyboard-config/xkeyboard-config-${PART_VERSION}.tar.xz"
sha256 = "10c58218fb60d08fb1f7b30304deb3ba47613195aa8a08a81f1972775ccc3640"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir -p build && cd build
meson setup --prefix=/usr --buildtype=release ..

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PART_DIR} ninja install

'''

[lifecycle.fabricate]
