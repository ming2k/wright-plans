name = "libinput"
version = "1.31.0"
release = 1
description = "Input device management and event handling library"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/libinput/"


build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/libinput/libinput/-/archive/${VERSION}/libinput-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libinput-${VERSION}
meson setup build \
--prefix=/usr           \
--buildtype=release     \
-D documentation=false  \
-D tests=false          \
-D debug-gui=false      \
-D libwacom=false'''

[lifecycle.compile]
script = '''
cd source/libinput-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/libinput-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['libevdev', 'mtdev']
