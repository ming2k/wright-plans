[plan]
name = "libatasmart"
version = "0.19"
release = 1
description = "ATA S.M.A.R.T. reading and parsing library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "http://0pointer.de/blog/projects/being-smart.html"

[dependencies]
build = ["autoconf", "automake", "gcc", "libtool", "make", "pkgconf"]
link = ["systemd"]

[[sources]]
uri = "http://0pointer.de/public/libatasmart-${PART_VERSION}.tar.xz"
sha256 = "61f0ea345f63d28ab2ff0dc352c22271661b66bf09642db3a4049ac9dbdb0f8d"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
autoreconf -fi
./configure --prefix=/usr --sbindir=/usr/bin --disable-static
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
