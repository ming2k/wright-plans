name = "dosfstools"
version = "4.2"
release = 1
description = "FAT filesystem utilities: mkfs.fat, fsck.fat, fatlabel"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/dosfstools/dosfstools"

[dependencies]
build = ["pkgconf"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/dosfstools/dosfstools/releases/download/v${VERSION}/dosfstools-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --sbindir=/usr/bin --enable-compat-symlinks'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install -C ${WORKDIR}'''
