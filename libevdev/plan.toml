name = "libevdev"
version = "1.13.3"
release = 1
description = "Wrapper library for evdev input devices"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/libevdev/"


build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.freedesktop.org/software/libevdev/libevdev-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libevdev-${VERSION}
meson setup build \
--prefix=/usr         \
--buildtype=release   \
-D documentation=disabled \
-D tests=disabled'''

[pipeline.compile]
script = '''
cd source/libevdev-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libevdev-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

