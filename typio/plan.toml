name = "typio"
version = "1.1.2"
release = 1
description = "Native Wayland input method daemon with optional GTK4 control panel"
license = "NOASSERTION"
arch = "x86_64"
url = "https://github.com/ming2k/typio"

[dependencies]
runtime = ["rime-prelude"]
build = [
    "cmake",
    "ninja",
    "pkgconf",
]
link = [
    "cairo",
    "dbus",
    "gtk4",
    "librime",
    "libxkbcommon",
    "pango",
    "wayland",
]

[[sources]]
uri = "https://github.com/ming2k/typio/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "e40019e6efc26b2cda6f251b34bc4fbfefb0f90f40905875a4491ece3e7f36f3"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -S . -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_TESTS=OFF \
    -DBUILD_CONTROL_PANEL=ON \
    -DENABLE_SYSTRAY=ON \
    -DENABLE_STATUS_BUS=ON

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"
