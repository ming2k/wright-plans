name = "gtk3"
version = "3.24.52"
release = 1
description = "GTK3 - the GIMP Toolkit (Pure Wayland)"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.gtk.org"

[dependencies]
runtime = ["adwaita-icon-theme", "shared-mime-info", "iso-codes"]
build = ["meson", "ninja", "pkgconf", "gobject-introspection", "wayland-protocols"]
link = ["at-spi2-core", "glib", "pango", "cairo", "gdk-pixbuf", "libepoxy", "libxkbcommon", "wayland"]

[[sources]]
sha256 = "SKIP"
url = "https://download.gnome.org/sources/gtk/3.24/gtk-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Dwayland_backend=true -Dx11_backend=false -Dbroadway_backend=false -Dintrospection=true -Dgtk_doc=false -Dman=false'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
meson install -C ${WORKDIR}/build --destdir ${PART_DIR}'''

[hooks]
post_install = '''
glib-compile-schemas /usr/share/glib-2.0/schemas 2>/dev/null || true
gdk-pixbuf-query-loaders --update-cache 2>/dev/null || true
gtk-update-icon-cache -qtf /usr/share/icons/hicolor 2>/dev/null || true

'''
post_upgrade = '''
glib-compile-schemas /usr/share/glib-2.0/schemas 2>/dev/null || true
gdk-pixbuf-query-loaders --update-cache 2>/dev/null || true
gtk-update-icon-cache -qtf /usr/share/icons/hicolor 2>/dev/null || true

'''
