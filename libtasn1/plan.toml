name = "libtasn1"
version = "4.21.0"
release = 1
description = "ASN.1 library used by GnuTLS"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libtasn1/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/libtasn1/libtasn1-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
