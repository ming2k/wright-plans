name = "mpc"
version = "1.4.1"
release = 1
description = "C library for the arithmetic of complex numbers with arbitrarily high precision"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://www.multiprecision.org/mpc/"

link_deps = ['gmp', 'mpfr']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/mpc/mpc-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/mpc-${VERSION}
./configure --prefix=/usr    \
--disable-static \
--docdir=/usr/share/doc/mpc-1.3.1'''

[pipeline.compile]
script = '''
cd source/mpc-${VERSION}
make -j$(nproc)
make html'''

# [pipeline.check]
# script = '''
# cd source/mpc-${VERSION}
# make check'''

[pipeline.staging]
script = '''
cd source/mpc-${VERSION}
make DESTDIR=${STAGING_DIR} install
make DESTDIR=${STAGING_DIR} install-html'''

[[output]]
runtime_deps = ['gmp', 'mpfr']
