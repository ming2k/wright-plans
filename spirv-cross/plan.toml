name = "spirv-cross"
version = "1.4.341.0"
release = 1
description = "Tool and library for parsing and converting SPIR-V to other shader languages"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/KhronosGroup/SPIRV-Cross"

[dependencies]
build = ["gcc", "make", "cmake"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/KhronosGroup/SPIRV-Cross/archive/refs/tags/vulkan-sdk-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
mkdir -p ${WORKDIR}/build && cd source/build
cmake -DCMAKE_INSTALL_PREFIX=/usr \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
      -DSPIRV_CROSS_SHARED=ON \
      -DSPIRV_CROSS_STATIC=OFF \
      -DSPIRV_CROSS_CLI=OFF \
      ..'''

[lifecycle.compile]
script = '''
cd source/build
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
make DESTDIR=${PART_DIR} install'''
