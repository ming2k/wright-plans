name = "intel-ucode"
version = "20260227"
release = 1
description = "Intel CPU microcode firmware for early microcode update"
license = "LicenseRef-intel-microcode"
arch = "x86_64"
url = "https://github.com/intel/Intel-Linux-Processor-Microcode-Data-Files"

[[sources]]
sha256 = "SKIP"
url = "https://github.com/intel/Intel-Linux-Processor-Microcode-Data-Files/archive/refs/tags/microcode-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
install -d "${PART_DIR}/usr/lib/firmware"
cp -r "${WORKDIR}/intel-ucode" "${PART_DIR}/usr/lib/firmware/"
cp -r "${WORKDIR}/intel-ucode-with-caveats" "${PART_DIR}/usr/lib/firmware/"

install -Dm644 "${WORKDIR}/license" \
    "${PART_DIR}/usr/share/licenses/intel-ucode/LICENSE"'''
