name = "kmod"
version = "34.2"
release = 3
description = "Linux kernel module management tools and library"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git"

[dependencies]
build = ["gcc", "meson", "ninja"]
link = ["openssl", "xz", "zlib", "zstd"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git/snapshot/kmod-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build          \
  --prefix=/usr            \
  --sbindir=/usr/bin       \
  --buildtype=release      \
  -D manpages=false        \
  -D openssl=enabled       \
  -D xz=enabled            \
  -D zlib=enabled          \
  -D zstd=enabled'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build

# Create standard module configuration directories
install -dm755 ${PART_DIR}/etc/depmod.d
install -dm755 ${PART_DIR}/etc/modprobe.d
install -dm755 ${PART_DIR}/usr/lib/depmod.d
install -dm755 ${PART_DIR}/usr/lib/modprobe.d'''
