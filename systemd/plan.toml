name = "systemd"
version = "259.3"
release = 1
description = "System and Service Manager"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/systemd/systemd"

[dependencies]
runtime = [
    "bash",
    "dbus",
    "hwdata",
    "kbd",
    "kmod",
]
build = [
    "gcc",
    "gperf",
    "llvm",
    "python-jinja2",
    "python-pyelftools",
    "meson",
    "ninja",
    "pkgconf",
    "python",
]
link = [
    "acl",
    "cryptsetup",
    "glibc",
    "libcap",
    "libgcrypt",
    "libidn2",
    "libseccomp",
    "libxcrypt",
    "linux-pam",
    "lz4",
    "openssl",
    "p11-kit",
    "pcre2",
    "util-linux",
    "xz",
    "zstd",
]

[[sources]]
uri = "https://github.com/systemd/systemd/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "90-theseus.preset"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
sed -i -e 's/GROUP="render"/GROUP="video"/' \
       -e 's/GROUP="sgx", //' \
       rules.d/50-udev-default.rules.in

'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir -p build
cd build
meson setup .. \
    --prefix=/usr \
    --buildtype=release \
    -D libdir=lib \
    -D sbindir=/usr/bin \
    -D version-tag="${PART_VERSION}-theseus" \
    -D vcs-tag=false \
    -D shared-lib-tag="${PART_VERSION}" \
    -D mode=release \
    -D install-tests=false \
    -D ldconfig=false \
    -D man=disabled \
    -D rpmmacrosdir=no \
    -D sysvinit-path= \
    -D sysvrcnd-path= \
    -D dbuspolicydir=/usr/share/dbus-1/system.d \
    -D firstboot=true \
    -D sysusers=true \
    -D pam=enabled \
    -D pamconfdir=/usr/lib/pam.d \
    -D logind=true \
    -D networkd=true \
    -D resolve=true \
    -D seccomp=enabled \
    -D libidn2=enabled \
    -D lz4=enabled \
    -D dns-over-tls=openssl \
    -D ukify=auto \
    -D bootloader=enabled \
    -D homed=disabled \
    -D sysupdate=disabled \
    -D audit=disabled \
    -D selinux=disabled \
    -D default-dnssec=no \
    -D default-kill-user-processes=false \
    -D default-locale='C.UTF-8' \
    -D fallback-hostname='theseus' \
    -D nologin-path=/usr/bin/nologin \
    -D dev-kvm-mode=0660 \
    -D nobody-group=nogroup \
    -D sbat-distro=theseus \
    -D sbat-distro-summary="Ship of Theseus" \
    -D sbat-distro-pkgname=systemd \
    -D sbat-distro-version=${PART_VERSION} \
    -D sbat-distro-url=https://github.com/anthropic \
    -D docdir=/usr/share/doc/systemd-${PART_VERSION}

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PART_DIR} ninja install

# Relocate any sbin files — systemd installs sysvinit compat shims to /usr/sbin
# regardless of -D sbindir. Move them, then replace with proper symlinks to systemctl.
if [ -d ${PART_DIR}/usr/sbin ]; then
  cp -a ${PART_DIR}/usr/sbin/. ${PART_DIR}/usr/bin/
  rm -rf ${PART_DIR}/usr/sbin
fi

# Sysvinit compat: halt/poweroff/reboot/shutdown → systemctl (Arch approach)
for cmd in halt poweroff reboot shutdown; do
  ln -sf systemctl ${PART_DIR}/usr/bin/${cmd}
done
# init → systemd
ln -sf ../lib/systemd/systemd ${PART_DIR}/usr/bin/init 2>/dev/null || true

# Preset policy: 90-theseus.preset explicitly enables core services.
# 99-default.preset denies everything else. (Arch approach)
install -Dm644 ${FILES_DIR}/90-theseus.preset ${PART_DIR}/usr/lib/systemd/system-preset/90-theseus.preset
echo 'disable *' > ${PART_DIR}/usr/lib/systemd/system-preset/99-default.preset

# Ship local console logins on tty1-tty6 without relying on preset application.
install -d ${PART_DIR}/etc/systemd/system/getty.target.wants
for tty in 1 2 3 4 5 6; do
  ln -sf /usr/lib/systemd/system/getty@.service \
    ${PART_DIR}/etc/systemd/system/getty.target.wants/getty@tty${tty}.service
done

# Remove factory files that conflict with the filesystem package
rm -f ${PART_DIR}/usr/share/factory/etc/issue
rm -f ${PART_DIR}/usr/share/factory/etc/nsswitch.conf
sed -i '/^C \/etc\/nsswitch/d; /^C \/etc\/issue/d' \
       ${PART_DIR}/usr/lib/tmpfiles.d/etc.conf

'''

[hooks]
post_install = '''
ldconfig 2>/dev/null || true
systemd-machine-id-setup 2>/dev/null || true
systemctl preset-all 2>/dev/null || true
for tty in 1 2 3 4 5 6; do
  systemctl enable getty@tty${tty}.service 2>/dev/null || true
done
systemctl daemon-reexec 2>/dev/null || true

'''
post_upgrade = '''
ldconfig 2>/dev/null || true
systemctl daemon-reexec 2>/dev/null || true

'''

[output]
backup = [
    "/etc/systemd/coredump.conf",
    "/etc/systemd/journald.conf",
    "/etc/systemd/logind.conf",
    "/etc/systemd/networkd.conf",
    "/etc/systemd/oomd.conf",
    "/etc/systemd/resolved.conf",
    "/etc/systemd/sleep.conf",
    "/etc/systemd/system.conf",
    "/etc/systemd/timesyncd.conf",
    "/etc/systemd/user.conf",
    "/etc/udev/iocost.conf",
    "/etc/udev/udev.conf",
]
