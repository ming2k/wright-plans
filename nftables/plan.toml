[plan]
name = "nftables"
version = "1.1.6"
release = 4
description = "Netfilter tables userspace tools"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://netfilter.org/projects/nftables/"

[dependencies]
build = ["autoconf", "automake", "bison", "flex", "gcc", "libmnl", "libnftnl", "make", "pkgconf"]
link = ["gmp", "jansson", "libmnl", "libnftnl", "ncurses", "readline"]

[sources]
uris = [
  "git+https://git.netfilter.org/nftables.git#tag=v${PKG_VERSION}",
  "nftables.service",
  "nftables.conf",
]
sha256 = ["SKIP", "SKIP", "SKIP"]

[options]
strip = true
ccache = true

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
autoreconf -fiv
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr       \
  --sbindir=/usr/bin  \
  --sysconfdir=/etc   \
  --with-json         \
  --with-cli=readline \
  --disable-debug     \
  --disable-man-doc   \
  --disable-python    \
  --with-mini-gmp=no
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

# Basic safe firewall config (user-editable, backed up by wright)
install -Dm644 ${FILES_DIR}/nftables.conf ${PKG_DIR}/etc/nftables.conf

# systemd service
install -Dm644 ${FILES_DIR}/nftables.service ${PKG_DIR}/usr/lib/systemd/system/nftables.service
'''

[install_scripts]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"
pre_remove = "nft flush ruleset 2>/dev/null || true"

[backup]
files = ["/etc/nftables.conf"]
