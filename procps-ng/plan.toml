[plan]
name = "procps-ng"
version = "4.0.6"
release = 4
description = "Utilities for monitoring your system and its processes"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gitlab.com/procps-ng/procps"

[dependencies]
build = ["gcc", "gettext", "make"]
link = ["ncurses", "systemd"]

[[sources]]
uri = "https://downloads.sourceforge.net/project/procps-ng/Production/procps-ng-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure \
  --prefix=/usr \
  --sbindir=/usr/bin \
  --bindir=/usr/bin \
  --libdir=/usr/lib \
  --sysconfdir=/etc \
  --disable-static \
  --disable-kill \
  --disable-modern-top \
  --enable-watch8bit \
  --with-systemd
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

if [ -d ${PKG_DIR}/usr/sbin ]; then
  cp -a ${PKG_DIR}/usr/sbin/. ${PKG_DIR}/usr/bin/
  rm -rf ${PKG_DIR}/usr/sbin
fi
'''
