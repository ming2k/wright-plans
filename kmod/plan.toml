[plan]
name = "kmod"
version = "34.2"
release = 3
description = "Linux kernel module management tools and library"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git"

[dependencies]
build = ["gcc", "meson", "ninja"]
link = ["openssl", "xz", "zlib", "zstd"]

[sources]
uris = ["https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git/snapshot/kmod-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build          \
  --prefix=/usr            \
  --sbindir=/usr/bin       \
  --buildtype=release      \
  -D manpages=false        \
  -D openssl=enabled       \
  -D xz=enabled            \
  -D zlib=enabled          \
  -D zstd=enabled
'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
script = '''
DESTDIR=${PKG_DIR} meson install -C ${BUILD_DIR}/build

# Create standard module configuration directories
install -dm755 ${PKG_DIR}/etc/depmod.d
install -dm755 ${PKG_DIR}/etc/modprobe.d
install -dm755 ${PKG_DIR}/usr/lib/depmod.d
install -dm755 ${PKG_DIR}/usr/lib/modprobe.d
'''
