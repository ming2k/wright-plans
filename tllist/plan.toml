name = "tllist"
version = "1.1.0"
release = 1
description = "Typed linked list C header library"
license = "MIT"
arch = "x86_64"
url = "https://codeberg.org/dnkl/tllist"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://codeberg.org/dnkl/tllist/archive/1.1.0.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr          \
--buildtype=release'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
