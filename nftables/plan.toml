[plan]
name = "nftables"
version = "1.1.6"
release = 5
description = "Netfilter tables userspace tools"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://www.netfilter.org/projects/nftables/"

[dependencies]
build = ["autoconf", "automake", "bison", "flex", "gcc", "libmnl", "libnftnl", "make", "pkgconf"]
link = ["gmp", "jansson", "libmnl", "libnftnl", "ncurses", "readline"]

[[sources]]
uri = "https://www.netfilter.org/pub/nftables/nftables-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[[sources]]
uri = "nftables.service"
sha256 = "SKIP"

[[sources]]
uri = "nftables.conf"
sha256 = "SKIP"

[options]
ccache = true

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
autoreconf -fiv
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr       \
  --sbindir=/usr/bin  \
  --sysconfdir=/etc   \
  --with-json         \
  --with-cli=readline \
  --disable-debug     \
  --disable-man-doc   \
  --disable-python    \
  --with-mini-gmp=no
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

install -Dm644 ${FILES_DIR}/nftables.conf ${PART_DIR}/etc/nftables.conf
install -Dm644 ${FILES_DIR}/nftables.service ${PART_DIR}/usr/lib/systemd/system/nftables.service
'''

[lifecycle.fabricate]
hooks.post_install = "ldconfig 2>/dev/null || true"
hooks.post_upgrade = "ldconfig 2>/dev/null || true"
hooks.pre_remove = "nft flush ruleset 2>/dev/null || true"
backup = ["/etc/nftables.conf"]
