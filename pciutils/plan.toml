name = "pciutils"
version = "3.14.0"
release = 1
description = "PCI bus utility programs and library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://mj.ucw.cz/sw/pciutils/"

link_deps = ['systemd', 'zlib']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mj.ucw.cz/download/linux/pci/pciutils-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source/pciutils-${VERSION}
make PREFIX=/usr \
     SHAREDIR=/usr/share/hwdata \
     SHARED=yes \
     ZLIB=yes \
     -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/pciutils-${VERSION}
make PREFIX=/usr \
     SBINDIR=/usr/bin \
     SHAREDIR=/usr/share/hwdata \
     SHARED=yes \
     DESTDIR=${STAGING_DIR} \
     install install-lib'''

[[output]]
runtime_deps = ['systemd', 'zlib']
