name = "typio-engine-basic"
version = "0.1.4"
release = 1
description = "Always-installable keyboard fallback for the Typio input method framework"
license = "MIT"
arch = "x86_64"
url = "https://github.com/typio-ime/typio-engine-basic"

build_deps = ['rust']

[[sources]]
type = "git"
url = "https://github.com/typio-ime/typio-engine-basic.git"
ref = "v${VERSION}"
extract_to = "source/typio-engine-basic"

[[sources]]
type = "git"
url = "https://github.com/typio-ime/libtypio.git"
ref = "v0.1.7"
extract_to = "source/libtypio"

[pipeline.prepare]
script = '''
cd source/typio-engine-basic
# Remove dev-dependencies that reference unpublished/local crates
sed -i '/^\[dev-dependencies\]/,/^$/d' Cargo.toml'''

[pipeline.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${WORKDIR}/.cargo', CARGO_TARGET_DIR = '${WORKDIR}/target' }
script = '''
cd source/typio-engine-basic
cargo build --release'''

[pipeline.staging]
script = '''
cd source/typio-engine-basic
install -Dm755 ${WORKDIR}/target/release/libtypio_engine_basic.so ${STAGING_DIR}/usr/lib/typio/engines/libtypio_engine_basic.so
install -Dm644 data/icons/hicolor/symbolic/apps/typio-engine-basic-symbolic.svg ${STAGING_DIR}/usr/share/icons/hicolor/symbolic/apps/typio-engine-basic-symbolic.svg'''

[[output]]
name = "typio-engine-basic"
runtime_deps = ['libtypio']
