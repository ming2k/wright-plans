name = "cmake"
version = "4.3.1"
release = 1
description = "A modern toolset used for generating Makefiles and other build systems"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://cmake.org/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://cmake.org/files/v4.3/cmake-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
sed -i '/"lib64"/s/64//' Modules/GNUInstallDirs.cmake
./bootstrap --prefix=/usr \
--no-system-jsoncpp \
--no-system-cppdap \
--no-system-librhash \
--mandir=/share/man \
--docdir=/share/doc/cmake-${VERSION} \
--parallel=$(nproc)'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
