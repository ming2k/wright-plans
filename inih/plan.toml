name = "inih"
version = "r58"
release = 1
description = "Simple INI file parser library in C"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/benhoyt/inih"

[dependencies]
build = ["meson", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/benhoyt/inih/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared -Ddistro_install=true'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
meson install -C ${WORKDIR}/build --destdir ${PART_DIR}'''
