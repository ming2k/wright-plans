name = "libclc"
version = "22.1.4"
release = 2
description = "OpenCL C library implementation for LLVM"
license = "Apache-2.0"
arch = "x86_64"
url = "https://libclc.llvm.org/"

link_deps = ['llvm:llvm-libs']
build_deps = ['cmake', 'llvm:clang']

[[sources]]
type = "http"
sha256 = "3e68c90dda630c27d41d201e37b8bbf5222e39b273dec5ca880709c69e0a07d4"
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${VERSION}/llvm-project-${VERSION}.src.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/llvm-project-${VERSION}.src
mkdir build-libclc && cd build-libclc
cmake ../libclc                              \
-DCMAKE_INSTALL_PREFIX=/usr            \
-DCMAKE_BUILD_TYPE=Release'''

[lifecycle.compile]
script = '''
cd source/llvm-project-${VERSION}.src/build-libclc
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/llvm-project-${VERSION}.src/build-libclc
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc', 'llvm:llvm-libs']
