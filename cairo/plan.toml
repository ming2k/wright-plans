[plan]
name = "cairo"
version = "1.18.4"
release = 1
description = "Multi-platform 2D graphics library (Pure Wayland)"
license = "LGPL-2.1"
arch = "x86_64"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["pixman", "libpng", "fontconfig", "freetype", "zlib"]

[[sources]]
uri = "https://cairographics.org/releases/cairo-${PART_VERSION}.tar.xz"
sha256 = "445ed8208a6e4823de1226a74ca319d3600e83f6369f99b14265006599c32ccb"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr          \
    --buildtype=release    \
    --wrap-mode=nofallback \
    -D xcb=disabled        \
    -D xlib=disabled       \
    -D tests=disabled      \
    -D symbol-lookup=disabled \
    -D spectre=disabled    \
    -D lzo=disabled
'''

[lifecycle.compile]
script = "cd ${BUILD_DIR} && meson compile -C build"

[lifecycle.staging]
script = "cd ${BUILD_DIR} && meson install -C build --destdir ${PART_DIR}"
