name = "termus"
version = "1.0.4"
release = 1
description = "Small, fast terminal music player inspired by cmus"
license = "UNKNOWN"
arch = "x86_64"
url = "https://github.com/ming2k/termus"

link_deps = ['ncurses']
build_deps = ['autoconf', 'automake', 'libtool']

[[sources]]
type = "git"
url = "https://github.com/ming2k/termus.git"
ref = "v${VERSION}"
extract_to = "source"

[pipeline.configure]
script = '''
cd source
autoreconf --force --install --verbose
./configure \
    --prefix=/usr \
    --mandir=/usr/share/man'''

[pipeline.compile]
script = '''
cd source
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['ncurses']
