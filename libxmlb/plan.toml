name = "libxmlb"
version = "0.3.21"
release = 1
description = "Library to help create and query binary XML blobs"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/hughsie/libxmlb"

build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/hughsie/libxmlb/releases/download/${VERSION}/libxmlb-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libxmlb-${VERSION}
meson setup build \
--prefix=/usr          \
--buildtype=release    \
-D tests=false         \
-D introspection=false \
-D gtkdoc=false'''

[lifecycle.compile]
script = '''
cd source/libxmlb-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/libxmlb-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''
