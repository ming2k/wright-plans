name = "gst-plugins-good"
version = "1.28.0"
release = 1
description = "GStreamer Good Plugins"
license = "LGPL-2.0-or-later"
arch = "x86_64"

link_deps = ['libsoup:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gstreamer.freedesktop.org/src/gst-plugins-good/gst-plugins-good-1.28.0.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
export PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/share/pkgconfig
meson setup build --prefix=/usr --libdir=lib -Dtests=disabled -Ddoc=disabled'''

[lifecycle.compile]
script = '''
cd source/build
ninja -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
DESTDIR=${STAGING_DIR} ninja install'''

[output]
runtime_deps = ['cairo:default', 'gdk-pixbuf:default', 'gst-plugins-base:default', 'gstreamer:default']
