name = "hwdata"
version = "0.393"
release = 1
description = "Hardware identification and configuration data"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/vcrhonek/hwdata"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/vcrhonek/hwdata/archive/v${VERSION}/hwdata-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/hwdata-${VERSION}
./configure --prefix=/usr --datarootdir=/usr/share'''

[lifecycle.compile]
script = '''
cd source/hwdata-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/hwdata-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

