# typio-linux — the Wayland host daemon.
#
# Builds with cargo. The Cargo manifest resolves libtypio, typio-abi,
# flux-sys, and flux-text-sys via git deps (no sibling-checkout assumption);
# the native libraries (libflux.so, libflux-text.so) come from the flux
# wright package via pkg-config.
#
# Engines are separate packages (typio-engine-*); the daemon discovers their
# manifests under /usr/share/typio/engines at runtime.
name = "typio-linux"
version = "0.4.1"
release = 1
description = "Wayland input-method host daemon for the Typio framework"
license = "MIT"
arch = "x86_64"
url = "https://github.com/typio-ime/typio-linux"

# bindgen links libclang at build time; pkg-config resolves libflux/libflux-text.
build_deps = ['rust', 'pkgconf', 'clang']
link_deps = [
    'libtypio', 'flux', 'wayland', 'libxkbcommon', 'vulkan-loader',
]

[[sources]]
type = "git"
url = "https://github.com/typio-ime/typio-linux.git"
ref = "v${VERSION}"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${WORKDIR}/.cargo', TYPIO_INSTALL_PREFIX = '/usr' }
script = '''
cd source
cargo build --release --features wayland,systray'''

[pipeline.staging]
env = { CARGO_HOME = '${WORKDIR}/.cargo', TYPIO_INSTALL_PREFIX = '/usr' }
script = '''
: "${STAGING_DIR:?STAGING_DIR is required}"
cd source
# xtask install walks data/icons/hicolor, renders the systemd unit from
# data/typio.service.in, and copies the example configs. It assumes the
# default target/ layout (no CARGO_TARGET_DIR redirect above).
cargo run --release --bin xtask -- install \
    --prefix /usr \
    --destdir "$STAGING_DIR"
# Sanity-check the daemon, its user unit, and example config landed.
test -x "$STAGING_DIR/usr/bin/typio"
test -f "$STAGING_DIR/usr/lib/systemd/user/typio.service"
test -f "$STAGING_DIR/usr/share/typio/core.toml.example"'''

[[output]]
name = "typio-linux"
runtime_deps = [
    'flux', 'wayland', 'libxkbcommon', 'vulkan-loader', 'glibc',
]
