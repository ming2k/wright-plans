name = "expat"
version = "2.7.1"
release = 1
description = "Stream oriented C library for parsing XML"
license = "MIT"
arch = "x86_64"
url = "https://libexpat.github.io/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/libexpat/libexpat/releases/download/R_2_7_1/expat-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr    \
--disable-static \
--docdir=/usr/share/doc/expat-${PART_VERSION}

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
install -v -m644 doc/*.{html,css} ${PART_DIR}/usr/share/doc/expat-${PART_VERSION}

'''
