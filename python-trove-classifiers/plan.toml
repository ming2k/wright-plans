name = "python-trove-classifiers"
version = "2026.6.1.19"
release = 1
description = "Canonical source for classifiers on PyPI"
license = "Apache-2.0"
arch = "any"
url = "https://github.com/pypa/trove-classifiers"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "c5132b4b61a829d11cfbd2d72e97f20a45ed6edb95e45c5efdeb5e00836b2745"
url = "https://pypi.org/packages/source/t/trove_classifiers/trove_classifiers-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/trove_classifiers-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
