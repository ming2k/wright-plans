name = "bash"
version = "5.3"
release = 1
description = "The Bourne-Again Shell"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/bash/"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses", "readline"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/bash/bash-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr             \
            --without-bash-malloc     \
            --with-installed-readline \
            --docdir=/usr/share/doc/bash-${VERSION}'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
