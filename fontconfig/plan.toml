[plan]
name = "fontconfig"
version = "2.17.1"
release = 1
description = "Font configuration and customization library"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/fontconfig/"

[sources]
uris = ["https://gitlab.freedesktop.org/fontconfig/fontconfig/-/archive/${PKG_VERSION}/fontconfig-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[dependencies]
build = ["meson", "ninja", "pkgconf", "gperf"]
link = ["freetype", "expat"]

[lifecycle.configure]
dockyard = "none"
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
    --prefix=/usr                        \
    --buildtype=release                  \
    --wrap-mode=nofallback               \
    -D doc=disabled                      \
    -D tests=disabled
'''

[lifecycle.compile]
dockyard = "none"
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
dockyard = "none"
script = "DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install"

[install_scripts]
post_install = "fc-cache -s 2>/dev/null || true"
post_upgrade = "fc-cache -s 2>/dev/null || true"
