name = "sing-box-rules"
version = "20260221"
release = 1
description = "GeoIP and GeoSite rule-set files for sing-box"
license = "GPL-3.0-only"
arch = "x86_64"
url = "https://github.com/SagerNet/sing-geoip"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/SagerNet/sing-geoip/raw/rule-set/geoip-cn.srs"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/SagerNet/sing-geosite/raw/rule-set/geosite-cn.srs"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/SagerNet/sing-geosite/raw/rule-set/geosite-google.srs"

[lifecycle.staging]
script = '''
install -Dm644 "${WORKDIR}/geoip-cn.srs" "${PART_DIR}/usr/share/sing-box/rules/geoip-cn.srs"
install -Dm644 "${WORKDIR}/geosite-cn.srs" "${PART_DIR}/usr/share/sing-box/rules/geosite-cn.srs"
install -Dm644 "${WORKDIR}/geosite-google.srs" "${PART_DIR}/usr/share/sing-box/rules/geosite-google.srs"'''
