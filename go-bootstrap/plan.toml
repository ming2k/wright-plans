name = "go-bootstrap"
version = "1.26.2"
release = 1
description = "Bootstrap Go toolchain used to build Go from source"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://go.dev"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://go.dev/dl/go${VERSION}.linux-amd64.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/go-bootstrap-${VERSION}
install -d ${STAGING_DIR}/usr/lib
cp -a ${WORKDIR} ${STAGING_DIR}/usr/lib/go-bootstrap
install -d ${STAGING_DIR}/usr/bin
ln -sf ../lib/go-bootstrap/bin/go ${STAGING_DIR}/usr/bin/go-bootstrap'''
