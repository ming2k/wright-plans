name = "python-pluggy"
version = "1.6.0"
release = 1
description = "Plugin and hook calling mechanisms for Python"
license = "MIT"
arch = "any"
url = "https://github.com/pytest-dev/pluggy"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/p/pluggy/pluggy-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/pluggy-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
