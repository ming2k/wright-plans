name = "cairo"
version = "1.18.4"
release = 1
description = "Multi-platform 2D graphics library (X11 backends disabled)"
license = "LGPL-2.1-only OR MPL-1.1"
arch = "x86_64"
url = "https://cairographics.org/"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["pixman", "libpng", "fontconfig", "freetype", "glib", "zlib"]

[[sources]]
sha256 = "445ed8208a6e4823de1226a74ca319d3600e83f6369f99b14265006599c32ccb"
url = "https://cairographics.org/releases/cairo-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr            \
    --buildtype=release      \
    --wrap-mode=nofallback   \
    -Ddefault_library=shared \
    -Dpng=enabled            \
    -Dzlib=enabled           \
    -Dfontconfig=enabled     \
    -Dfreetype=enabled       \
    -Dglib=enabled           \
    -Dxcb=disabled           \
    -Dxlib=disabled          \
    -Dxlib-xcb=disabled      \
    -Dtests=disabled         \
    -Dsymbol-lookup=disabled \
    -Dspectre=disabled       \
    -Dlzo=disabled'''

[lifecycle.compile]
script = "cd source && meson compile -C build"

[lifecycle.staging]
script = "cd source && meson install -C build --destdir ${PART_DIR}"
