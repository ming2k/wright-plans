name = "hwdata"
version = "0.393"
release = 1
description = "Hardware identification and configuration data"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/vcrhonek/hwdata"

[dependencies]
build = ["make"]

[[sources]]
uri = "https://github.com/vcrhonek/hwdata/archive/v${PART_VERSION}/hwdata-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --datarootdir=/usr/share

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
