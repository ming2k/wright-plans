name = "libslirp"
version = "4.9.1"
release = 1
description = "User-mode networking library used by QEMU"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/slirp/libslirp"

link_deps = ['glib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/slirp/libslirp/-/archive/v${VERSION}/libslirp-v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libslirp-v${VERSION}
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared'''

[pipeline.compile]
script = '''
cd source/libslirp-v${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/libslirp-v${VERSION}
DESTDIR=${STAGING_DIR} meson install -C build'''

[[output]]
runtime_deps = ['glib']
