name = "python-sphinxcontrib-jquery"
version = "4.1"
release = 1
description = "Sphinx extension to include jQuery for older themes"
license = "0BSD"
arch = "x86_64"
url = "https://github.com/sphinx-contrib/jquery"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/s/sphinxcontrib-jquery/sphinxcontrib-jquery-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/python-sphinxcontrib-jquery-${VERSION}
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python', 'python-sphinx']
