name = "aom"
version = "3.9.1"
release = 1
description = "Alliance for Open Media AV1 Codec SDK"
license = "BSD-2-Clause"
arch = "x86_64"

[dependencies]
build = [
    "cmake",
    "gcc",
    "make",
    "nasm",
    "perl",
    "python",
]

[[sources]]
uri = "https://storage.googleapis.com/aom-releases/libaom-3.9.1.tar.gz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}

# 修复: GCC 15 需要显式包含 <cstdint> 才能使用 uint32_t/uint64_t
# 问题出在捆绑的第三方库 libwebm 中
sed -i '/#include <cassert>/a #include <cstdint>' third_party/libwebm/mkvparser/mkvparser.cc

# 可选: 消除 CMake 版本过低的警告 (虽然不是致命错误，但修一下更好)
find . -name "*.cmake" -exec sed -i 's/cmake_minimum_required(VERSION [0-9.]*)/cmake_minimum_required(VERSION 3.10)/' {} +

'''

[lifecycle.configure]
script = '''
mkdir -p ${BUILD_DIR}/build
cd ${BUILD_DIR}/build

cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=lib -DBUILD_SHARED_LIBS=ON -DENABLE_NASM=ON -DENABLE_TESTS=OFF -DENABLE_DOCS=OFF

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
