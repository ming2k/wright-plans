name = "gcc"
version = "15.2.0"
release = 3
description = "The GNU Compiler Collection - C and C++ frontends"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://gcc.gnu.org/"

[dependencies]
runtime = ["binutils"]
build = ["binutils", "make", "perl", "texinfo"]
link = ["gcc-libs", "gmp", "mpc", "mpfr", "zlib"]

[[sources]]
type = "http"
sha256 = "438fd996826b0c82485a29da03a72d71d6e3541a83ec702df4271f6fe025d24e"
url = "https://ftp.gnu.org/gnu/gcc/gcc-${VERSION}/gcc-${VERSION}.tar.xz"
extract_to = "source"

[options]
ccache = true

[lifecycle.prepare]
script = '''
cd source
case $(uname -m) in
    x86_64) sed -e '/m64=/s/lib64/lib/' -i.orig gcc/config/i386/t-linux64 ;;
esac
mkdir -v build'''

[lifecycle.configure]
script = '''
cd source/build
SED=sed \
../configure --prefix=/usr \
    LD=ld \
    --enable-languages=c,c++ \
    --enable-default-pie \
    --enable-default-ssp \
    --enable-host-pie \
    --disable-multilib \
    --disable-bootstrap \
    --disable-fixincludes \
    --enable-shared \
    --enable-threads=posix \
    --enable-__cxa_atexit \
    --enable-clocale=gnu \
    --enable-gnu-indirect-function \
    --enable-linker-build-id \
    --enable-lto \
    --enable-plugin \
    --enable-install-libiberty \
    --with-system-zlib \
    --with-linker-hash-style=gnu \
    --disable-werror'''

[lifecycle.compile]
script = '''
cd source/build
make -j$(nproc)'''

[output]

[output."libgcc"]
include = ["/.*"]
description = "GCC runtime library (libgcc_s.so)"
[output."libgcc".dependencies]
link = ["glibc"]

[output."libstdc++"]
include = ["/.*"]
description = "GNU C++ standard library"
[output."libstdc++".dependencies]
runtime = ["libgcc"]
link = ["glibc"]

[output."libgomp"]
include = ["/.*"]
description = "GNU OpenMP runtime library"
[output."libgomp".dependencies]
link = ["glibc"]

[output."libatomic"]
include = ["/.*"]
description = "GCC atomic operations fallback library"
[output."libatomic".dependencies]
link = ["glibc"]

[output."libsanitizer"]
include = ["/.*"]
description = "GCC sanitizer runtime libraries (ASan, LSan, TSan, UBSan)"
[output."libsanitizer".dependencies]
runtime = ["libgcc", "libstdc++"]
link = ["glibc"]

[output."gcc-libs"]
include = ["/.*"]
description = "GCC runtime libraries (meta-package)"
[output."gcc-libs".dependencies]
runtime = ["libatomic", "libgcc", "libgomp", "libstdc++"]
