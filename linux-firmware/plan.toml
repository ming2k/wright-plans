for dir in ath3k ar3k ath6k ath10k ath11k ath12k; do

[ -d "$FW/$dir" ] && cp -a "$FW/$dir" ${PART_DIR}/usr/lib/firmware/
done

for f in "$FW"/htc_*.fw "$FW"/htc_*.bin; do

