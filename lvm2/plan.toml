name = "lvm2"
version = "2.03.38"
release = 1
description = "Linux Logical Volume Manager 2 utilities"
license = "GPL-2.0-only AND LGPL-2.1-only"
arch = "x86_64"
url = "https://sourceware.org/lvm2"

[dependencies]
build = ["pkgconf"]
link = ["systemd", "readline", "util-linux", "libaio"]

[[sources]]
sha256 = "SKIP"
url = "https://sourceware.org/pub/lvm2/LVM2.${VERSION}.tgz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --sbindir=/usr/bin --enable-cmdlib --enable-pkgconfig --enable-udev_sync --with-udev-prefix=/usr --with-systemdsystemunitdir=/usr/lib/systemd/system --enable-dmeventd --enable-lvmpolld --enable-blkid_wiping --with-readline'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install -C ${WORKDIR}'''

[hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemctl enable lvm2-monitor.service 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
