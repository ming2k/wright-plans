[plan]
name = "libxcb"
version = "1.17.0"
release = 1
description = "X11 client-side library (X protocol C-language Binding)"
license = "MIT"
arch = "x86_64"
url = "https://xcb.freedesktop.org"

[dependencies]
runtime = ["xcb-proto"]
build = ["gcc", "make", "python", "xcb-proto"]

[[sources]]
uri = "https://xorg.freedesktop.org/archive/individual/lib/libxcb-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var --disable-static --without-doxygen
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
