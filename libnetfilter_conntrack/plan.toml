name = "libnetfilter_conntrack"
version = "1.1.1"
release = 1
description = "Library for userspace access to the connection tracking state table"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.netfilter.org/projects/libnetfilter_conntrack/"

[dependencies]
build = ["gcc", "make", "pkg-config"]
link = ["glibc", "libmnl", "libnfnetlink"]

[[sources]]
uri = "https://www.netfilter.org/projects/libnetfilter_conntrack/files/libnetfilter_conntrack-${VERSION}.tar.xz"
sha256 = "769d3eaf57fa4fbdb05dd12873b6cb9a5be7844d8937e222b647381d44284820"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''

[lifecycle.fabricate]
