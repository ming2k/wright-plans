name = "texinfo"
version = "7.3"
release = 1
description = "Programs for reading, writing, and converting info pages"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/texinfo/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/texinfo/texinfo-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source/texinfo-${VERSION}
if [ -d tp/Texinfo/Convert ]; then
  find tp/Texinfo/Convert -name '*.pm' -exec sed 's/! $output_file eq/$output_file ne/' -i {} +
fi'''

[pipeline.configure]
script = '''
cd source/texinfo-${VERSION}
./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/texinfo-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/texinfo-${VERSION}
make DESTDIR=${STAGING_DIR} install
make DESTDIR=${STAGING_DIR} TEXMF=/usr/share/texmf install-tex'''

[[output]]
runtime_deps = ['perl']
