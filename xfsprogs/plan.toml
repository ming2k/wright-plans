[plan]
name = "xfsprogs"
version = "6.11.0"
release = 1
description = "XFS filesystem userspace utilities"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://xfs.wiki.kernel.org"

[dependencies]
build = ["pkgconf"]
link = ["util-linux", "icu", "inih"]

[[sources]]
uri = "https://www.kernel.org/pub/linux/utils/fs/xfs/xfsprogs/xfsprogs-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sbindir=/usr/bin --disable-static
'''

[lifecycle.compile]
script = "make -j$(nproc) -C ${BUILD_DIR}"

[lifecycle.staging]
script = "make DESTDIR=${PKG_DIR} install -C ${BUILD_DIR}"
