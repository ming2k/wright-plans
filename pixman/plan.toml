name = "pixman"
version = "0.46.4"
release = 1
description = "Low-level pixel manipulation library"
license = "MIT"
arch = "x86_64"
url = "http://pixman.org/"


build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.cairographics.org/releases/pixman-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/pixman-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared -Dtests=disabled'''

[pipeline.compile]
script = '''
cd source/pixman-${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/pixman-${VERSION}
DESTDIR=${STAGING_DIR} meson install -C build'''

