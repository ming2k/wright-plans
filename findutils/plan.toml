name = "findutils"
version = "4.10.0"
release = 1
description = "Programs to find files and operate on them"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/findutils/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/findutils/findutils-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --localstatedir=/var/lib/locate

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
