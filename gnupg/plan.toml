name = "gnupg"
version = "2.4.9"
release = 1
description = "GNU Privacy Guard"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://gnupg.org"

link_deps = ['libgcrypt', 'libgpg-error', 'libassuan', 'libksba', 'npth', 'readline', 'gnutls', 'sqlite']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gnupg.org/ftp/gcrypt/gnupg/gnupg-${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gnupg-${VERSION}
./configure --prefix=/usr              \
--libexecdir=/usr/lib/gnupg \
--sbindir=/usr/bin          \
--sysconfdir=/etc           \
--enable-keyboxd            \
--enable-large-secmem       \
--disable-ldap              \
--disable-doc'''

[pipeline.compile]
script = '''
cd source/gnupg-${VERSION}
make -j$(nproc) LDFLAGS="${LDFLAGS} -lreadline -lhistory"'''

[pipeline.staging]
script = '''
cd source/gnupg-${VERSION}
DESTDIR=${STAGING_DIR} make install
ln -sf gpg  ${STAGING_DIR}/usr/bin/gpg2
ln -sf gpgv ${STAGING_DIR}/usr/bin/gpgv2'''

[[output]]
runtime_deps = ['pinentry', 'libgcrypt', 'libgpg-error', 'libassuan', 'libksba', 'npth', 'readline', 'gnutls', 'sqlite']
