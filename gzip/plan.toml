name = "gzip"
version = "1.14"
release = 1
description = "Programs for compressing and decompressing files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gzip/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gzip/gzip-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
