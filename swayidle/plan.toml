name = "swayidle"
version = "1.9.0"
release = 1
description = "Idle management daemon for Wayland"
license = "MIT"
arch = "x86_64"
url = "https://github.com/swaywm/swayidle"

[dependencies]
runtime = ["systemd"]
build = ["meson", "ninja"]
link = ["wayland", "wayland-protocols"]

[[sources]]
type = "http"
sha256 = "6c1b769038b60250c88e47380cbb021cfa57a65f872bf4d6c340b5e3057096ac"
url = "https://github.com/swaywm/swayidle/releases/download/v${VERSION}/swayidle-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Dlogind=enabled -Dlogind-provider=systemd -Dman-pages=disabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
