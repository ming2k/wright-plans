[plan]
name = "libfuse3"
version = "3.18.1"
release = 4
description = "Filesystem in Userspace"
license = "GPL-2.0-only AND LGPL-2.1-only"
arch = "x86_64"
url = "https://github.com/libfuse/libfuse"

[sources]
uris = ["https://github.com/libfuse/libfuse/releases/download/fuse-${PKG_VERSION}/fuse-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr          \
--buildtype=release    \
-D tests=false         \
-D examples=false      \
-D useroot=false
'''

[lifecycle.compile]
dockyard = "none"
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
dockyard = "none"
script = '''
DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install
chmod u+s ${PKG_DIR}/usr/bin/fusermount3
'''
