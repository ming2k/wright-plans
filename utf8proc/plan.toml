name = "utf8proc"
version = "2.10.0"
release = 1
description = "UTF-8 processing library"
license = "MIT"
arch = "x86_64"
url = "https://github.com/JuliaStrings/utf8proc"

[[sources]]
sha256 = "SKIP"
url = "https://github.com/JuliaStrings/utf8proc/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo "cmake project"'''

[lifecycle.compile]
script = '''
cd source
mkdir -p build && cd build
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
DESTDIR=${PART_DIR} make install'''
