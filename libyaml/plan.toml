[plan]
name = "libyaml"
version = "0.2.5"
release = 1
description = "YAML 1.1 parser and emitter"
license = "MIT"
arch = "x86_64"
url = "https://pyyaml.org/wiki/LibYAML"

[[sources]]
uri = "https://github.com/yaml/libyaml/releases/download/${PART_VERSION}/yaml-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} make install
'''
