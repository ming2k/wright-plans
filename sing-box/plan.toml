name = "sing-box"
version = "1.13.13"
release = 1
description = "The universal proxy platform"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://sing-box.sagernet.org/"


build_deps = ['go']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/SagerNet/sing-box/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "local"
path = "sing-box.service"

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/sing-box-${VERSION}
export PATH=/usr/lib/go/bin:$PATH
export GOPATH=/tmp/go-cache
export GOCACHE=/tmp/go-cache/build
export CGO_ENABLED=0
go build -o sing-box \
-trimpath \
-tags "with_quic,with_dhcp,with_wireguard,with_utls,with_clash_api,with_gvisor" \
-ldflags "-s -w -X github.com/sagernet/sing-box/constant.Version=${VERSION}" \
./cmd/sing-box'''

[pipeline.staging]
script = '''
cd source/sing-box-${VERSION}
install -Dm755 sing-box ${STAGING_DIR}/usr/bin/sing-box
install -dm755 ${STAGING_DIR}/etc/sing-box
echo '{}' > ${STAGING_DIR}/etc/sing-box/config.json
install -Dm644 ${WORKDIR}/sing-box.service ${STAGING_DIR}/usr/lib/systemd/system/sing-box.service'''

[[output]]
backup = ["/etc/sing-box/config.json"]

[output.hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
echo ":: Edit /etc/sing-box/config.json before starting sing-box"
echo ":: Enable with: systemctl enable --now sing-box"

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
pre_remove = '''
systemctl stop sing-box 2>/dev/null || true
systemctl disable sing-box 2>/dev/null || true

'''

