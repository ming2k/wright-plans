name = "libusb"
version = "1.0.29"
release = 1
description = "Library for userspace USB device access"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://libusb.info"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["systemd"]

[[sources]]
type = "http"
sha256 = "5977fc950f8d1395ccea9bd48c06b3f808fd3c2c961b44b0c2e6e29fc3a70a85"
url = "https://github.com/libusb/libusb/releases/download/v${VERSION}/libusb-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
