[plan]
name = "librsvg"
version = "2.61.4"
release = 2
description = "SVG rendering library using Rust"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
build = ["pkgconf", "meson", "ninja", "rust", "cargo-c", "python", "gobject-introspection"]
link = ["cairo", "gdk-pixbuf", "pango", "glib", "libxml2", "harfbuzz", "freetype", "fribidi"]

[[sources]]
uri = "https://download.gnome.org/sources/librsvg/2.61/librsvg-${PKG_VERSION}.tar.xz"
sha256 = "fca0ea28d1f28f95c8407d2579f4702dac085e7c758644daca8b40d1e072ca0c"

[lifecycle.configure]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --libdir=lib --buildtype=release -Dintrospection=enabled -Ddocs=disabled -Dtests=false -Dvala=disabled
'''

[lifecycle.compile]
dockyard = "relaxed"
env = {LD_LIBRARY_PATH = "${BUILD_DIR}/build/librsvg"}
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "meson install -C ${BUILD_DIR}/build --destdir ${PKG_DIR}"
