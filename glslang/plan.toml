name = "glslang"
# glslang's native semver; 16.3.0 == vulkan-sdk-1.4.350.1 (same upstream commit).
version = "16.3.0"
release = 1
description = "Khronos reference GLSL/ESSL compiler and SPIR-V generator"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/KhronosGroup/glslang"


build_deps = ['cmake', 'ninja']

[[sources]]
type = "http"
sha256 = "efff5a15258dce1ca2d323bf64c974f5fca03778174615dbc30c8d36db645bf5"
url = "https://github.com/KhronosGroup/glslang/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/glslang-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DALLOW_EXTERNAL_SPIRV_TOOLS=ON \
    -DBUILD_SHARED_LIBS=ON'''

[pipeline.compile]
script = '''
cd source/glslang-${VERSION}
cmake --build build -j $(nproc)'''

[pipeline.staging]
script = '''
cd source/glslang-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build'''

