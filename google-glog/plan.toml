name = "google-glog"
version = "0.7.1"
release = 1
description = "C++ implementation of the Google logging module"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/glog"

[dependencies]
build = ["cmake", "ninja"]
link = ["gflags"]

[[sources]]
uri = "https://github.com/google/glog/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DBUILD_TESTING=OFF \
    -DWITH_PKGCONFIG=ON

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
