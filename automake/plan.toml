name = "automake"
version = "1.18.1"
release = 1
description = "Programs for generating Makefiles for use with Autoconf"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/automake/"

[dependencies]
build = ["autoconf", "make", "perl"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/automake/automake-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --docdir=/usr/share/doc/automake-${VERSION}'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
