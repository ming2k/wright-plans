[plan]
name = "meson"
version = "1.10.1"
release = 1
description = "Open source build system meant to be fast and user friendly"
license = "Apache-2.0"
arch = "x86_64"
url = "https://mesonbuild.com/"

[dependencies]
build = ["ninja", "python", "setuptools"]

[sources]
uris = ["https://github.com/mesonbuild/meson/releases/download/${PKG_VERSION}/meson-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PKG_DIR} --no-build-isolation .
'''
