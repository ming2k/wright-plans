name = "pkgconf"
version = "2.5.1"
release = 1
description = "Utility for discovering compiler and linker flags"
license = "ISC"
arch = "x86_64"
url = "https://pkgconf.org/"

[dependencies]
build = ["bash", "gcc", "make"]

[[sources]]
sha256 = "cd05c9589b9f86ecf044c10a2269822bc9eb001eced2582cfffd658b0a50c243"
url = "https://distfiles.ariadne.space/pkgconf/pkgconf-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
ln -sf pkgconf ${PART_DIR}/usr/bin/pkg-config'''

[output]
provides = ["pkg-config"]
conflicts = ["pkg-config"]
