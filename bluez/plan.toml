name = "bluez"
version = "5.86"
release = 3
description = "Official Linux Bluetooth protocol stack"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.bluez.org/"

link_deps = ['glibc', 'glib', 'dbus', 'ell', 'alsa-lib', 'json-c', 'libical', 'readline']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/bluetooth/bluez-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source/bluez-${VERSION}
# Drop the bundled ell/ snapshot so the build uses the system ell exclusively
# (matches --enable-external-ell). With it gone, automake's -I. can't shadow
# <ell/ell.h> with a stale local copy, and gcc resolves all ell includes to
# /usr/include/ell/*.h — the same library we link against.
rm -rf ell'''

[pipeline.configure]
script = '''
cd source/bluez-${VERSION}
./configure --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    --libexecdir=/usr/lib \
    --enable-library \
    --enable-tools \
    --enable-btpclient \
    --enable-midi \
    --enable-sixaxis \
    --enable-mesh \
    --enable-hid2hci \
    --enable-experimental \
    --enable-datafiles \
    --enable-external-ell \
    --enable-deprecated \
    --disable-manpages \
    --disable-static'''

[pipeline.compile]
script = '''
cd source/bluez-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/bluez-${VERSION}
make DESTDIR=${STAGING_DIR} install

# Intentionally do not install src/main.conf. bluetoothd has sensible built-in
# defaults and upstream's sample main.conf drifts across releases — shipping it
# causes "Failed to set default system config" as bluetoothd rejects keys that
# were removed or renamed. Users can place their own /etc/bluetooth/main.conf
# if they need to override defaults.'''

[[output]]
runtime_deps = ['dbus', 'systemd', 'glibc', 'glib', 'ell', 'alsa-lib', 'json-c', 'libical', 'readline']
hooks.post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemctl enable bluetooth.service 2>/dev/null || true
'''
hooks.post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
