name = "libdecor"
version = "0.2.5"
release = 1
description = "A client-side decorations library for Wayland clients"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/libdecor/libdecor"

link_deps = ['cairo', 'pango', 'wayland', 'libxkbcommon']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
url = "https://gitlab.freedesktop.org/libdecor/libdecor/-/archive/${VERSION}/libdecor-${VERSION}.tar.gz"
sha256 = "SKIP"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libdecor-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Ddemo=false'''

[lifecycle.compile]
script = '''
cd source/libdecor-${VERSION}
ninja -j$(nproc) -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source/libdecor-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['cairo', 'pango', 'wayland', 'libxkbcommon']
