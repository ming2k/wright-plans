[plan]
name = "make-ca"
version = "1.16.1"
release = 3
description = "Utility to deliver and manage a CA certificate store"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/lfs-book/make-ca"

[dependencies]
runtime = ["p11-kit"]
link = ["openssl"]
[sources]
uris = ["https://github.com/lfs-book/make-ca/archive/v${PKG_VERSION}/make-ca-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} sbindir=/usr/bin install

# Upstream still installs make-ca to /usr/sbin on some builds; Wright enforces /usr/bin.
if [ -d ${PKG_DIR}/usr/sbin ]; then
  install -vdm755 ${PKG_DIR}/usr/bin
  cp -a ${PKG_DIR}/usr/sbin/. ${PKG_DIR}/usr/bin/
  rm -rf ${PKG_DIR}/usr/sbin
fi

install -vdm755 ${PKG_DIR}/etc/ssl/local
'''
