name = "typio-engine-rime"
version = "0.3.0"
release = 1
description = "Rime input engine for the Typio input method framework"
license = "MIT"
arch = "x86_64"
url = "https://github.com/typio-ime/typio-engine-rime"

build_deps = ['meson', 'ninja', 'pkg-config', 'cc']
link_deps = ['libtypio', 'librime', 'curl']

[[sources]]
type = "git"
url = "https://github.com/typio-ime/typio-engine-rime.git"
ref = "v${VERSION}"
extract_to = "source"

[pipeline.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release'''

[pipeline.compile]
script = '''
cd source
ninja -C build'''

[pipeline.staging]
script = '''
: "${STAGING_DIR:?STAGING_DIR is required}"
cd source
meson install -C build --destdir "$STAGING_DIR"
# v0.2.0+ ships a private worker executable + runtime manifest (the
# engine-process model), not a cdylib plugin.
test -x "$STAGING_DIR/usr/libexec/typio/engines/typio-engine-rime"
test -f "$STAGING_DIR/usr/share/typio/engines/typio-engine-rime.toml"
test -f "$STAGING_DIR/usr/share/icons/hicolor/scalable/apps/typio-rime-symbolic.svg"
test -f "$STAGING_DIR/usr/share/icons/hicolor/scalable/apps/typio-rime-latin-symbolic.svg"'''

[[output]]
name = "typio-engine-rime"
runtime_deps = ['librime', 'libtypio', 'curl', 'rime-prelude']
