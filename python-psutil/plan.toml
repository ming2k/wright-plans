name = "python-psutil"
version = "7.0.0"
release = 1
description = "Cross-platform process and system monitoring library for Python"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/giampaolo/psutil"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
uri = "https://files.pythonhosted.org/packages/source/p/psutil/psutil-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .

'''

[lifecycle.fabricate]
