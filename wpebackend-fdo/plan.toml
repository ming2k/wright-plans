name = "wpebackend-fdo"
version = "1.14.3"
release = 1
description = "Freedesktop.org backend for WPE WebKit"
license = "BSD-2-Clause"
arch = "x86_64"

[dependencies]
runtime = ["libepoxy", "libwpe"]
build = [
    "libepoxy",
    "libwpe",
    "meson",
    "ninja",
    "pkgconf",
]
link = ["glib", "wayland"]

[[sources]]
uri = "https://wpewebkit.org/releases/wpebackend-fdo-1.14.3.tar.xz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
# 修复 GCC 13/14/15 编译错误：
# 缺少 <cstdint> 导致 uint32_t 类型解析问题，进而导致虚函数覆盖检查失败
sed -i '1i #include <cstdint>' src/ipc.h

'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --libdir=lib

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PART_DIR} ninja install

'''
