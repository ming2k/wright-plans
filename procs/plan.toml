name = "procs"
version = "0.14.11"
release = 1
description = "A modern replacement for ps written in Rust"
license = "MIT"
arch = "x86_64"
url = "https://github.com/dalance/procs"

[dependencies]
build = ["rust"]

[[sources]]
uri = "https://github.com/dalance/procs/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
env = { CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target" }
script = '''
cd ${BUILD_DIR}
cargo build --release --locked
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/procs ${PART_DIR}/usr/bin/procs
'''

[lifecycle.fabricate]
