name = "zziplib"
version = "0.13.80"
release = 2
description = "Lightweight library for transparent read access to zipped files"
license = "LGPL-2.0-or-later OR MPL-1.1"
arch = "x86_64"
url = "https://github.com/gdraheim/zziplib"

link_deps = ['zlib']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/gdraheim/zziplib/archive/v0.13.80.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DZZIPDOCS=OFF -DZZIPTEST=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['zlib']
