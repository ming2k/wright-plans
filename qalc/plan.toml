name = "qalc"
version = "5.10.0"
release = 1
description = "Powerful command-line calculator built on libqalculate"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://qalculate.github.io/"

[dependencies]
build = ["gcc", "gettext", "make", "pkgconf"]
runtime = ["curl", "gettext", "gmp", "icu", "libxml2", "mpfr", "readline"]
link = ["curl", "gettext", "gmp", "icu", "libxml2", "mpfr", "readline"]

[[sources]]
sha256 = "904592d33a98ed4a26a59fa34c855578e096144fb91965b8afc90e06797dba8e"
url = "https://github.com/Qalculate/libqalculate/releases/download/v${VERSION}/libqalculate-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
    --disable-static \
    --with-readline \
    --docdir=/usr/share/doc/qalc-${VERSION}'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.check]
script = '''
cd source
make check'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"
