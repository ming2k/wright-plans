name = "igt-gpu-tools"
version = "2.4"
release = 1
description = "Tools for development and testing of the Intel DRM driver"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/drm/igt-gpu-tools"

link_deps = ['cairo', 'glibc', 'kmod', 'libdrm', 'libpciaccess', 'libunwind', 'procps-ng', 'systemd']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "675a46af1ec7998909819a0829aec6b03c79f0b573d1588d858dd54ac3063329"
url = "https://gitlab.freedesktop.org/drm/igt-gpu-tools/-/archive/v${VERSION}/igt-gpu-tools-v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/igt-gpu-tools-${VERSION}
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D chamelium=disabled \
    -D docs=disabled \
    -D man=enabled \
    -D overlay=disabled \
    -D runner=disabled \
    -D testplan=disabled \
    -D tests=disabled \
    -D valgrind=disabled \
    -D oping=disabled'''

[pipeline.compile]
script = '''
cd source/igt-gpu-tools-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/igt-gpu-tools-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[hooks]
post_install = "setcap cap_perfmon=+ep /usr/bin/intel_gpu_top"
post_upgrade = "setcap cap_perfmon=+ep /usr/bin/intel_gpu_top"

[[output]]
runtime_deps = ['cairo', 'glibc', 'kmod', 'libdrm', 'libpciaccess', 'libunwind', 'procps-ng', 'systemd']
