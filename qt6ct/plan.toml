name = "qt6ct"
version = "0.11"
release = 1
description = "Qt 6 Configuration Tool"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.opencode.net/trialuser/qt6ct"

link_deps = ['qt6-base', 'qt6-svg']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.opencode.net/trialuser/qt6ct/-/archive/${VERSION}/qt6ct-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/qt6ct-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release'''

[pipeline.compile]
script = '''
cd source/qt6ct-${VERSION}
ninja -j$(nproc) -C build'''

[pipeline.staging]
script = '''
cd source/qt6ct-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['qt6-base', 'qt6-svg']
