[plan]
name = "flatpak"
version = "1.16.3"
release = 7
description = "Universal app distribution framework (Pure Wayland)"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://flatpak.org"

[dependencies]
runtime = [
    "ca-certificates",
    "dbus",
    "systemd",
    "xdg-desktop-portal",
    "xdg-desktop-portal-gtk",
    "shared-mime-info",
]
build = [
    "meson",
    "ninja",
    "pkgconf",
    "libxslt",
    "gettext",
    "gobject-introspection",
    "python-pyparsing",
    "bubblewrap",
    "xdg-dbus-proxy",
]
link = [
    "glib",
    "libarchive",
    "libxml2",
    "ostree",
    "polkit",
    "json-glib",
    "curl",
    "appstream",
    "gdk-pixbuf",
    "libjpeg-turbo",
    "libfuse3",
    "gpgme",
    "libseccomp",
]

[[sources]]
uri = "https://github.com/flatpak/flatpak/releases/download/${PKG_VERSION}/flatpak-${PKG_VERSION}.tar.xz"
sha256 = "3d6bd3f5f8940e80c087286ca3e42182fc630d780894536511fcd2cffc12cf5b"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    -Dsystem_bubblewrap=/usr/bin/bwrap \
    -Dsystem_dbus_proxy=/usr/bin/xdg-dbus-proxy \
    -Dhttp_backend=curl \
    -Dsystemd=enabled \
    -Ddbus_config_dir=/usr/share/dbus-1/system.d \
    -Dselinux_module=disabled \
    -Dman=disabled \
    -Ddocbook_docs=disabled \
    -Dxauth=disabled \
    -Dgtkdoc=disabled \
    -Dtests=false \
    -Dinstalled_tests=false
'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = '''
meson install -C ${BUILD_DIR}/build --destdir ${PKG_DIR}
mkdir -p ${PKG_DIR}/var/lib/flatpak

# Unprivileged user namespaces required by bubblewrap
install -Dm644 /dev/stdin ${PKG_DIR}/usr/lib/sysctl.d/60-flatpak-userns.conf << 'SYSCTLEOF'
kernel.unprivileged_userns_clone = 1
SYSCTLEOF
'''


[lifecycle.package]
hooks.post_install = '''
systemd-sysusers /usr/lib/sysusers.d/flatpak.conf 2>/dev/null || true
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''
hooks.post_upgrade = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''
