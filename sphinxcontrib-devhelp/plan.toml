name = "sphinxcontrib-devhelp"
version = "2.0.0"
release = 1
description = "Sphinx extension for Devhelp output"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/sphinx-doc/sphinxcontrib-devhelp"

[dependencies]
runtime = ["python"]
build = ["python", "flit-core"]

[[sources]]
uri = "https://pypi.org/packages/source/s/sphinxcontrib_devhelp/sphinxcontrib_devhelp-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .

'''

[lifecycle.fabricate]
