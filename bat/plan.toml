name = "bat"
version = "0.26.1"
release = 1
description = "A cat clone with syntax highlighting and Git integration"
license = "Apache-2.0 OR MIT"
arch = "x86_64"
url = "https://github.com/sharkdp/bat"

[dependencies]
build = ["rust"]
link = ["gcc", "glibc"]
optional = ["git"]

[[sources]]
uri = "https://github.com/sharkdp/bat/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
env = { CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target" }
script = '''
cd ${BUILD_DIR}
cargo build --release --locked

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}

install -Dm755 target/release/bat ${PART_DIR}/usr/bin/bat

install -dm755 ${PART_DIR}/usr/share/bash-completion/completions
install -dm755 ${PART_DIR}/usr/share/fish/vendor_completions.d
install -dm755 ${PART_DIR}/usr/share/zsh/site-functions

target/release/bat --completion bash > ${PART_DIR}/usr/share/bash-completion/completions/bat
target/release/bat --completion fish > ${PART_DIR}/usr/share/fish/vendor_completions.d/bat.fish
target/release/bat --completion zsh > ${PART_DIR}/usr/share/zsh/site-functions/_bat

install -dm755 ${PART_DIR}/usr/share/man/man1
sed \
  -e 's/{{PROJECT_EXECUTABLE_UPPERCASE}}/BAT/g' \
  -e 's/{{PROJECT_EXECUTABLE}}/bat/g' \
  assets/manual/bat.1.in > ${PART_DIR}/usr/share/man/man1/bat.1

'''

[lifecycle.fabricate]
