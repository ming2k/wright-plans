name = "pipewire"
version = "1.6.3"
release = 1
description = "Low-latency audio/video router and processor"
license = "MIT"
arch = "x86_64"
url = "https://pipewire.org"

[dependencies]
build = ["meson", "ninja", "pkgconf", "rtkit", "python-docutils"]
link = ["alsa-lib", "bluez", "dbus", "glib", "gstreamer", "libcamera", "libsndfile", "ncurses", "opus", "readline", "sbc", "systemd", "v4l-utils"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/PipeWire/pipewire/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.prepare]
script = "cd source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr                        \
--buildtype=release                  \
-D docs=disabled                     \
-D man=enabled                       \
-D tests=enabled                     \
-D gstreamer=enabled                 \
-D v4l2=enabled                      \
-D jack=disabled                     \
-D pipewire-jack=enabled             \
-D pipewire-alsa=enabled             \
-D libpulse=disabled                 \
-D pipewire-v4l2=enabled             \
-D rlimits-install=false             \
-D selinux=disabled                  \
-D udevrulesdir=/usr/lib/udev/rules.d \
-D bluez5=enabled                    \
-D libcamera=enabled                \
-D session-managers='''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemd-tmpfiles --create /usr/lib/tmpfiles.d/pipewire.conf 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
