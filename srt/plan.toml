name = "srt"
version = "1.5.4"
release = 1
description = "Secure Reliable Transport protocol library"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/Haivision/srt"

[dependencies]
build = ["cmake", "ninja", "pkgconf"]
link = ["openssl"]

[[sources]]
uri = "https://github.com/Haivision/srt/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DENABLE_STATIC=OFF \
    -DENABLE_SHARED=ON \
    -DENABLE_APPS=OFF \
    -DUSE_ENCLIB=openssl \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5

'''

[lifecycle.compile]
script = "ninja -j$(nproc) -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
