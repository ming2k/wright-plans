name = "obs-studio"
version = "32.1.0"
release = 1
description = "Free and open source software for video recording and live streaming"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://obsproject.com"

link_deps = ['alsa-lib:default', 'curl:default', 'ffmpeg:default', 'fontconfig:default', 'freetype:default', 'jansson:default', 'libdrm:default', 'libglvnd:default', 'libva:default', 'libxkbcommon:default', 'mbedtls:default', 'mesa:default', 'nlohmann-json:default', 'pciutils:default', 'pipewire:default', 'qt6-base:default', 'qt6-svg:default', 'qt6-wayland:default', 'rnnoise:default', 'speexdsp:default', 'v4l-utils:default', 'vulkan-loader:default', 'wayland:default', 'x264:default', 'zlib:default']

[[sources]]
type = "git"
url = "https://github.com/obsproject/obs-studio.git"
ref = "${VERSION}"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
    -DENABLE_UI=ON \
    -DENABLE_WAYLAND=ON \
    -DENABLE_PIPEWIRE=ON \
    -DENABLE_ALSA=ON \
    -DENABLE_PULSEAUDIO=OFF \
    -DENABLE_JACK=OFF \
    -DENABLE_SNDIO=OFF \
    -DENABLE_V4L2=ON \
    -DENABLE_FREETYPE=ON \
    -DENABLE_SPEEXDSP=ON \
    -DENABLE_RNNOISE=ON \
    -DENABLE_SCRIPTING=ON \
    -DENABLE_VLC=OFF \
    -DENABLE_BROWSER=OFF \
    -DENABLE_VST=ON \
    -DENABLE_AJA=OFF \
    -DENABLE_DECKLINK=OFF \
    -DENABLE_LIBFDK=OFF \
    -DENABLE_HEVC=ON \
    -DENABLE_VIRTUALCAM=OFF \
    -DENABLE_PLUGINS=ON \
    -DENABLE_FFMPEG_LOGGING=OFF \
    -DENABLE_NEW_MPEGTS_OUTPUT=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install'''

[output]
runtime_deps = ['xdg-desktop-portal:default']
