name = "pixman"
version = "0.44.2"
release = 1
description = "Low-level pixel manipulation library"
license = "MIT"
arch = "x86_64"
url = "http://pixman.org/"

[dependencies]
build = ["bash", "python", "meson", "ninja", "pkgconf"]

[[sources]]
sha256 = "SKIP"
url = "https://www.cairographics.org/releases/pixman-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared -Dtests=disabled'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build'''
