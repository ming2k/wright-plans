name = "libdrm"
version = "2.4.131"
release = 1
description = "Direct Rendering Manager library"
license = "MIT"
arch = "x86_64"
url = "https://dri.freedesktop.org/libdrm/"

[dependencies]
build = ["meson", "ninja"]

[[sources]]
sha256 = "SKIP"
url = "https://dri.freedesktop.org/libdrm/libdrm-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr          \
--buildtype=release    \
-D udev=true           \
-D valgrind=disabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
