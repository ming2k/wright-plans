name = "qt6-wayland"
version = "6.11.0"
release = 1
description = "Qt 6 Wayland platform plugin"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"

[dependencies]
build = ["cmake", "gcc", "ninja", "pkgconf", "wayland-protocols"]
link = ["wayland", "qt6-base", "qt6-declarative"]

[[sources]]
sha256 = "SKIP"
url = "https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtwayland-everywhere-src-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
