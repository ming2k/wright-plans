name = "librsvg"
version = "2.62.1"
release = 2
description = "SVG rendering library using Rust"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
build = ["pkgconf", "meson", "ninja", "rust", "cargo-c", "python", "gobject-introspection"]
link = ["cairo", "gdk-pixbuf", "pango", "glib", "libxml2", "harfbuzz", "freetype", "fribidi"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/librsvg/2.62/librsvg-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
isolation = "relaxed"
script = '''
cd source
meson setup build --prefix=/usr --libdir=lib --buildtype=release -Dintrospection=enabled -Ddocs=disabled -Dtests=false -Dvala=disabled'''

[lifecycle.compile]
isolation = "relaxed"
env = { LD_LIBRARY_PATH = '${BUILD_DIR}/build/librsvg' }
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
meson install -C ${WORKDIR}/build --destdir ${PART_DIR}'''
