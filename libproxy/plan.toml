name = "libproxy"
version = "0.5.8"
release = 1
description = "Library that provides automatic proxy configuration management"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["duktape", "gsettings-desktop-schemas"]
build = [
    "gobject-introspection",
    "meson",
    "ninja",
    "pkgconf",
]
link = ["glib"]

[[sources]]
uri = "https://github.com/libproxy/libproxy/archive/refs/tags/${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Ddocs=false -Dtests=false -Dvapi=false -Dconfig-gnome=true -Dpacrunner-duktape=true

'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} meson install -C ${BUILD_DIR}/build"

[lifecycle.fabricate]
