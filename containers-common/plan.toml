name = "containers-common"
version = "0.64.1"
release = 1
description = "Default configuration files for container tools (podman, buildah, skopeo)"
license = "Apache-2.0"
arch = "any"
url = "https://github.com/containers/common"

[[sources]]
uri = "https://github.com/containers/common/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
# Storage configuration
install -dm755 ${PART_DIR}/etc/containers
install -dm755 ${PART_DIR}/usr/share/containers

install -Dm644 ${BUILD_DIR}/pkg/config/containers.conf \
  ${PART_DIR}/usr/share/containers/containers.conf

# Minimal registries config (search docker.io by default)
cat > ${PART_DIR}/etc/containers/registries.conf << 'EOF'
unqualified-search-registries = ["docker.io"]

[[registry]]
prefix = "docker.io"
location = "docker.io"
EOF

# Permissive signature policy (accept any image)
cat > ${PART_DIR}/etc/containers/policy.json << 'EOF'
{
    "default": [
        {
            "type": "insecureAcceptAnything"
        }
    ],
    "transports": {
        "docker-daemon": {
            "": [{"type": "insecureAcceptAnything"}]
        }
    }
}
EOF

# Set netavark to use nftables firewall backend
sed -i 's/^#firewall_driver = ""/firewall_driver = "nftables"/' \
  ${PART_DIR}/usr/share/containers/containers.conf

# Suppress "Executing external compose provider" hint
sed -i 's/^#compose_warning_logs = true/compose_warning_logs = false/' \
  ${PART_DIR}/usr/share/containers/containers.conf

# Default storage config
cat > ${PART_DIR}/etc/containers/storage.conf << 'EOF'
[storage]
driver = "overlay"

[storage.options.overlay]
mount_program = "/usr/bin/fuse-overlayfs"
EOF

'''

[output]
backup = [
    "/etc/containers/registries.conf",
    "/etc/containers/policy.json",
    "/etc/containers/storage.conf",
]
