name = "nettle"
version = "3.10.2"
release = 1
description = "Low-level cryptographic library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.lysator.liu.se/~nisse/nettle/"

[dependencies]
build = ["gcc", "make"]
link = ["gmp"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/nettle/nettle-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
chmod -v 755 ${PART_DIR}/usr/lib/lib{hogweed,nettle}.so'''
