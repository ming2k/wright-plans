name = "libnftnl"
version = "1.3.1"
release = 1
description = "Netfilter nf_tables netlink userspace library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.netfilter.org/projects/libnftnl/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.netfilter.org/pub/libnftnl/libnftnl-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libnftnl-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libnftnl-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libnftnl-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['libmnl >= 1.0.4']
