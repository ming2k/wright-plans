name = "xdg-desktop-portal-gtk"
version = "1.15.3"
release = 2
description = "GTK backend for xdg-desktop-portal"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/flatpak/xdg-desktop-portal-gtk"

[dependencies]
runtime = ["dbus", "xdg-desktop-portal"]
build = ["meson", "ninja", "pkgconf"]
link = ["gtk3", "gsettings-desktop-schemas"]

[[sources]]
uri = "https://github.com/flatpak/xdg-desktop-portal-gtk/releases/download/${PART_VERSION}/xdg-desktop-portal-gtk-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dwallpaper=disabled

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[lifecycle.fabricate]
