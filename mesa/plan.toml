name = "mesa"
version = "26.0.6"
release = 1
description = "Open-source OpenGL and Vulkan drivers"
license = "MIT"
arch = "x86_64"
url = "https://mesa3d.org"

link_deps = ['elfutils', 'expat', 'libdisplay-info', 'libdrm', 'libglvnd', 'libunwind', 'llvm:llvm-libs', 'wayland', 'zlib', 'zstd']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "1d3c3b8a8363b8cc354175bb4a684ad8b035211cc1d6fa17aeb9b9623c513f89"
url = "https://mesa.freedesktop.org/archive/mesa-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/mesa-${VERSION}
# Pure Wayland build:
# -Dplatforms=wayland keeps the EGL/GBM Wayland platform and intentionally
#   drops X11. This does not disable Wayland EGL support.
# -Dglx=disabled only removes the X11 GLX API; it is not a prerequisite for
#   EGL_WL_bind_wayland_display.
# If niri logs "error binding wl-display in EGL:
# EglExtensionNotSupported([\"EGL_WL_bind_wayland_display\"])", that points to
# runtime EGL driver/feature availability in Mesa's loaded stack, not to GLX
# being disabled in this build plan.
# The separate GL_INVALID_VALUE/glTexSubImage2D error is a renderer/runtime bug
# path and should be investigated independently from this packaging choice.
meson setup build --prefix=/usr --buildtype=release -D platforms=wayland -D gallium-drivers=iris,crocus,llvmpipe -D vulkan-drivers=intel,intel_hasvk,swrast -D egl=enabled -D gbm=enabled -D gles1=disabled -D gles2=enabled -D glx=disabled -D llvm=enabled -D shared-llvm=enabled -D gallium-va=disabled -D vulkan-layers=device-select,overlay -D video-codecs=all -D valgrind=disabled -D libunwind=enabled'''

[pipeline.compile]
script = '''
cd source/mesa-${VERSION}
ninja -j$(nproc) -C build'''

[pipeline.staging]
script = '''
cd source/mesa-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['elfutils', 'expat', 'libdisplay-info', 'libdrm', 'libglvnd', 'libunwind', 'llvm:llvm-libs', 'wayland', 'zlib', 'zstd']
