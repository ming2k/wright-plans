name = "python-alabaster"
version = "1.0.0"
release = 1
description = "Light, configurable Sphinx theme"
license = "BSD-3-Clause"
arch = "any"
url = "https://alabaster.readthedocs.io/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/a/alabaster/alabaster-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/alabaster-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
