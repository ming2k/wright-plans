name = "libsoup"
version = "3.6.6"
release = 1
description = "HTTP client/server library for GNOME"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["brotli", "glib-networking"]
build = ["gobject-introspection", "meson", "ninja", "pkgconf"]
link = ["glib", "libpsl", "libxml2", "nghttp2", "sqlite"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/libsoup/3.6/libsoup-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Dvapi=disabled -Dsysprof=disabled -Dtests=false -Ddocs=disabled'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build'''
