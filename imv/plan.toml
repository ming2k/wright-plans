name = "imv"
version = "5.0.1"
release = 1
description = "Command line image viewer for tiling window managers"
license = "MIT"
arch = "x86_64"
url = "https://git.sr.ht/~exec64/imv"

link_deps = ['pango:default', 'libxkbcommon:default', 'inih:default', 'wayland:default', 'mesa:default', 'libpng:default', 'libjpeg-turbo:default', 'libtiff:default', 'librsvg:default', 'libheif:default', 'libjxl:default', 'libwebp:default', 'icu:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://git.sr.ht/~exec64/imv/archive/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "patches/fix-missing-stdio.patch"

[lifecycle.prepare]
script = '''
cd source/*
patch -Np1 < ${WORKDIR}/${NAME}-fix-missing-stdio.patch'''

[lifecycle.configure]
script = '''
cd source/*
meson setup build \
    --prefix=/usr \
    -Dwindows=wayland \
    -Dunicode=icu \
    -Dlibnsgif=disabled \
    -Dlibnsbmp=disabled \
    -Dtest=disabled \
    -Dman=disabled'''

[lifecycle.compile]
script = '''
cd source/*
ninja -C build'''

[lifecycle.staging]
script = '''
cd source/*
DESTDIR=${STAGING_DIR} ninja -C build install'''

[output]
runtime_deps = ['wayland:default']
