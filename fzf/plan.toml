[plan]
name = "fzf"
version = "0.66.1"
release = 2
description = "Command-line fuzzy finder"
license = "MIT"
arch = "x86_64"
url = "https://github.com/junegunn/fzf"

[dependencies]
build = ["go"]

[[sources]]
uri = "https://github.com/junegunn/fzf/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
export CGO_ENABLED=0
go build -trimpath -ldflags "-s -w -X main.version=${PART_VERSION}" -o bin/fzf .
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 bin/fzf ${PART_DIR}/usr/bin/fzf
install -Dm644 man/man1/fzf.1 ${PART_DIR}/usr/share/man/man1/fzf.1
install -Dm644 shell/completion.bash ${PART_DIR}/usr/share/bash-completion/completions/fzf
install -Dm644 shell/completion.zsh ${PART_DIR}/usr/share/zsh/site-functions/_fzf
install -Dm644 shell/key-bindings.bash ${PART_DIR}/usr/share/fzf/key-bindings.bash
install -Dm644 shell/key-bindings.zsh ${PART_DIR}/usr/share/fzf/key-bindings.zsh
install -Dm644 shell/key-bindings.fish ${PART_DIR}/usr/share/fish/vendor_functions.d/fzf_key_bindings.fish
'''
