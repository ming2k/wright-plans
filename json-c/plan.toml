name = "json-c"
version = "0.18"
release = 1
description = "A JSON implementation in C"
license = "MIT"
arch = "x86_64"
url = "https://github.com/json-c/json-c"

[dependencies]
build = ["cmake", "ninja"]
link = ["glibc"]

[[sources]]
sha256 = "SKIP"
url = "https://s3.amazonaws.com/json-c_releases/releases/json-c-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
mkdir -p build && cd build
cmake .. -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=/usr/lib -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_STATIC_LIBS=OFF -DENABLE_RDRAND=OFF -DENABLE_THREADING=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja install -C ${WORKDIR}/build'''
