name = "vid.stab"
version = "1.1.1"
release = 1
description = "Video stabilization library"
license = "GPL-2.0-or-later"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "cmake"]
link = []

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/georgmartius/vid.stab/archive/refs/tags/v1.1.1.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON'''

[lifecycle.compile]
script = '''
cd source
cmake --build build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} cmake --install build'''
