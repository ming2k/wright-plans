name = "wget2"
version = "2.2.1"
release = 1
description = "GNU Wget2 - a file and recursive website downloader (next-gen wget)"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/wget/"

[dependencies]
runtime = ["ca-certificates"]
build = ["gcc", "make"]
link = [
    "gnutls",
    "libidn2",
    "libpsl",
    "nghttp2",
    "brotli",
    "zstd",
    "zlib",
    "pcre2",
    "gpgme",
]

[[sources]]
uri = "https://ftp.gnu.org/gnu/wget/wget2-${VERSION}.tar.lz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr      \
    --sysconfdir=/etc          \
    --with-ssl=gnutls          \
    --with-brotlidec           \
    --with-zstd                \
    --with-nghttp2

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
