name = "rust"
version = "1.94.0"
release = 1
description = "The Rust programming language compiler and standard library"
license = "Apache-2.0 AND MIT"
arch = "x86_64"
url = "https://www.rust-lang.org"

[dependencies]
runtime = ["gcc"]
link = ["glibc"]

[[sources]]
uri = "https://static.rust-lang.org/dist/rust-${PART_VERSION}-x86_64-unknown-linux-gnu.tar.xz"
sha256 = "SKIP"

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
./install.sh --destdir=${PART_DIR} --prefix=/usr --without=rust-docs

'''

[lifecycle.fabricate]
script = '''
# install.sh already placed files into ${PART_DIR}/usr
# Remove install log that references the temp directory
rm -f ${PART_DIR}/usr/lib/rustlib/install.log
rm -f ${PART_DIR}/usr/lib/rustlib/uninstall.sh
rm -rf ${PART_DIR}/usr/lib/rustlib/manifest-*
# Remove /usr/etc — not FHS-compliant
rm -rf ${PART_DIR}/usr/etc

'''

[output.cargo]
description = "Cargo package manager for Rust"
script = '''
install -d ${PART_DIR}/usr/bin
install -d ${PART_DIR}/usr/share/man/man1
install -d ${PART_DIR}/usr/share/bash-completion/completions
install -d ${PART_DIR}/usr/share/fish/vendor_completions.d
install -d ${PART_DIR}/usr/share/zsh/site-functions

# Binaries
for bin in cargo cargo-*; do
  if [ -f "${MAIN_PART_DIR}/usr/bin/${bin}" ]; then
    mv -v "${MAIN_PART_DIR}/usr/bin/${bin}" "${PART_DIR}/usr/bin/"
  fi
done

# Man pages
for man in cargo*.1; do
  if [ -f "${MAIN_PART_DIR}/usr/share/man/man1/${man}" ]; then
    mv -v "${MAIN_PART_DIR}/usr/share/man/man1/${man}" "${PART_DIR}/usr/share/man/man1/"
  fi
done

# Shell completions if present
if [ -f "${MAIN_PART_DIR}/usr/share/bash-completion/completions/cargo" ]; then
  mv -v "${MAIN_PART_DIR}/usr/share/bash-completion/completions/cargo" "${PART_DIR}/usr/share/bash-completion/completions/"
fi
if [ -f "${MAIN_PART_DIR}/usr/share/fish/vendor_completions.d/cargo.fish" ]; then
  mv -v "${MAIN_PART_DIR}/usr/share/fish/vendor_completions.d/cargo.fish" "${PART_DIR}/usr/share/fish/vendor_completions.d/"
fi
if [ -f "${MAIN_PART_DIR}/usr/share/zsh/site-functions/_cargo" ]; then
  mv -v "${MAIN_PART_DIR}/usr/share/zsh/site-functions/_cargo" "${PART_DIR}/usr/share/zsh/site-functions/"
fi

'''

[output.cargo.dependencies]
runtime = ["rust"]
