[plan]
name = "sphinxcontrib-devhelp"
version = "2.0.0"
release = 1
description = "Sphinx extension for Devhelp output"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/sphinx-doc/sphinxcontrib-devhelp"

[dependencies]
build = ["python", "flit-core"]
runtime = ["python"]

[sources]
uris = ["https://pypi.org/packages/source/s/sphinxcontrib_devhelp/sphinxcontrib_devhelp-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PKG_DIR} --no-build-isolation .
'''
