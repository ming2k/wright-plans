[plan]
name = "libvorbis"
version = "1.3.7"
release = 1
description = "Vorbis audio codec library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/vorbis"

[dependencies]
build = ["gcc", "make"]
link = ["libogg"]

[sources]
uris = ["https://downloads.xiph.org/releases/vorbis/libvorbis-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
