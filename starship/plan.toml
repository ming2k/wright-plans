name = "starship"
version = "1.25.1"
release = 1
description = "The minimal, blazing-fast, and infinitely customizable prompt for any shell"
license = "ISC"
arch = "x86_64"
url = "https://starship.rs/"


build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/starship/starship/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${WORKDIR}/.cargo', CARGO_TARGET_DIR = '${WORKDIR}/target' }
script = '''
cd source/starship-${VERSION}
cargo build --release --locked'''

[lifecycle.staging]
script = '''
install -Dm755 ${WORKDIR}/target/release/starship ${STAGING_DIR}/usr/bin/starship
install -dm755 ${STAGING_DIR}/usr/share/bash-completion/completions
install -dm755 ${STAGING_DIR}/usr/share/zsh/site-functions
install -dm755 ${STAGING_DIR}/usr/share/fish/vendor_completions.d
${WORKDIR}/target/release/starship completions bash > ${STAGING_DIR}/usr/share/bash-completion/completions/starship
${WORKDIR}/target/release/starship completions zsh  > ${STAGING_DIR}/usr/share/zsh/site-functions/_starship
${WORKDIR}/target/release/starship completions fish > ${STAGING_DIR}/usr/share/fish/vendor_completions.d/starship.fish'''

