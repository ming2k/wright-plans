name = "libaio"
version = "0.3.113"
release = 1
description = "Linux kernel AIO (Asynchronous I/O) interface library"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://pagure.io/libaio"

[[sources]]
sha256 = "SKIP"
url = "https://pagure.io/libaio/archive/libaio-${VERSION}/libaio-libaio-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR} prefix=/usr'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR} prefix=/usr DESTDIR=${PART_DIR} install'''
