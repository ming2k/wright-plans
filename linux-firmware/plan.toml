# ─── Intel ───

[split.linux-firmware-intel]
description = "Firmware for Intel audio, Bluetooth, GPU, network, NPU, webcam"

[split.linux-firmware-intel.dependencies]
runtime = ["linux-firmware-whence"]
[split.linux-firmware-intel.lifecycle.package]
script = """
FW="${BUILD_DIR}/_installed/usr/lib/firmware"
shopt -s nullglob
mkdir -p ${PKG_DIR}/usr/lib/firmware

# Directory-based firmware (correct layout from copy-firmware.sh)
for dir in intel i915 xe ice; do

[ -d "$FW/$dir" ] && cp -a "$FW/$dir" ${PKG_DIR}/usr/lib/firmware/
done

# iwlwifi ucode + pnvm (flat in firmware root after copy-firmware.sh)
for f in "$FW"/iwlwifi-*.ucode "$FW"/iwlwifi-*.pnvm; do

[ -e "$f" ] && cp -a "$f" ${PKG_DIR}/usr/lib/firmware/"$(basename "$f")"
done

# Intel Bluetooth firmware
for f in "$FW"/ibt-*.sfi "$FW"/ibt-*.ddc; do

[ -e "$f" ] && cp -a "$f" ${PKG_DIR}/usr/lib/firmware/"$(basename "$f")"
done
"""

