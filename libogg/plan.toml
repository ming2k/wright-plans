name = "libogg"
version = "1.3.6"
release = 1
description = "Ogg bitstream and framing library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/ogg"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://downloads.xiph.org/releases/ogg/libogg-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
