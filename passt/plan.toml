name = "passt"
version = "2026_01_20.386b5f5"
release = 1
description = "Translation layer for networking of VMs and containers (provides pasta)"
license = "GPL-2.0-or-later AND BSD-3-Clause"
arch = "x86_64"
url = "https://passt.top/passt/about/"

[dependencies]
build = ["gcc", "make"]
link = ["glibc"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://passt.top/passt/snapshot/passt-${VERSION}.tar.zst"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source
make VERSION="${VERSION}" -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} prefix=/usr install'''
