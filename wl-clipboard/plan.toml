name = "wl-clipboard"
version = "2.2.1"
release = 1
description = "Command-line copy/paste utilities for Wayland"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/bugaevc/wl-clipboard"

[dependencies]
build = ["meson", "ninja"]
link = ["wayland", "wayland-protocols"]

[[sources]]
uri = "https://github.com/bugaevc/wl-clipboard/archive/v${PART_VERSION}/wl-clipboard-${PART_VERSION}.tar.gz"
sha256 = "6eb8081207fb5581d1d82c4bcd9587205a31a3d47bea3ebeb7f41aa1143783eb"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[lifecycle.fabricate]
