name = "rsync"
version = "3.4.1"
release = 2
description = "A fast and versatile file copying tool for remote and local files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://rsync.samba.org/"

link_deps = ['openssl', 'zlib', 'zstd', 'lz4']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.samba.org/ftp/rsync/src/rsync-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/rsync-${VERSION}
./configure --prefix=/usr    \
--disable-xxhash             \
--without-included-popt      \
--without-included-zlib'''

[pipeline.compile]
script = '''
cd source/rsync-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/rsync-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['openssl', 'zlib', 'zstd', 'lz4']
