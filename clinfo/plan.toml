name = "clinfo"
version = "3.0.25.02.14"
release = 1
description = "Enumerates all possible OpenCL properties of all available platforms and devices"
license = "CC0-1.0"
arch = "x86_64"
url = "https://github.com/Oblomov/clinfo"

[dependencies]
build = ["gcc", "make", "opencl-headers", "ocl-icd", "pkg-config"]
link = ["glibc", "ocl-icd"]
runtime = ["glibc", "ocl-icd"]

[[sources]]
type = "http"
url = "https://github.com/Oblomov/clinfo/archive/refs/tags/${VERSION}.tar.gz"
sha256 = "48b77dc33315e6f760791a2984f98ea4bff28504ff37d460d8291585f49fcd3a"

[lifecycle.compile]
script = '''
cd clinfo-${VERSION}
make'''

[lifecycle.staging]
script = '''
cd clinfo-${VERSION}
make DESTDIR=${PART_DIR} PREFIX=/usr MANDIR=/usr/share/man install'''
