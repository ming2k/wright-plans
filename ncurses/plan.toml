name = "ncurses"
version = "6.6"
release = 1
description = "Libraries for terminal-independent handling of character screens"
license = "MIT"
arch = "x86_64"
url = "https://www.gnu.org/software/ncurses/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/ncurses/ncurses-6.6.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr           \
--mandir=/usr/share/man \
--with-shared           \
--without-debug         \
--without-normal        \
--with-cxx-shared       \
--enable-pc-files       \
--with-pkg-config-libdir=/usr/lib/pkgconfig'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=$PWD/dest install
install -vm755 dest/usr/lib/libncursesw.so.6.6 /usr/lib
rm -v  dest/usr/lib/libncursesw.so.6.6
sed -e 's/^#if.*XOPEN.*$/#if 1/' \
-i dest/usr/include/curses.h
cp -av dest/* ${PART_DIR}/

for lib in ncurses form panel menu ; do
ln -sfv lib${lib}w.so ${PART_DIR}/usr/lib/lib${lib}.so
ln -sfv ${lib}w.pc    ${PART_DIR}/usr/lib/pkgconfig/${lib}.pc
done

ln -sfv libncursesw.so ${PART_DIR}/usr/lib/libcurses.so

mkdir -p ${PART_DIR}/usr/share/doc/ncurses-6.6
cp -v -R doc/* ${PART_DIR}/usr/share/doc/ncurses-6.6/'''
