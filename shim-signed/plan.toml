name = "shim-signed"
version = "16.1"
release = 1
description = "UEFI Secure Boot shim bootloader (Microsoft-signed binary from Fedora)"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/rhboot/shim"

build_deps = ["binutils"]

[[sources]]
type = "http"
url = "https://kojipkgs.fedoraproject.org/packages/shim/16.1/8/x86_64/shim-x64-16.1-8.x86_64.rpm"
sha256 = "ee8787bb9fbd13fcce73de0501938075c24efd78bc1a590826f0c01c7a10986b"

[pipeline.prepare]
isolation = "relaxed"
script = '''
RPMFILE=$(ls -1 *.rpm 2>/dev/null | head -n1)
bsdtar xf "$RPMFILE"'''

[pipeline.staging]
isolation = "relaxed"
script = '''
SHIM_DIR=$(find . -name shimx64.efi -type f | head -n1 | xargs dirname)
install -Dm644 "${SHIM_DIR}/shimx64.efi" ${STAGING_DIR}/usr/share/shim-signed/shimx64.efi
install -Dm644 "${SHIM_DIR}/mmx64.efi" ${STAGING_DIR}/usr/share/shim-signed/mmx64.efi
install -Dm644 "${SHIM_DIR}/BOOTX64.CSV" ${STAGING_DIR}/usr/share/shim-signed/BOOTX64.CSV
BOOT_DIR=$(find . -name fbx64.efi -type f | head -n1 | xargs dirname)
install -Dm644 "${BOOT_DIR}/fbx64.efi" ${STAGING_DIR}/usr/share/shim-signed/fbx64.efi'''
