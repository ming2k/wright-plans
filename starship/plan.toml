name = "starship"
version = "1.24.2"
release = 1
description = "The minimal, blazing-fast, and infinitely customizable prompt for any shell"
license = "ISC"
arch = "x86_64"
url = "https://starship.rs/"

[dependencies]
build = ["rust"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/starship/starship/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
env = {'CARGO_HOME': '${BUILD_DIR}/.cargo', 'CARGO_TARGET_DIR': '${BUILD_DIR}/target'}
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/starship ${PART_DIR}/usr/bin/starship
install -dm755 ${PART_DIR}/usr/share/bash-completion/completions
install -dm755 ${PART_DIR}/usr/share/zsh/site-functions
install -dm755 ${PART_DIR}/usr/share/fish/vendor_completions.d
target/release/starship completions bash > ${PART_DIR}/usr/share/bash-completion/completions/starship
target/release/starship completions zsh  > ${PART_DIR}/usr/share/zsh/site-functions/_starship
target/release/starship completions fish > ${PART_DIR}/usr/share/fish/vendor_completions.d/starship.fish'''
