name = "go"
version = "1.26.2"
release = 1
description = "The Go programming language"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://go.dev"

[dependencies]
build = ["gcc", "go-bootstrap"]
link = ["glibc"]

[[sources]]
uri = "https://go.dev/dl/go${PART_VERSION}.src.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
env = { GOROOT_BOOTSTRAP = "/usr/lib/go-bootstrap" }
script = '''
cd ${BUILD_DIR}/src
./make.bash

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
mkdir -p ${PART_DIR}/usr/lib
cp -a ${BUILD_DIR} ${PART_DIR}/usr/lib/go
mkdir -p ${PART_DIR}/usr/bin
ln -sf ../lib/go/bin/go ${PART_DIR}/usr/bin/go
ln -sf ../lib/go/bin/gofmt ${PART_DIR}/usr/bin/gofmt

'''

[output]
replaces = ["go-bin"]
conflicts = ["go-bin"]

[lifecycle.fabricate]
script = '''
# Bootstrap caches and bootstrap toolchain are not needed in the final part.
rm -rf ${PART_DIR}/usr/lib/go/pkg/bootstrap
rm -rf ${PART_DIR}/usr/lib/go/pkg/obj

'''
