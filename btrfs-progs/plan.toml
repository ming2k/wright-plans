[plan]
name = "btrfs-progs"
version = "6.19"
release = 1
description = "Btrfs filesystem userspace utilities"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://btrfs.readthedocs.io"

[dependencies]
build = ["pkgconf"]
link = ["util-linux", "zlib", "lzo", "zstd", "e2fsprogs", "libgcrypt", "systemd"]

[[sources]]
uri = "https://www.kernel.org/pub/linux/kernel/people/kdave/btrfs-progs/btrfs-progs-v${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sbindir=/usr/bin --disable-static --disable-documentation --with-crypto=libgcrypt
'''

[lifecycle.compile]
script = "make -j$(nproc) -C ${BUILD_DIR}"

[lifecycle.staging]
script = "make DESTDIR=${PKG_DIR} install -C ${BUILD_DIR}"


[lifecycle.package]
hooks.post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemctl enable btrfs-scrub@-.timer 2>/dev/null || true
'''
