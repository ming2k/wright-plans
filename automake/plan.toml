[plan]
name = "automake"
version = "1.18.1"
release = 1
description = "Programs for generating Makefiles for use with Autoconf"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/automake/"

[dependencies]
build = ["autoconf", "make", "perl"]
[sources]
uris = ["https://ftp.gnu.org/gnu/automake/automake-1.18.1.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --docdir=/usr/share/doc/automake-1.18.1
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
