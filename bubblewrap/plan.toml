[plan]
name = "bubblewrap"
version = "0.11.0"
release = 1
description = "Unprivileged sandboxing tool"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/containers/bubblewrap"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["libcap", "libseccomp"]

[[sources]]
uri = "https://github.com/containers/bubblewrap/releases/download/v${PART_VERSION}/bubblewrap-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build      \
--prefix=/usr          \
--buildtype=release    \
-D tests=false
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install
'''
