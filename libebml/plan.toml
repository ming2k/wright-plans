name = "libebml"
version = "1.4.5"
release = 1
description = "EBML parsing library used by Matroska tools"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.matroska.org/"


build_deps = ['cmake', 'ninja']

[[sources]]
type = "http"
sha256 = "4971640b0592da29c2d426f303e137a9b0b3d07e1b81d069c1e56a2f49ab221b"
url = "https://dl.matroska.org/downloads/libebml/libebml-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libebml-${VERSION}
cmake -S ${WORKDIR} -B ${WORKDIR}/build -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
  -DBUILD_SHARED_LIBS=ON'''

[pipeline.compile]
script = '''
cd source/libebml-${VERSION}
cmake --build ${WORKDIR}/build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libebml-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install ${WORKDIR}/build'''

