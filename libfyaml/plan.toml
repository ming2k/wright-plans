name = "libfyaml"
version = "0.9"
release = 3
description = "Fully feature complete YAML parser and emitter"
license = "MIT"
arch = "x86_64"
url = "https://github.com/pantoniou/libfyaml"


build_deps = ['cmake', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/pantoniou/libfyaml/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libfyaml-${VERSION}
cmake -S . -B build \
    -G Ninja \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DBUILD_SHARED_LIBS=ON \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
    -DENABLE_ASAN=OFF'''

[pipeline.compile]
script = '''
cd source/libfyaml-${VERSION}
cmake --build build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libfyaml-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build
install -d ${STAGING_DIR}/usr/lib/pkgconfig
cat > ${STAGING_DIR}/usr/lib/pkgconfig/libfyaml.pc << 'PCEOF'
prefix=/usr
exec_prefix=${prefix}
libdir=${exec_prefix}/lib
includedir=${prefix}/include

Name: libfyaml
Description: Fully feature complete YAML parser and emitter library
Version: ${VERSION}
Libs: -L${libdir} -lfyaml
Cflags: -I${includedir}
PCEOF'''

