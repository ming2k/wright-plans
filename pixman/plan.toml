name = "pixman"
version = "0.44.2"
release = 1
description = "Low-level pixel manipulation library"
license = "MIT"
arch = "x86_64"
url = "http://pixman.org/"

[dependencies]
build = [
    "bash",
    "python",
    "meson",
    "ninja",
    "pkgconf",
]

[[sources]]
uri = "https://www.cairographics.org/releases/pixman-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared -Dtests=disabled

'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} meson install -C ${BUILD_DIR}/build"

[lifecycle.fabricate]
