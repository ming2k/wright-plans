name = "onnxruntime"
version = "1.24.3"
release = 1
description = "Cross-platform ML inference and training accelerator"
license = "MIT"
arch = "x86_64"
url = "https://github.com/microsoft/onnxruntime"

[dependencies]
build = ["gcc", "cmake", "ninja", "git", "python"]
link = ["abseil-cpp", "protobuf"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/microsoft/onnxruntime/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[options]
timeout = 3600

[lifecycle.configure]
dockyard = "relaxed"
script = '''
cd source
cmake --compile-no-warning-as-error \
  -S cmake -B build -G Ninja \
  -Wno-dev \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -Donnxruntime_BUILD_SHARED_LIB=ON \
  -Donnxruntime_BUILD_UNIT_TESTS=OFF \
  -Donnxruntime_ENABLE_PYTHON=OFF \
  -Donnxruntime_USE_CUDA=OFF \
  -Donnxruntime_USE_OPENVINO=OFF \
  -Donnxruntime_USE_TENSORRT=OFF \
  -Donnxruntime_USE_DML=OFF \
  -Donnxruntime_USE_FULL_PROTOBUF=OFF \
  -DCMAKE_CXX_STANDARD=17 \
  -DFETCHCONTENT_QUIET=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
