name = "ffmpeg"
version = "8.1"
release = 6
description = "Complete, cross-platform solution to record, convert and stream audio and video"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://ffmpeg.org"

link_deps = ['alsa-lib:default', 'aom:default', 'dav1d:default', 'freetype:default', 'gnutls:default', 'lame:default', 'libass:default', 'libdrm:default', 'libglvnd:default', 'libplacebo:default', 'libsndfile:default', 'libtheora:default', 'libva:default', 'libvorbis:default', 'libvpx:default', 'libwebp:default', 'libxml2:default', 'mesa:default', 'openjpeg:default', 'opus:default', 'pipewire:default', 'sdl2:default', 'srt:default', 'svt-av1:default', 'vulkan-loader:default', 'x264:default', 'x265:default', 'zlib:default', 'bzip2:default', 'lz4:default', 'zstd:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ffmpeg.org/releases/ffmpeg-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.prepare]
script = "cd source"

[lifecycle.configure]
script = '''
cd source

pkg-config --exists sdl2 || {
  echo "ffplay requested but SDL2 pkg-config metadata is missing"
  exit 1
}

command -v sdl2-config >/dev/null 2>&1 || {
  echo "ffplay requested but sdl2-config is missing from the build environment"
  exit 1
}

./configure \
  --prefix=/usr \
  --disable-debug \
  --disable-static \
  --disable-stripping \
  --enable-shared \
  --enable-gpl \
  --enable-version3 \
  --enable-gnutls \
  --enable-libass \
  --enable-libaom \
  --enable-libdav1d \
  --enable-libfreetype \
  --enable-libmp3lame \
  --enable-libopenjpeg \
  --enable-libopus \
  --enable-libplacebo \
  --enable-libsrt \
  --enable-libsvtav1 \
  --enable-libtheora \
  --enable-libvorbis \
  --enable-libvpx \
  --enable-libwebp \
  --enable-libx264 \
  --enable-libx265 \
  --enable-libxml2 \
  --enable-sdl2 \
  --enable-ffplay \
  --enable-vulkan \
  --enable-vaapi \
  --enable-libdrm \
  --enable-lto \
  --enable-pic'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install

test -x ${STAGING_DIR}/usr/bin/ffplay'''

[output]
runtime_deps = ['alsa-lib:default', 'aom:default', 'dav1d:default', 'freetype:default', 'gnutls:default', 'lame:default', 'libass:default', 'libdrm:default', 'libglvnd:default', 'libplacebo:default', 'libsndfile:default', 'libtheora:default', 'libva:default', 'libvorbis:default', 'libvpx:default', 'libwebp:default', 'libxml2:default', 'mesa:default', 'openjpeg:default', 'opus:default', 'pipewire:default', 'sdl2:default', 'srt:default', 'svt-av1:default', 'vulkan-loader:default', 'x264:default', 'x265:default', 'zlib:default', 'bzip2:default', 'lz4:default', 'zstd:default']
