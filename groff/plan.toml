[plan]
name = "groff"
version = "1.23.0"
release = 1
description = "Programs for processing and formatting text and images"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/groff/"

[dependencies]
build = ["gcc", "make", "perl"]
[sources]
uris = ["https://ftp.gnu.org/gnu/groff/groff-1.23.0.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
PAGE=A4 ./configure --prefix=/usr
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j1
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
