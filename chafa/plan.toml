name = "chafa"
version = "1.18.1"
release = 1
description = "Image-to-text converter for terminal graphics"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://hpjansson.org/chafa/"

link_deps = ['glib', 'freetype', 'libjpeg-turbo', 'librsvg', 'libtiff', 'libwebp', 'libavif', 'libheif', 'libjxl']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/hpjansson/chafa/releases/download/${VERSION}/chafa-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/chafa-${VERSION}
./configure \
  --prefix=/usr \
  --disable-static \
  --disable-gtk-doc \
  --disable-man'''

[lifecycle.compile]
script = '''
cd source/chafa-${VERSION}
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/chafa-${VERSION}
make -C ${WORKDIR} DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glib', 'freetype', 'libjpeg-turbo', 'librsvg', 'libtiff', 'libwebp', 'libavif', 'libheif', 'libjxl']
