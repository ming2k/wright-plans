name = "texinfo"
version = "7.2"
release = 1
description = "Programs for reading, writing, and converting info pages"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/texinfo/"

[dependencies]
runtime = ["perl"]
build = ["gcc", "make", "perl"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/texinfo/texinfo-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
sed 's/! $output_file eq/$output_file ne/' -i tp/Texinfo/Convert/*.pm'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
make DESTDIR=${PART_DIR} TEXMF=/usr/share/texmf install-tex'''
