name = "gcr3"
version = "3.41.2"
release = 1
description = "Crypto services and certificate UI library for GNOME 3 consumers"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/gcr"

[dependencies]
runtime = ["libsecret", "p11-kit"]
build = ["gettext", "gobject-introspection", "libxslt", "meson", "ninja", "pkgconf", "vala"]
link = ["dbus", "glib", "gtk3", "libgcrypt", "p11-kit"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/gcr/3.41/gcr-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Dgtk_doc=false -Dintrospection=true'''

[lifecycle.compile]
script = '''
cd source
meson compile -C build'''

[lifecycle.staging]
script = '''
cd source
meson install -C build --destdir ${PART_DIR}'''
