name = "soxr"
version = "0.1.3"
release = 1
description = "High quality SoX-based resampler library"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "cmake"]
link = []

[[sources]]
type = "http"
sha256 = "b111c15fdc8c029989330ff559184198c161100a59312f5dc19ddeb9b5a15889"
url = "https://sourceforge.net/projects/soxr/files/soxr-0.1.3-Source.tar.xz/download"

[lifecycle.configure]
script = '''
cd source
cmake -B build \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DWITH_OPENMP=OFF'''

[lifecycle.compile]
script = '''
cd source
cmake --build build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} cmake --install build'''
