[plan]
name = "cmus"
version = "2.12.0"
release = 1
description = "Feature-rich ncurses-based music player"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://cmus.github.io/"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses", "alsa-lib", "ffmpeg"]

[[sources]]
uri = "https://github.com/cmus/cmus/archive/refs/tags/v${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

install -vDm644 contrib/_cmus ${PKG_DIR}/usr/share/zsh/site-functions/_cmus
install -vDm644 contrib/cmus.bash-completion ${PKG_DIR}/usr/share/bash-completion/completions/cmus
'''
