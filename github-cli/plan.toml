name = "github-cli"
version = "2.88.1"
release = 1
description = "GitHub CLI"
license = "MIT"
arch = "x86_64"
url = "https://github.com/cli/cli"

[dependencies]
build = ["go", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/cli/cli/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd source
export PATH=/usr/lib/go/bin:$PATH
export CGO_ENABLED=0
make bin/gh manpages'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 bin/gh ${PART_DIR}/usr/bin/gh
install -dm755 ${PART_DIR}/usr/share/bash-completion/completions
install -dm755 ${PART_DIR}/usr/share/fish/vendor_completions.d
install -dm755 ${PART_DIR}/usr/share/man/man1
install -dm755 ${PART_DIR}/usr/share/zsh/site-functions

./bin/gh completion -s bash > ${PART_DIR}/usr/share/bash-completion/completions/gh
./bin/gh completion -s fish > ${PART_DIR}/usr/share/fish/vendor_completions.d/gh.fish
./bin/gh completion -s zsh > ${PART_DIR}/usr/share/zsh/site-functions/_gh
install -Dm644 share/man/man1/gh.1 ${PART_DIR}/usr/share/man/man1/gh.1
install -Dm644 share/man/man1/gh-*.1 -t ${PART_DIR}/usr/share/man/man1
install -Dm644 LICENSE ${PART_DIR}/usr/share/licenses/github-cli/LICENSE'''
