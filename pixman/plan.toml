name = "pixman"
version = "0.46.4"
release = 1
description = "Low-level pixel manipulation library"
license = "MIT"
arch = "x86_64"
url = "http://pixman.org/"

[dependencies]
build = ["bash", "python", "meson", "ninja", "pkgconf"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.cairographics.org/releases/pixman-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/pixman-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared -Dtests=disabled'''

[lifecycle.compile]
script = '''
cd source/pixman-${VERSION}
meson compile -C build'''

[lifecycle.staging]
script = '''
cd source/pixman-${VERSION}
DESTDIR=${PART_DIR} meson install -C build'''
