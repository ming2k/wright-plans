name = "nftables"
version = "1.1.6"
release = 5
description = "Netfilter tables userspace tools"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://www.netfilter.org/projects/nftables/"

link_deps = ['gmp', 'jansson', 'libmnl', 'libnftnl', 'ncurses', 'readline']
build_deps = ['autoconf', 'automake', 'libtool', 'python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.netfilter.org/pub/nftables/nftables-${VERSION}.tar.xz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "nftables.service"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "nftables.conf"

[options]
ccache = true

[pipeline.prepare]
script = '''
cd source/nftables-${VERSION}
autoreconf -fiv'''

[pipeline.configure]
script = '''
cd source/nftables-${VERSION}
./configure --prefix=/usr       \
  --sbindir=/usr/bin  \
  --sysconfdir=/etc   \
  --with-json         \
  --with-cli=readline \
  --disable-debug     \
  --disable-man-doc   \
  --disable-python    \
  --with-mini-gmp=no'''

[pipeline.compile]
script = '''
cd source/nftables-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/nftables-${VERSION}
make DESTDIR=${STAGING_DIR} install

install -Dm644 ${WORKDIR}/nftables-nftables.conf ${STAGING_DIR}/etc/nftables.conf
install -Dm644 ${WORKDIR}/nftables-nftables.service ${STAGING_DIR}/usr/lib/systemd/system/nftables.service'''

[[output]]
runtime_deps = ['gmp', 'jansson', 'libmnl', 'libnftnl', 'ncurses', 'readline']
backup = ["/etc/nftables.conf"]
hooks.post_install = '''
ldconfig 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
systemctl enable nftables.service 2>/dev/null || true
'''
hooks.post_upgrade = "ldconfig 2>/dev/null || true"
hooks.pre_remove = "nft flush ruleset 2>/dev/null || true"

