name = "leveldb"
version = "1.23"
release = 1
description = "Fast key-value storage library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/leveldb"

[dependencies]
build = ["cmake", "ninja"]
link = ["snappy"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/google/leveldb/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DLEVELDB_BUILD_TESTS=OFF \
    -DLEVELDB_BUILD_BENCHMARKS=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
