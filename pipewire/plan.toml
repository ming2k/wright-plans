[plan]
name = "pipewire"
version = "1.6.0"
release = 1
description = "Low-latency audio/video router and processor"
license = "MIT"
arch = "x86_64"
url = "https://pipewire.org"

[dependencies]
build = ["meson", "ninja", "pkgconf", "rtkit"]
link = ["alsa-lib", "dbus", "glib", "libsndfile", "ncurses", "opus", "readline", "systemd"]

[[sources]]
uri = "https://github.com/PipeWire/pipewire/archive/refs/tags/${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr                        \
--buildtype=release                  \
-D docs=disabled                     \
-D man=disabled                      \
-D tests=disabled                    \
-D gstreamer=disabled                \
-D v4l2=disabled                     \
-D jack=disabled                     \
-D pipewire-jack=disabled            \
-D pipewire-alsa=enabled             \
-D pipewire-v4l2=disabled            \
-D rlimits-install=false             \
-D selinux=disabled                  \
-D udevrulesdir=/usr/lib/udev/rules.d \
-D session-managers=[]
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install"


[lifecycle.package]
hooks.post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemd-tmpfiles --create /usr/lib/tmpfiles.d/pipewire.conf 2>/dev/null || true
'''
hooks.post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
