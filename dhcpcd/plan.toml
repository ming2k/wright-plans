name = "dhcpcd"
version = "10.3.0"
release = 1
description = "DHCP/DHCPv6 client with IPv4LL support"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/NetworkConfiguration/dhcpcd"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/NetworkConfiguration/dhcpcd/releases/download/v${VERSION}/dhcpcd-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr       \
--sbindir=/usr/bin  \
--sysconfdir=/etc   \
--libexecdir=/usr/lib/dhcpcd \
--dbdir=/var/lib/dhcpcd      \
--runstatedir=/run           \
--disable-privsep'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
