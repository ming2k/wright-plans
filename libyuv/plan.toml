name = "libyuv"
version = "1893"
release = 3
description = "YUV scaling and conversion library (Git Source)"
license = "BSD-3-Clause"
arch = "x86_64"


build_deps = ['ninja', 'cmake']

[[sources]]
type = "git"
url = "https://chromium.googlesource.com/libyuv/libyuv.git"
ref = "stable"

[pipeline.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5'''

[pipeline.compile]
script = "ninja -C ${WORKDIR}/build"

[pipeline.staging]
script = '''
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install

mkdir -p ${STAGING_DIR}/usr/lib/pkgconfig
cat > ${STAGING_DIR}/usr/lib/pkgconfig/libyuv.pc << PCEOF
prefix=/usr
exec_prefix=${prefix}
libdir=${exec_prefix}/lib
includedir=${prefix}/include

Name: libyuv
Description: YUV scaling and conversion library
Version: 1893
Libs: -L${libdir} -lyuv
Cflags: -I${includedir}
PCEOF'''

