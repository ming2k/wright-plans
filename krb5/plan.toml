name = "krb5"
version = "1.22.2"
release = 2
description = "MIT Kerberos network authentication system"
license = "MIT"
arch = "x86_64"
url = "https://web.mit.edu/kerberos/"

link_deps = ['keyutils', 'openssl']

[[sources]]
type = "http"
sha256 = "3243ffbc8ea4d4ac22ddc7dd2a1dc54c57874c40648b60ff97009763554eaf13"
url = "https://web.mit.edu/Kerberos/dist/krb5/1.22/krb5-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/src
./configure --prefix=/usr \
    --sbindir=/usr/bin \
    --disable-static \
    --without-ldap'''

[pipeline.compile]
script = '''
cd source/src
make WARN_CFLAGS= -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/src
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['keyutils', 'openssl']
