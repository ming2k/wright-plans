[plan]
name = "yazi"
version = "26.1.22"
release = 1
description = "Blazing fast terminal file manager written in Rust, based on async I/O"
license = "MIT"
arch = "x86_64"
url = "https://github.com/sxyazi/yazi"

[dependencies]
build = ["rust"]
link = ["gcc", "glibc"]
optional = [
    { name = "ffmpeg", description = "Video and audio file previews" },
    { name = "fd", description = "File search integration" },
    { name = "rg", description = "Content search integration" },
    { name = "zoxide", description = "Directory jumping" },
    { name = "fzf", description = "Fuzzy finder integration" },
    { name = "poppler", description = "PDF preview support" },
    { name = "jq", description = "JSON file preview" },
    { name = "imagemagick", description = "Additional image format support" },
]

[sources]
uris = ["https://github.com/sxyazi/yazi/archive/refs/tags/v${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.compile]
dockyard = "none"
env = { YAZI_GEN_COMPLETIONS = "true" }
script = '''
cd ${BUILD_DIR}
cargo build --release --locked
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/yazi ${PKG_DIR}/usr/bin/yazi
install -Dm755 target/release/ya   ${PKG_DIR}/usr/bin/ya

# Shell completions for yazi
install -Dm644 yazi-boot/completions/yazi.bash ${PKG_DIR}/usr/share/bash-completion/completions/yazi || true
install -Dm644 yazi-boot/completions/_yazi     ${PKG_DIR}/usr/share/zsh/site-functions/_yazi || true
install -Dm644 yazi-boot/completions/yazi.fish ${PKG_DIR}/usr/share/fish/vendor_completions.d/yazi.fish || true

# Shell completions for ya
install -Dm644 yazi-cli/completions/ya.bash ${PKG_DIR}/usr/share/bash-completion/completions/ya || true
install -Dm644 yazi-cli/completions/_ya     ${PKG_DIR}/usr/share/zsh/site-functions/_ya || true
install -Dm644 yazi-cli/completions/ya.fish ${PKG_DIR}/usr/share/fish/vendor_completions.d/ya.fish || true

# Desktop integration
install -Dm644 assets/yazi.desktop ${PKG_DIR}/usr/share/applications/yazi.desktop || true
install -Dm644 assets/yazi.svg     ${PKG_DIR}/usr/share/icons/hicolor/scalable/apps/yazi.svg || true
'''
