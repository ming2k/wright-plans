name = "wlroots"
version = "0.20.0"
release = 1
description = "Modular Wayland compositor library"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/wlroots/wlroots"

build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/wlroots/wlroots/-/archive/${VERSION}/wlroots-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/wlroots-${VERSION}
meson setup build \
  --prefix=/usr \
  --buildtype=release \
  -Dexamples=false \
  -Dxwayland=disabled
'''

[lifecycle.compile]
script = '''
cd source/wlroots-${VERSION}
ninja -C build
'''

[lifecycle.staging]
script = '''
cd source/wlroots-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install
'''

[[output]]
provides = ["wlroots"]
conflicts = ["wlroots"]

