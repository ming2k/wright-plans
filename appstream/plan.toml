[plan]
name = "appstream"
version = "1.1.2"
release = 10
description = "Tools and libraries to work with AppStream metadata"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Distributions/AppStream/"

[dependencies]
build = ["meson", "ninja", "pkgconf", "gettext", "gobject-introspection", "itstool", "gperf", "bash-completion", "docbook-xsl"]
runtime = ["systemd"]
link = ["glib", "libxml2", "libxmlb", "curl", "libfyaml", "zstd"]

[sources]
uris = ["https://github.com/ximion/appstream/archive/refs/tags/v${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
sanitize_flags() {
    printf "%s" "$1" | sed -E "s/(^|[[:space:]])-I([[:space:]]|$)/ /g; s/[[:space:]]+/ /g; s/^ //; s/ $//"
}
export CPPFLAGS="$(sanitize_flags "${CPPFLAGS:-}")"
export CFLAGS="$(sanitize_flags "${CFLAGS:-}")"
export CXXFLAGS="$(sanitize_flags "${CXXFLAGS:-}")"
meson setup build              \
    --prefix=/usr              \
    --buildtype=release        \
    -Ddocs=false               \
    -Dapidocs=false            \
    -Dstemming=false           \
    -Dsystemd=true             \
    -Dcompose=false            \
    -Dgir=true                 \
    -Dinstall-docs=false       \
    -Dman=false
'''

[lifecycle.compile]
dockyard = "none"
script = '''
sanitize_flags() {
    printf "%s" "$1" | sed -E "s/(^|[[:space:]])-I([[:space:]]|$)/ /g; s/[[:space:]]+/ /g; s/^ //; s/ $//"
}
export CPPFLAGS="$(sanitize_flags "${CPPFLAGS:-}")"
export CFLAGS="$(sanitize_flags "${CFLAGS:-}")"
export CXXFLAGS="$(sanitize_flags "${CXXFLAGS:-}")"
meson compile -C ${BUILD_DIR}/build
'''

[lifecycle.package]
dockyard = "none"
script = '''
meson install -C ${BUILD_DIR}/build --destdir ${PKG_DIR}
'''
