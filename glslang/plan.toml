name = "glslang"
version = "16.3.0"
release = 1
description = "Khronos reference GLSL/ESSL compiler and SPIR-V generator"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/KhronosGroup/glslang"


build_deps = ['cmake']

[[sources]]
type = "http"
sha256 = "efff5a15258dce1ca2d323bf64c974f5fca03778174615dbc30c8d36db645bf5"
url = "https://github.com/KhronosGroup/glslang/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/glslang-${VERSION}
mkdir build && cd build
cmake ..                                \
-DCMAKE_INSTALL_PREFIX=/usr       \
-DCMAKE_BUILD_TYPE=Release        \
-DALLOW_EXTERNAL_SPIRV_TOOLS=ON   \
-DBUILD_SHARED_LIBS=ON'''

[lifecycle.compile]
script = '''
cd source/glslang-${VERSION}/build
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/glslang-${VERSION}/build
make DESTDIR=${STAGING_DIR} install'''

