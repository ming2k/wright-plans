name = "gmp"
version = "6.3.0"
release = 2
description = "GNU Multiple Precision Arithmetic Library"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://gmplib.org/"

[dependencies]
build = ["gcc", "m4", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gmp/gmp-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
sed -i '/long long t1;/,+1s/()/(...)/' configure'''

[lifecycle.configure]
script = '''
unset CFLAGS CXXFLAGS
cd source
./configure --prefix=/usr    \
--enable-cxx     \
--disable-static \
--docdir=/usr/share/doc/gmp-6.3.0'''

[lifecycle.compile]
script = '''
unset CFLAGS CXXFLAGS
cd source
make -j$(nproc)
make html'''

[lifecycle.check]
script = '''
cd source
make check 2>&1 | tee gmp-check-log
awk '/# PASS:/{total+=$3} END{print total}' gmp-check-log'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
make DESTDIR=${PART_DIR} install-html'''
