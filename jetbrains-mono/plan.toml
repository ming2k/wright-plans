name = "jetbrains-mono"
version = "2.304"
release = 2
description = "JetBrains Mono - typeface for developers"
license = "OFL-1.1"
arch = "any"
url = "https://www.jetbrains.com/lp/mono/"

[dependencies]
build = ["libarchive"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/JetBrains/JetBrainsMono/releases/download/v${VERSION}/JetBrainsMono-${VERSION}.zip"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo preparing jetbrains-mono'''

[lifecycle.compile]
script = '''
cd source
rm -rf jbmono
bsdtar xf ${WORKDIR}/JetBrainsMono-${VERSION}.zip -C jbmono'''

[lifecycle.staging]
script = '''
cd source
mkdir -p ${PART_DIR}/usr/share/fonts/jetbrains-mono
find ${WORKDIR}/jbmono -name '*.ttf' -not -name '*NL*' -exec cp {} ${PART_DIR}/usr/share/fonts/jetbrains-mono/ \;'''

[hooks]
post_install = "fc-cache -s 2>/dev/null || true"
post_upgrade = "fc-cache -s 2>/dev/null || true"
