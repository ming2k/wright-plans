[plan]
name = "inetutils"
version = "2.7"
release = 7
description = "A collection of common network programs"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/inetutils/"

[dependencies]
build = ["gcc", "gettext", "make"]
link = ["ncurses", "linux-pam", "readline", "libcap"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/inetutils/inetutils-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure \
  --prefix=/usr \
  --libexec=/usr/bin \
  --sbindir=/usr/bin \
  --localstatedir=/var \
  --sysconfdir=/etc \
  --without-wrap \
  --with-pam \
  --enable-ftp \
  --enable-ftpd \
  --enable-telnet \
  --enable-telnetd \
  --enable-talk \
  --enable-talkd \
  --enable-rlogin \
  --enable-rlogind \
  --enable-rsh \
  --enable-rshd \
  --enable-rcp \
  --enable-hostname \
  --enable-dnsdomainname \
  --disable-rexec \
  --disable-rexecd \
  --disable-tftp \
  --disable-tftpd \
  --disable-ping \
  --disable-ping6 \
  --disable-logger \
  --disable-syslogd \
  --disable-inetd \
  --disable-whois \
  --disable-uucpd \
  --disable-ifconfig \
  --disable-traceroute

# Fix tgetent resolution from ncurses (must run after configure generates config.h)
sed -i '/HAVE_CURSES_TGETENT/c #define HAVE_CURSES_TGETENT 1' config.h
sed -i '/# include <curses.h>/a # include <term.h>' telnet/telnet.c telnetd/utility.c
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

# Remove setuid bits from r-commands (they use PAM, not setuid, for auth)
chmod -s ${PART_DIR}/usr/bin/rcp ${PART_DIR}/usr/bin/rlogin ${PART_DIR}/usr/bin/rsh

# Relocate anything that escaped to /usr/sbin
if [ -d ${PART_DIR}/usr/sbin ]; then
  cp -a ${PART_DIR}/usr/sbin/. ${PART_DIR}/usr/bin/
  rm -rf ${PART_DIR}/usr/sbin
fi
'''
