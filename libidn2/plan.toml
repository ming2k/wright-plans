[plan]
name = "libidn2"
version = "2.3.7"
release = 1
description = "Library for internationalized domain names (IDNA2008/TR46)"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libidn/#libidn2"

[dependencies]
build = ["gcc", "make"]
link = ["libunistring"]
[sources]
uris = ["https://ftp.gnu.org/gnu/libidn/libidn2-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
