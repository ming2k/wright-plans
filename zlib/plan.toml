name = "zlib"
version = "1.3.2"
release = 1
description = "Compression library implementing the deflate format"
license = "Zlib"
arch = "x86_64"
url = "https://zlib.net/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/madler/zlib/releases/download/v${VERSION}/zlib-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/zlib-${VERSION}
./configure --prefix=/usr
make -j$(nproc)
make DESTDIR=${STAGING_DIR} install

# remove static library
rm -f ${STAGING_DIR}/usr/lib/libz.a'''

