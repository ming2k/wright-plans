[plan]
name = "autoconf"
version = "2.72"
release = 1
description = "Package for producing shell scripts that automatically configure software"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/autoconf/"

[dependencies]
build = ["m4", "make", "perl"]
[sources]
uris = ["https://ftp.gnu.org/gnu/autoconf/autoconf-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
