name = "v4l-utils"
version = "1.28.1"
release = 1
description = "Userspace tools and libraries for Video4Linux"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://linuxtv.org/wiki/index.php/V4l-utils"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["systemd", "elfutils", "json-c"]

[[sources]]
sha256 = "SKIP"
url = "https://linuxtv.org/downloads/v4l-utils/v4l-utils-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr                        \
--buildtype=release                  \
-D gconv=disabled                    \
-D v4l2-tracer=disabled              \
-D qv4l2=disabled                    \
-D qvidcap=disabled                  \
-D bpf=disabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install
if [ -d ${PART_DIR}/usr/sbin ]; then
    mv ${PART_DIR}/usr/sbin/* ${PART_DIR}/usr/bin/
    rmdir ${PART_DIR}/usr/sbin
fi'''
