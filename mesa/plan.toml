[plan]
name = "mesa"
version = "26.0.0"
release = 1
description = "Open-source OpenGL and Vulkan drivers"
license = "MIT"
arch = "x86_64"
url = "https://mesa3d.org"

[dependencies]
build = [
    "elfutils",
    "glslang",
    "libclc",
    "llvm",
    "meson",
    "ninja",
    "pkgconf",
    "python-mako",
    "python-pyyaml",
    "spirv-llvm-translator",
    "spirv-tools",
    "wayland-protocols",
]
link = [
    "elfutils",
    "expat",
    "libdisplay-info",
    "libdrm",
    "libglvnd",
    "libunwind",
    "llvm",
    "vulkan-headers",
    "wayland",
    "zlib",
    "zstd",
]

[[sources]]
uri = "https://mesa.freedesktop.org/archive/mesa-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[options]
strip = true

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -D platforms=wayland -D gallium-drivers=iris,crocus,llvmpipe -D vulkan-drivers=intel,intel_hasvk,swrast -D egl=enabled -D gbm=enabled -D gles1=disabled -D gles2=enabled -D glx=disabled -D llvm=enabled -D shared-llvm=enabled -D gallium-va=disabled -D vulkan-layers=device-select,overlay -D video-codecs=all -D valgrind=disabled -D libunwind=enabled
'''

[lifecycle.compile]
script = "ninja -j$(nproc) -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install"
