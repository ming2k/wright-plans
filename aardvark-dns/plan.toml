name = "aardvark-dns"
version = "1.17.1"
release = 1
description = "Authoritative DNS server for container A and AAAA records"
license = "Apache-2.0 AND MIT AND Zlib"
arch = "x86_64"
url = "https://github.com/containers/aardvark-dns"

[dependencies]
build = ["rust", "cargo"]
runtime = ["glibc"]
link = ["glibc"]

[[sources]]
uri = "https://github.com/containers/aardvark-dns/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "25b39bfad079a03862825b2f9db8b71b82fc80aad5552a9c76ea912edc9b889e"

[[sources]]
uri = "https://github.com/containers/aardvark-dns/releases/download/v${PART_VERSION}/aardvark-dns-v${PART_VERSION}-vendor.tar.gz"
sha256 = "009198f042f150d42025c8a0456bb7a98293c9deeb012d37b2d364f44e52288f"

[lifecycle.prepare]
dockyard = "none"
script = '''
cd ${BUILD_DIR}/aardvark-dns-${PART_VERSION}
ln -sfn ../vendor vendor
install -dm755 .cargo
cat > .cargo/config.toml << 'EOF'
[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"
EOF
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}/aardvark-dns-${PART_VERSION}
export CARGO_HOME=${BUILD_DIR}/.cargo-home
export CARGO_TARGET_DIR=${BUILD_DIR}/target

# Use upstream Makefile
make PREFIX=/usr CARGO="cargo --locked --offline" build
'''

[lifecycle.staging]
dockyard = "none"
script = '''
cd ${BUILD_DIR}/aardvark-dns-${PART_VERSION}
make DESTDIR=${PART_DIR} PREFIX=/usr install
'''
