name = "tcpdump"
version = "4.99.6"
release = 1
description = "Command-line packet analyzer"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://www.tcpdump.org/"

[dependencies]
build = ["gcc", "make", "libpcap"]
link = ["libpcap"]

[[sources]]
uri = "https://www.tcpdump.org/release/tcpdump-${VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
