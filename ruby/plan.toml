name = "ruby"
version = "4.0.1"
release = 1
description = "An interpreted object-oriented programming language"
license = "BSD-2-Clause"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["gmp", "libffi", "libyaml", "openssl", "readline", "zlib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.1.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
# --enable-shared: 构建 libruby.so
# --disable-install-doc: 跳过文档安装以节省时间和空间
./configure --prefix=/usr --enable-shared --disable-install-doc --with-openssl-dir=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
