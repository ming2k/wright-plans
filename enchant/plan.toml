name = "enchant"
version = "2.8.15"
release = 1
description = "Generic spell checking library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/AbiWord/enchant"

[dependencies]
build = ["gcc", "groff", "make", "pkgconf"]
link = ["glib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/AbiWord/enchant/releases/download/v${VERSION}/enchant-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --sysconfdir=/etc --disable-static --with-groff'''

[lifecycle.compile]
script = '''
cd source
make'''

[lifecycle.staging]
script = '''
cd source
install -dm755 ${PART_DIR}/usr/lib/enchant-2
make DESTDIR=${PART_DIR} install'''
