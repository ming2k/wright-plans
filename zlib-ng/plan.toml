name = "zlib-ng"
version = "2.3.3"
release = 2
description = "Zlib replacement with optimizations (non-compat build)"
license = "Zlib"
arch = "x86_64"
url = "https://github.com/zlib-ng/zlib-ng"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -S ${WORKDIR} -B ${WORKDIR}/build -G Ninja \
  -DCMAKE_BUILD_TYPE=None \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DWITH_GTEST=OFF \
  -DBUILD_SHARED_LIBS=ON'''

[lifecycle.compile]
script = '''
cd source
cmake --build ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} cmake --install ${WORKDIR}/build
install -Dm 644 ${WORKDIR}/LICENSE.md ${PART_DIR}/usr/share/licenses/zlib-ng/LICENSE.md
install -Dm 644 ${WORKDIR}/README.md ${PART_DIR}/usr/share/doc/zlib-ng/README.md'''
