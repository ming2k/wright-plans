name = "ostree"
version = "2026.1"
release = 2
description = "Operating system and container binary deployment and upgrades"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://ostreedev.github.io/ostree/"

link_deps = ['glib', 'libarchive', 'curl', 'gpgme']

[[sources]]
type = "http"
sha256 = "8e77c285dd6fa5ec5fb063130390977be727fe11107335ed8778a40385069e95"
url = "https://github.com/ostreedev/ostree/releases/download/v${VERSION}/libostree-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libostree-${VERSION}
./configure --prefix=/usr       \
    --disable-static            \
    --with-curl                 \
    --without-soup              \
    --without-soup3             \
    --disable-man               \
    --disable-gtk-doc           \
    --with-gpgme                \
    --sysconfdir=/etc            \
    --disable-otmpfile          \
    --with-builtin-grub2-mkconfig'''

[pipeline.compile]
script = '''
cd source/libostree-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libostree-${VERSION}
DESTDIR=${STAGING_DIR} make install'''

[[output]]
runtime_deps = ['systemd', 'glib', 'libarchive', 'curl', 'gpgme']
