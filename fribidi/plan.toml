name = "fribidi"
version = "1.0.16"
release = 1
description = "Unicode Bidirectional Algorithm library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/fribidi/fribidi"

build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/fribidi/fribidi/releases/download/v${VERSION}/fribidi-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/fribidi-${VERSION}
meson setup build \
--prefix=/usr          \
--buildtype=release'''

[lifecycle.compile]
script = '''
cd source/fribidi-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/fribidi-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''
