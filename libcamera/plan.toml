name = "libcamera"
version = "0.7.1"
release = 1
description = "Linux camera stack and framework"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://libcamera.org"

link_deps = ['gnutls', 'libevent', 'libyaml', 'systemd', 'gstreamer', 'v4l-utils']
build_deps = ['meson', 'ninja']

[[sources]]
type = "git"
url = "https://github.com/libcamera-org/libcamera.git"
ref = "v${VERSION}"
extract_to = "source"

[lifecycle.configure]
isolation = "relaxed"
script = '''
cd source
export CXXFLAGS="${CXXFLAGS:-} -Wno-error=array-bounds"
meson setup build \
--prefix=/usr                        \
--buildtype=release                  \
-D documentation=disabled            \
-D test=false                        \
-D qcam=disabled                     \
-D pycamera=disabled                 \
-D gstreamer=enabled                 \
-D v4l2=enabled                      \
-D udev=enabled                      \
-D cam=enabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['gnutls', 'libevent', 'libyaml', 'systemd', 'gstreamer', 'v4l-utils']
