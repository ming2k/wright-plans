name = "glib"
version = "2.86.5"
release = 1
description = "Core application building blocks library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.gtk.org/"

[dependencies]
build = [
    "bash",
    "python",
    "meson",
    "ninja",
    "pkgconf",
]
link = ["libffi", "pcre2"]

[[sources]]
uri = "https://download.gnome.org/sources/glib/2.86/glib-${VERSION}.tar.xz"
sha256 = "ce85a947bb8b3c0204dbeff79aec39bcb46371c6fafb64ba5b8726c71e038d5f"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared -Dtests=false -Dinstalled_tests=false

'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} meson install -C ${BUILD_DIR}/build"

[lifecycle.fabricate]
