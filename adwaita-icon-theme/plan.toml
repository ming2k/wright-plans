[plan]
name = "adwaita-icon-theme"
version = "48.1"
release = 1
description = "Adwaita icon theme"
license = "LGPL-3.0-or-later"
arch = "any"
url = "https://gitlab.gnome.org/GNOME/adwaita-icon-theme"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
runtime = ["hicolor-icon-theme"]

[sources]
uris = ["https://download.gnome.org/sources/adwaita-icon-theme/48/adwaita-icon-theme-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release
'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build"

[lifecycle.package]
script = "meson install -C ${BUILD_DIR}/build --destdir ${PKG_DIR}"

[install_scripts]
post_install = '''
gtk-update-icon-cache -qtf /usr/share/icons/Adwaita 2>/dev/null || true
gtk-update-icon-cache -qtf /usr/share/icons/hicolor 2>/dev/null || true
'''
post_upgrade = '''
gtk-update-icon-cache -qtf /usr/share/icons/Adwaita 2>/dev/null || true
gtk-update-icon-cache -qtf /usr/share/icons/hicolor 2>/dev/null || true
'''
