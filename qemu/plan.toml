name = "qemu"
version = "10.2.2"
release = 1
description = "Machine emulator and virtualizer"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.qemu.org/"

[dependencies]
runtime = ["seabios"]
build = ["bash", "python", "python-distlib", "perl", "meson", "ninja", "pkgconf"]
link = ["glib", "pixman", "zlib", "libslirp", "dtc", "spice"]

[[sources]]
sha256 = "SKIP"
url = "https://download.qemu.org/qemu-${VERSION}.tar.xz"
extract_to = "source"

[options]
timeout = 14400

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var --target-list=x86_64-softmmu --python=/usr/bin/python3 --disable-download --enable-fdt=system --audio-drv-list= --enable-slirp --enable-spice --disable-docs --disable-werror'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
