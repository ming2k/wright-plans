name = "potrace"
version = "1.16"
release = 2
description = "Utility for tracing bitmaps into vector graphics"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://potrace.sourceforge.net/"

[dependencies]
build = ["gcc", "make", "autoconf", "automake", "zlib"]
runtime = ["zlib"]
link = ["zlib"]

[[sources]]
type = "http"
sha256 = "be8248a17dedd6ccbaab2fcc45835bb0502d062e40fbded3bc56028ce5eb7acc"
url = "https://potrace.sourceforge.net/download/1.16/potrace-1.16.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "lto.patch"

[lifecycle.prepare]
script = '''
cd source
patch -Np1 < ${WORKDIR}/lto.patch
autoreconf -fiv'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --mandir=/usr/share/man --with-libpotrace'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
