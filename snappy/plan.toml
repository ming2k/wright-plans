[plan]
name = "snappy"
version = "1.2.2"
release = 1
description = "Fast compressor/decompressor library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/snappy"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
uri = "https://github.com/google/snappy/archive/refs/tags/${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DSNAPPY_BUILD_TESTS=OFF \
    -DSNAPPY_BUILD_BENCHMARKS=OFF
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"
