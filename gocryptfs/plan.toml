name = "gocryptfs"
version = "2.6.1"
release = 1
description = "Encrypted overlay filesystem written in Go"
license = "MIT"
arch = "x86_64"
url = "https://github.com/rfjakob/gocryptfs"

[dependencies]
runtime = ["libfuse3"]
build = ["go", "openssl", "pkgconf"]
link = ["openssl"]

[[sources]]
uri = "git+https://github.com/rfjakob/gocryptfs.git#v${PART_VERSION}"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
CGO_ENABLED=1 go build \
    -trimpath \
    -buildmode=pie \
    -ldflags "-X main.GitVersion=v${PART_VERSION} -X main.BuildDate=unknown" \
    -o gocryptfs .
CGO_ENABLED=1 go build \
    -trimpath \
    -o gocryptfs-xray ./gocryptfs-xray

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 gocryptfs ${PART_DIR}/usr/bin/gocryptfs
install -Dm755 gocryptfs-xray/gocryptfs-xray ${PART_DIR}/usr/bin/gocryptfs-xray

'''

[lifecycle.fabricate]
