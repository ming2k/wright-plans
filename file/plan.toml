name = "file"
version = "5.47"
release = 1
description = "Utility for determining the type of a given file using magic number recognition"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.darwinsys.com/file/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://astron.com/pub/file/file-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.check]
script = '''
cd source
make check'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
