name = "gobject-introspection"
version = "1.86.0"
release = 1
description = "Introspection system for GObject-based libraries"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://gi.readthedocs.io/"

link_deps = ['glib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/gobject-introspection/1.86/gobject-introspection-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gobject-introspection-${VERSION}
meson setup build        \
--prefix=/usr            \
--buildtype=release'''

[pipeline.compile]
script = '''
cd source/gobject-introspection-${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/gobject-introspection-${VERSION}
meson install -C build --destdir ${STAGING_DIR}'''

[[output]]
runtime_deps = ['python', 'glib']
