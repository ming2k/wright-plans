name = "xdg-desktop-portal-gtk"
version = "1.15.3"
release = 2
description = "GTK backend for xdg-desktop-portal"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/flatpak/xdg-desktop-portal-gtk"

link_deps = ['gtk3', 'gsettings-desktop-schemas']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/flatpak/xdg-desktop-portal-gtk/releases/download/${VERSION}/xdg-desktop-portal-gtk-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/xdg-desktop-portal-gtk-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Dwallpaper=disabled'''

[lifecycle.compile]
script = '''
cd source/xdg-desktop-portal-gtk-${VERSION}
ninja -C build'''

[lifecycle.staging]
script = '''
cd source/xdg-desktop-portal-gtk-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['dbus', 'xdg-desktop-portal', 'gtk3', 'gsettings-desktop-schemas']
