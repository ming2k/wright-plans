name = "niri"
version = "25.11"
release = 3
description = "Scrollable-tiling Wayland compositor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/YaLTeR/niri"

[dependencies]
runtime = [
    "seatd",
    "pipewire",
    "xdg-desktop-portal",
    "xdg-desktop-portal-gtk",
    "xdg-desktop-portal-wlr",
]
build = ["cargo", "pkgconf", "rust"]
link = [
    "cairo",
    "glib",
    "libinput",
    "mesa",
    "pango",
    "pipewire",
    "seatd",
    "systemd",
    "wayland",
    "libxkbcommon",
]

[[sources]]
uri = "https://github.com/YaLTeR/niri/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "patches/0001-default-xwayland-satellite-off.patch"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
# Pure Wayland system policy: default xwayland-satellite to off so niri never
# tries to spawn it when the user has no config override. Opt-in stays one-line
# for users who still want X11: `xwayland-satellite { on; }`.
patch -Np1 < ${FILES_DIR}/0001-default-xwayland-satellite-off.patch

'''

[lifecycle.configure]
script = '''
echo "cargo project, no configure step"

'''

[lifecycle.compile]
dockyard = "relaxed"
env = { CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target" }
script = '''
cd ${BUILD_DIR}
cargo build --release --no-default-features --features systemd --locked

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
mkdir -p ${PART_DIR}/usr/bin
cp target/release/niri ${PART_DIR}/usr/bin/
mkdir -p ${PART_DIR}/usr/share/wayland-sessions
cp resources/niri.desktop ${PART_DIR}/usr/share/wayland-sessions/
mkdir -p ${PART_DIR}/usr/lib/systemd/user
cp resources/niri.service ${PART_DIR}/usr/lib/systemd/user/
cp resources/niri-shutdown.target ${PART_DIR}/usr/lib/systemd/user/
install -Dm755 resources/niri-session ${PART_DIR}/usr/bin/niri-session

'''

[lifecycle.fabricate]
