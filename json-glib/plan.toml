name = "json-glib"
version = "1.10.8"
release = 2
description = "JSON parser/generator for GLib"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://wiki.gnome.org/Projects/JsonGlib"

[dependencies]
build = ["meson", "ninja", "pkgconf", "gobject-introspection"]
link = ["glib"]

[[sources]]
sha256 = "SKIP"
url = "https://download.gnome.org/sources/json-glib/1.10/json-glib-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
    --prefix=/usr             \
    --buildtype=release       \
    -Dtests=false             \
    -Dintrospection=enabled   \
    -Dman=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
