name = "gettext"
version = "1.0"
release = 1
description = "Utilities for internationalization and localization"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gettext/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/gettext/gettext-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr    \
            --disable-static \
            --docdir=/usr/share/doc/gettext-${PART_VERSION}

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
chmod -v 0755 ${PART_DIR}/usr/lib/preloadable_libintl.so

'''
