name = "cairo"
version = "1.18.4"
release = 1
description = "Multi-platform 2D graphics library (X11 backends disabled)"
license = "LGPL-2.1-only OR MPL-1.1"
arch = "x86_64"
url = "https://cairographics.org/"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = [
    "pixman",
    "libpng",
    "fontconfig",
    "freetype",
    "glib",
    "zlib",
]

[[sources]]
uri = "https://cairographics.org/releases/cairo-${PART_VERSION}.tar.xz"
sha256 = "445ed8208a6e4823de1226a74ca319d3600e83f6369f99b14265006599c32ccb"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr            \
    --buildtype=release      \
    --wrap-mode=nofallback   \
    -Ddefault_library=shared \
    -Dpng=enabled            \
    -Dzlib=enabled           \
    -Dfontconfig=enabled     \
    -Dfreetype=enabled       \
    -Dglib=enabled           \
    -Dxcb=disabled           \
    -Dxlib=disabled          \
    -Dxlib-xcb=disabled      \
    -Dtests=disabled         \
    -Dsymbol-lookup=disabled \
    -Dspectre=disabled       \
    -Dlzo=disabled

'''

[lifecycle.compile]
script = "cd ${BUILD_DIR} && meson compile -C build"

[lifecycle.staging]
script = "cd ${BUILD_DIR} && meson install -C build --destdir ${PART_DIR}"

[lifecycle.fabricate]
