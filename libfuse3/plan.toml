name = "libfuse3"
version = "3.18.1"
release = 6
description = "Filesystem in Userspace"
license = "GPL-2.0-only AND LGPL-2.1-only"
arch = "x86_64"
url = "https://github.com/libfuse/libfuse"

build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/libfuse/libfuse/releases/download/fuse-${VERSION}/fuse-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/fuse-${VERSION}
meson setup build \
  --prefix=/usr          \
  --sbindir=/usr/bin     \
  --buildtype=release    \
  -D tests=false         \
  -D examples=false      \
  -D useroot=false'''

[lifecycle.compile]
script = '''
ninja -C source/fuse-${VERSION}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
DESTDIR=${STAGING_DIR} ninja -C source/fuse-${VERSION}/build install

# Remove legacy init scripts and static device nodes (handled by udev)
rm -rf ${STAGING_DIR}/etc/init.d ${STAGING_DIR}/dev 2>/dev/null || true

# Allow non-root users to mount FUSE filesystems via fusermount3
chmod u+s ${STAGING_DIR}/usr/bin/fusermount3'''

[[output]]
backup = ["/etc/fuse.conf"]
