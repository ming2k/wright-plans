name = "libxkbcommon"
version = "1.13.1"
release = 2
description = "Keymap handling library (Wayland Only)"
license = "MIT"
arch = "x86_64"

link_deps = ['libxml2', 'wayland', 'xkeyboard-config']
build_deps = ['bison', 'meson', 'ninja', 'pkgconf', 'wayland-protocols']

[[sources]]
type = "http"
sha256 = "aeb951964c2f7ecc08174cb5517962d157595e9e3f38fc4a130b91dc2f9fec18"
url = "https://github.com/xkbcommon/libxkbcommon/archive/refs/tags/xkbcommon-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libxkbcommon-xkbcommon-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Denable-x11=false -Denable-wayland=true -Denable-docs=false'''

[pipeline.compile]
script = '''
cd source/libxkbcommon-xkbcommon-${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/libxkbcommon-xkbcommon-${VERSION}
DESTDIR=${STAGING_DIR} meson install -C build'''

[[output]]
runtime_deps = ['libxml2', 'wayland', 'xkeyboard-config']
