[plan]
name = "setuptools-scm"
version = "9.2.2"
release = 1
description = "Handles managing Python package versions from SCM metadata"
license = "MIT"
arch = "x86_64"
url = "https://github.com/pypa/setuptools-scm"

[dependencies]
runtime = ["python", "setuptools", "python-packaging"]
build = ["python", "setuptools"]

[[sources]]
uri = "https://pypi.org/packages/source/s/setuptools_scm/setuptools_scm-${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
SETUPTOOLS_SCM_PRETEND_VERSION=${PKG_VERSION} pip3 install --no-index --no-user --no-deps --root=${PKG_DIR} --no-build-isolation .
'''
