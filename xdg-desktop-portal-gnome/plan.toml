name = "xdg-desktop-portal-gnome"
version = "49.0"
release = 1
description = "GNOME backend for xdg-desktop-portal"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/xdg-desktop-portal-gnome"

[dependencies]
runtime = ["gnome-desktop", "gsettings-desktop-schemas", "xdg-desktop-portal"]
build = [
    "meson",
    "ninja",
    "pkgconf",
    "xdg-desktop-portal",
]
link = ["gtk4", "libadwaita"]

[[sources]]
uri = "https://download.gnome.org/sources/xdg-desktop-portal-gnome/49/xdg-desktop-portal-gnome-${VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dsystemduserunitdir=/usr/lib/systemd/user

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[hooks]
post_install = "glib-compile-schemas /usr/share/glib-2.0/schemas 2>/dev/null || true"

[lifecycle.fabricate]
