name = "xdg-user-dirs"
version = "0.20"
release = 1
description = "Tool to help manage standard user directories"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/xdg/xdg-user-dirs"

[dependencies]
build = ["gcc", "gettext", "meson", "ninja", "pkgconf", "docbook-xsl", "libxslt"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/xdg/xdg-user-dirs/-/archive/v${VERSION}/xdg-user-dirs-v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release'''

[lifecycle.compile]
script = '''
cd source
meson compile -C build'''

[lifecycle.staging]
script = '''
cd source
meson install -C build --destdir ${PART_DIR}'''
