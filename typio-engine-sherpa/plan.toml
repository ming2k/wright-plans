name = "typio-engine-sherpa"
version = "0.2.2"
release = 1
description = "Speech-to-text voice engine for the Typio input method framework, powered by sherpa-onnx"
license = "MIT"
arch = "x86_64"
url = "https://github.com/typio-ime/typio-engine-sherpa"

build_deps = ['meson', 'ninja', 'pkgconf']
link_deps = ['libtypio', 'sherpa-onnx', 'curl']

[[sources]]
type = "git"
url = "https://github.com/typio-ime/typio-engine-sherpa.git"
ref = "v${VERSION}"
extract_to = "source"

[pipeline.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release'''

[pipeline.compile]
script = '''
cd source
ninja -C build'''

[pipeline.staging]
script = '''
: "${STAGING_DIR:?STAGING_DIR is required}"
cd source
meson install -C build --destdir "$STAGING_DIR"
# v0.2.0+ ships a private worker executable + runtime manifest (the
# engine-process model), not a cdylib plugin.
test -x "$STAGING_DIR/usr/libexec/typio/engines/typio-engine-sherpa"
test -f "$STAGING_DIR/usr/share/typio/engines/typio-engine-sherpa.toml"
test -f "$STAGING_DIR/usr/share/icons/hicolor/scalable/apps/typio-sherpa-symbolic.svg"'''

[[output]]
name = "typio-engine-sherpa"
runtime_deps = ['libtypio', 'sherpa-onnx', 'curl']
