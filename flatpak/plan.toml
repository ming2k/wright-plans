name = "flatpak"
version = "1.16.6"
release = 1
description = "Universal app distribution framework (Pure Wayland)"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://flatpak.org"

link_deps = ['glib:default', 'libarchive:default', 'libxml2:default', 'ostree:default', 'polkit:default', 'json-glib:default', 'curl:default', 'appstream:default', 'gdk-pixbuf:default', 'libjpeg-turbo:default', 'libfuse3:default', 'gpgme:default', 'libseccomp:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/flatpak/flatpak/releases/download/${VERSION}/flatpak-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    -Dsystem_bubblewrap=/usr/bin/bwrap \
    -Dsystem_dbus_proxy=/usr/bin/xdg-dbus-proxy \
    -Dsystemd=enabled \
    -Ddbus_config_dir=/usr/share/dbus-1/system.d \
    -Dselinux_module=disabled \
    -Dman=disabled \
    -Ddocbook_docs=disabled \
    -Dxauth=disabled \
    -Dgtkdoc=disabled \
    -Dtests=false \
    -Dinstalled_tests=false'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
meson install -C ${WORKDIR}/build --destdir ${STAGING_DIR}
mkdir -p ${STAGING_DIR}/var/lib/flatpak'''

[hooks]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/flatpak.conf 2>/dev/null || true
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
update-mime-database /usr/share/mime 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
post_upgrade = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/flatpak.conf 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
update-mime-database /usr/share/mime 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''

[output]
runtime_deps = ['ca-certificates:default', 'dbus:default', 'systemd:default', 'xdg-desktop-portal:default', 'xdg-desktop-portal-gtk:default', 'shared-mime-info:default', 'desktop-file-utils:default']
