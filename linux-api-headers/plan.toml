name = "linux-api-headers"
version = "6.18.26"
release = 1
description = "Sanitized Linux kernel headers for userspace"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://www.kernel.org"


[[sources]]
type = "http"
sha256 = "53772f5d3776e043767c8d81a32240d1f3eb64e822a5d7a510b55ca40707b0ec"
url = "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/linux-api-headers-${VERSION}
echo preparing linux-api-headers'''

[lifecycle.compile]
script = '''
cd source/linux-api-headers-${VERSION}
echo no compile stage for linux-api-headers'''

[lifecycle.staging]
script = '''
cd source/linux-${VERSION}
make mrproper
make headers
find usr/include -name '.*' -delete
rm -f usr/include/Makefile
install -d ${STAGING_DIR}/usr
cp -a usr/include ${STAGING_DIR}/usr/
# Remove any stray files that leak into ${STAGING_DIR}
find ${STAGING_DIR} -maxdepth 2 -name '*.pl' -delete'''
