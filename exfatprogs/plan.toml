name = "exfatprogs"
version = "1.3.2"
release = 1
description = "exFAT filesystem utilities: mkfs.exfat, fsck.exfat"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/exfatprogs/exfatprogs"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/exfatprogs/exfatprogs/releases/download/${VERSION}/exfatprogs-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/exfatprogs-${VERSION}
./configure --prefix=/usr --sbindir=/usr/bin --disable-static'''

[lifecycle.compile]
script = '''
cd source/exfatprogs-${VERSION}
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source/exfatprogs-${VERSION}
make DESTDIR=${STAGING_DIR} install -C ${WORKDIR}'''
