name = "llama.cpp"
version = "b8693"
release = 3
description = "LLM inference in C/C++"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ggml-org/llama.cpp"

[dependencies]
build = ["gcc", "cmake", "ninja", "pkgconf", "shaderc", "vulkan-headers"]
link = ["openssl", "vulkan-loader"]

[[sources]]
type = "local"
path = "patches/0001-disable-spirv-opt-for-iq1_m-get_rows-vulkan-shaders.patch"

[[sources]]
sha256 = "SKIP"
url = "https://github.com/ggml-org/llama.cpp/archive/refs/tags/${VERSION}.tar.gz"

[lifecycle.prepare]
script = '''
cd source
patch -Np1 < ${WORKDIR}/0001-disable-spirv-opt-for-iq1_m-get_rows-vulkan-shaders.patch || true'''

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr/lib/llama.cpp \
  -DBUILD_SHARED_LIBS=OFF \
  -DGGML_NATIVE=OFF \
  -DGGML_VULKAN=ON \
  -DLLAMA_OPENSSL=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''

[lifecycle.fabricate]
script = '''
mkdir -p ${PART_DIR}/usr/bin
for bin in ${PART_DIR}/usr/lib/llama.cpp/bin/*; do
  ln -sf /usr/lib/llama.cpp/bin/$(basename "$bin") ${PART_DIR}/usr/bin/$(basename "$bin")
done

mkdir -p ${PART_DIR}/usr/lib/pkgconfig
ln -sf /usr/lib/llama.cpp/lib/pkgconfig/llama.pc ${PART_DIR}/usr/lib/pkgconfig/llama.pc'''
