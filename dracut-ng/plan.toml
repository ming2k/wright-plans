name = "dracut-ng"
version = "110"
release = 1
description = "Event-driven initramfs infrastructure with UKI support"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/dracut-ng/dracut-ng"

[dependencies]
runtime = [
    "bash",
    "coreutils",
    "cpio",
    "kmod",
    "systemd",
    "util-linux",
]
build = [
    "gcc",
    "make",
    "pkgconf",
    "kmod",
]

[[sources]]
uri = "https://github.com/dracut-ng/dracut-ng/archive/${PART_VERSION}/dracut-ng-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure \
  --prefix=/usr \
  --libdir=/usr/lib \
  --sysconfdir=/etc \
  --sbindir=/usr/bin \
  --systemdsystemunitdir=/usr/lib/systemd/system \
  --disable-documentation

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
