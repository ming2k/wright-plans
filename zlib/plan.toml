[plan]
name = "zlib"
version = "1.3.1"
release = 1
description = "Compression library implementing the deflate format"
license = "Zlib"
arch = "x86_64"
url = "https://zlib.net/"

[dependencies]
build = ["bash", "gcc", "make"]

[[sources]]
uri = "https://zlib.net/zlib-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
./configure --prefix=/usr
"""

[lifecycle.compile]
script = """
cd ${BUILD_DIR}
make -j$(nproc)
"""

[lifecycle.staging]
script = """
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
"""

