[plan]
name = "protobuf"
version = "34.0"
release = 1
description = "Protocol Buffers - Google's data interchange format"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/protocolbuffers/protobuf"

[dependencies]
build = ["cmake", "ninja"]
link = ["abseil-cpp"]

[[sources]]
uri = "https://github.com/protocolbuffers/protobuf/archive/refs/tags/v${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cmake -B ${BUILD_DIR}/build -S ${BUILD_DIR} -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DBUILD_SHARED_LIBS=ON \
  -Dprotobuf_BUILD_TESTS=OFF \
  -Dprotobuf_ABSL_PROVIDER=package \
  -Dprotobuf_BUILD_PROTOC_BINARIES=ON
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install"
