name = "python-sphinx"
version = "9.1.0"
release = 1
description = "Python documentation generator"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.sphinx-doc.org/"

[dependencies]
runtime = [
    "python",
    "python-jinja2",
    "python-pygments",
    "python-docutils",
    "python-babel",
    "python-alabaster",
    "python-requests",
    "python-packaging",
    "sphinxcontrib-applehelp",
    "sphinxcontrib-devhelp",
    "sphinxcontrib-htmlhelp",
    "sphinxcontrib-jsmath",
    "sphinxcontrib-qthelp",
    "sphinxcontrib-serializinghtml",
]
build = ["python", "flit-core"]

[[sources]]
uri = "https://pypi.org/packages/source/s/sphinx/sphinx-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .

'''

[lifecycle.fabricate]
