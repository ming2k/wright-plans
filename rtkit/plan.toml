name = "rtkit"
version = "0.14"
release = 5
description = "Realtime Policy and Watchdog Daemon"
license = "GPL-3.0-or-later AND MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/pipewire/rtkit"

[dependencies]
build = ["gcc", "meson", "ninja", "pkgconf", "vim"]
link = ["dbus", "libcap", "polkit", "systemd"]

[[sources]]
type = "git"
url = "https://gitlab.freedesktop.org/pipewire/rtkit.git"
ref = "v${VERSION}"

[lifecycle.configure]
script = '''
meson setup ${WORKDIR}/build ${WORKDIR} \
  --prefix=/usr \
  --sbindir=/usr/bin \
  --buildtype=release \
  -D installed_tests=false'''

[lifecycle.compile]
script = "meson compile -C ${WORKDIR}/build -j$(nproc)"

[lifecycle.staging]
script = '''
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build

install -Dm644 ${WORKDIR}/LICENSE -t ${PART_DIR}/usr/share/licenses/rtkit/
sed -n '4,25p' ${WORKDIR}/rtkit.c |
  install -Dm644 /dev/stdin ${PART_DIR}/usr/share/licenses/rtkit/LICENSE.MIT

if [ -d ${PART_DIR}/usr/sbin ]; then
  cp -a ${PART_DIR}/usr/sbin/. ${PART_DIR}/usr/bin/
  rm -rf ${PART_DIR}/usr/sbin
fi'''

[hooks]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/rtkit.conf
systemctl daemon-reload
systemctl enable --now rtkit-daemon.service

'''
post_upgrade = '''
systemd-sysusers /usr/lib/sysusers.d/rtkit.conf
systemctl daemon-reload
systemctl restart rtkit-daemon.service

'''
