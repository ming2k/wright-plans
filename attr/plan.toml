name = "attr"
version = "2.5.2"
release = 1
description = "Utilities to administer the extended attributes of filesystem objects"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://savannah.nongnu.org/projects/attr"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://download.savannah.gnu.org/releases/attr/attr-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr     \
--disable-static  \
--sysconfdir=/etc \
--docdir=/usr/share/doc/attr-2.5.2

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make check

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
