name = "libpsl"
version = "0.21.5"
release = 1
description = "Library for accessing the Public Suffix List"
license = "MIT"
arch = "x86_64"
url = "https://github.com/rockdaboot/libpsl"

link_deps = ['libidn2', 'libunistring']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/rockdaboot/libpsl/releases/download/${VERSION}/libpsl-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libpsl-${VERSION}
meson setup build \
--prefix=/usr         \
--buildtype=release'''

[lifecycle.compile]
script = '''
cd source/libpsl-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/libpsl-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['libidn2', 'libunistring']
