[plan]
name = "libxmlb"
version = "0.3.21"
release = 1
description = "Library to help create and query binary XML blobs"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/hughsie/libxmlb"

[[sources]]
uri = "https://github.com/hughsie/libxmlb/releases/download/${PART_VERSION}/libxmlb-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr          \
--buildtype=release    \
-D tests=false         \
-D introspection=false \
-D gtkdoc=false
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"
