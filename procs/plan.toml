name = "procs"
version = "0.14.11"
release = 1
description = "A modern replacement for ps written in Rust"
license = "MIT"
arch = "x86_64"
url = "https://github.com/dalance/procs"

[dependencies]
build = ["rust"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/dalance/procs/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
dockyard = "relaxed"
env = {'CARGO_HOME': '${BUILD_DIR}/.cargo', 'CARGO_TARGET_DIR': '${BUILD_DIR}/target'}
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/procs ${PART_DIR}/usr/bin/procs'''
