name = "go"
version = "1.26.3"
release = 1
description = "The Go programming language"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://go.dev"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://go.dev/dl/go${VERSION}.src.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "none"
env = { GOROOT_BOOTSTRAP = '/usr/lib/go-bootstrap', GOOS = 'linux', GOARCH = 'amd64', CGO_ENABLED = '1' }
script = '''
cd source/go/src
./make.bash'''

[pipeline.staging]
isolation = "none"
script = '''
mkdir -p ${STAGING_DIR}/usr/lib
cp -a source/go ${STAGING_DIR}/usr/lib/go

# Cleanup things we don't want to distribute
rm -rf ${STAGING_DIR}/usr/lib/go/pkg/obj
rm -rf ${STAGING_DIR}/usr/lib/go/pkg/bootstrap
rm -rf ${STAGING_DIR}/usr/lib/go/pkg/linux_amd64/cmd

mkdir -p ${STAGING_DIR}/usr/bin
ln -sf ../lib/go/bin/go ${STAGING_DIR}/usr/bin/go
ln -sf ../lib/go/bin/gofmt ${STAGING_DIR}/usr/bin/gofmt'''

[[output]]
runtime_deps = ['glibc']
