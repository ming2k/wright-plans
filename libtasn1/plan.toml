name = "libtasn1"
version = "4.21.0"
release = 1
description = "ASN.1 library used by GnuTLS"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libtasn1/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/libtasn1/libtasn1-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libtasn1-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libtasn1-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libtasn1-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

