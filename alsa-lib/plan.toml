name = "alsa-lib"
version = "1.2.15.3"
release = 1
description = "ALSA library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.alsa-project.org"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.alsa-project.org/files/pub/lib/alsa-lib-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/alsa-lib-${VERSION}
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source/alsa-lib-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/alsa-lib-${VERSION}
DESTDIR=${STAGING_DIR} make install'''
