name = "gpgme"
version = "2.0.1"
release = 2
description = "GnuPG Made Easy"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gnupg.org/software/gpgme/"

link_deps = ['libassuan', 'libgpg-error', 'gnupg']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gnupg.org/ftp/gcrypt/gpgme/gpgme-${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gpgme-${VERSION}
./configure \
    --prefix=/usr \
    --disable-static \
    --disable-gpg-test'''

[pipeline.compile]
script = '''
cd source/gpgme-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gpgme-${VERSION}
DESTDIR=${STAGING_DIR} make install'''

[[output]]
runtime_deps = ['libassuan', 'libgpg-error', 'gnupg']
