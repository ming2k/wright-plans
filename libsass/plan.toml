[plan]
name = "libsass"
version = "3.6.6"
release = 1
description = "C implementation of a Sass compiler"
license = "MIT"
arch = "x86_64"
url = "https://github.com/sass/libsass"

[dependencies]
build = ["autoconf", "automake", "gcc", "libtool", "make"]

[[sources]]
uri = "https://github.com/sass/libsass/archive/${PKG_VERSION}/libsass-${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
autoreconf -fi
./configure --prefix=/usr --disable-static
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
