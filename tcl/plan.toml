name = "tcl"
version = "8.6.17"
release = 1
description = "Tool Command Language - robust general-purpose scripting language"
license = "TCL"
arch = "x86_64"
url = "https://www.tcl.tk/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://downloads.sourceforge.net/project/tcl/Tcl/${PART_VERSION}/tcl${PART_VERSION}-src.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}/unix
./configure --prefix=/usr           \
            --mandir=/usr/share/man \
            --disable-rpath

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/unix
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/unix
make DESTDIR=${PART_DIR} install
make DESTDIR=${PART_DIR} install-private-headers

ln -sfv tclsh8.6 ${PART_DIR}/usr/bin/tclsh
mv ${PART_DIR}/usr/share/man/man3/{Thread,Tcl_Thread}.3

'''

[lifecycle.fabricate]
