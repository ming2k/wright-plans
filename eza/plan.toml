name = "eza"
version = "0.23.4"
release = 1
description = "A modern, maintained replacement for ls"
license = "MIT"
arch = "x86_64"
url = "https://github.com/eza-community/eza"

[dependencies]
build = ["rust"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/eza-community/eza/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${BUILD_DIR}/.cargo', CARGO_TARGET_DIR = '${BUILD_DIR}/target' }
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/eza ${PART_DIR}/usr/bin/eza'''
