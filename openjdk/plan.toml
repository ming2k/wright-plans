name = "openjdk"
version = "21.0.7+6"
release = 1
description = "Eclipse Temurin OpenJDK 21 LTS Runtime"
license = "GPL-2.0-with-classpath-exception"
arch = "x86_64"
url = "https://adoptium.net"

[[sources]]
uri = "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.7%2B6/OpenJDK21U-jdk_x64_linux_hotspot_21.0.7_6.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}

install -dm755 ${PART_DIR}/usr/lib/jvm/java-21-openjdk
cp -a . ${PART_DIR}/usr/lib/jvm/java-21-openjdk/

install -dm755 ${PART_DIR}/usr/bin
for bin in java javac jar jlink jmod keytool; do
  ln -sf ../lib/jvm/java-21-openjdk/bin/$bin ${PART_DIR}/usr/bin/$bin
done

install -dm755 ${PART_DIR}/etc/profile.d
cat > ${PART_DIR}/etc/profile.d/jdk.sh << 'PROF'
export JAVA_HOME=/usr/lib/jvm/java-21-openjdk
PROF
'''

[output]
provides = ["java", "jdk"]
backup = ["/etc/profile.d/jdk.sh"]
