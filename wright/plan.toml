[plan]
name = "wright"
version = "1.2.0"
release = 2
description = "Declarative, extensible, sandboxed Linux package manager"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ming2k/wright"

[dependencies]
build = ["rust", "cargo"]

[sources]
uris = ["https://github.com/ming2k/wright/archive/refs/tags/v${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
export CARGO_HOME=${BUILD_DIR}/.cargo
cargo build --release
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/wright ${PKG_DIR}/usr/bin/wright
install -Dm755 target/release/wbuild ${PKG_DIR}/usr/bin/wbuild

# Skeleton plan for new packages
install -dm755 ${PKG_DIR}/usr/share/wright/skel
cat > ${PKG_DIR}/usr/share/wright/skel/plan.toml << 'EOF'
[plan]
name = "pkgname"
version = "1.0.0"
release = 1
description = ""
license = "MIT"
arch = "x86_64"
url = ""

[dependencies]
build = []
link = []
runtime = []

[sources]
uris = ["https://example.com/pkgname-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
./configure --prefix=/usr
"""

[lifecycle.compile]
script = """
cd ${BUILD_DIR}
make -j$(nproc)
"""

[lifecycle.package]
script = """
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
"""
EOF

# Plans workspace — created here so permissions are managed by the package
install -dm755 ${PKG_DIR}/var/lib/wright/plans
'''

[install_scripts]
post_install = '''
# Group for plan authors — members can edit plans without root
groupadd -r wright 2>/dev/null || true

# Hand the plans directory to the wright group with setgid so new
# plan dirs/files automatically inherit the group
chgrp wright /var/lib/wright/plans
chmod 2775 /var/lib/wright/plans
chmod -R o-w /var/lib/wright/plans/

echo "Add yourself to the wright group to edit plans without sudo:"
echo "  usermod -aG wright \$USER"
'''

post_upgrade = '''
# Re-apply in case a manual chmod/chown drifted the state
groupadd -r wright 2>/dev/null || true
chgrp wright /var/lib/wright/plans
chmod 2775 /var/lib/wright/plans
chmod -R o-w /var/lib/wright/plans/
'''
