name = "gzip"
version = "1.14"
release = 1
description = "Programs for compressing and decompressing files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gzip/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gzip/gzip-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gzip-${VERSION}
./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/gzip-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gzip-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

