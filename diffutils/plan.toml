[plan]
name = "diffutils"
version = "3.12"
release = 1
description = "Programs that show the differences between files or directories"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/diffutils/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/diffutils/diffutils-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
