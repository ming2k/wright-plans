name = "c-ares"
version = "1.34.6"
release = 1
description = "Asynchronous DNS requests and name resolution library"
license = "MIT"
arch = "x86_64"
url = "https://c-ares.org/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/c-ares/c-ares/releases/download/v${PART_VERSION}/c-ares-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
