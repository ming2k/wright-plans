[plan]
name = "findutils"
version = "4.10.0"
release = 1
description = "Programs to find files and operate on them"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/findutils/"

[dependencies]
build = ["gcc", "make"]
[sources]
uris = ["https://ftp.gnu.org/gnu/findutils/findutils-4.10.0.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --localstatedir=/var/lib/locate
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
