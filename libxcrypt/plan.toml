name = "libxcrypt"
version = "4.4.38"
release = 1
description = "Modern library for one-way hashing of passwords"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/besser82/libxcrypt/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/besser82/libxcrypt/releases/download/v${VERSION}/libxcrypt-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libxcrypt-${VERSION}
CONFIG_SHELL=/usr/bin/bash /usr/bin/bash ./configure --prefix=/usr \
--enable-hashes=strong,glibc \
--enable-obsolete-api=no     \
--disable-static             \
--disable-werror             \
--disable-failure-tokens'''

[lifecycle.compile]
script = '''
cd source/libxcrypt-${VERSION}
make -j$(nproc)'''

[lifecycle.check]
script = '''
cd source/libxcrypt-${VERSION}
make check'''

[lifecycle.staging]
script = '''
cd source/libxcrypt-${VERSION}
make DESTDIR=${STAGING_DIR} install'''
