name = "xray"
version = "26.3.27"
release = 1
description = "Platform for building proxies to bypass network restrictions"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/XTLS/Xray-core"


build_deps = ['go']

[[sources]]
type = "http"
sha256 = "992a4997e6bb846d11469435d687f99ef812fcde1e0a009bb8e95189ea20331d"
url = "https://github.com/XTLS/Xray-core/archive/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "local"
path = "xray-tproxy.service"

[pipeline.prepare]
isolation = "none"
script = '''
cd source/Xray-core-${VERSION}
export PATH=/usr/lib/go/bin:$PATH
export GOPROXY=https://proxy.golang.org,direct
export GOMODCACHE=/tmp/go-mod-cache
rm -rf vendor
go mod vendor'''

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/Xray-core-${VERSION}
export PATH=/usr/lib/go/bin:$PATH
export CGO_ENABLED=0
export GOCACHE=/tmp/go-cache/build
export GOPROXY=off
export GOSUMDB=off
export GOFLAGS="-trimpath -mod=vendor"
go build -ldflags "-X github.com/xtls/xray-core.codename=xray -X github.com/xtls/xray-core.version=${VERSION} -buildid=" -o xray ./main'''

[pipeline.staging]
script = '''
cd source/Xray-core-${VERSION}
install -Dm755 xray ${STAGING_DIR}/usr/bin/xray
install -dm755 ${STAGING_DIR}/etc/xray
install -Dm644 ${WORKDIR}/xray-xray-tproxy.service ${STAGING_DIR}/usr/lib/systemd/system/xray-tproxy.service'''

[[output]]
runtime_deps = ['glibc', 'v2ray-rules-dat']
backup = ["/etc/xray/config.json"]

[output.hooks]
post_install = '''
echo ":: Create /etc/xray/config.json before starting xray"
echo ":: Install /etc/nftables/xray-tproxy.nft with your tproxy nftables rules"
echo ":: If /etc/systemd/system/xray-tproxy.service exists from a previous manual install, remove it"
echo ":: Then: systemctl daemon-reload && systemctl enable --now xray-tproxy"
'''
