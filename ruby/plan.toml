name = "ruby"
version = "4.0.3"
release = 1
description = "An interpreted object-oriented programming language"
license = "BSD-2-Clause"
arch = "x86_64"

link_deps = ['gmp', 'libffi', 'libyaml', 'openssl', 'readline', 'zlib']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://cache.ruby-lang.org/pub/ruby/4.0/ruby-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/ruby-${VERSION}
# --enable-shared: 构建 libruby.so
# --disable-install-doc: 跳过文档安装以节省时间和空间
./configure --prefix=/usr --enable-shared --disable-install-doc --with-openssl-dir=/usr'''

[pipeline.compile]
script = '''
cd source/ruby-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/ruby-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['gmp', 'libffi', 'libyaml', 'openssl', 'readline', 'zlib']
