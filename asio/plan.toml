name = "asio"
version = "1.38.0"
release = 1
description = "Cross-platform C++ library for network programming"
license = "BSL-1.0"
arch = "x86_64"
url = "https://think-async.com/Asio/"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/chriskohlhoff/asio/archive/refs/tags/asio-1-38-0.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
install -d ${PART_DIR}/usr/include
cp -r ${WORKDIR}/asio/include/asio.hpp ${PART_DIR}/usr/include/
cp -r ${WORKDIR}/asio/include/asio ${PART_DIR}/usr/include/'''
