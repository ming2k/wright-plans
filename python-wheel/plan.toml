name = "python-wheel"
version = "0.47.0"
release = 1
description = "Built-package format for Python"
license = "MIT"
arch = "any"
url = "https://wheel.readthedocs.io/"


build_deps = ['python', 'flit-core']

[[sources]]
type = "http"
sha256 = "cc72bd1009ba0cf63922e28f94d9d83b920aa2bb28f798a31d0691b02fa3c9b3"
url = "https://pypi.org/packages/source/w/wheel/wheel-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/wheel-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --no-cache-dir --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python', 'python-packaging']
