name = "e2fsprogs"
version = "1.47.3"
release = 3
description = "Ext2/3/4 filesystem utilities"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://e2fsprogs.sourceforge.net"

[dependencies]
build = ["util-linux"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://kernel.org/pub/linux/kernel/people/tytso/e2fsprogs/v${VERSION}/e2fsprogs-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
mkdir -p build && cd build
../configure --prefix=/usr          \
--with-root-prefix=''   \
--libdir=/usr/lib       \
--libexecdir=/usr/lib   \
--sbindir=/usr/bin      \
--enable-elf-shlibs     \
--disable-libblkid      \
--disable-libuuid       \
--disable-uuidd         \
--disable-fsck'''

[lifecycle.compile]
script = '''
cd source/build
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
DESTDIR=${PART_DIR} make install
DESTDIR=${PART_DIR} make install-libs

# Remove static libraries
rm -f ${PART_DIR}/usr/lib/lib{com_err,e2p,ext2fs,ss}.a'''
