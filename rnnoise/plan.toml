name = "rnnoise"
version = "0.2"
release = 1
description = "Recurrent neural network for audio noise reduction"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/rnnoise"


build_deps = ['autoconf', 'automake', 'libtool']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/xiph/rnnoise/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://media.xiph.org/rnnoise/models/rnnoise_data-0b50c45.tar.gz"

[pipeline.prepare]
script = '''
cd source/rnnoise-${VERSION}
cd ${SRC_DIR}/rnnoise-${VERSION}
cp ${SRC_DIR}/src/rnnoise_data* src/
autoreconf -fi'''

[pipeline.configure]
script = '''
cd source/rnnoise-${VERSION}
cd ${SRC_DIR}/rnnoise-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/rnnoise-${VERSION}
cd ${SRC_DIR}/rnnoise-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/rnnoise-${VERSION}
cd ${SRC_DIR}/rnnoise-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

