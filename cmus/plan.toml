name = "cmus"
version = "3.0.4"
release = 1
description = "Feature-rich ncurses-based music player"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://github.com/ming2k/cmus"

link_deps = ['alsa-lib', 'flac', 'libvorbis', 'mpg123', 'ncurses', 'pipewire']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ming2k/cmus/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/cmus-${VERSION}
./configure \
  prefix=/usr \
  CONFIG_FFMPEG=n \
  CONFIG_FLAC=y \
  CONFIG_MAD=n \
  CONFIG_MPG123=y \
  CONFIG_OPUS=n \
  CONFIG_PULSE=n \
  CONFIG_PIPEWIRE=y \
  CONFIG_JACK=n \
  CONFIG_MODPLUG=n \
  CONFIG_MP4=n \
  CONFIG_AAC=n'''

[pipeline.compile]
script = '''
cd source/cmus-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/cmus-${VERSION}
make DESTDIR=${STAGING_DIR} install

install -vDm644 contrib/_cmus ${STAGING_DIR}/usr/share/zsh/site-functions/_cmus
install -vDm644 contrib/cmus.bash-completion ${STAGING_DIR}/usr/share/bash-completion/completions/cmus'''

[[output]]
runtime_deps = ['pipewire', 'alsa-lib', 'flac', 'libvorbis', 'mpg123', 'ncurses']
