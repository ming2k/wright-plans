name = "hwy"
version = "1.2.0"
release = 1
description = "Performance-portable, length-agnostic SIMD with runtime dispatch"
license = "Apache-2.0"
arch = "x86_64"

[dependencies]
build = ["cmake", "gcc", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/google/highway/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -S ${WORKDIR} -B ${WORKDIR}/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_SHARED_LIBS=ON -DHWY_ENABLE_EXAMPLES=OFF -DHWY_ENABLE_TESTS=OFF'''

[lifecycle.compile]
script = '''
cd source
cmake --build ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} cmake --install ${WORKDIR}/build'''
