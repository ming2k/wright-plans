[plan]
name = "dbus"
version = "1.16.2"
release = 4
description = "D-Bus message bus system"
license = "AFL-2.1 OR GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/dbus/"

[dependencies]
runtime = ["systemd"]
build = ["gcc", "meson", "ninja", "pkgconf"]
link = ["expat", "libsystemd"]

[[sources]]
uri = "https://dbus.freedesktop.org/releases/dbus/dbus-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir -p build
cd build
meson setup --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    --buildtype=release \
    --wrap-mode=nofallback \
    -Dapparmor=disabled \
    -Dkqueue=disabled \
    -Dlaunchd=disabled \
    -Drelocation=disabled \
    -Dselinux=disabled \
    -Dsystemd=enabled \
    -Dx11_autolaunch=disabled \
    -Druntime_dir=/run \
    -Dmodular_tests=disabled \
    ..
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PKG_DIR} ninja install

# Symlink so D-Bus and systemd share machine-id
ln -sfv /etc/machine-id ${PKG_DIR}/var/lib/dbus

# Set dbus-daemon-launch-helper setuid root:messagebus in the package.
# Use GID 18 directly so this works even when the messagebus group
# doesn't exist in the build environment.
chown 0:18 ${PKG_DIR}/usr/libexec/dbus-daemon-launch-helper
chmod 4750 ${PKG_DIR}/usr/libexec/dbus-daemon-launch-helper
'''


[lifecycle.fabricate]
hooks.post_install = '''
if [ -f /usr/libexec/dbus-daemon-launch-helper ]; then
    chown root:messagebus /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
    chmod 4750 /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
fi
'''
hooks.post_upgrade = '''
if [ -f /usr/libexec/dbus-daemon-launch-helper ]; then
    chown root:messagebus /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
    chmod 4750 /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
fi
'''

[lifecycle.fabricate.libdbus]
description = "D-Bus low-level shared library"
dependencies.link = ["glibc"]
script = '''
install -d ${PKG_DIR}/usr/lib
mv -v ${MAIN_PKG_DIR}/usr/lib/libdbus-1.so* ${PKG_DIR}/usr/lib/
'''
