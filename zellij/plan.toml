name = "zellij"
version = "0.44.1"
release = 1
description = "A terminal workspace with batteries included"
license = "MIT"
arch = "x86_64"
url = "https://github.com/zellij-org/zellij"


build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/zellij-org/zellij/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${BUILD_DIR}/.cargo', CARGO_TARGET_DIR = '${BUILD_DIR}/target' }
script = '''
cd source/zellij-${VERSION}
cargo build --release --locked'''

[pipeline.staging]
script = '''
cd source/zellij-${VERSION}
install -Dm755 target/release/zellij ${STAGING_DIR}/usr/bin/zellij'''

