name = "bubblewrap"
version = "0.11.2"
release = 1
description = "Unprivileged sandboxing tool"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/containers/bubblewrap"

link_deps = ['libcap', 'libseccomp']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/containers/bubblewrap/releases/download/v${VERSION}/bubblewrap-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/bubblewrap-${VERSION}
meson setup build      \
--prefix=/usr          \
--buildtype=release    \
-D tests=false'''

[lifecycle.compile]
script = '''
cd source/bubblewrap-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/bubblewrap-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['libcap', 'libseccomp']
