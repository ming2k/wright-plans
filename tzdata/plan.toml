name = "tzdata"
version = "2026b"
release = 2
description = "Sources for time zone and daylight saving time data"
license = "LicenseRef-tz"
arch = "any"
url = "https://www.iana.org/time-zones"


[[sources]]
type = "http"
sha256 = "37e9ed8427f5d3521c22fc58e293cbfb043d70eedf1003870b33f363f61ca344"
url = "https://data.iana.org/time-zones/releases/tzcode${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "114543d9f19a6bfeb5bca43686aea173d38755a3db1f2eec112647ae92c6f544"
url = "https://data.iana.org/time-zones/releases/tzdata${VERSION}.tar.gz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source
sed -i 's|/sbin|/bin|g' Makefile'''

[pipeline.compile]
script = '''
cd source
make CC=gcc LFLAGS="${LDFLAGS}" -j$(nproc)'''

[pipeline.staging]
script = '''
cd source

# Install tzcode tools (zic, zdump, tzselect)
make CC=gcc DESTDIR=${STAGING_DIR} install

# Ensure FHS compliance: move zic from /usr/sbin to /usr/bin
if [ -d ${STAGING_DIR}/usr/sbin ]; then
    mv ${STAGING_DIR}/usr/sbin/* ${STAGING_DIR}/usr/bin/ 2>/dev/null || true
    rmdir ${STAGING_DIR}/usr/sbin 2>/dev/null || true
fi

# Generate zoneinfo database
./zic -b fat -d ${STAGING_DIR}/usr/share/zoneinfo africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

./zic -b fat -d ${STAGING_DIR}/usr/share/zoneinfo/posix africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

./zic -b fat -d ${STAGING_DIR}/usr/share/zoneinfo/right -L leapseconds africa antarctica asia australasia europe northamerica southamerica etcetera backward factory

# POSIX rules (New York — POSIX requires US DST rules)
./zic -b fat -d ${STAGING_DIR}/usr/share/zoneinfo -p America/New_York

# Reference data files
install -m644 iso3166.tab leap-seconds.list zone1970.tab zone.tab SECURITY ${STAGING_DIR}/usr/share/zoneinfo

# /etc/localtime is managed by the user, not the package
rm -f ${STAGING_DIR}/etc/localtime

# License
install -Dm644 LICENSE ${STAGING_DIR}/usr/share/licenses/tzdata/LICENSE'''
