name = "libsndfile"
version = "1.2.2"
release = 1
description = "C library for reading and writing sound files"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://libsndfile.github.io/libsndfile/"

[[sources]]
uri = "https://github.com/libsndfile/libsndfile/releases/download/${PART_VERSION}/libsndfile-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
CFLAGS="-std=gnu17" ./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} make install

'''

[lifecycle.fabricate]
