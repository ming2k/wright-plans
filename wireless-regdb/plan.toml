name = "wireless-regdb"
version = "2026.02.04"
release = 1
description = "Wireless regulatory database for cfg80211"
license = "ISC"
arch = "any"
url = "https://wireless.wiki.kernel.org/en/developers/regulatory/wireless-regdb"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/software/network/wireless-regdb/wireless-regdb-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
install -Dm644 regulatory.db ${PART_DIR}/usr/lib/firmware/regulatory.db
install -Dm644 regulatory.db.p7s ${PART_DIR}/usr/lib/firmware/regulatory.db.p7s'''
