name = "yazi"
version = "26.1.22"
release = 1
description = "Blazing fast terminal file manager written in Rust, based on async I/O"
license = "MIT"
arch = "x86_64"
url = "https://github.com/sxyazi/yazi"

[dependencies]
build = ["rust"]
link = ["gcc", "glibc"]
optional = []

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/sxyazi/yazi/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "relaxed"
env = { YAZI_GEN_COMPLETIONS = 'true' }
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/yazi ${PART_DIR}/usr/bin/yazi
install -Dm755 target/release/ya   ${PART_DIR}/usr/bin/ya

# Shell completions for yazi
install -Dm644 yazi-boot/completions/yazi.bash ${PART_DIR}/usr/share/bash-completion/completions/yazi || true
install -Dm644 yazi-boot/completions/_yazi     ${PART_DIR}/usr/share/zsh/site-functions/_yazi || true
install -Dm644 yazi-boot/completions/yazi.fish ${PART_DIR}/usr/share/fish/vendor_completions.d/yazi.fish || true

# Shell completions for ya
install -Dm644 yazi-cli/completions/ya.bash ${PART_DIR}/usr/share/bash-completion/completions/ya || true
install -Dm644 yazi-cli/completions/_ya     ${PART_DIR}/usr/share/zsh/site-functions/_ya || true
install -Dm644 yazi-cli/completions/ya.fish ${PART_DIR}/usr/share/fish/vendor_completions.d/ya.fish || true

# Desktop integration
install -Dm644 assets/yazi.desktop ${PART_DIR}/usr/share/applications/yazi.desktop || true
install -Dm644 assets/yazi.svg     ${PART_DIR}/usr/share/icons/hicolor/scalable/apps/yazi.svg || true'''
