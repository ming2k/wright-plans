name = "grep"
version = "3.12"
release = 1
description = "Programs for searching through the contents of files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/grep/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/grep/grep-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
