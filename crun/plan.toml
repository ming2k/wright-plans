name = "crun"
version = "1.27"
release = 1
description = "Fast OCI container runtime"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/containers/crun"

link_deps = ['glibc', 'libcap', 'libseccomp', 'systemd']
build_deps = ['python']

[[sources]]
type = "http"
sha256 = "99077cc701a9f6842f70384eb05e9429da1ad338cdef3e0bac5a486cbf2ca75d"
url = "https://github.com/containers/crun/releases/download/${VERSION}/crun-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
isolation = "none"
env = { ac_cv_path_MD2MAN = '' }
script = '''
cd source/crun-${VERSION}
./configure \
    --prefix=/usr \
    --bindir=/usr/bin \
    --disable-libcrun \
    --without-python-bindings \
    --enable-embedded-yajl'''

[pipeline.compile]
isolation = "none"
script = '''
cd source/crun-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
isolation = "none"
script = '''
cd source/crun-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc', 'libcap', 'libseccomp', 'systemd']
