[plan]
name = "wheel"
version = "0.46.1"
release = 1
description = "Built-package format for Python"
license = "MIT"
arch = "x86_64"
url = "https://wheel.readthedocs.io/"

[dependencies]
build = ["flit-core", "python"]
[sources]
uris = ["https://pypi.org/packages/source/w/wheel/wheel-0.46.1.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --root=${PKG_DIR} --no-build-isolation .
'''
