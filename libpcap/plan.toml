name = "libpcap"
version = "1.10.6"
release = 1
description = "Portable library for network traffic capture"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://www.tcpdump.org/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.tcpdump.org/release/libpcap-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/libpcap-${VERSION}
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source/libpcap-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/libpcap-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

