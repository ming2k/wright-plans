name = "libnftnl"
version = "1.3.1"
release = 1
description = "Netfilter nf_tables netlink userspace library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.netfilter.org/projects/libnftnl/"

[dependencies]
runtime = ["libmnl >= 1.0.4"]
build = ["gcc", "libmnl", "make", "pkgconf"]

[[sources]]
sha256 = "SKIP"
url = "https://www.netfilter.org/pub/libnftnl/libnftnl-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
