name = "typio"
version = "3.0.3"
release = 1
description = "Native Wayland input method daemon with optional GTK4 control panel"
license = "NOASSERTION"
arch = "x86_64"
url = "https://github.com/ming2k/typio"

[dependencies]
runtime = ["rime-prelude"]
build = ["cmake", "glslang", "ninja", "pkgconf", "vulkan-headers"]
link = ["dbus", "freetype", "gtk4", "harfbuzz", "librime", "libxkbcommon", "pipewire", "vulkan-loader", "wayland"]

[[sources]]
type = "git"
url = "https://github.com/ming2k/typio.git"
ref = "v3.0.3"
extract_to = "source"

[lifecycle.configure]
script = '''
cmake -S source -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_TESTS=OFF \
    -DBUILD_CONTROL_PANEL=ON \
    -DBUILD_RIME_ENGINE=ON \
    -DBUILD_WHISPER=ON \
    -DBUILD_SHERPA_ONNX=ON \
    -DBUILD_MOZC_ENGINE=ON \
    -DENABLE_SYSTRAY=OFF'''

[lifecycle.compile]
script = '''
cmake --build build -j$(nproc)'''

[lifecycle.staging]
script = '''
DESTDIR=${PART_DIR} cmake --install build'''
