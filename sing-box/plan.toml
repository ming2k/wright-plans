name = "sing-box"
version = "1.13.3"
release = 1
description = "The universal proxy platform"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://sing-box.sagernet.org/"

[dependencies]
build = ["go"]

[[sources]]
uri = "https://github.com/SagerNet/sing-box/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "bf8933cd43e2797afcffb47528282e1c1aee078bf5eeda888d80a151fef726e1"

[[sources]]
uri = "sing-box.service"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
export PATH=/usr/lib/go/bin:$PATH
export GOPATH=/tmp/go-cache
export GOCACHE=/tmp/go-cache/build
export CGO_ENABLED=0
go build -o sing-box \
-trimpath \
-tags "with_quic,with_dhcp,with_wireguard,with_utls,with_clash_api,with_gvisor" \
-ldflags "-s -w -X github.com/sagernet/sing-box/constant.Version=${PART_VERSION}" \
./cmd/sing-box

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 sing-box ${PART_DIR}/usr/bin/sing-box
install -dm755 ${PART_DIR}/etc/sing-box
echo '{}' > ${PART_DIR}/etc/sing-box/config.json
install -Dm644 ${FILES_DIR}/sing-box.service ${PART_DIR}/usr/lib/systemd/system/sing-box.service

'''

[hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
echo ":: Edit /etc/sing-box/config.json before starting sing-box"
echo ":: Enable with: systemctl enable --now sing-box"

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
pre_remove = '''
systemctl stop sing-box 2>/dev/null || true
systemctl disable sing-box 2>/dev/null || true

'''

[output]
backup = ["/etc/sing-box/config.json"]
