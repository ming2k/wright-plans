name = "libvorbis"
version = "1.3.7"
release = 1
description = "Vorbis audio codec library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/vorbis"

[dependencies]
build = ["gcc", "make"]
link = ["libogg"]

[[sources]]
uri = "https://downloads.xiph.org/releases/vorbis/libvorbis-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
