name = "jansson"
version = "2.14.1"
release = 1
description = "C library for encoding, decoding and manipulating JSON data"
license = "MIT"
arch = "x86_64"
url = "https://sourceforge.net/projects/jansson/"

[dependencies]
build = ["gcc", "make"]
link = ["glibc"]

[[sources]]
uri = "https://github.com/akheron/jansson/releases/download/v${PART_VERSION}/jansson-${PART_VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make check

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
