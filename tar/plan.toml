name = "tar"
version = "1.35"
release = 1
description = "An archiving program for creating and extracting tar archives"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/tar/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/tar/tar-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
FORCE_UNSAFE_CONFIGURE=1 \
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
make -C doc DESTDIR=${PART_DIR} install-html docdir=/usr/share/doc/tar-${VERSION}'''
