name = "readline"
version = "8.3"
release = 1
description = "GNU readline library for command-line editing and history"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://tiswww.case.edu/php/chet/readline/rltop.html"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/readline/readline-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-001"
sha256 = "SKIP"

[[sources]]
uri = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-002"
sha256 = "SKIP"

[[sources]]
uri = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-003"
sha256 = "SKIP"

[options]
ccache = true

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
patch -Np0 < ${FILES_DIR}/readline83-001
patch -Np0 < ${FILES_DIR}/readline83-002
patch -Np0 < ${FILES_DIR}/readline83-003
sed -i '/MV.*old/d' Makefile.in
sed -i '/{OLDSUFF}/c:' support/shlib-install

'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr    --disable-static --with-curses    --docdir=/usr/share/doc/readline-${PART_VERSION}

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make SHLIB_LIBS="-lncursesw"

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make SHLIB_LIBS="-lncursesw" DESTDIR=${PART_DIR} install
install -d ${PART_DIR}/usr/share/doc/readline-${PART_VERSION}
install -v -m644 doc/*.{ps,pdf,html,dvi} ${PART_DIR}/usr/share/doc/readline-${PART_VERSION}/ 2>/dev/null || true

'''

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"

[output]
backup = ["/etc/inputrc"]
