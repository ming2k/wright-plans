name = "wl-clipboard"
version = "2.3.0"
release = 1
description = "Command-line copy/paste utilities for Wayland"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/bugaevc/wl-clipboard"

link_deps = ['wayland']
build_deps = ['wayland-protocols', 'meson', 'ninja']

[[sources]]
type = "http"
sha256 = "b4dc560973f0cd74e02f817ffa2fd44ba645a4f1ea94b7b9614dacc9f895f402"
url = "https://github.com/bugaevc/wl-clipboard/archive/v${VERSION}/wl-clipboard-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/wl-clipboard-${VERSION}
meson setup build --prefix=/usr --buildtype=release'''

[pipeline.compile]
script = '''
cd source/wl-clipboard-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/wl-clipboard-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['wayland']
