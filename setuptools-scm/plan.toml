name = "setuptools-scm"
version = "9.2.2"
release = 1
description = "Handles managing Python package versions from SCM metadata"
license = "MIT"
arch = "x86_64"
url = "https://github.com/pypa/setuptools-scm"

[dependencies]
runtime = ["python", "setuptools", "python-packaging"]
build = ["python", "setuptools"]

[[sources]]
sha256 = "SKIP"
url = "https://pypi.org/packages/source/s/setuptools_scm/setuptools_scm-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
SETUPTOOLS_SCM_PRETEND_VERSION=${VERSION} pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
