name = "python-alabaster"
version = "1.0.0"
release = 1
description = "Light, configurable Sphinx theme"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://alabaster.readthedocs.io/"

build = ['python', 'flit-core']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/a/alabaster/alabaster-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[output]
runtime_deps = ['python']
