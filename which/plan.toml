name = "which"
version = "2.23"
release = 1
description = "Utility to show the full path of commands"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://carlowood.github.io/which/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://carlowood.github.io/which/which-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
