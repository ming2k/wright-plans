name = "groff"
version = "1.23.0"
release = 1
description = "Programs for processing and formatting text and images"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/groff/"

[dependencies]
build = ["gcc", "make", "perl"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/groff/groff-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
PAGE=A4 ./configure --prefix=/usr

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j1

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
