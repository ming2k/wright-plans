[plan]
name = "mpv"
version = "0.41.0"
release = 2
description = "A free, open source, and cross-platform media player"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://mpv.io"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = [
    "alsa-lib",
    "ffmpeg",
    "lcms2",
    "libass",
    "libdrm",
    "libplacebo",
    "libva",
    "luajit",
    "mesa",
    "pipewire",
    "vulkan-loader",
    "wayland",
    "libxkbcommon",
]

[[sources]]
uri = "https://github.com/mpv-player/mpv/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr \
--buildtype=release \
-D libmpv=true \
-D cdda=disabled \
-D drm=enabled \
-D libarchive=disabled \
-D dvdnav=disabled \
-D javascript=disabled \
-D lua=luajit \
-D uchardet=disabled \
-D tests=false \
-D alsa=enabled \
-D pipewire=enabled \
-D vulkan=enabled \
-D wayland=enabled \
-D gl=enabled
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"
