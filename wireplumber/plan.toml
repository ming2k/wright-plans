name = "wireplumber"
version = "0.5.14"
release = 1
description = "Session/policy manager for PipeWire"
license = "MIT"
arch = "x86_64"
url = "https://pipewire.pages.freedesktop.org/wireplumber/"

link_deps = ['glib', 'lua', 'pipewire', 'systemd']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/pipewire/wireplumber/-/archive/${VERSION}/wireplumber-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/wireplumber-${VERSION}
meson setup build \
--prefix=/usr                \
--buildtype=release          \
-D doc=disabled              \
-D tests=false               \
-D system-lua=true           \
-D elogind=disabled          \
-D systemd=enabled'''

[lifecycle.compile]
script = '''
cd source/wireplumber-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/wireplumber-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[hooks]
post_install = "systemctl daemon-reload 2>/dev/null || true"
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"

[[output]]
runtime_deps = ['glib', 'lua', 'pipewire', 'systemd']
