name = "librist"
version = "0.2.11"
release = 1
description = "Reliable Internet Stream Transport protocol library"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://code.videolan.org/rist/librist"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["mbedtls"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://code.videolan.org/rist/librist/-/archive/v${VERSION}/librist-v${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D built_tools=false \
    -D test=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
