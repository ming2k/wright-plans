name = "lame"
version = "3.100"
release = 1
description = "High quality MP3 encoder"
license = "LGPL-2.0-or-later"
arch = "x86_64"

link_deps = ['ncurses']
build_deps = ['nasm']

[[sources]]
type = "http"
sha256 = "ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e"
url = "https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/lame-${VERSION}
./configure \
    --prefix=/usr \
    --enable-shared \
    --enable-nasm \
    --disable-static'''

[pipeline.compile]
script = '''
cd source/lame-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/lame-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['ncurses']
