name = "librime"
version = "1.16.1"
release = 2
description = "Rime input method engine"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/rime/librime"

[dependencies]
build = ["cmake", "ninja", "pkgconf"]
link = ["boost", "google-glog", "leveldb", "lua", "marisa", "opencc", "yaml-cpp"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/rime/librime/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_CXX_FLAGS="-DNDEBUG -DGLOG_USE_GLOG_EXPORT" \
    -DBUILD_TEST=OFF \
    -DENABLE_EXTERNAL_PLUGINS=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
