name = "tmux"
version = "3.6a"
release = 1
description = "A terminal multiplexer"
license = "ISC"
arch = "x86_64"
url = "https://github.com/tmux/tmux/wiki"

[dependencies]
build = ["gcc", "make"]
link = ["libevent", "ncurses", "systemd"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/tmux/tmux/releases/download/${VERSION}/tmux-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
            --enable-sixel   \
            --enable-systemd'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
