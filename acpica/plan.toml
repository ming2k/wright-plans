name = "acpica"
version = "20251212"
release = 1
description = "ACPICA tools and reference implementation, including iasl"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/acpica/acpica"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/acpica/acpica/releases/download/20251212/acpica-unix2-20251212.tar.gz"
extract_to = "source"

[pipeline.compile]
script = '''
cd source/acpica-${VERSION}
make -C generate/unix -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/acpica-${VERSION}
install -Dm755 generate/unix/bin/iasl ${STAGING_DIR}/usr/bin/iasl
install -Dm755 generate/unix/bin/acpibin ${STAGING_DIR}/usr/bin/acpibin
install -Dm755 generate/unix/bin/acpidump ${STAGING_DIR}/usr/bin/acpidump
install -Dm755 generate/unix/bin/acpiexec ${STAGING_DIR}/usr/bin/acpiexec
install -Dm755 generate/unix/bin/acpihelp ${STAGING_DIR}/usr/bin/acpihelp
install -Dm755 generate/unix/bin/acpisrc ${STAGING_DIR}/usr/bin/acpisrc
install -Dm644 changes.txt ${STAGING_DIR}/usr/share/doc/acpica/changes.txt'''

