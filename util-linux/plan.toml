name = "util-linux"
version = "2.42"
release = 1
description = "Miscellaneous system utilities for Linux"
license = "GPL-2.0-only AND GPL-2.0-or-later AND GPL-3.0-or-later AND LGPL-2.1-or-later AND BSD-2-Clause AND BSD-3-Clause AND LicenseRef-PublicDomain"
arch = "x86_64"
url = "https://github.com/util-linux/util-linux"

[dependencies]
build = ["gcc", "meson", "ninja", "pkgconf", "python"]
link = ["glibc", "ncurses", "zlib", "libcap", "linux-pam", "readline"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/utils/util-linux/v2.42/util-linux-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build'''

[lifecycle.configure]
script = '''
cd source

# Tool ownership policy:
#   login, su, chfn, chsh, newgrp, nologin, vipw/vigr — owned by shadow
#     (better PAM + NSS + /etc/shadow integration)
#   mesg, write — unique to util-linux (terminal messaging)
#   line — obsolete, not built
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D sbindir=/usr/bin \
    -D fs-search-path=/usr/bin:/usr/local/bin \
    -D libuser=disabled \
    -D libutempter=disabled \
    -D ncurses=disabled \
    -D ncursesw=enabled \
    -D econf=disabled \
    -D build-chfn-chsh=disabled \
    -D build-line=disabled \
    -D build-login=disabled \
    -D build-mesg=enabled \
    -D build-newgrp=disabled \
    -D build-nologin=disabled \
    -D build-su=disabled \
    -D build-vipw=disabled \
    -D build-write=enabled'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

