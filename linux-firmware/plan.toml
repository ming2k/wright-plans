[plan]
name = "linux-firmware"
version = "20260110"
release = 2
description = "Firmware files for Linux - complete collection with vendor split packages"
license = "GPL-2.0-only AND GPL-2.0-or-later AND custom"
arch = "any"
url = "https://gitlab.com/kernel-firmware/linux-firmware"
maintainer = "Wright Maintainer <maintainer@example.com>"

[dependencies]

[sources]
uris = ["https://cdn.kernel.org/pub/linux/kernel/firmware/linux-firmware-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[options]
strip = false

# ═══════════════════════════════════════════════════════════════
# Use copy-firmware.sh to install firmware with correct paths
# and symlinks into a staging area. All splits extract from there.
# ═══════════════════════════════════════════════════════════════

[lifecycle.compile]
script = """
cd ${BUILD_DIR}
mkdir -p _installed/usr/lib/firmware
./copy-firmware.sh _installed/usr/lib/firmware
"""

[lifecycle.package]
script = """
mkdir -p ${PKG_DIR}/usr/share/doc/linux-firmware
echo "linux-firmware ${PKG_VERSION} meta-package" > ${PKG_DIR}/usr/share/doc/linux-firmware/README
"""

# ═══════════════════════════════════════════════════════════════
# Split packages — all use FW="${BUILD_DIR}/_installed/usr/lib/firmware"
# ═══════════════════════════════════════════════════════════════

# ─── WHENCE ───

[split.linux-firmware-whence]
description = "Firmware files for Linux - WHENCE license manifest"

[split.linux-firmware-whence.lifecycle.package]
script = """
cd ${BUILD_DIR}
shopt -s nullglob

mkdir -p ${PKG_DIR}/usr/lib/firmware
mkdir -p ${PKG_DIR}/usr/share/doc/linux-firmware-whence

install -m644 WHENCE ${PKG_DIR}/usr/lib/firmware/WHENCE

[ -f README.md ] && install -m644 README.md ${PKG_DIR}/usr/share/doc/linux-firmware-whence/README.md

for f in LICEN*; do
install -m644 "$f" ${PKG_DIR}/usr/lib/firmware/"$f"
done
"""

# ─── AMD GPU ───

[split.linux-firmware-amdgpu]
description = "Firmware for AMD Radeon GPUs (amdgpu + legacy radeon)"

[split.linux-firmware-amdgpu.dependencies]
runtime = ["linux-firmware-whence"]
[split.linux-firmware-amdgpu.lifecycle.package]
script = """
FW="${BUILD_DIR}/_installed/usr/lib/firmware"
mkdir -p ${PKG_DIR}/usr/lib/firmware

[ -d "$FW/amdgpu" ] && cp -a "$FW/amdgpu" ${PKG_DIR}/usr/lib/firmware/

[ -d "$FW/radeon" ] && cp -a "$FW/radeon" ${PKG_DIR}/usr/lib/firmware/
"""

# ─── AMD Microcode ───

[split.amd-ucode]
description = "Microcode update image for AMD CPUs"

[split.amd-ucode.dependencies]
runtime = ["linux-firmware-whence"]
[split.amd-ucode.lifecycle.package]
script = """
FW="${BUILD_DIR}/_installed/usr/lib/firmware"
mkdir -p ${PKG_DIR}/usr/lib/firmware

[ -d "$FW/amd-ucode" ] && cp -a "$FW/amd-ucode" ${PKG_DIR}/usr/lib/firmware/
"""

# ─── Atheros ───

[split.linux-firmware-atheros]
description = "Firmware for Qualcomm Atheros wireless adapters"

[split.linux-firmware-atheros.dependencies]
runtime = ["linux-firmware-whence"]
[split.linux-firmware-atheros.lifecycle.package]
script = """
FW="${BUILD_DIR}/_installed/usr/lib/firmware"
shopt -s nullglob
mkdir -p ${PKG_DIR}/usr/lib/firmware

for dir in ath3k ar3k ath6k ath10k ath11k ath12k; do

[ -d "$FW/$dir" ] && cp -a "$FW/$dir" ${PKG_DIR}/usr/lib/firmware/
done

for f in "$FW"/htc_*.fw "$FW"/htc_*.bin; do

[ -e "$f" ] && cp -a "$f" ${PKG_DIR}/usr/lib/firmware/"$(basename "$f")"
done
"""

