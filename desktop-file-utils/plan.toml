name = "desktop-file-utils"
version = "0.28"
release = 2
description = "Utilities for manipulating .desktop files"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/desktop-file-utils/"

link_deps = ['glib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.freedesktop.org/software/desktop-file-utils/releases/desktop-file-utils-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/desktop-file-utils-${VERSION}
meson setup build --prefix=/usr --buildtype=release'''

[pipeline.compile]
script = '''
cd source/desktop-file-utils-${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/desktop-file-utils-${VERSION}
meson install -C build --destdir ${STAGING_DIR}'''

[[output]]
runtime_deps = ['glib']
hooks.post_install = '''
update-desktop-database -q /usr/share/applications 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
'''
hooks.post_upgrade = '''
update-desktop-database -q /usr/share/applications 2>/dev/null || true
[ -d /var/lib/flatpak/exports/share/applications ] && update-desktop-database -q /var/lib/flatpak/exports/share/applications 2>/dev/null || true
'''
