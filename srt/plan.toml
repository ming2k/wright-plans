name = "srt"
version = "1.5.4"
release = 2
description = "Secure Reliable Transport protocol library"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/Haivision/srt"

link_deps = ['openssl']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/Haivision/srt/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/srt-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DENABLE_STATIC=OFF \
    -DENABLE_SHARED=ON \
    -DENABLE_APPS=OFF \
    -DUSE_ENCLIB=openssl \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5'''

[pipeline.compile]
script = '''
cd source/srt-${VERSION}
ninja -j$(nproc) -C build'''

[pipeline.staging]
script = '''
cd source/srt-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['openssl']
