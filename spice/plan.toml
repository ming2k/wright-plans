name = "spice"
version = "0.16.0"
release = 1
description = "SPICE server library for remote display virtualization"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.spice-space.org/"

[dependencies]
build = ["meson", "ninja", "pkgconf", "python"]
link = ["glib", "pixman", "openssl", "libjpeg-turbo", "opus", "zlib", "spice-protocol"]

[[sources]]
sha256 = "SKIP"
url = "https://www.spice-space.org/download/releases/spice-server/spice-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr -Dgstreamer=no -Dsasl=false -Dlz4=false -Dtests=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
