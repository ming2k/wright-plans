name = "ant"
version = "1.10.15"
release = 1
description = "Java-based build tool"
license = "Apache-2.0"
arch = "x86_64"
url = "https://ant.apache.org/"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://dlcdn.apache.org/ant/binaries/apache-ant-${VERSION}-bin.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/ant-${VERSION}

install -dm755 ${STAGING_DIR}/usr/share/ant
cp -a bin lib etc ${STAGING_DIR}/usr/share/ant/

install -dm755 ${STAGING_DIR}/usr/bin
ln -sf ../share/ant/bin/ant ${STAGING_DIR}/usr/bin/ant'''

[[output]]
runtime_deps = ['openjdk']
provides = ["apache-ant"]
