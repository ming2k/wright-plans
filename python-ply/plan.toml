name = "python-ply"
version = "3.11"
release = 1
description = "Python Lex-Yacc parsing tool"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://www.dabeaz.com/ply/"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/p/ply/ply-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
