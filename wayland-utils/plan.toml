name = "wayland-utils"
version = "1.3.0"
release = 2
description = "Wayland diagnostic utilities (wayland-info)"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/wayland/wayland-utils"

[dependencies]
runtime = ["wayland"]
build = [
    "gcc",
    "libdrm",
    "meson",
    "ninja",
    "pkgconf",
    "wayland",
]
link = ["glibc"]

[[sources]]
uri = "https://gitlab.freedesktop.org/wayland/wayland-utils/-/archive/${VERSION}/wayland-utils-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D drm=enabled

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
