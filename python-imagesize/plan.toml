[plan]
name = "python-imagesize"
version = "1.5.0"
release = 1
description = "Getting image size from png/jpeg/jpeg2000/gif file"
license = "MIT"
arch = "x86_64"
url = "https://github.com/shibukawa/imagesize_py"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
uri = "https://pypi.org/packages/source/i/imagesize/imagesize-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .
'''
