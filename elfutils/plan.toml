[plan]
name = "elfutils"
version = "0.194"
release = 1
description = "Collection of utilities and libraries for handling ELF files and DWARF data"
license = "LGPL-3.0-or-later AND GPL-3.0-or-later"
arch = "x86_64"
url = "https://sourceware.org/elfutils/"

[dependencies]
build = ["gcc", "make"]
link = ["zlib"]

[[sources]]
uri = "https://sourceware.org/ftp/elfutils/${PART_VERSION}/elfutils-${PART_VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr        \
            --disable-debuginfod \
            --enable-libdebuginfod=dummy
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
rm -f ${PART_DIR}/usr/lib/lib*.a
rm -rf ${PART_DIR}/usr/etc
'''
