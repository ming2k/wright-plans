[plan]
name = "expect"
version = "5.45.4"
release = 1
description = "Tools for automating interactive applications via scripted dialogues"
license = "Public Domain"
arch = "x86_64"
url = "https://core.tcl.tk/expect/"

[dependencies]
runtime = ["tcl"]
build = ["gcc", "make", "tcl"]

[[sources]]
uri = "https://downloads.sourceforge.net/project/expect/Expect/${PKG_VERSION}/expect${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://www.linuxfromscratch.org/patches/lfs/12.4/expect-${PKG_VERSION}-gcc15-1.patch"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
patch -Np1 < ${FILES_DIR}/expect-${PKG_VERSION}-gcc15-1.patch
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr           \
--with-tcl=/usr/lib     \
--enable-shared         \
--disable-rpath         \
--mandir=/usr/share/man \
--with-tclinclude=/usr/include
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make test
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
ln -svf expect${PKG_VERSION}/libexpect${PKG_VERSION}.so ${PKG_DIR}/usr/lib
'''
