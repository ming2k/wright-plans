name = "sphinxcontrib-qthelp"
version = "2.0.0"
release = 1
description = "Sphinx extension for Qt help output"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/sphinx-doc/sphinxcontrib-qthelp"

[dependencies]
runtime = ["python"]
build = ["python", "flit-core"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/s/sphinxcontrib_qthelp/sphinxcontrib_qthelp-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
