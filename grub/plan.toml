name = "grub"
version = "2.12"
release = 2
description = "GRand Unified Bootloader (BIOS + UEFI)"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/grub/"

[dependencies]
runtime = ["dosfstools"]
build = [
    "bison",
    "flex",
    "gcc",
    "make",
    "freetype",
]

[[sources]]
uri = "https://ftp.gnu.org/gnu/grub/grub-2.12.tar.xz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
echo depends bli part_gpt > grub-core/extra_deps.lst

'''

[lifecycle.configure]
script = '''
# Configure and compile are combined — GRUB requires two separate
# configure/make cycles for BIOS and EFI platforms.
echo "Skipping standalone configure — handled in compile stage."

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
unset {C,CPP,CXX,LD}FLAGS

# ── Build 1: BIOS (i386-pc) ──────────────────────────────────────────────────
mkdir -p build-bios
cd build-bios
../configure --prefix=/usr          \
    --sysconfdir=/etc               \
    --with-platform=pc              \
    --target=i386                   \
    --disable-efiemu                \
    --disable-werror
make -j$(nproc)

# ── Build 2: UEFI (x86_64-efi) ───────────────────────────────────────────────
cd ${BUILD_DIR}
mkdir -p build-efi
cd build-efi
../configure --prefix=/usr          \
    --sysconfdir=/etc               \
    --with-platform=efi             \
    --target=x86_64                 \
    --disable-efiemu                \
    --disable-werror
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}

# Install BIOS build first, then EFI on top (shared tools are identical)
cd build-bios
make DESTDIR=${PART_DIR} install

cd ${BUILD_DIR}/build-efi
make DESTDIR=${PART_DIR} install

# Relocate bash completion
mkdir -p ${PART_DIR}/usr/share/bash-completion/completions
mv -v ${PART_DIR}/etc/bash_completion.d/grub \
    ${PART_DIR}/usr/share/bash-completion/completions/ 2>/dev/null || true
rmdir ${PART_DIR}/etc/bash_completion.d 2>/dev/null || true

'''
