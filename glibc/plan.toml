[plan]
name = "glibc"
version = "2.43"
release = 4
description = "The GNU C Library"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libc/"

[dependencies]
runtime = ["linux-api-headers >= 4.10", "tzdata >= 2025c"]
build = ["bison", "gawk", "gcc", "make", "python", "sed"]

[sources]
uris = [
    "https://ftp.gnu.org/gnu/glibc/glibc-${PKG_VERSION}.tar.xz",
    "locale.gen",
]
sha256 = ["SKIP", "SKIP"]

[lifecycle.configure]
script = """
# Glibc requires an out-of-tree build
mkdir -pv ${BUILD_DIR}/build
cd ${BUILD_DIR}/build

# _FORTIFY_SOURCE=3 conflicts with --enable-fortify-source
CFLAGS="${CFLAGS/-Wp,-D_FORTIFY_SOURCE=3/}"

cat > configparms << EOF
slibdir=/usr/lib
rtlddir=/usr/lib
sbindir=/usr/bin
rootsbindir=/usr/bin
EOF

../configure                          \\
  --prefix=/usr                       \\
  --libdir=/usr/lib                   \\
  --libexecdir=/usr/lib               \\
  --with-headers=/usr/include         \\
  --enable-bind-now                   \\
  --enable-cet                        \\
  --enable-fortify-source             \\
  --enable-kernel=5.4                 \\
  --enable-multi-arch                 \\
  --enable-stack-protector=strong     \\
  --disable-nscd                      \\
  --disable-profile                   \\
  --disable-werror
"""

[lifecycle.compile]
dockyard = "strict"
script = """
cd ${BUILD_DIR}/build
make -O -j$(nproc)
"""

[lifecycle.check]
optional = true
script = """
cd ${BUILD_DIR}/build
make -O check || true
"""

[lifecycle.package]
script = """
cd ${BUILD_DIR}/build

mkdir -p ${PKG_DIR}/etc

make DESTDIR=${PKG_DIR} install

# Remove stale cache — regenerated by ldconfig post-install
rm -f ${PKG_DIR}/etc/ld.so.cache

# tzselect, zdump, zic and their man pages are provided by tzdata
rm -f ${PKG_DIR}/usr/bin/{tzselect,zdump,zic}
rm -f ${PKG_DIR}/usr/share/man/man5/tzfile.5
rm -f ${PKG_DIR}/usr/share/man/man8/{tzselect,zdump,zic}.8

# Fix hardcoded /usr prefix in ldd so it resolves via /lib symlink
sed '/RTLDLIST=/s@/usr@@g' -i ${PKG_DIR}/usr/bin/ldd

install -Dm644 ${FILES_DIR}/locale.gen ${PKG_DIR}/etc/locale.gen

# stub /etc/locale.conf so it exists as a backup-managed file
install -Dm644 /dev/null ${PKG_DIR}/etc/locale.conf

# nsswitch.conf
cat > ${PKG_DIR}/etc/nsswitch.conf << "NSEOF"
# Begin /etc/nsswitch.conf

passwd: files
group: files
shadow: files

hosts: files dns
networks: files

protocols: files
services: files
ethers: files
rpc: files

# End /etc/nsswitch.conf
NSEOF

# ld.so.conf
cat > ${PKG_DIR}/etc/ld.so.conf << "LDEOF"
# Begin /etc/ld.so.conf
/usr/local/lib
/opt/lib

include /etc/ld.so.conf.d/*.conf

LDEOF
mkdir -pv ${PKG_DIR}/etc/ld.so.conf.d
"""

[lifecycle.post_package]
script = """
mkdir -p /usr/lib/locale
localedef -i C -f UTF-8 C.UTF-8
"""

[backup]
files = ["/etc/nsswitch.conf", "/etc/ld.so.conf", "/etc/locale.gen", "/etc/locale.conf"]

[install_scripts]
post_install = "ldconfig"
post_upgrade = "ldconfig"
