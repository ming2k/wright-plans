[plan]
name = "libde265"
version = "1.0.16"
release = 1
description = "Open H.265 video codec implementation"
license = "LGPL-3.0-or-later"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "cmake"]

[sources]
uris = ["https://github.com/strukturag/libde265/releases/download/v${PKG_VERSION}/libde265-${PKG_VERSION}.tar.gz"]
sha256 = [
    "b92beb6b53c346db9a8fae968d686ab706240099cdd5aff87777362d668b0de7",
]

[lifecycle.configure]
script = "cd ${BUILD_DIR} && cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DENABLE_SHARED=ON -DENABLE_STATIC=OFF"

[lifecycle.compile]
script = "make -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
script = "make -C ${BUILD_DIR}/build DESTDIR=${PKG_DIR} install"
