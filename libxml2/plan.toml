name = "libxml2"
version = "2.15.1"
release = 1
description = "XML C parser and toolkit"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/libxml2"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/libxml2/2.15/libxml2-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
mkdir -p build && cd build
meson setup .. --prefix=/usr \
    -D history=enabled \
    -D icu=enabled \
    -D python=enabled \
    -D docs=disabled'''

[lifecycle.compile]
script = '''
cd source/build
ninja -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
DESTDIR=${STAGING_DIR} ninja install'''

[output]
runtime_deps = ['icu:default', 'python:default']
