name = "polkit"
version = "127"
release = 2
description = "Application-level toolkit for defining and handling authorization"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/polkit-org/polkit"

[dependencies]
runtime = ["dbus", "systemd"]
build = ["meson", "ninja", "pkgconf"]
link = ["glib", "duktape", "linux-pam"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/polkit-org/polkit/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
    --prefix=/usr               \
    --buildtype=release         \
    -D authfw=pam               \
    -D session_tracking=logind  \
    -D man=false                \
    -D tests=false              \
    -D introspection=false      \
    -D gtk_doc=false            \
    -D os_type=lfs              \
    -D examples=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[hooks]
post_install = '''
groupadd -fg 27 polkitd 2>/dev/null || true
useradd -r -u 27 -g polkitd -d /var/lib/polkit-1 -s /usr/bin/false \
    -c "PolicyKit Daemon Owner" polkitd 2>/dev/null || true

'''
