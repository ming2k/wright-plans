name = "python"
version = "3.14.4"
release = 1
description = "The Python programming language (Long-term Stable Baseline)"
license = "PSF-2.0"
arch = "x86_64"
url = "https://www.python.org/"

link_deps = ['expat:default', 'libffi:default', 'ncurses:default', 'openssl:default', 'readline:default', 'zlib:default', 'bzip2:default', 'xz:default', 'sqlite:default', 'gdbm:default', 'libxcrypt:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.python.org/ftp/python/${VERSION}/Python-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr        \
            --enable-shared      \
            --with-system-expat  \
            --with-system-ffi    \
            --enable-optimizations \
            --with-lto           \
            --with-computed-gotos \
            --without-static-libpython'''

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install
rm -rf ${STAGING_DIR}/usr/lib/python3.14/test
rm -rf ${STAGING_DIR}/usr/lib/python3.14/*/test
mkdir -p ${STAGING_DIR}/usr/lib/python3.14
cat > ${STAGING_DIR}/usr/lib/python3.14/EXTERNALLY-MANAGED << EOF
[externally-managed]
Error=Please use 'wright install python-<package>' to install system-level Python packages.
EOF'''

