name = "qalc"
version = "5.10.0"
release = 1
description = "Powerful command-line calculator built on libqalculate"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://qalculate.github.io/"

link_deps = ['curl', 'gettext', 'gmp', 'icu', 'libxml2', 'mpfr', 'readline']

[[sources]]
type = "http"
sha256 = "904592d33a98ed4a26a59fa34c855578e096144fb91965b8afc90e06797dba8e"
url = "https://github.com/Qalculate/libqalculate/releases/download/v${VERSION}/libqalculate-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/qalc-${VERSION}
./configure --prefix=/usr \
    --disable-static \
    --with-readline \
    --docdir=/usr/share/doc/qalc-${VERSION}'''

[pipeline.compile]
script = '''
cd source/qalc-${VERSION}
make -j$(nproc)'''

[pipeline.check]
script = '''
cd source/qalc-${VERSION}
make check'''

[pipeline.staging]
script = '''
cd source/qalc-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"

[[output]]
runtime_deps = ['curl', 'gettext', 'gmp', 'icu', 'libxml2', 'mpfr', 'readline']
