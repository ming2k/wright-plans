name = "python-evdev"
version = "1.9.3"
release = 1
description = "Python bindings for the Linux input subsystem"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://python-evdev.readthedocs.io/"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools", "gcc", "linux-api-headers"]

[[sources]]
type = "http"
sha256 = "2c140e01ac8437758fa23fe5c871397412461f42d421aa20241dc8fe8cfccbc9"
url = "https://files.pythonhosted.org/packages/source/e/evdev/evdev-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
