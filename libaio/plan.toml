name = "libaio"
version = "0.3.113"
release = 1
description = "Linux kernel AIO (Asynchronous I/O) interface library"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://pagure.io/libaio"

link_deps = ['glibc']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pagure.io/libaio/archive/libaio-${VERSION}/libaio-libaio-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
script = '''
cd source/libaio-libaio-${VERSION}
make -j$(nproc) prefix=/usr'''

[pipeline.staging]
script = '''
cd source/libaio-libaio-${VERSION}
make prefix=/usr DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc']
