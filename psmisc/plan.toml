name = "psmisc"
version = "23.7"
release = 1
description = "Programs for displaying information about running processes"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.com/psmisc/psmisc"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]

[[sources]]
sha256 = "SKIP"
url = "https://downloads.sourceforge.net/project/psmisc/psmisc/psmisc-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
