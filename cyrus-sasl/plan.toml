name = "cyrus-sasl"
version = "2.1.28"
release = 1
description = "Simple Authentication and Security Layer library"
license = "BSD-4-Clause-UC"
arch = "x86_64"
url = "https://www.cyrusimap.org/sasl/"

[dependencies]
build = ["gcc", "make"]
link = ["krb5", "openssl"]

[[sources]]
sha256 = "7ccfc6abd01ed67c1a0924b353e526f1b766b21f42d4562ee635a8ebfc5bb38c"
url = "https://github.com/cyrusimap/cyrus-sasl/releases/download/cyrus-sasl-${VERSION}/cyrus-sasl-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
export CFLAGS="${CFLAGS} -std=gnu89"
export CPPFLAGS="${CPPFLAGS} -DHAVE_TIME_H=1"
./configure --prefix=/usr \
    --sbindir=/usr/bin \
    --libdir=/usr/lib \
    --disable-static \
    --enable-gssapi=/usr \
    --with-openssl=/usr \
    --with-dblib=none'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
