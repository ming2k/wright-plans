name = "greetd"
version = "0.10.3"
release = 2
description = "Minimal and flexible Wayland login manager daemon"
license = "GPL-3.0-only"
arch = "x86_64"
url = "https://sr.ht/~kennylevinsen/greetd"

link_deps = ['glibc', 'linux-pam', 'seatd']
build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://git.sr.ht/~kennylevinsen/greetd/archive/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/greetd-${VERSION}
cargo build --release --locked'''

[pipeline.staging]
script = '''
cd source/greetd-${VERSION}

install -Dm755 target/release/greetd ${STAGING_DIR}/usr/bin/greetd
install -Dm755 target/release/agreety ${STAGING_DIR}/usr/bin/agreety

if [ -f greetd.service ]; then
  install -Dm644 greetd.service ${STAGING_DIR}/usr/lib/systemd/system/greetd.service
else
  install -Dm644 /dev/stdin ${STAGING_DIR}/usr/lib/systemd/system/greetd.service << 'UNITEOF'
[Unit]
Description=Greeter daemon
After=systemd-user-sessions.service plymouth-quit-wait.service getty@tty1.service
Conflicts=getty@tty1.service

[Service]
Type=simple
ExecStart=/usr/bin/greetd
Restart=always
RestartSec=1

[Install]
Alias=display-manager.service
UNITEOF
fi

install -dm755 ${STAGING_DIR}/etc/greetd
if [ -f config.toml ]; then
  install -Dm644 config.toml ${STAGING_DIR}/etc/greetd/config.toml
else
  install -Dm644 /dev/stdin ${STAGING_DIR}/etc/greetd/config.toml << 'CFGEOF'
[terminal]
vt = 1

[default_session]
command = "agreety --cmd 'systemctl --user start --wait niri.service'"
user = "greeter"
CFGEOF
fi

install -Dm644 /dev/stdin ${STAGING_DIR}/etc/pam.d/greetd << 'PAMEOF'
# /etc/pam.d/greetd
auth      include     system-auth
account   include     system-account
session   required    pam_env.so
session   required    pam_limits.so
session   include     system-session
password  include     system-password
PAMEOF

install -dm750 ${STAGING_DIR}/var/lib/greetd

install -Dm644 /dev/stdin ${STAGING_DIR}/usr/lib/sysusers.d/greetd.conf << 'SYSUSERS'
u greeter - "Greeter user" /var/lib/greetd
m greeter video
SYSUSERS'''

[[output]]
runtime_deps = ['seatd', 'systemd', 'glibc', 'linux-pam']
backup = ["/etc/greetd/config.toml", "/etc/pam.d/greetd"]

[hooks]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/greetd.conf 2>/dev/null || true
chown greeter:greeter /var/lib/greetd 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
post_upgrade = '''
systemd-sysusers /usr/lib/sysusers.d/greetd.conf 2>/dev/null || true
chown greeter:greeter /var/lib/greetd 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
