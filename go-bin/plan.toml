name = "go-bin"
version = "1.26.1"
release = 1
description = "Prebuilt upstream Go binary distribution"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://go.dev"

build_deps = ['go']

[[sources]]
type = "http"
sha256 = "031f088e5d955bab8657ede27ad4e3bc5b7c1ba281f05f245bcc304f327c987a"
url = "https://go.dev/dl/go${VERSION}.linux-amd64.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/go-bin-${VERSION}
install -d ${STAGING_DIR}/usr/lib
cp -a ${WORKDIR} ${STAGING_DIR}/usr/lib/go
install -d ${STAGING_DIR}/usr/bin
ln -sf ../lib/go/bin/go ${STAGING_DIR}/usr/bin/go
ln -sf ../lib/go/bin/gofmt ${STAGING_DIR}/usr/bin/gofmt'''

[[output]]
replaces = ["go"]
conflicts = ["go"]
provides = ["go"]
