name = "python-psutil"
version = "7.2.2"
release = 1
description = "Cross-platform process and system monitoring library for Python"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/giampaolo/psutil"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/p/psutil/psutil-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
