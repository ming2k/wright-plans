[plan]
name = "openssh"
version = "10.2p1"
release = 7
description = "Free implementation of the SSH protocol suite"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.openssh.com/portable.html"

[dependencies]
build = ["gcc", "make", "pkgconf"]
runtime = ["shadow"]
link = ["glibc", "libedit", "linux-pam", "openssl", "zlib", "libxcrypt"]

[sources]
uris = [
  "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-${PKG_VERSION}.tar.gz",
  "sshd.service",
  "sshdgenkeys.service",
  "sshd.socket",
  "sshd@.service",
  "ssh-agent.service",
  "ssh-agent.socket",
  "sshd.pam",
  "openssh.tmpfiles",
]
sha256 = ["SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
# --with-privsep-user=nobody: no dedicated sshd user needed
# --with-security-key-builtin omitted: requires libfido2 (not yet packaged)
# --with-xauth omitted: pure Wayland system, no X11
./configure \
  --prefix=/usr \
  --sysconfdir=/etc/ssh \
  --libexecdir=/usr/lib/ssh \
  --sbindir=/usr/bin \
  --with-privsep-path=/usr/share/empty.sshd \
  --with-privsep-user=nobody \
  --with-pam \
  --with-libedit \
  --with-ssl-engine \
  --disable-lastlog \
  --with-default-path=/usr/bin
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

# ── Systemd system units ──────────────────────────────────────────────────────
install -Dm644 ${FILES_DIR}/sshd.service         ${PKG_DIR}/usr/lib/systemd/system/sshd.service
install -Dm644 ${FILES_DIR}/sshdgenkeys.service  ${PKG_DIR}/usr/lib/systemd/system/sshdgenkeys.service
install -Dm644 ${FILES_DIR}/sshd.socket          ${PKG_DIR}/usr/lib/systemd/system/sshd.socket
install -Dm644 ${FILES_DIR}/sshd@.service        ${PKG_DIR}/usr/lib/systemd/system/sshd@.service

# ── Systemd user units (ssh-agent) ────────────────────────────────────────────
install -Dm644 ${FILES_DIR}/ssh-agent.service    ${PKG_DIR}/usr/lib/systemd/user/ssh-agent.service
install -Dm644 ${FILES_DIR}/ssh-agent.socket     ${PKG_DIR}/usr/lib/systemd/user/ssh-agent.socket

# ── tmpfiles (privilege separation chroot) ────────────────────────────────────
install -Dm644 ${FILES_DIR}/openssh.tmpfiles     ${PKG_DIR}/usr/lib/tmpfiles.d/openssh.conf

# ── Factory defaults (pristine upstream configs for reference) ────────────────
install -Dm644 ${PKG_DIR}/etc/ssh/ssh_config     ${PKG_DIR}/usr/share/factory/etc/ssh/ssh_config
install -Dm644 ${PKG_DIR}/etc/ssh/sshd_config    ${PKG_DIR}/usr/share/factory/etc/ssh/sshd_config

# ── PAM configuration ─────────────────────────────────────────────────────────
install -Dm644 ${FILES_DIR}/sshd.pam             ${PKG_DIR}/etc/pam.d/sshd

# ── Permissions ───────────────────────────────────────────────────────────────
# ssh-keysign needs setuid for host-based authentication
if [ -e ${PKG_DIR}/usr/lib/ssh/ssh-keysign ]; then
  chmod 4755 ${PKG_DIR}/usr/lib/ssh/ssh-keysign
fi
'''

[install_scripts]
post_install = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/openssh.conf 2>/dev/null || true
ssh-keygen -A 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''
post_upgrade = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/openssh.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''

[backup]
files = [
"/etc/ssh/ssh_config",
"/etc/ssh/sshd_config",
"/etc/pam.d/sshd",
]
