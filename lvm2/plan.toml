name = "lvm2"
version = "2.03.38"
release = 2
description = "Linux Logical Volume Manager 2 utilities"
license = "GPL-2.0-only AND LGPL-2.1-only"
arch = "x86_64"
url = "https://sourceware.org/lvm2"

link_deps = ['readline', 'util-linux', 'libaio']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://sourceware.org/pub/lvm2/LVM2.${VERSION}.tgz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/LVM2.${VERSION}
./configure --prefix=/usr --sbindir=/usr/bin --enable-cmdlib --enable-pkgconfig --disable-udev_sync --enable-dmeventd --enable-lvmpolld --enable-blkid_wiping --with-readline'''

[lifecycle.compile]
script = '''
cd source/LVM2.${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/LVM2.${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['readline', 'util-linux', 'libaio']
hooks.post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemctl enable lvm2-monitor.service 2>/dev/null || true

'''
hooks.post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
