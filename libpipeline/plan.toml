name = "libpipeline"
version = "1.5.8"
release = 1
description = "A library for manipulating pipelines of subprocesses in a flexible and convenient way"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://libpipeline.nongnu.org/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.savannah.gnu.org/releases/libpipeline/libpipeline-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libpipeline-${VERSION}
./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/libpipeline-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libpipeline-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

