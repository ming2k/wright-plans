[plan]
name = "greetd"
version = "0.10.3"
release = 1
description = "Minimal and flexible Wayland login manager daemon"
license = "GPL-3.0-only"
arch = "x86_64"
url = "https://sr.ht/~kennylevinsen/greetd"

[dependencies]
build = ["rust"]
runtime = ["seatd"]
link = ["glibc", "linux-pam", "seatd", "systemd"]

[sources]
uris = ["https://git.sr.ht/~kennylevinsen/greetd/archive/${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
cargo build --release --locked
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}

install -Dm755 target/release/greetd ${PKG_DIR}/usr/bin/greetd
install -Dm755 target/release/agreety ${PKG_DIR}/usr/bin/agreety

if [ -f greetd.service ]; then
  install -Dm644 greetd.service ${PKG_DIR}/usr/lib/systemd/system/greetd.service
else
  install -Dm644 /dev/stdin ${PKG_DIR}/usr/lib/systemd/system/greetd.service << 'UNITEOF'
[Unit]
Description=Greeter daemon
After=systemd-user-sessions.service plymouth-quit-wait.service getty@tty1.service
Conflicts=getty@tty1.service

[Service]
Type=simple
ExecStart=/usr/bin/greetd
Restart=always
RestartSec=1

[Install]
Alias=display-manager.service
UNITEOF
fi

install -dm755 ${PKG_DIR}/etc/greetd
if [ -f config.toml ]; then
  install -Dm644 config.toml ${PKG_DIR}/etc/greetd/config.toml
else
  install -Dm644 /dev/stdin ${PKG_DIR}/etc/greetd/config.toml << 'CFGEOF'
[terminal]
vt = 1

[default_session]
command = "agreety --cmd 'systemctl --user start --wait niri.service'"
user = "greeter"
CFGEOF
fi

install -Dm644 /dev/stdin ${PKG_DIR}/etc/pam.d/greetd << 'PAMEOF'
# /etc/pam.d/greetd
auth      include     system-auth
account   include     system-account
session   required    pam_env.so
session   required    pam_limits.so
session   include     system-session
password  include     system-password
PAMEOF

install -Dm644 /dev/stdin ${PKG_DIR}/usr/lib/sysusers.d/greetd.conf << 'SYSUSERS'
u greeter - "Greeter user" /var/lib/greetd
m greeter video
SYSUSERS
'''

[install_scripts]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/greetd.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''
post_upgrade = '''
systemd-sysusers /usr/lib/sysusers.d/greetd.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''

[backup]
files = ["/etc/greetd/config.toml", "/etc/pam.d/greetd"]
