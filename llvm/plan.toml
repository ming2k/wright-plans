name = "llvm"
version = "22.1.3"
release = 1
description = "The LLVM Compiler Infrastructure"
license = "Apache-2.0-with-LLVM-exception"
arch = "x86_64"
url = "https://llvm.org"

[dependencies]
runtime = ["llvm-libs"]
build = ["cmake", "gcc", "ninja", "pkgconf", "python"]
link = ["libedit", "libffi", "libxml2", "zlib", "zstd"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${VERSION}/llvm-project-${VERSION}.src.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/llvm-project-${VERSION}.src/llvm
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_SKIP_INSTALL_RPATH=ON -DLLVM_ENABLE_PROJECTS="clang;lld" -DLLVM_ENABLE_RUNTIMES="compiler-rt" -DLLVM_TARGETS_TO_BUILD="X86" -DLLVM_BUILD_LLVM_DYLIB=ON -DLLVM_LINK_LLVM_DYLIB=ON -DLLVM_ENABLE_RTTI=ON -DLLVM_ENABLE_FFI=ON -DLLVM_ENABLE_ZLIB=ON -DLLVM_ENABLE_ZSTD=ON -DLLVM_ENABLE_LIBEDIT=ON -DLLVM_BINUTILS_INCDIR=/usr/include -DCLANG_DEFAULT_PIE_ON_LINUX=ON -DCLANG_LINK_CLANG_DYLIB=ON -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF -DLLVM_ENABLE_ASSERTIONS=OFF -DLLVM_ENABLE_BINDINGS=OFF'''

[lifecycle.compile]
script = '''
cd source/llvm-project-${VERSION}.src/llvm
ninja -C build -j$(nproc)'''

[output]

[output."llvm-libs"]
include = ["/.*"]
description = "LLVM shared libraries"
[output."llvm-libs".dependencies]
link = ["glibc", "libffi", "libedit", "ncurses", "zlib", "zstd"]
runtime = ["glibc", "libffi", "libedit", "ncurses", "zlib", "zstd"]

[output."clang"]
include = ["/.*"]
description = "C/C++/ObjC compiler frontend for LLVM"
[output."clang".dependencies]
runtime = ["llvm-libs"]
link = ["glibc"]

[output."lld"]
include = ["/.*"]
description = "LLVM linker"
[output."lld".dependencies]
runtime = ["llvm-libs"]
link = ["glibc"]
