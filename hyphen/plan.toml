name = "hyphen"
version = "2.8.8"
release = 1
description = "A hyphenation library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "http://hunspell.sourceforge.net/"

link_deps = ['glibc']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "http://deb.debian.org/debian/pool/main/h/hyphen/hyphen_${VERSION}.orig.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/hyphen-${VERSION}
./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/hyphen-${VERSION}
make'''

[pipeline.staging]
script = '''
cd source/hyphen-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc']
