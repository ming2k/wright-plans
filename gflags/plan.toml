name = "gflags"
version = "2.2.2"
release = 1
description = "Command-line flags library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/gflags/gflags"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/gflags/gflags/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
    -DBUILD_SHARED_LIBS=ON \
    -DBUILD_TESTING=OFF \
    -DREGISTER_INSTALL_PREFIX=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
