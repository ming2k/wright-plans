name = "iproute2"
version = "6.19.0"
release = 1
description = "Programs for basic and advanced IPV4-based networking"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://wiki.linuxfoundation.org/networking/iproute2"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/utils/net/iproute2/iproute2-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
sed -i /ARPD/d Makefile
rm -fv man/man8/arpd.8'''

[lifecycle.compile]
script = '''
cd source
make NETNS_RUN_DIR=/run/netns -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make SBINDIR=/usr/bin DESTDIR=${PART_DIR} install'''
