name = "python-mako"
version = "1.3.10"
release = 1
description = "Fast templating language for Python"
license = "MIT"
arch = "x86_64"
url = "https://www.makotemplates.org/"

[dependencies]
build = ["python"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/m/mako/mako-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --break-system-packages --no-deps --root=${PART_DIR} --no-build-isolation .'''
