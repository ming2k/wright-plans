name = "python-idna"
version = "3.10"
release = 1
description = "Internationalized Domain Names in Applications (IDNA)"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/kjd/idna"

[dependencies]
runtime = ["python"]
build = ["python", "flit-core"]

[[sources]]
uri = "https://pypi.org/packages/source/i/idna/idna-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .

'''

[lifecycle.fabricate]
