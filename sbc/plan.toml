name = "sbc"
version = "2.2"
release = 1
description = "Bluetooth Sub-Band Codec (SBC) library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.kernel.org/pub/linux/bluetooth/"

link_deps = ['glibc']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/bluetooth/sbc-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/sbc-${VERSION}
./configure --prefix=/usr \
    --disable-static \
    --disable-tester'''

[pipeline.compile]
script = '''
cd source/sbc-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/sbc-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc']
