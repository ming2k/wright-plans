name = "gperf"
version = "3.3"
release = 1
description = "Perfect hash function generator"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gperf/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gperf/gperf-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/gperf-${VERSION}
./configure --prefix=/usr --docdir=/usr/share/doc/gperf-${VERSION}'''

[lifecycle.compile]
script = '''
cd source/gperf-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/gperf-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

