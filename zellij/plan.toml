name = "zellij"
version = "0.44.1"
release = 1
description = "A terminal workspace with batteries included"
license = "MIT"
arch = "x86_64"
url = "https://github.com/zellij-org/zellij"

[dependencies]
build = ["rust"]

[[sources]]
uri = "https://github.com/zellij-org/zellij/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
env = { CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target" }
script = '''
cd ${BUILD_DIR}
cargo build --release --locked
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/zellij ${PART_DIR}/usr/bin/zellij
'''

[lifecycle.fabricate]
