name = "brotli"
version = "1.2.0"
release = 1
description = "Generic-purpose lossless compression algorithm"
license = "MIT"
arch = "x86_64"


build_deps = ['cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/google/brotli/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/brotli-${VERSION}
cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib'''

[pipeline.compile]
script = '''
cd source/brotli-${VERSION}
cmake --build build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/brotli-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build'''
