name = "pefile"
version = "2024.8.26"
release = 1
description = "Python module to read and work with PE (Portable Executable) files"
license = "MIT"
arch = "x86_64"
url = "https://github.com/erocarrera/pefile"

build_deps = ["python", "setuptools"]
link_deps = ["python"]

[[sources]]
type = "http"
url = "https://files.pythonhosted.org/packages/source/p/pefile/pefile-${VERSION}.tar.gz"
sha256 = "3ff6c5d8b43e8c37bb6e6dd5085658d658a7a0bdcd20b6a07b1fcfc1c4e9d632"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/pefile-${VERSION}
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ["python"]
