name = "iniparser"
version = "4.2.6"
release = 1
description = "A free stand-alone ini file parsing library"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ndevilla/iniparser"

[dependencies]
build = ["gcc", "cmake", "ninja"]
link = ["glibc"]

[[sources]]
type = "http"
sha256 = "a0bd370713a744b1fa8ec27bba889ebf9dbd43060ec92e07fbe91fb43e3cb3ac"
url = "https://github.com/ndevilla/iniparser/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
mkdir build
cd build
cmake \
    -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    ..'''

[lifecycle.compile]
script = '''
cd source/build
ninja'''

[lifecycle.staging]
script = '''
cd source/build
DESTDIR=${PART_DIR} ninja install'''
