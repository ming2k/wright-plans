name = "llvm"
version = "22.1.4"
release = 1
description = "The LLVM Compiler Infrastructure"
license = "Apache-2.0-with-LLVM-exception"
arch = "x86_64"
url = "https://llvm.org"

link_deps = ['libedit:default', 'libffi:default', 'libxml2:default', 'zlib:default', 'zstd:default', 'glibc:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${VERSION}/llvm-project-${VERSION}.src.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/llvm-project-${VERSION}.src/llvm
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_SKIP_INSTALL_RPATH=ON -DLLVM_ENABLE_PROJECTS="clang;clang-tools-extra;lld" -DLLVM_ENABLE_RUNTIMES="compiler-rt" -DLLVM_TARGETS_TO_BUILD="X86" -DLLVM_BUILD_LLVM_DYLIB=ON -DLLVM_LINK_LLVM_DYLIB=ON -DLLVM_ENABLE_RTTI=ON -DLLVM_ENABLE_FFI=ON -DLLVM_ENABLE_ZLIB=ON -DLLVM_ENABLE_ZSTD=ON -DLLVM_ENABLE_LIBEDIT=ON -DLLVM_BINUTILS_INCDIR=/usr/include -DCLANG_DEFAULT_PIE_ON_LINUX=ON -DCLANG_LINK_CLANG_DYLIB=ON -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF -DLLVM_ENABLE_ASSERTIONS=OFF -DLLVM_ENABLE_BINDINGS=OFF'''

[lifecycle.compile]
script = '''
cd source/llvm-project-${VERSION}.src/llvm
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/llvm-project-${VERSION}.src/llvm
DESTDIR=${STAGING_DIR} ninja -C build install
'''

# LLVM outputs: libs + clang + lld + clangd
# Note: no catch-all; unclaimed files (e.g. llvm-as, opt, llc, headers) are discarded.

[[output]]
name = "llvm-libs"
description = "LLVM shared libraries"
include = [
    "/usr/lib/libLLVM.*\\.so.*",
    "/usr/lib/libclang\\.so.*",
    "/usr/lib/libclang-cpp\\.so.*",
    "/usr/lib/liblld.*\\.so.*",
    "/usr/lib/libLTO\\.so.*",
    "/usr/lib/libRemarks\\.so.*",
    "/usr/lib/LLVMgold\\.so",
]
runtime_deps = ['glibc:default', 'libffi:default', 'libedit:default', 'ncurses:default', 'zlib:default', 'zstd:default']

[[output]]
name = "clang"
description = "C/C++/ObjC compiler frontend for LLVM"
include = [
    "/usr/bin/clang",
    "/usr/bin/clang-[0-9]+",
    "/usr/bin/clang\\+\\+",
    "/usr/bin/clang-cl",
    "/usr/bin/clang-cpp",
    "/usr/bin/clang-format",
    "/usr/bin/clang-tidy",
    "/usr/bin/clang-check",
    "/usr/bin/run-clang-tidy",
    "/usr/bin/git-clang-format",
    "/usr/bin/clang-apply-replacements",
    "/usr/bin/scan-build",
    "/usr/bin/scan-view",
    "/usr/bin/analyze-build",
    "/usr/bin/intercept-build",
    "/usr/lib/clang/.*",
    "/usr/lib/cmake/clang/.*",
    "/usr/lib/libscanbuild/.*",
    "/usr/share/clang/.*",
    "/usr/share/scan-build/.*",
    "/usr/share/scan-view/.*",
    "/usr/share/man/man1/scan-build\\.1",
]
runtime_deps = ['llvm-libs:default']

[[output]]
name = "lld"
description = "LLVM linker"
include = [
    "/usr/bin/lld",
    "/usr/bin/lld-[0-9]+",
    "/usr/bin/ld\\.lld",
    "/usr/bin/ld64\\.lld",
    "/usr/bin/lld-link",
    "/usr/bin/wasm-ld",
    "/usr/lib/cmake/lld/.*",
]
runtime_deps = ['llvm-libs:default']

[[output]]
name = "clangd"
description = "Language server protocol implementation for C/C++"
include = [
    "/usr/bin/clangd",
]
runtime_deps = ['clang:default', 'llvm-libs:default']

