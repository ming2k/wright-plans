name = "gawk"
version = "5.3.2"
release = 1
description = "Programs for manipulating text files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gawk/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gawk/gawk-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
sed -i 's/extras//' Makefile.in'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
