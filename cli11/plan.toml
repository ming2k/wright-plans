name = "cli11"
version = "2.4.2"
release = 1
description = "Command line parser for C++11 and beyond"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/CLIUtils/CLI11"


build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/CLIUtils/CLI11/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/cli11-${VERSION}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCLI11_BUILD_TESTS=OFF -DCLI11_BUILD_EXAMPLES=OFF'''

[pipeline.compile]
script = '''
cd source/cli11-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/cli11-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

