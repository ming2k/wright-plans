name = "seabios"
version = "1.16.3"
release = 1
description = "Open source legacy BIOS implementation used by QEMU"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://www.seabios.org/"

[dependencies]
build = ["bash", "gcc", "make", "python"]

[[sources]]
sha256 = "SKIP"
url = "https://www.seabios.org/downloads/seabios-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) PYTHON=python3'''

[lifecycle.staging]
script = '''
cd source
install -Dm644 out/bios.bin ${PART_DIR}/usr/share/qemu/bios.bin
if [ -f out/vgabios.bin ]; then
  install -Dm644 out/vgabios.bin ${PART_DIR}/usr/share/qemu/vgabios.bin
fi
install -Dm644 COPYING ${PART_DIR}/usr/share/doc/seabios/COPYING'''
