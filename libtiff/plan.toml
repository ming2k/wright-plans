name = "libtiff"
version = "4.7.1"
release = 1
description = "TIFF image format library"
license = "libtiff"
arch = "x86_64"
url = "https://libtiff.gitlab.io/libtiff/"

[dependencies]
build = ["gcc", "make"]
link = ["zlib", "libjpeg-turbo"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.osgeo.org/libtiff/tiff-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR} DESTDIR=${PART_DIR} install'''
