name = "python-pyelftools"
version = "0.31"
release = 1
description = "Python library for analyzing ELF files and DWARF debugging information"
license = "Unlicense"
arch = "x86_64"
url = "https://github.com/eliben/pyelftools"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
uri = "https://github.com/eliben/pyelftools/archive/v${PART_VERSION}/pyelftools-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .

'''
