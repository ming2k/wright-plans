name = "systemd"
version = "260.2"
release = 1
description = "System and Service Manager"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/systemd/systemd"

link_deps = ['acl', 'cryptsetup', 'glibc', 'libcap', 'libgcrypt', 'libidn2', 'libseccomp', 'libxcrypt', 'linux-pam', 'lz4', 'openssl', 'p11-kit', 'pcre2', 'tpm2-tss', 'util-linux', 'xz', 'zstd']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "71a9ed11cf773478b0d7a16cd96e39ca3c3939ab37ed9a8ee814c31ea9b4f2b5"
url = "https://github.com/systemd/systemd/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "90-theseus.preset"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "network-wait-online.conf"

[pipeline.prepare]
script = '''
cd source/systemd-${VERSION}
sed -i -e 's/GROUP="render"/GROUP="video"/' \
       -e 's/GROUP="sgx", //' \
       rules.d/50-udev-default.rules.in
'''

[pipeline.configure]
script = '''
cd source/systemd-${VERSION}
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D libdir=lib \
    -D split-bin=false \
    -D dbuspolicydir=/usr/share/dbus-1/system.d \
    -D pamconfdir=/usr/lib/pam.d \
    -D docdir=/usr/share/doc/systemd-${VERSION} \
    -D version-tag="${VERSION}-theseus" \
    -D vcs-tag=false \
    -D shared-lib-tag="${VERSION}" \
    -D mode=release \
    -D install-tests=false \
    -D tests=false \
    -D ldconfig=false \
    -D man=disabled \
    -D rpmmacrosdir=no \
    -D sysvinit-path= \
    -D sysvrcnd-path= \
    -D firstboot=true \
    -D sysusers=true \
    -D pam=enabled \
    -D logind=true \
    -D networkd=true \
    -D resolve=true \
    -D seccomp=enabled \
    -D libidn2=enabled \
    -D lz4=enabled \
    -D dns-over-tls=openssl \
    -D tpm2=enabled \
    -D ukify=enabled \
    -D bootloader=enabled \
    -D homed=disabled \
    -D sysupdate=disabled \
    -D audit=disabled \
    -D selinux=disabled \
    -D default-dnssec=no \
    -D default-kill-user-processes=false \
    -D default-locale='C.UTF-8' \
    -D fallback-hostname='theseus' \
    -D nologin-path=/usr/bin/nologin \
    -D dev-kvm-mode=0660 \
    -D nobody-group=nogroup \
    -D sbat-distro=theseus \
    -D sbat-distro-pkgname=systemd \
    -D sbat-distro-url=https://github.com/ming2k/wright'''

[pipeline.compile]
script = '''
cd source/systemd-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/systemd-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install

# Preset only the services we opt into.
install -Dm644 ${WORKDIR}/systemd-90-theseus.preset ${STAGING_DIR}/usr/lib/systemd/system-preset/90-theseus.preset

# wait-online: single-NIC laptop policy — any interface online is enough,
# and cap the wait at 20s so a missing secondary link never pins boot.
install -Dm644 ${WORKDIR}/systemd-network-wait-online.conf \
    ${STAGING_DIR}/usr/lib/systemd/system/systemd-networkd-wait-online.service.d/10-theseus.conf
'''

[[output]]
name = "systemd-boot"
description = "EFI boot manager"
include = [
    "/usr/bin/bootctl",
    "/usr/lib/systemd/boot/efi/**",
    "/usr/lib/systemd/systemd-boot-check-no-failures",
    "/usr/lib/systemd/system/systemd-boot-*.service",
    "/usr/lib/systemd/system/systemd-bootctl@.service",
    "/usr/lib/systemd/system/systemd-bootctl.socket",
    "/usr/share/bash-completion/completions/bootctl",
    "/usr/share/zsh/site-functions/_bootctl",
]
runtime_deps = ["systemd"]

[[output]]
name = "systemd-ukify"
description = "Unified Kernel Image builder"
include = [
    "/usr/bin/ukify",
    "/usr/lib/kernel/install.d/60-ukify.install",
]
runtime_deps = ["systemd", "python", "pefile"]

[[output]]
name = "systemd-networkd"
description = "Network configuration daemon"
include = [
    "/etc/systemd/networkd.conf",
    "/usr/bin/networkctl",
    "/usr/lib/systemd/systemd-networkd",
    "/usr/lib/systemd/systemd-networkd-wait-online",
    "/usr/lib/systemd/network/**",
    "/usr/lib/systemd/system/systemd-networkd*.service",
    "/usr/lib/systemd/system/systemd-networkd*.socket",
    "/usr/lib/systemd/system/systemd-networkd-wait-online*.service",
    "/usr/lib/systemd/system/systemd-networkd-wait-online.service.d/**",
    "/usr/share/bash-completion/completions/networkctl",
    "/usr/share/polkit-1/rules.d/systemd-networkd.rules",
    "/usr/share/zsh/site-functions/_networkctl",
]
runtime_deps = ["systemd"]

[[output]]
name = "systemd-resolved"
description = "Network name resolution daemon"
include = [
    "/etc/systemd/resolved.conf",
    "/usr/bin/resolvectl",
    "/usr/lib/systemd/systemd-resolved",
    "/usr/lib/systemd/system/systemd-resolved*.service",
    "/usr/lib/systemd/system/systemd-resolved*.socket",
    "/usr/share/bash-completion/completions/resolvectl",
    "/usr/share/zsh/site-functions/_resolvectl",
]
runtime_deps = ["systemd"]

[[output]]
description = "System and Service Manager (core)"
runtime_deps = ['acl', 'bash', 'cryptsetup', 'glibc', 'hwdata', 'kbd', 'kmod', 'libcap', 'libgcrypt', 'libidn2', 'libseccomp', 'libxcrypt', 'linux-pam', 'lz4', 'openssl', 'p11-kit', 'pcre2', 'tpm2-tss', 'util-linux', 'xz', 'zstd']
backup = ["/etc/issue", "/etc/locale.conf", "/etc/nsswitch.conf", "/etc/vconsole.conf", "/etc/systemd/coredump.conf", "/etc/systemd/journald.conf", "/etc/systemd/logind.conf", "/etc/systemd/oomd.conf", "/etc/systemd/sleep.conf", "/etc/systemd/system.conf", "/etc/systemd/timesyncd.conf", "/etc/systemd/user.conf", "/etc/udev/iocost.conf", "/etc/udev/udev.conf"]

[output.hooks]
post_install = '''
ldconfig 2>/dev/null || true
systemd-machine-id-setup 2>/dev/null || true
systemctl preset-all 2>/dev/null || true
systemctl daemon-reexec 2>/dev/null || true
'''
post_upgrade = '''
ldconfig 2>/dev/null || true
systemctl daemon-reexec 2>/dev/null || true
'''
