name = "flatpak-builder"
version = "1.4.7"
release = 1
description = "Tool to build Flatpaks from source"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/flatpak/flatpak-builder"

[dependencies]
runtime = ["flatpak", "appstream"]
build = ["meson", "ninja", "pkgconf", "appstream", "elfutils"]
link = ["glib", "json-glib", "curl", "elfutils", "libxml2", "ostree", "libyaml"]

[[sources]]
sha256 = "fd5bc36fe3b974395f782e6c920d8955cee168f513370c32cc800b69acd980d0"
url = "https://github.com/flatpak/flatpak-builder/releases/download/${VERSION}/flatpak-builder-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build              \
    --prefix=/usr              \
    --buildtype=release        \
    -Ddocs=disabled            \
    -Dtests=false              \
    -Dinstalled_tests=false    \
    -Dyaml=enabled'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
meson install -C ${WORKDIR}/build --destdir ${PART_DIR}'''
