name = "pinentry"
version = "1.3.2"
release = 1
description = "Collection of simple PIN or passphrase entry dialogs"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gnupg.org/software/pinentry/"

build = ['gcc', 'make', 'pkgconf']
link = ['libassuan', 'libgpg-error', 'ncurses']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gnupg.org/ftp/gcrypt/pinentry/pinentry-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --disable-static \
  --enable-pinentry-curses \
  --enable-pinentry-tty \
  --disable-pinentry-emacs \
  --disable-pinentry-gnome3 \
  --disable-pinentry-gtk2 \
  --disable-pinentry-qt \
  --disable-pinentry-qt5 \
  --disable-pinentry-qt6'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} make install

# Ensure a generic pinentry binary exists for gpg-agent defaults.
if [ ! -e ${STAGING_DIR}/usr/bin/pinentry ] && [ -e ${STAGING_DIR}/usr/bin/pinentry-curses ]; then
  ln -sf pinentry-curses ${STAGING_DIR}/usr/bin/pinentry
fi'''

