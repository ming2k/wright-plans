name = "niri"
version = "26.04"
release = 1
description = "Scrollable-tiling Wayland compositor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/niri-wm/niri"

link_deps = ['cairo', 'glib', 'libdisplay-info', 'libinput', 'mesa', 'pango', 'pipewire', 'seatd', 'systemd', 'wayland', 'libxkbcommon']
build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/niri-wm/niri/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "patches/0001-default-xwayland-satellite-off.patch"

[pipeline.prepare]
script = '''
cd source/*
# Pure Wayland system policy: default xwayland-satellite to off so niri never
# tries to spawn it when the user has no config override. Opt-in stays one-line
# for users who still want X11: `xwayland-satellite { on; }`.
patch -Np1 < ${WORKDIR}/${NAME}-0001-default-xwayland-satellite-off.patch'''

[pipeline.configure]
script = '''
cd source/*
echo "cargo project, no configure step"'''

[pipeline.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${WORKDIR}/.cargo', CARGO_TARGET_DIR = '${WORKDIR}/target' }
script = '''
cd source/*
cargo build --release --locked'''

[pipeline.staging]
script = '''
cd source/*
install -Dm755 ${WORKDIR}/target/release/niri ${STAGING_DIR}/usr/bin/niri
install -Dm755 resources/niri-session ${STAGING_DIR}/usr/bin/niri-session
install -Dm644 resources/niri.desktop ${STAGING_DIR}/usr/share/wayland-sessions/niri.desktop
install -Dm644 resources/niri-portals.conf ${STAGING_DIR}/usr/share/xdg-desktop-portal/niri-portals.conf
install -Dm644 resources/niri.service ${STAGING_DIR}/usr/lib/systemd/user/niri.service
install -Dm644 resources/niri-shutdown.target ${STAGING_DIR}/usr/lib/systemd/user/niri-shutdown.target'''

[[output]]
runtime_deps = ['seatd', 'pipewire', 'xdg-desktop-portal', 'xdg-desktop-portal-gtk', 'cairo', 'glib', 'libdisplay-info', 'libinput', 'mesa', 'pango', 'systemd', 'wayland', 'libxkbcommon']
