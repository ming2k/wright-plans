name = "nftables"
version = "1.1.6"
release = 5
description = "Netfilter tables userspace tools"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://www.netfilter.org/projects/nftables/"

[dependencies]
build = ["autoconf", "automake", "bison", "flex", "gcc", "libmnl", "libnftnl", "make", "pkgconf"]
link = ["gmp", "jansson", "libmnl", "libnftnl", "ncurses", "readline"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.netfilter.org/pub/nftables/nftables-${VERSION}.tar.xz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "nftables.service"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "nftables.conf"

[options]
ccache = true

[lifecycle.prepare]
script = '''
cd source
autoreconf -fiv'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr       \
  --sbindir=/usr/bin  \
  --sysconfdir=/etc   \
  --with-json         \
  --with-cli=readline \
  --disable-debug     \
  --disable-man-doc   \
  --disable-python    \
  --with-mini-gmp=no'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install

install -Dm644 ${WORKDIR}/nftables.conf ${PART_DIR}/etc/nftables.conf
install -Dm644 ${WORKDIR}/nftables.service ${PART_DIR}/usr/lib/systemd/system/nftables.service'''

[output]
backup = ["/etc/nftables.conf"]

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"
pre_remove = "nft flush ruleset 2>/dev/null || true"
