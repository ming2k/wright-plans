[plan]
name = "libproxy"
version = "0.5.8"
release = 1
description = "Library that provides automatic proxy configuration management"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
build = ["gobject-introspection", "meson", "ninja", "pkgconf"]
runtime = ["duktape", "gsettings-desktop-schemas"]
link = ["glib"]
[sources]
uris = ["https://github.com/libproxy/libproxy/archive/refs/tags/${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
# -Dvapi=false: 禁用 Vala 绑定（因为未安装 valac）
# -Dconfig-gnome=true: 启用 GNOME 代理设置支持
# -Dpacrunner-duktape=true: 启用 Duktape JS 引擎支持
script = """
cd ${BUILD_DIR}
meson setup build \
--prefix=/usr \
--buildtype=release \
-Ddocs=false \
-Dtests=false \
-Dvapi=false \
-Dconfig-gnome=true \
-Dpacrunner-duktape=true
"""

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
script = "DESTDIR=${PKG_DIR} meson install -C ${BUILD_DIR}/build"
