name = "iana-etc"
version = "20260430"
release = 1
description = "Data for network services and protocols (/etc/services and /etc/protocols)"
license = "MIT"
arch = "x86_64"
url = "https://www.iana.org/protocols"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "11f67138163d1de144adee30d7a053de1050e6e586237ca12e24e5f70f47c5fb"
url = "https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.csv"

[[sources]]
type = "http"
sha256 = "e704ee14e69347681b3a6271af02195a9741236074fc311449ebb032101bdf2c"
url = "https://www.iana.org/assignments/protocol-numbers/protocol-numbers-1.csv"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "generate_iana_etc.py"

[pipeline.staging]
script = '''
python3 ${WORKDIR}/iana-etc-generate_iana_etc.py \
  ${WORKDIR}/iana-etc-service-names-port-numbers.csv \
  ${WORKDIR}/iana-etc-protocol-numbers-1.csv \
  ${STAGING_DIR}'''
