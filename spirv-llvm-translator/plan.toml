[plan]
name = "spirv-llvm-translator"
version = "21.1.4"
release = 1
description = "Bi-directional translation between SPIR-V and LLVM IR"
license = "UoI-NCSA"
arch = "x86_64"
url = "https://github.com/KhronosGroup/SPIRV-LLVM-Translator"

[dependencies]
runtime = ["llvm"]
build = ["cmake", "gcc", "llvm", "make", "spirv-headers", "spirv-tools"]

[[sources]]
uri = "https://github.com/KhronosGroup/SPIRV-LLVM-Translator/archive/refs/tags/v${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[options]
strip = true
ccache = true

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib -DBUILD_SHARED_LIBS=ON -DLLVM_EXTERNAL_SPIRV_HEADERS_SOURCE_DIR=/usr -DLLVM_SPIRV_INCLUDE_TESTS=OFF
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
cmake --build build -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PKG_DIR} cmake --install build
'''
