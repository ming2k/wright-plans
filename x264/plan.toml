name = "x264"
version = "0.165.r3222.b35605a"
release = 1
description = "H.264/AVC encoder library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://code.videolan.org/videolan/x264"

[dependencies]
build = ["gcc", "make", "nasm"]

[[sources]]
sha256 = "SKIP"
url = "https://code.videolan.org/videolan/x264/-/archive/b35605ace3ddf7c1a5d67a2eb553f034aef41d55/x264-b35605ace3ddf7c1a5d67a2eb553f034aef41d55.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
            --enable-shared \
            --disable-static \
            --enable-lto \
            --disable-cli'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
