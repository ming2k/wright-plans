name = "brightnessctl"
version = "0.5.1"
release = 1
description = "A program to read and control device brightness"
license = "MIT"
arch = "x86_64"
url = "https://github.com/Hummer12007/brightnessctl"

[dependencies]
runtime = ["systemd"]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/Hummer12007/brightnessctl/archive/${PART_VERSION}/brightnessctl-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make ENABLE_SYSTEMD=1

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make install DESTDIR=${PART_DIR} PREFIX=/usr ENABLE_SYSTEMD=1 INSTALL_UDEV_RULES=0

'''
