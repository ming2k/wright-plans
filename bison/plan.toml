name = "bison"
version = "3.8.2"
release = 1
description = "Parser generator"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/bison/"

[dependencies]
build = ["gcc", "m4", "make"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/bison/bison-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --docdir=/usr/share/doc/bison-${PART_VERSION}

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
