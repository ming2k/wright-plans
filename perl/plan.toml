name = "perl"
version = "5.42.0"
release = 1
description = "Practical Extraction and Report Language"
license = "Artistic-1.0-Perl OR GPL-1.0-or-later"
arch = "x86_64"
url = "https://www.perl.org/"

[dependencies]
build = ["bzip2", "gcc", "gdbm", "make"]
link = ["zlib"]

[[sources]]
sha256 = "73cf6cc1ea2b2b1c110a18c14bbbc73a362073003893ffcedc26d22ebdbdd0c3"
url = "https://www.cpan.org/src/5.0/perl-5.42.0.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
export BUILD_ZLIB=False
export BUILD_BZIP2=0
sh Configure -des                                          \
-D prefix=/usr                                \
-D vendorprefix=/usr                          \
-D privlib=/usr/lib/perl5/5.42/core_perl      \
-D archlib=/usr/lib/perl5/5.42/core_perl      \
-D sitelib=/usr/lib/perl5/5.42/site_perl      \
-D sitearch=/usr/lib/perl5/5.42/site_perl     \
-D vendorlib=/usr/lib/perl5/5.42/vendor_perl  \
-D vendorarch=/usr/lib/perl5/5.42/vendor_perl \
-D man1dir=/usr/share/man/man1                \
-D man3dir=/usr/share/man/man3                \
-D pager="/usr/bin/less -isR"                 \
-D useshrplib                                 \
-D usethreads'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
unset BUILD_ZLIB BUILD_BZIP2'''
