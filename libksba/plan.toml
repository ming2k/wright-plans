name = "libksba"
version = "1.6.7"
release = 1
description = "X.509 and CMS library for GnuPG"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gnupg.org/software/libksba/"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gnupg.org/ftp/gcrypt/libksba/libksba-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} make install'''
