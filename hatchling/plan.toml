name = "hatchling"
version = "1.29.0"
release = 1
description = "Modern, extensible Python build backend"
license = "MIT"
arch = "x86_64"
url = "https://hatch.pypa.io/"

[dependencies]
runtime = ["python", "python-packaging", "python-pathspec", "python-pluggy", "python-trove-classifiers"]
build = ["python"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/h/hatchling/hatchling-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
