name = "aardvark-dns"
version = "1.17.1"
release = 1
description = "Authoritative DNS server for container A and AAAA records"
license = "Apache-2.0 AND MIT AND Zlib"
arch = "x86_64"
url = "https://github.com/containers/aardvark-dns"

[dependencies]
build = ["rust", "cargo"]
runtime = ["glibc"]
link = ["glibc"]

[[sources]]
type = "http"
sha256 = "25b39bfad079a03862825b2f9db8b71b82fc80aad5552a9c76ea912edc9b889e"
url = "https://github.com/containers/aardvark-dns/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "009198f042f150d42025c8a0456bb7a98293c9deeb012d37b2d364f44e52288f"
url = "https://github.com/containers/aardvark-dns/releases/download/v${VERSION}/aardvark-dns-v${VERSION}-vendor.tar.gz"

[lifecycle.prepare]
isolation = "none"
script = '''
cd source/aardvark-dns-${VERSION}
ln -sfn ../vendor vendor
install -dm755 .cargo
cat > .cargo/config.toml << 'EOF'
[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"
EOF'''

[lifecycle.compile]
isolation = "none"
script = '''
cd source/aardvark-dns-${VERSION}
export CARGO_HOME=${WORKDIR}/.cargo-home
export CARGO_TARGET_DIR=${WORKDIR}/target

# Use upstream Makefile
make PREFIX=/usr CARGO="cargo --locked --offline" build'''

[lifecycle.staging]
isolation = "none"
script = '''
cd source/aardvark-dns-${VERSION}
make DESTDIR=${PART_DIR} PREFIX=/usr install'''
