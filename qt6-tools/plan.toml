name = "qt6-tools"
version = "6.11.0"
release = 1
description = "Qt 6 tools module"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"

link_deps = ['qt6-base', 'qt6-declarative']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qttools-everywhere-src-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/qttools-everywhere-src-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_TESTING=OFF \
    -DQT_BUILD_EXAMPLES=OFF \
    -DQT_BUILD_TESTS=OFF'''

[lifecycle.compile]
script = '''
cd source/qttools-everywhere-src-${VERSION}
ninja -j$(nproc) -C build'''

[lifecycle.staging]
script = '''
cd source/qttools-everywhere-src-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['qt6-base', 'qt6-declarative']
