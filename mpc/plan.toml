name = "mpc"
version = "1.3.1"
release = 1
description = "C library for the arithmetic of complex numbers with arbitrarily high precision"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://www.multiprecision.org/mpc/"

[dependencies]
build = ["make"]
link = ["gmp", "mpfr"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/mpc/mpc-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr    \
--disable-static \
--docdir=/usr/share/doc/mpc-1.3.1'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)
make html'''

[lifecycle.check]
script = '''
cd source
make check'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
make DESTDIR=${PART_DIR} install-html'''
