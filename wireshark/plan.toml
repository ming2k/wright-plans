name = "wireshark"
version = "4.6.4"
release = 1
description = "Qt-based network protocol analyzer with CLI capture tools"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.wireshark.org/"

[dependencies]
build = [
    "cmake",
    "flex",
    "gcc",
    "ninja",
    "perl",
    "pkgconf",
    "python",
    "qt6-5compat",
    "qt6-base",
    "qt6-svg",
    "speexdsp",
]
link = [
    "c-ares",
    "glib",
    "libcap",
    "libgcrypt",
    "libpcap",
    "libxml2",
    "pcre2",
    "qt6-5compat",
    "qt6-base",
    "qt6-svg",
    "speexdsp",
    "zlib",
]

[[sources]]
uri = "https://www.wireshark.org/download/src/wireshark-${VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DUSE_qt6=ON \
    -DBUILD_stratoshark=OFF \
    -DBUILD_tshark=ON \
    -DBUILD_wireshark=ON \
    -DENABLE_KERBEROS=OFF

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -j$(nproc) -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install

'''

[hooks]
post_install = "setcap 'cap_net_admin,cap_net_raw=+ep' /usr/bin/dumpcap 2>/dev/null || true"
post_upgrade = "setcap 'cap_net_admin,cap_net_raw=+ep' /usr/bin/dumpcap 2>/dev/null || true"

[lifecycle.fabricate]
