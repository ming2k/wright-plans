name = "linux-pam"
version = "1.7.2"
release = 5
description = "Pluggable Authentication Modules for Linux"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/linux-pam/linux-pam"

[dependencies]
runtime = ["systemd"]
build = [
    "gcc",
    "meson",
    "ninja",
    "pkgconf",
]
link = ["glibc"]

[[sources]]
uri = "https://github.com/linux-pam/linux-pam/releases/download/v${VERSION}/Linux-PAM-${VERSION}.tar.xz"
sha256 = "SKIP"

# Theseus-baseline PAM service files. Kept as separate, reviewable source
# files instead of inline heredocs so each stack can be read and diff'd on
# its own. The main policy call is /etc/pam.d/other — a silent deny-all
# fallback for any service without its own pam.d file.
[[sources]]
uri = "pam.d/system-account"
sha256 = "SKIP"

[[sources]]
uri = "pam.d/system-auth"
sha256 = "SKIP"

[[sources]]
uri = "pam.d/system-session"
sha256 = "SKIP"

[[sources]]
uri = "pam.d/system-password"
sha256 = "SKIP"

[[sources]]
uri = "pam.d/other"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir -p build
cd build
meson setup .. \
    --prefix=/usr \
    --buildtype=release \
    -Dsbindir=/usr/bin \
    -Dlogind=enabled \
    -Deconf=disabled \
    -Dselinux=disabled \
    -Delogind=disabled \
    -Dpam_userdb=disabled \
    -Dpwaccess=disabled \
    -Dvendordir='' \
    -Ddocs=disabled \
    -Ddocdir=/usr/share/doc/Linux-PAM-${VERSION}

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
ninja

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PART_DIR} ninja install

chmod -v 4755 ${PART_DIR}/usr/bin/unix_chkpwd

rm -rf ${PART_DIR}/usr/lib/systemd

install -vdm755 ${PART_DIR}/etc/pam.d
for f in system-account system-auth system-session system-password other; do
    install -Dm644 ${FILES_DIR}/${f} ${PART_DIR}/etc/pam.d/${f}
done

'''

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"

[output]
backup = [
    "/etc/pam.d/system-account",
    "/etc/pam.d/system-auth",
    "/etc/pam.d/system-session",
    "/etc/pam.d/system-password",
    "/etc/pam.d/other",
]
