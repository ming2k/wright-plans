name = "libmanette"
version = "0.2.7"
release = 1
description = "Simple GObject game controller library"
license = "LGPL-2.1-or-later"
arch = "x86_64"

link_deps = ['glib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/libmanette/0.2/libmanette-0.2.7.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libmanette-${VERSION}
# 修复：
# 1. 将 -Dexamples=false 改为 -Ddemos=false (这是 libmanette 正确的选项名)
# 2. 确保 introspection 和 vapi 选项格式正确
meson setup build --prefix=/usr --libdir=lib -Dintrospection=true -Dvapi=false -Ddemos=false'''

[pipeline.compile]
script = '''
cd source/libmanette-${VERSION}/build
ninja -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libmanette-${VERSION}/build
DESTDIR=${STAGING_DIR} ninja install'''

[[output]]
runtime_deps = ['libevdev', 'libgudev', 'glib']
