[plan]
name = "openssl"
version = "3.6.1"
release = 1
description = "Management tools and libraries relating to cryptography"
license = "Apache-2.0"
arch = "x86_64"
url = "https://www.openssl.org/"

[dependencies]
build = ["gcc", "make", "perl"]
link = ["zlib"]

[[sources]]
uri = "https://github.com/openssl/openssl/releases/download/openssl-${PKG_VERSION}/openssl-${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./config --prefix=/usr         \
         --openssldir=/etc/ssl \
         --libdir=lib          \
         shared                \
         zlib-dynamic
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
sed -i '/INSTALL_LIBS/s/libcrypto.a libssl.a//' Makefile
make MANSUFFIX=ssl DESTDIR=${PKG_DIR} install
mv -v ${PKG_DIR}/usr/share/doc/openssl ${PKG_DIR}/usr/share/doc/openssl-${PKG_VERSION}
'''
