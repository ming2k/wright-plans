name = "patch"
version = "2.8"
release = 1
description = "A program for modifying or creating files by applying a patch file"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://savannah.gnu.org/projects/patch/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/patch/patch-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
