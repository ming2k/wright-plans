[plan]
name = "utf8proc"
version = "2.10.0"
release = 1
description = "UTF-8 processing library"
license = "MIT"
arch = "x86_64"
url = "https://github.com/JuliaStrings/utf8proc"

[[sources]]
uri = "https://github.com/JuliaStrings/utf8proc/archive/refs/tags/v${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
echo "cmake project"
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
mkdir -p build && cd build
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}/build
DESTDIR=${PKG_DIR} make install
'''
