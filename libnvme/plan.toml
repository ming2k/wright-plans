name = "libnvme"
version = "1.16.1"
release = 1
description = "C library for NVM Express on Linux"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/linux-nvme/libnvme"

[dependencies]
build = ["meson", "ninja", "pkgconf", "gcc"]
link = ["dbus", "json-c", "keyutils", "openssl"]

[[sources]]
type = "http"
sha256 = "ce1d9d393feb84c4e82ca096db2bdb7dd4a5fd1997d711cc1904796944f2c579"
url = "https://github.com/linux-nvme/libnvme/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
  --prefix=/usr \
  -Ddocs=false \
  -Dpython=disabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
