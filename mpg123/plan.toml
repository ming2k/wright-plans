[plan]
name = "mpg123"
version = "1.33.3"
release = 1
description = "Fast console MPEG audio decoder/player"
license = "LGPL-2.1-only"
arch = "x86_64"
url = "https://www.mpg123.org/"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["alsa-lib"]

[[sources]]
uri = "https://deb.debian.org/debian/pool/main/m/mpg123/mpg123_${PART_VERSION}.orig.tar.bz2"
sha256 = "6a0c6472dd156e213c2068f40115ebbb73978c2d873e66bae2a250e2d2198d26"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure \
  --prefix=/usr \
  --disable-static \
  --with-optimization=0 \
  --with-default-audio=alsa
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
