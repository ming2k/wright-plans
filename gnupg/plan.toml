[plan]
name = "gnupg"
version = "2.4.9"
release = 1
description = "GNU Privacy Guard"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://gnupg.org"

[sources]
uris = ["https://gnupg.org/ftp/gcrypt/gnupg/gnupg-${PKG_VERSION}.tar.bz2"]
sha256 = ["SKIP"]

[dependencies]
runtime = ["pinentry"]
link = ["libgcrypt", "libgpg-error", "libassuan", "libksba", "npth", "readline", "gnutls", "sqlite"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr              \
--libexecdir=/usr/lib/gnupg \
--sbindir=/usr/bin          \
--sysconfdir=/etc           \
--enable-keyboxd            \
--enable-large-secmem       \
--disable-ldap              \
--disable-doc
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc) LDFLAGS="${LDFLAGS} -lreadline -lhistory"
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
DESTDIR=${PKG_DIR} make install
ln -sf gpg  ${PKG_DIR}/usr/bin/gpg2
ln -sf gpgv ${PKG_DIR}/usr/bin/gpgv2
'''
