name = "potrace"
version = "1.16"
release = 2
description = "Utility for tracing bitmaps into vector graphics"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://potrace.sourceforge.net/"

[dependencies]
build = ["gcc", "make", "autoconf", "automake", "zlib"]
runtime = ["zlib"]
link = ["zlib"]

[[sources]]
uri = "https://potrace.sourceforge.net/download/1.16/potrace-1.16.tar.gz"
sha256 = "be8248a17dedd6ccbaab2fcc45835bb0502d062e40fbded3bc56028ce5eb7acc"

[[sources]]
uri = "lto.patch"
sha256 = "SKIP"

[lifecycle.prepare]
script = """
cd ${BUILD_DIR}
patch -Np1 < ${FILES_DIR}/lto.patch
autoreconf -fiv
"""

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
./configure \
  --prefix=/usr \
  --mandir=/usr/share/man \
  --with-libpotrace
"""

[lifecycle.compile]
script = """
cd ${BUILD_DIR}
make -j$(nproc)
"""

[lifecycle.staging]
script = """
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
"""
