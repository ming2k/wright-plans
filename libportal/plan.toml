name = "libportal"
version = "0.7.1"
release = 2
description = "GIO-style async APIs for Flatpak Portals"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/flatpak/libportal"

[dependencies]
build = ["gobject-introspection", "meson", "ninja", "pkgconf"]
link = ["glib", "gtk4", "gtk3"]

[[sources]]
sha256 = "297b90b263fad22190a26b8c7e8ea938fe6b18fb936265e588927179920d3805"
url = "https://github.com/flatpak/libportal/releases/download/${VERSION}/libportal-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Dbackend-gtk3=enabled -Dbackend-gtk4=enabled -Dintrospection=true -Dvapi=false -Ddocs=false -Dtests=false'''

[lifecycle.compile]
script = '''
cd source
meson compile -C build'''

[lifecycle.staging]
script = '''
cd source
meson install -C build --destdir ${PART_DIR}'''
