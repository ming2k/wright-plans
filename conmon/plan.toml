name = "conmon"
version = "2.2.1"
release = 1
description = "OCI container runtime monitor"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/containers/conmon"

link_deps = ['glib', 'glibc', 'libseccomp', 'systemd']

[[sources]]
type = "http"
sha256 = "814fb5979a3a4b8576b1f901e606b482bebb41cb7e57926e6d5765ee786b96d3"
url = "https://github.com/containers/conmon/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "none"
script = '''
cd source/conmon-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
isolation = "none"
script = '''
cd source/conmon-${VERSION}
make DESTDIR=${STAGING_DIR} PREFIX=/usr LIBEXECDIR=/usr/libexec install.podman'''

[[output]]
runtime_deps = ['glib', 'glibc', 'libseccomp', 'systemd']
