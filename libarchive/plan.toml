name = "libarchive"
version = "3.7.7"
release = 1
description = "Multi-format archive and compression library"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://libarchive.org"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/libarchive/libarchive/releases/download/v${VERSION}/libarchive-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libarchive-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libarchive-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libarchive-${VERSION}
DESTDIR=${STAGING_DIR} make install'''
