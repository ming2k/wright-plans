[plan]
name = "libxkbcommon"
version = "1.13.1"
release = 2
description = "Keymap handling library (Wayland Only)"
license = "MIT"
arch = "x86_64"

[dependencies]
build = ["meson", "ninja", "pkgconf", "bison"]
link = ["wayland", "wayland-protocols", "xkeyboard-config"]

[sources]
uris = ["https://github.com/xkbcommon/libxkbcommon/archive/refs/tags/xkbcommon-${PKG_VERSION}.tar.gz"]
sha256 = [
    "aeb951964c2f7ecc08174cb5517962d157595e9e3f38fc4a130b91dc2f9fec18",
]

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -Denable-x11=false \
    -Denable-wayland=true \
    -Denable-docs=false
"""

[lifecycle.compile]
script = "meson compile -C build"

[lifecycle.package]
script = "meson install -C build --destdir ${PKG_DIR}"
