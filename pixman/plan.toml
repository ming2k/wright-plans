[plan]
name = "pixman"
version = "0.44.2"
release = 1
description = "Low-level pixel manipulation library"
license = "MIT"
arch = "x86_64"
url = "https://www.pixman.org/"

[dependencies]
build = ["meson", "ninja"]
[sources]
uris = ["https://www.cairographics.org/releases/pixman-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr         \
--buildtype=release
'''

[lifecycle.compile]
dockyard = "none"
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
dockyard = "none"
script = "DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install"
