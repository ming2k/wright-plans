name = "which"
version = "2.23"
release = 1
description = "Utility to show the full path of commands"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://carlowood.github.io/which/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://carlowood.github.io/which/which-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/which-${VERSION}
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source/which-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/which-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

