name = "upower"
version = "1.91.2"
release = 1
description = "Abstraction for enumerating power devices"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/upower/upower"

[dependencies]
runtime = ["systemd"]
build = ["gettext", "gobject-introspection", "meson", "ninja", "pkgconf", "polkit", "docbook-xsl", "libxslt"]
link = ["glib", "libgudev", "libusb", "polkit"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/upower/upower/-/archive/v${VERSION}/upower-v${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
  --prefix=/usr \
  --libexecdir=/usr/libexec \
  --buildtype=release \
  -Dos_backend=linux \
  -Dgtk-doc=false \
  -Dsystemdsystemunitdir=/usr/lib/systemd/system'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
systemctl enable upower.service 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
