name = "typio"
version = "2.9.0"
release = 1
description = "Native Wayland input method daemon with optional GTK4 control panel"
license = "NOASSERTION"
arch = "x86_64"
url = "https://github.com/ming2k/typio"

[dependencies]
runtime = ["rime-prelude"]
build = [
    "cmake",
    "ninja",
    "pkgconf",
]
link = [
    "cairo",
    "dbus",
    "gtk4",
    "librime",
    "libxkbcommon",
    "pango",
    "wayland",
]

[[sources]]
uri = "https://github.com/ming2k/typio/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
 cmake -S . -B build \
cmake -S . -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_TESTS=OFF \
    -DENABLE_NOTIFICATIONS=ON \
    -DBUILD_CONTROL_PANEL=ON \
    -DBUILD_RIME_ENGINE=ON \
    -DBUILD_WHISPER=ON \
    -DBUILD_SHERPA_ONNX=ON \
    -DBUILD_MOZC_ENGINE=ON \
    -DENABLE_SYSTRAY=OFF
'''

[lifecycle.compile]
script = "cmake --build ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} cmake --install ${BUILD_DIR}/build"

[lifecycle.fabricate]
