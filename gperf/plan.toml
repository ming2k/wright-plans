name = "gperf"
version = "3.3"
release = 1
description = "Perfect hash function generator"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gperf/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gperf/gperf-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --docdir=/usr/share/doc/gperf-${VERSION}'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
