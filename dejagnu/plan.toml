[plan]
name = "dejagnu"
version = "1.6.3"
release = 1
description = "Framework for testing other programs"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/dejagnu/"

[dependencies]
build = ["expect", "make", "texinfo"]
runtime = ["expect"]
[sources]
uris = ["https://ftp.gnu.org/gnu/dejagnu/dejagnu-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
mkdir -v build
cd build
../configure --prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
makeinfo --html --no-split -o doc/dejagnu.html ../doc/dejagnu.texi
makeinfo --plaintext       -o doc/dejagnu.txt  ../doc/dejagnu.texi
'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}/build
make check
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}/build
make DESTDIR=${PKG_DIR} install
install -v -dm755  ${PKG_DIR}/usr/share/doc/dejagnu-1.6.3
install -v -m644   doc/dejagnu.{html,txt} ${PKG_DIR}/usr/share/doc/dejagnu-1.6.3
'''
