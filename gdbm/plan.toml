name = "gdbm"
version = "1.26"
release = 1
description = "GNU Database Manager"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gdbm/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/gdbm/gdbm-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr    \
--disable-static \
--enable-libgdbm-compat

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
