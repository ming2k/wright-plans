name = "curl"
version = "8.20.0"
release = 2
description = "Command line tool and library for transferring data with URLs"
license = "curl"
arch = "x86_64"
url = "https://curl.se/"

link_deps = ['libidn2', 'libpsl', 'nghttp2', 'openssl']

[[sources]]
type = "http"
sha256 = "63fe2dc148ba0ceae89922ef838f7e5c946272c2e78b7c59fab4b79d3ce2b896"
url = "https://curl.se/download/curl-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/curl-${VERSION}
./configure --prefix=/usr                    \
--disable-static                 \
--with-openssl                   \
--enable-threaded-resolver       \
--with-ca-path=/etc/ssl/certs'''

[pipeline.compile]
script = '''
cd source/curl-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/curl-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['ca-certificates', 'libidn2', 'libpsl', 'nghttp2', 'openssl']
