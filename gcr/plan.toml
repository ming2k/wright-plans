name = "gcr"
version = "4.4.0.1"
release = 1
description = "A library for displaying certificates and crypto UI"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/gcr"

link_deps = ['glib', 'gtk4', 'libgcrypt']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "0c3c341e49f9f4f2532a4884509804190a0c2663e6120360bb298c5d174a8098"
url = "https://download.gnome.org/sources/gcr/4.4/gcr-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gcr-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Dgtk_doc=false -Dintrospection=true -Dssh_agent=false -Dvapi=false'''

[pipeline.compile]
script = '''
cd source/gcr-${VERSION}
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/gcr-${VERSION}
meson install -C build --destdir ${STAGING_DIR}'''

[[output]]
runtime_deps = ['libsecret', 'p11-kit', 'glib', 'gtk4', 'libgcrypt']
