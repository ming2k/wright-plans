[plan]
name = "ncurses"
version = "6.6"
release = 1
description = "Libraries for terminal-independent handling of character screens"
license = "MIT"
arch = "x86_64"
url = "https://www.gnu.org/software/ncurses/"

[dependencies]
build = ["gcc", "make"]
[sources]
uris = ["https://ftp.gnu.org/gnu/ncurses/ncurses-6.6.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr           \
--mandir=/usr/share/man \
--with-shared           \
--without-debug         \
--without-normal        \
--with-cxx-shared       \
--enable-pc-files       \
--with-pkg-config-libdir=/usr/lib/pkgconfig
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
make DESTDIR=$PWD/dest install
install -vm755 dest/usr/lib/libncursesw.so.6.6 /usr/lib
rm -v  dest/usr/lib/libncursesw.so.6.6
sed -e 's/^#if.*XOPEN.*$/#if 1/' \
-i dest/usr/include/curses.h
cp -av dest/* ${PKG_DIR}/

for lib in ncurses form panel menu ; do
ln -sfv lib${lib}w.so ${PKG_DIR}/usr/lib/lib${lib}.so
ln -sfv ${lib}w.pc    ${PKG_DIR}/usr/lib/pkgconfig/${lib}.pc
done

ln -sfv libncursesw.so ${PKG_DIR}/usr/lib/libcurses.so

mkdir -p ${PKG_DIR}/usr/share/doc/ncurses-6.6
cp -v -R doc/* ${PKG_DIR}/usr/share/doc/ncurses-6.6/
'''
