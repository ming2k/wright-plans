name = "gstreamer"
version = "1.28.2"
release = 1
description = "Streaming media framework"
license = "LGPL-2.0-or-later"
arch = "x86_64"

[dependencies]
runtime = ["libunwind"]
build = ["bison", "flex", "gobject-introspection", "libunwind", "meson", "ninja", "pkgconf"]
link = ["glib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gstreamer.freedesktop.org/src/gstreamer/gstreamer-1.28.0.tar.xz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source
# 移除 --libdir=lib，让 meson 自动决定是 lib 还是 lib64
meson setup build --prefix=/usr -Dtests=disabled -Dbenchmarks=disabled -Dintrospection=enabled
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
