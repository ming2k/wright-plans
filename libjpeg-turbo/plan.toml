name = "libjpeg-turbo"
version = "3.1.3"
release = 1
description = "SIMD-accelerated JPEG codec (libjpeg v8 compatible)"
license = "IJG"
arch = "x86_64"

[dependencies]
build = [
    "cmake",
    "ninja",
    "gcc",
    "nasm",
]

[[sources]]
uri = "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/${PART_VERSION}/libjpeg-turbo-${PART_VERSION}.tar.gz"
sha256 = "075920b826834ac4ddf97661cc73491047855859affd671d52079c6867c1c6c0"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib -DWITH_JPEG8=ON

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = '''
DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install
# 兼容性软链接：确保 pkg-config 始终能找到 libjpeg.pc
if [ ! -f ${PART_DIR}/usr/lib/pkgconfig/libjpeg.pc ]; then
    ln -sv libjpeg-turbo.pc ${PART_DIR}/usr/lib/pkgconfig/libjpeg.pc
fi

'''

[lifecycle.fabricate]
