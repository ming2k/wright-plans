name = "udisks2"
version = "2.10.1"
release = 1
description = "Disk management service"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/udisks/"

[dependencies]
build = ["gcc", "make", "pkgconf", "gettext", "glib", "docbook-xsl", "libxslt", "polkit"]
link = ["acl", "libatasmart", "libblockdev", "libgudev", "polkit", "systemd"]

[[sources]]
type = "http"
sha256 = "b75734ccf602540dedb4068bec206adcb508a4c003725e117ae8f994d92d8ece"
url = "https://github.com/storaged-project/udisks/releases/download/udisks-${VERSION}/udisks-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --sbindir=/usr/bin \
  --sysconfdir=/etc \
  --disable-static \
  --with-udevdir=/usr/lib/udev \
  --enable-lvm2 \
  --enable-btrfs'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
install -dm750 ${PART_DIR}/var/lib/udisks2'''
