name = "icu"
version = "78.3"
release = 1
description = "International Components for Unicode"
license = "ICU"
arch = "x86_64"


[[sources]]
type = "http"
sha256 = "3a2e7a47604ba702f345878308e6fefeca612ee895cf4a5f222e7955fabfe0c0"
url = "https://github.com/unicode-org/icu/releases/download/release-78.3/icu4c-78.3-sources.tgz"
extract_to = "source"

[pipeline.configure]
script = '''
# ICU 的源码位于解压后的 source 子目录中
cd source/icu/source
./configure --prefix=/usr --sbindir=/usr/bin --disable-static --enable-tests=no --enable-samples=no'''

[pipeline.compile]
script = '''
cd source/icu/source
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/icu/source
make DESTDIR=${STAGING_DIR} install'''
