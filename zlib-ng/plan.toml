[plan]
name = "zlib-ng"
version = "2.3.3"
release = 2
description = "Zlib replacement with optimizations (non-compat build)"
license = "Zlib"
arch = "x86_64"
url = "https://github.com/zlib-ng/zlib-ng"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
uri = "https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cmake -S ${BUILD_DIR} -B ${BUILD_DIR}/build -G Ninja \
  -DCMAKE_BUILD_TYPE=None \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DWITH_GTEST=OFF \
  -DBUILD_SHARED_LIBS=ON
'''

[lifecycle.compile]
script = "cmake --build ${BUILD_DIR}/build"

[lifecycle.staging]
script = '''
DESTDIR=${PKG_DIR} cmake --install ${BUILD_DIR}/build
install -Dm 644 ${BUILD_DIR}/LICENSE.md ${PKG_DIR}/usr/share/licenses/zlib-ng/LICENSE.md
install -Dm 644 ${BUILD_DIR}/README.md ${PKG_DIR}/usr/share/doc/zlib-ng/README.md
'''
