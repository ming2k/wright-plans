name = "luajit"
version = "2.1.1767980792+707c12b"
release = 1
description = "Just-in-time compiler for Lua"
license = "MIT"
arch = "x86_64"
url = "https://luajit.org"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/LuaJIT/LuaJIT/archive/707c12b.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/LuaJIT-*
echo "LuaJIT uses the upstream make-based build"'''

[pipeline.compile]
script = '''
cd source/LuaJIT-*
make -j$(nproc) PREFIX=/usr XCFLAGS='-fPIC''''

[pipeline.staging]
script = '''
cd source/LuaJIT-*
make PREFIX=/usr DESTDIR=${STAGING_DIR} install

mkdir -p ${STAGING_DIR}/usr/lib/pkgconfig
cat > ${STAGING_DIR}/usr/lib/pkgconfig/luajit.pc << PCEOF
prefix=/usr
exec_prefix=\${prefix}
libdir=\${exec_prefix}/lib
includedir=\${prefix}/include/luajit-2.1

Name: LuaJIT
Description: Just-in-time compiler for Lua
Version: ${VERSION}
Libs: -L\${libdir} -lluajit-5.1
Cflags: -I\${includedir}
PCEOF'''

[[output]]
runtime_deps = ['glibc']

[output.hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"

