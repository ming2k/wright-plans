name = "diffutils"
version = "3.12"
release = 1
description = "Programs that show the differences between files or directories"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/diffutils/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/diffutils/diffutils-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/diffutils-${VERSION}
./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/diffutils-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/diffutils-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

