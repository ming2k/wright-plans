name = "typio"
version = "4.2.2"
release = 1
description = "Native Wayland input method daemon with optional GTK4 control panel"
arch = "x86_64"
license = "NOASSERTION"
url = "https://github.com/ming2k/typio"

link_deps = ['dbus', 'fontconfig', 'freetype', 'gtk4', 'harfbuzz', 'librime', 'libxkbcommon', 'pipewire', 'sherpa-onnx', 'vulkan-loader', 'wayland', 'whisper.cpp']
build_deps = ['meson', 'ninja', 'rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ming2k/typio/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "git"
url = "https://github.com/ming2k/flux.git"
ref = "44de7ec"
extract_to = "source/flux"

[pipeline.configure]
script = '''
meson setup build source/typio-${VERSION} \
    --prefix=/usr \
    --libdir=lib \
    --buildtype=release \
    -Dbuild_tests=false \
    -Dbuild_control_panel=true \
    -Dbuild_basic_engine=true \
    -Dbuild_rime_engine=true \
    -Dbuild_sherpa_onnx=true \
    -Dbuild_mozc_engine=true \
    -Denable_wayland=true \
    -Denable_status_bus=true \
    -Denable_systray=false
'''

[pipeline.compile]
isolation = "relaxed"
script = '''
ninja -C build
'''

[pipeline.staging]
script = '''
DESTDIR=${STAGING_DIR} ninja -C build install
'''

[[output]]
runtime_deps = ['dbus', 'fontconfig', 'freetype', 'gtk4', 'harfbuzz', 'librime', 'libxkbcommon', 'pipewire', 'sherpa-onnx', 'vulkan-loader', 'wayland', 'whisper.cpp']
