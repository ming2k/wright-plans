name = "abseil-cpp"
version = "20260107.1"
release = 1
description = "Abseil C++ library (Google's common C++ utilities)"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/abseil/abseil-cpp"


build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/abseil/abseil-cpp/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/abseil-cpp-${VERSION}
cmake -B build -S . -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DCMAKE_CXX_STANDARD=17 \
  -DABSL_PROPAGATE_CXX_STD=ON \
  -DABSL_BUILD_TESTING=OFF \
  -DBUILD_SHARED_LIBS=ON'''

[pipeline.compile]
script = '''
cd source/abseil-cpp-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/abseil-cpp-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

