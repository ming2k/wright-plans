name = "v4l-utils"
version = "1.28.1"
release = 1
description = "Userspace tools and libraries for Video4Linux"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://linuxtv.org/wiki/index.php/V4l-utils"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["systemd", "elfutils", "json-c"]

[[sources]]
uri = "https://linuxtv.org/downloads/v4l-utils/v4l-utils-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr                        \
--buildtype=release                  \
-D gconv=disabled                    \
-D v4l2-tracer=disabled              \
-D qv4l2=disabled                    \
-D qvidcap=disabled                  \
-D bpf=disabled

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = '''
DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install
if [ -d ${PART_DIR}/usr/sbin ]; then
    mv ${PART_DIR}/usr/sbin/* ${PART_DIR}/usr/bin/
    rmdir ${PART_DIR}/usr/sbin
fi

'''
