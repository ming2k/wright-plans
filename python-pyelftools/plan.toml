[plan]
name = "python-pyelftools"
version = "0.31"
release = 1
description = "Python library for analyzing ELF files and DWARF debugging information"
license = "Unlicense"
arch = "x86_64"
url = "https://github.com/eliben/pyelftools"
replaces = ["pyelftools"]

[dependencies]
build = ["python", "setuptools"]
runtime = ["python"]

[sources]
uris = ["https://github.com/eliben/pyelftools/archive/v${PKG_VERSION}/pyelftools-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PKG_DIR} --no-build-isolation .
'''
