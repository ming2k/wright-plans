name = "python-packaging"
version = "26.0"
release = 1
description = "Core utilities for Python packages"
license = "Apache-2.0"
arch = "x86_64"
url = "https://packaging.pypa.io/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/p/packaging/packaging-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
