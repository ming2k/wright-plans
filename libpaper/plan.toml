name = "libpaper"
version = "2.2.7"
release = 2
description = "Library for handling paper size information"
license = "LGPL-2.1-or-later AND GPL-3.0-or-later AND FSFAP"
arch = "x86_64"
url = "https://github.com/rrthomas/libpaper"


[[sources]]
type = "http"
sha256 = "3925401edf1eda596277bc2485e050b704fd7f364f257c874b0c40ac5aa627c0"
url = "https://github.com/rrthomas/libpaper/releases/download/v2.2.7/libpaper-2.2.7.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "localepaper.c"

[lifecycle.prepare]
script = '''
cd source/libpaper-${VERSION}
cp ${WORKDIR}/localepaper.c ${WORKDIR}/src/'''

[lifecycle.configure]
script = '''
cd source/libpaper-${VERSION}
./configure --prefix=/usr --sysconfdir=/etc --sbindir=/usr/bin'''

[lifecycle.compile]
script = '''
cd source/libpaper-${VERSION}
make -j$(nproc)
cd src
gcc $CFLAGS $LDFLAGS -I.. -Ilibgnu -o localepaper localepaper.c libgnu/.libs/libgnupaper.a'''

[lifecycle.staging]
script = '''
cd source/libpaper-${VERSION}
make DESTDIR=${STAGING_DIR} install
install -Dt ${STAGING_DIR}/usr/lib -m0755 src/localepaper
install -dm755 ${STAGING_DIR}/etc
echo '# Simply write the paper name. See man 1 paper and "paper --no-size --all" for possible values' > ${STAGING_DIR}/etc/papersize
install -dm755 ${STAGING_DIR}/etc/libpaper.d'''

[[output]]
backup = ["/etc/papersize"]

