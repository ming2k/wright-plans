name = "bazelisk"
version = "1.28.1"
release = 1
description = "A user-friendly launcher for Bazel"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/bazelbuild/bazelisk"

[[sources]]
sha256 = "SKIP"
url = "https://github.com/bazelbuild/bazelisk/releases/download/v${VERSION}/bazelisk-linux-amd64"

[lifecycle.staging]
script = '''
install -Dm755 ${WORKDIR}/bazelisk-linux-amd64 ${PART_DIR}/usr/bin/bazelisk
ln -sf bazelisk ${PART_DIR}/usr/bin/bazel'''

[output]
provides = ["bazel"]
