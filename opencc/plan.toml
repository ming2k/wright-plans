name = "opencc"
version = "1.2.0"
release = 1
description = "Open Chinese Convert — Simplified/Traditional Chinese conversion"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/BYVoid/OpenCC"

[dependencies]
build = ["cmake", "ninja", "pkgconf"]
link = ["marisa"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/BYVoid/OpenCC/archive/refs/tags/ver.${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_PYTHON=OFF \
    -DBUILD_TESTING=OFF \
    -DBUILD_DOCUMENTATION=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
