name = "lua"
version = "5.4.7"
release = 4
description = "Powerful lightweight programming language"
license = "MIT"
arch = "x86_64"
url = "https://www.lua.org"

[dependencies]
link = ["readline"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.lua.org/ftp/lua-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
sed -i 's/^CFLAGS=.*/CFLAGS= -O2 -Wall -Wextra -DLUA_COMPAT_5_3 -fPIC $(SYSCFLAGS) $(MYCFLAGS)/' src/Makefile'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) linux-readline
# Build shared library from the PIC-compiled archive objects
cd source/src
${CC:-gcc} -shared -fPIC -Wl,-soname,liblua.so.5.4 \
    $(ar t liblua.a | tr '\n' ' ') \
    -lm -ldl -o liblua.so.5.4'''

[lifecycle.staging]
script = '''
cd source
make INSTALL_TOP=${PART_DIR}/usr INSTALL_MAN=${PART_DIR}/usr/share/man/man1 install

# Install shared library
install -Dm755 src/liblua.so.5.4 ${PART_DIR}/usr/lib/liblua.so.5.4
ln -sf liblua.so.5.4 ${PART_DIR}/usr/lib/liblua.so

mkdir -p ${PART_DIR}/usr/lib/pkgconfig
cat > ${PART_DIR}/usr/lib/pkgconfig/lua5.4.pc << PCEOF
prefix=/usr
exec_prefix=\${prefix}
libdir=\${exec_prefix}/lib
includedir=\${prefix}/include

Name: Lua
Description: Lua language engine
Version: ${VERSION}
Libs: -L\${libdir} -llua
Libs.private: -lm -ldl
Cflags: -I\${includedir}
PCEOF
cp ${PART_DIR}/usr/lib/pkgconfig/lua5.4.pc ${PART_DIR}/usr/lib/pkgconfig/lua-5.4.pc
cp ${PART_DIR}/usr/lib/pkgconfig/lua5.4.pc ${PART_DIR}/usr/lib/pkgconfig/lua.pc'''

[hooks]
post_install = "ldconfig 2>/dev/null || true"
post_upgrade = "ldconfig 2>/dev/null || true"
