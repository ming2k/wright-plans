name = "gdk-pixbuf"
version = "2.44.6"
release = 5
description = "GNOME image loading library (Modern Glycin Enabled)"
license = "LGPL-2.1-or-later"
arch = "x86_64"

link_deps = ['glycin', 'glib', 'libjpeg-turbo', 'libpng', 'libtiff', 'shared-mime-info']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "140c2d0b899fcf853ee92b26373c9dc228dbcde0820a4246693f4328a27466fa"
url = "https://download.gnome.org/sources/gdk-pixbuf/2.44/gdk-pixbuf-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/gdk-pixbuf-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Dman=false -Dgtk_doc=false -Dtests=false -Dintrospection=enabled -Dglycin=enabled'''

[lifecycle.compile]
script = '''
cd source/gdk-pixbuf-${VERSION}
meson compile -C build'''

[lifecycle.staging]
script = '''
cd source/gdk-pixbuf-${VERSION}
meson install -C build --destdir ${STAGING_DIR}'''

[[output]]
runtime_deps = ['glib', 'libjpeg-turbo', 'libpng', 'libtiff', 'shared-mime-info']

[output.hooks]
post_install = "gdk-pixbuf-query-loaders --update-cache 2>/dev/null || true"
post_upgrade = "gdk-pixbuf-query-loaders --update-cache 2>/dev/null || true"
