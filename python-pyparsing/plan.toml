name = "python-pyparsing"
version = "3.3.2"
release = 2
description = "Python parsing module"
license = "MIT"
arch = "any"
url = "https://github.com/pyparsing/pyparsing"

[dependencies]
build = ["python", "setuptools", "wheel"]

[[sources]]
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/p/pyparsing/pyparsing-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo "python package"'''

[lifecycle.compile]
script = '''
cd source
echo "no build needed"'''

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --no-build-isolation --break-system-packages --root=${PART_DIR} .'''
