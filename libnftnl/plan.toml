[plan]
name = "libnftnl"
version = "1.3.1"
release = 1
description = "Netfilter nf_tables netlink userspace library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.netfilter.org/projects/libnftnl/"

[dependencies]
runtime = ["libmnl >= 1.0.4"]
build = ["gcc", "libmnl", "make", "pkgconf"]

[[sources]]
uri = "https://www.netfilter.org/pub/libnftnl/libnftnl-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[options]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
