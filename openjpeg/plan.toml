name = "openjpeg"
version = "2.5.3"
release = 1
description = "Open-source JPEG 2000 codec"
license = "BSD-2-Clause"
arch = "x86_64"

[dependencies]
build = ["cmake", "gcc", "make"]

[[sources]]
uri = "https://github.com/uclouvain/openjpeg/archive/v${PART_VERSION}/openjpeg-v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib -DBUILD_STATIC_LIBS=OFF -DBUILD_DOC=OFF -DBUILD_TESTING=OFF

'''

[lifecycle.compile]
script = "cmake --build ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} cmake --install ${BUILD_DIR}/build"

[lifecycle.fabricate]
