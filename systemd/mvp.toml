link_deps = ['acl:default', 'glibc:default', 'libcap:default', 'libgcrypt:default', 'libidn2:default', 'libseccomp:default', 'libxcrypt:default', 'linux-pam:default', 'lz4:default', 'openssl:default', 'p11-kit:default', 'pcre2:default', 'util-linux:default', 'xz:default', 'zstd:default']

[lifecycle.configure]
script = '''
cd source
mkdir -p build
cd build
meson setup .. \
    --prefix=/usr \
    --buildtype=release \
    -D libdir=lib \
    -D sbindir=/usr/bin \
    -D version-tag="${VERSION}-theseus" \
    -D vcs-tag=false \
    -D shared-lib-tag="${VERSION}" \
    -D mode=release \
    -D install-tests=false \
    -D ldconfig=false \
    -D man=disabled \
    -D rpmmacrosdir=no \
    -D sysvinit-path= \
    -D sysvrcnd-path= \
    -D dbuspolicydir=/usr/share/dbus-1/system.d \
    -D firstboot=true \
    -D sysusers=true \
    -D pam=enabled \
    -D pamconfdir=/usr/lib/pam.d \
    -D logind=true \
    -D networkd=true \
    -D resolve=true \
    -D seccomp=enabled \
    -D libidn2=enabled \
    -D lz4=enabled \
    -D dns-over-tls=openssl \
    -D ukify=auto \
    -D bootloader=enabled \
    -D homed=disabled \
    -D sysupdate=disabled \
    -D audit=disabled \
    -D selinux=disabled \
    -D libcryptsetup=disabled \
    -D default-dnssec=no \
    -D default-kill-user-processes=false \
    -D default-locale='C.UTF-8' \
    -D fallback-hostname='theseus' \
    -D nologin-path=/usr/bin/nologin \
    -D dev-kvm-mode=0660 \
    -D nobody-group=nogroup \
    -D sbat-distro=theseus \
    -D sbat-distro-summary="Ship of Theseus" \
    -D sbat-distro-pkgname=systemd \
    -D sbat-distro-version=${VERSION} \
    -D sbat-distro-url=https://github.com/anthropic \
    -D docdir=/usr/share/doc/systemd-${VERSION}'''

