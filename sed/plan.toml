name = "sed"
version = "4.10"
release = 1
description = "Stream editor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/sed/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/sed/sed-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/sed-${VERSION}
./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/sed-${VERSION}
make -j$(nproc)
make html'''

[pipeline.staging]
script = '''
cd source/sed-${VERSION}
make DESTDIR=${STAGING_DIR} install
install -d -m755           ${STAGING_DIR}/usr/share/doc/sed-4.9
install -m644 doc/sed.html ${STAGING_DIR}/usr/share/doc/sed-4.9'''
