name = "libinput"
version = "1.31.0"
release = 1
description = "Input device management and event handling library"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/libinput/"

[dependencies]
runtime = ["libevdev", "mtdev"]
build = ["libevdev", "meson", "mtdev", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/libinput/libinput/-/archive/${VERSION}/libinput-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr           \
--buildtype=release     \
-D documentation=false  \
-D tests=false          \
-D debug-gui=false      \
-D libwacom=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
