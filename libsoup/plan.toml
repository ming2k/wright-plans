[plan]
name = "libsoup"
version = "3.6.6"
release = 1
description = "HTTP client/server library for GNOME"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["brotli", "glib-networking"]
build = ["gobject-introspection", "meson", "ninja", "pkgconf"]
link = ["glib", "libpsl", "libxml2", "nghttp2", "sqlite"]

[[sources]]
uri = "https://download.gnome.org/sources/libsoup/3.6/libsoup-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dvapi=disabled -Dsysprof=disabled -Dtests=false -Ddocs=disabled
'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} meson install -C ${BUILD_DIR}/build"
