name = "libass"
version = "0.17.4"
release = 1
description = "Portable subtitle renderer for ASS/SSA subtitle format"
license = "ISC"
arch = "x86_64"
url = "https://github.com/libass/libass"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["freetype", "fribidi", "harfbuzz", "fontconfig"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/libass/libass/releases/download/${VERSION}/libass-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
