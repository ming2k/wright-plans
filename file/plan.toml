name = "file"
version = "5.47"
release = 1
description = "Utility for determining the type of a given file using magic number recognition"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.darwinsys.com/file/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://astron.com/pub/file/file-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/file-${VERSION}
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source/file-${VERSION}
make -j$(nproc)'''

[lifecycle.check]
script = '''
cd source/file-${VERSION}
make check'''

[lifecycle.staging]
script = '''
cd source/file-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

