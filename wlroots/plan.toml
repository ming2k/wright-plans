name = "wlroots"
version = "0.20.1"
release = 1
description = "Modular Wayland compositor library"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/wlroots/wlroots"

build_deps = ['meson', 'ninja', 'wayland-protocols']
link_deps = ['libdrm', 'mesa', 'wayland', 'wayland-protocols', 'libinput', 'libxkbcommon', 'pixman']

[[sources]]
type = "http"
sha256 = "e9e699a06492121153ce3a3448b0aa610f3285130754b85fbb58736c931fffec"
url = "https://gitlab.freedesktop.org/wlroots/wlroots/-/archive/${VERSION}/wlroots-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/wlroots-${VERSION}
meson setup build \
  --prefix=/usr \
  --buildtype=release \
  -Dexamples=false \
  -Dxwayland=disabled
'''

[pipeline.compile]
script = '''
cd source/wlroots-${VERSION}
ninja -C build -j $(nproc)
'''

[pipeline.staging]
script = '''
cd source/wlroots-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install
'''

[[output]]
runtime_deps = ['libdrm', 'mesa', 'wayland', 'wayland-protocols', 'libinput', 'libxkbcommon', 'pixman']

