name = "sbc"
version = "2.2"
release = 1
description = "Bluetooth Sub-Band Codec (SBC) library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.kernel.org/pub/linux/bluetooth/"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["glibc"]

[[sources]]
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/bluetooth/sbc-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
    --disable-static \
    --disable-tester'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
