[plan]
name = "glib"
version = "2.84.0"
release = 1
description = "Core application building blocks library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.gtk.org/"

[dependencies]
build = ["bash", "python", "meson", "ninja", "pkgconf"]
link = ["libffi", "pcre2"]

[[sources]]
uri = "https://download.gnome.org/sources/glib/2.84/glib-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
meson setup build \
  --prefix=/usr \
  --buildtype=release \
  -Ddefault_library=shared \
  -Dtests=false \
  -Dinstalled_tests=false
"""

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build"

[lifecycle.staging]
script = "DESTDIR=${PKG_DIR} meson install -C ${BUILD_DIR}/build"

