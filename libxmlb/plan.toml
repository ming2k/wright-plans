name = "libxmlb"
version = "0.3.21"
release = 1
description = "Library to help create and query binary XML blobs"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/hughsie/libxmlb"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/hughsie/libxmlb/releases/download/${VERSION}/libxmlb-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr          \
--buildtype=release    \
-D tests=false         \
-D introspection=false \
-D gtkdoc=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
