name = "gdbm"
version = "1.26"
release = 1
description = "GNU Database Manager"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gdbm/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gdbm/gdbm-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr    \
--disable-static \
--enable-libgdbm-compat'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
