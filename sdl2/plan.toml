name = "sdl2"
version = "2.32.10"
release = 1
description = "Simple DirectMedia Layer"
license = "Zlib"
arch = "x86_64"
url = "https://www.libsdl.org/"

[dependencies]
build = ["gcc", "make", "pkgconf", "wayland-protocols"]
link = ["alsa-lib", "dbus", "libxkbcommon", "pipewire", "wayland"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.libsdl.org/release/SDL2-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --disable-static \
  --enable-video-wayland \
  --disable-video-x11 \
  --disable-rpath'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} make install

rm -f ${PART_DIR}/usr/lib/libSDL2.a
test -f ${PART_DIR}/usr/lib/pkgconfig/sdl2.pc'''
