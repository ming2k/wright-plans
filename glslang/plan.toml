name = "glslang"
version = "16.2.0"
release = 1
description = "Khronos reference GLSL/ESSL compiler and SPIR-V generator"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/KhronosGroup/glslang"

[dependencies]
build = ["cmake", "gcc", "make", "spirv-headers", "spirv-tools"]

[[sources]]
sha256 = "01985335785c97906a91afe3cb5ee015997696181ec6c125bab5555602ba08e2"
url = "https://github.com/KhronosGroup/glslang/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
mkdir build && cd build
cmake ..                                \
-DCMAKE_INSTALL_PREFIX=/usr       \
-DCMAKE_BUILD_TYPE=Release        \
-DALLOW_EXTERNAL_SPIRV_TOOLS=ON   \
-DBUILD_SHARED_LIBS=ON'''

[lifecycle.compile]
script = '''
cd source/build
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
make DESTDIR=${PART_DIR} install'''
