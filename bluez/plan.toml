[plan]
name = "bluez"
version = "5.86"
release = 2
description = "Official Linux Bluetooth protocol stack"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.bluez.org/"

[dependencies]
runtime = ["dbus", "systemd"]
build = ["gcc", "make"]
link = ["glibc", "glib", "dbus", "ell", "alsa-lib", "json-c", "libical", "readline"]

[[sources]]
uri = "https://www.kernel.org/pub/linux/bluetooth/bluez-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
# Remove bundled ell to ensure external ell is used exclusively
rm -rf ell
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    --libexecdir=/usr/lib \
    --enable-library \
    --enable-tools \
    --enable-btpclient \
    --enable-midi \
    --enable-sixaxis \
    --enable-mesh \
    --enable-hid2hci \
    --enable-experimental \
    --enable-datafiles \
    --enable-external-ell \
    --enable-deprecated \
    --disable-manpages \
    --disable-static
'''

[lifecycle.compile]
script = "make -j$(nproc) -C ${BUILD_DIR}"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

# Install main bluetoothd config
install -Dm644 src/main.conf ${PKG_DIR}/etc/bluetooth/main.conf
chmod 0555 ${PKG_DIR}/etc/bluetooth
'''


[lifecycle.fabricate]
hooks.post_install = '''
chmod 555 /etc/bluetooth 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
systemctl enable bluetooth.service 2>/dev/null || true
'''
hooks.post_upgrade = '''
chmod 555 /etc/bluetooth 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''
