name = "libevent"
version = "2.1.12-stable"
release = 1
description = "An event notification library for developing asynchronous applications"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://libevent.org/"

[dependencies]
build = ["gcc", "make"]
link = ["openssl"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/libevent/libevent/releases/download/release-${VERSION}/libevent-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
