name = "xdg-desktop-portal-wlr"
version = "0.7.1"
release = 1
description = "XDG Desktop Portal backend for wlroots-based Wayland compositors (including niri)"
license = "MIT"
arch = "x86_64"
url = "https://github.com/emersion/xdg-desktop-portal-wlr"

link_deps = ['pipewire', 'wayland', 'inih']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/emersion/xdg-desktop-portal-wlr/releases/download/v${VERSION}/xdg-desktop-portal-wlr-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/xdg-desktop-portal-wlr-${VERSION}
meson setup build \
  --prefix=/usr \
  --sysconfdir=/etc \
  --buildtype=release \
  -Dsd-bus-provider=libsystemd \
  -Dman-pages=enabled'''

[pipeline.compile]
script = '''
cd source/xdg-desktop-portal-wlr-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/xdg-desktop-portal-wlr-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['xdg-desktop-portal', 'pipewire', 'wayland', 'inih']
