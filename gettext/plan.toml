name = "gettext"
version = "1.0"
release = 1
description = "Utilities for internationalization and localization"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gettext/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/gettext/gettext-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gettext-${VERSION}
./configure --prefix=/usr    \
            --disable-static \
            --docdir=/usr/share/doc/gettext-${VERSION}'''

[pipeline.compile]
script = '''
cd source/gettext-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gettext-${VERSION}
make DESTDIR=${STAGING_DIR} install
chmod -v 0755 ${STAGING_DIR}/usr/lib/preloadable_libintl.so'''

