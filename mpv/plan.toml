name = "mpv"
version = "0.41.0"
release = 2
description = "A free, open source, and cross-platform media player"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://mpv.io"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["alsa-lib", "ffmpeg", "lcms2", "libass", "libdrm", "libplacebo", "libva", "luajit", "mesa", "pipewire", "vulkan-loader", "wayland", "libxkbcommon"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/mpv-player/mpv/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr \
--buildtype=release \
-D libmpv=true \
-D cdda=disabled \
-D drm=enabled \
-D libarchive=disabled \
-D dvdnav=disabled \
-D javascript=disabled \
-D lua=luajit \
-D uchardet=disabled \
-D tests=false \
-D alsa=enabled \
-D pipewire=enabled \
-D vulkan=enabled \
-D wayland=enabled \
-D gl=enabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
