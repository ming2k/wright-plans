name = "marisa"
version = "0.2.7"
release = 1
description = "Matching Algorithm with Recursively Implemented StorAge"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/s-yata/marisa-trie"

[dependencies]
build = ["autoconf", "automake", "libtool", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/s-yata/marisa-trie/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
autoreconf -fi'''

[lifecycle.configure]
script = '''
cd source
./configure \
    --prefix=/usr \
    --disable-static \
    --enable-sse2'''

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR} DESTDIR=${PART_DIR} install'''
