name = "libpcap"
version = "1.10.6"
release = 1
description = "Portable library for network traffic capture"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://www.tcpdump.org/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.tcpdump.org/release/libpcap-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
