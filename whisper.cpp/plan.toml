name = "whisper.cpp"
version = "1.8.3"
release = 1
description = "Automatic speech recognition in C/C++"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ggml-org/whisper.cpp"

[dependencies]
build = ["gcc", "cmake", "ninja"]
optional = ["sdl2"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr/lib/whisper.cpp \
  -DBUILD_SHARED_LIBS=OFF \
  -DGGML_NATIVE=OFF \
  -DWHISPER_SDL2=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''

