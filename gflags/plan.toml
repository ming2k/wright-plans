name = "gflags"
version = "2.2.2"
release = 1
description = "Command-line flags library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/gflags/gflags"


build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/gflags/gflags/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gflags-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
    -DBUILD_SHARED_LIBS=ON \
    -DBUILD_TESTING=OFF \
    -DREGISTER_INSTALL_PREFIX=OFF'''

[pipeline.compile]
script = '''
cd source/gflags-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gflags-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

