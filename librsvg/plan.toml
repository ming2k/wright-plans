name = "librsvg"
version = "2.62.1"
release = 2
description = "SVG rendering library using Rust"
license = "LGPL-2.1-or-later"
arch = "x86_64"

link_deps = ['cairo', 'gdk-pixbuf', 'pango', 'glib', 'libxml2', 'harfbuzz', 'freetype', 'fribidi']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/librsvg/2.62/librsvg-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
isolation = "relaxed"
script = '''
cd source/librsvg-${VERSION}
meson setup build --prefix=/usr --libdir=lib --buildtype=release -Dintrospection=enabled -Ddocs=disabled -Dtests=false -Dvala=disabled'''

[pipeline.compile]
isolation = "relaxed"
env = { LD_LIBRARY_PATH = '${BUILD_DIR}/build/librsvg' }
script = '''
cd source/librsvg-${VERSION}
meson compile -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/librsvg-${VERSION}
meson install -C build --destdir ${STAGING_DIR}'''

[[output]]
runtime_deps = ['cairo', 'gdk-pixbuf', 'pango', 'glib', 'libxml2', 'harfbuzz', 'freetype', 'fribidi']
