name = "procps-ng"
version = "4.0.6"
release = 4
description = "Utilities for monitoring your system and its processes"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gitlab.com/procps-ng/procps"

link_deps = ['ncurses', 'systemd']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://downloads.sourceforge.net/project/procps-ng/Production/procps-ng-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --sbindir=/usr/bin \
  --bindir=/usr/bin \
  --libdir=/usr/lib \
  --sysconfdir=/etc \
  --disable-static \
  --disable-kill \
  --disable-modern-top \
  --enable-watch8bit \
  --with-systemd'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install

if [ -d ${STAGING_DIR}/usr/sbin ]; then
  cp -a ${STAGING_DIR}/usr/sbin/. ${STAGING_DIR}/usr/bin/
  rm -rf ${STAGING_DIR}/usr/sbin
fi'''

[[output]]
runtime_deps = ['ncurses', 'systemd']
