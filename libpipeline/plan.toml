name = "libpipeline"
version = "1.5.8"
release = 1
description = "A library for manipulating pipelines of subprocesses in a flexible and convenient way"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://libpipeline.nongnu.org/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://download.savannah.gnu.org/releases/libpipeline/libpipeline-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
