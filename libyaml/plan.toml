name = "libyaml"
version = "0.2.5"
release = 1
description = "YAML 1.1 parser and emitter"
license = "MIT"
arch = "x86_64"
url = "https://pyyaml.org/wiki/LibYAML"

[[sources]]
sha256 = "SKIP"
url = "https://github.com/yaml/libyaml/releases/download/${VERSION}/yaml-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} make install'''
