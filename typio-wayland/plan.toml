name = "typio-wayland"
version = "0.0.6"
release = 1
description = "Linux/Wayland host for the Typio input method framework"
license = "MIT"
arch = "x86_64"
url = "https://github.com/typio-ime/typiod-wayland"

build_deps = ['meson', 'ninja']
link_deps = ['libtypio', 'wayland', 'libxkbcommon', 'dbus', 'pipewire', 'freetype', 'harfbuzz', 'fontconfig', 'flux', 'vulkan-loader']

[[sources]]
type = "git"
url = "https://github.com/typio-ime/typiod-wayland.git"
ref = "v0.0.6"
extract_to = "source"

[pipeline.configure]
script = '''
cd source
meson setup build --prefix=/usr --sysconfdir=/etc --buildtype=release \
    -Denable_systray=true \
    -Dbuild_voice=true'''

[pipeline.compile]
script = '''
cd source
ninja -C build'''

[pipeline.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
name = "typio-wayland"
runtime_deps = ['libtypio', 'wayland', 'libxkbcommon', 'dbus', 'pipewire', 'freetype', 'harfbuzz', 'fontconfig', 'flux', 'vulkan-loader']
