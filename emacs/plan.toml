name = "emacs"
version = "30.2"
release = 8
description = "The extensible, customizable, self-documenting real-time display editor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/emacs/"

[dependencies]
runtime = ["giflib", "glib", "gnutls", "gtk3", "harfbuzz", "libjpeg-turbo", "libpng", "librsvg", "libtiff", "libwebp", "ncurses", "pango", "tree-sitter"]
build = ["gcc", "gnutls", "make", "patch", "pkgconf", "tree-sitter"]
link = ["giflib", "glib", "glibc", "gnutls", "gtk3", "harfbuzz", "libjpeg-turbo", "libpng", "librsvg", "libtiff", "libwebp", "ncurses", "pango", "tree-sitter"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/emacs/emacs-${VERSION}.tar.xz"
extract_to = "source"

[[sources]]
sha256 = "54737e4f1b6624cf37b54b73b61cc89f5c149745793f29be8b4378cb1083e697"
type = "local"
path = "patches/emacs-30.2-tree-sitter-abi-version-r2.patch"

[lifecycle.prepare]
script = '''
cd source
patch -Np1 < ${WORKDIR}/emacs-30.2-tree-sitter-abi-version-r2.patch'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr                 \
--with-json                               \
--with-tree-sitter                        \
--with-native-compilation=no              \
--with-pgtk                               \
--with-jpeg                               \
--with-tiff                               \
--with-gif                                \
--with-png                                \
--with-rsvg                               \
--with-webp                               \
--without-imagemagick                     \
--without-gconf                           \
--without-gsettings                       \
--with-gnutls'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
