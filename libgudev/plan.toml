name = "libgudev"
version = "238"
release = 1
description = "GObject bindings for libudev"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["systemd"]
build = ["gobject-introspection", "meson", "ninja", "pkgconf", "systemd"]
link = ["glib"]

[[sources]]
sha256 = "SKIP"
url = "https://download.gnome.org/sources/libgudev/238/libgudev-238.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
# 修复：必须先进入源码目录
cd source

# 修正 meson 调用方式：指定构建目录为 'build'
meson setup build --prefix=/usr --libdir=lib -Dtests=disabled -Dintrospection=enabled -Dvapi=disabled'''

[lifecycle.compile]
script = '''
cd source/build
ninja -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/build
DESTDIR=${PART_DIR} ninja install'''
