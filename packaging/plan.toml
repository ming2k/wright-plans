[plan]
name = "packaging"
version = "25.0"
release = 1
description = "Core utilities for Python packages"
license = "Apache-2.0"
arch = "x86_64"
url = "https://packaging.pypa.io/"

[dependencies]
build = ["flit-core", "python"]
[sources]
uris = ["https://pypi.org/packages/source/p/packaging/packaging-25.0.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --root=${PKG_DIR} --no-build-isolation .
'''
