name = "libusb"
version = "1.0.29"
release = 1
description = "Library for userspace USB device access"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://libusb.info"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = ["systemd"]

[[sources]]
uri = "https://github.com/libusb/libusb/releases/download/v${PART_VERSION}/libusb-${PART_VERSION}.tar.bz2"
sha256 = "5977fc950f8d1395ccea9bd48c06b3f808fd3c2c961b44b0c2e6e29fc3a70a85"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
