name = "xml-parser"
version = "2.47"
release = 1
description = "Perl interface to the Expat XML parser"
license = "Artistic-1.0-Perl OR GPL-1.0-or-later"
arch = "x86_64"
url = "https://github.com/toddr/XML-Parser"

[dependencies]
build = ["make", "perl"]
link = ["expat"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://cpan.metacpan.org/authors/id/T/TO/TODDR/XML-Parser-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
perl Makefile.PL'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
