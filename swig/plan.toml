name = "swig"
version = "4.4.1"
release = 1
description = "Simplified Wrapper and Interface Generator"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://swig.org"

[dependencies]
build = ["gcc", "make", "autoconf", "automake", "bison"]
link = ["pcre2", "zlib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/swig/swig/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
./autogen.sh'''

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr \
            --with-pcre2'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
