name = "protobuf"
version = "34.1"
release = 1
description = "Protocol Buffers - Google's data interchange format"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/protocolbuffers/protobuf"

link_deps = ['abseil-cpp']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/protocolbuffers/protobuf/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/protobuf-${VERSION}
cmake -B ${WORKDIR}/build -S ${WORKDIR} -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DBUILD_SHARED_LIBS=ON \
  -Dprotobuf_BUILD_TESTS=OFF \
  -Dprotobuf_ABSL_PROVIDER=package \
  -Dprotobuf_BUILD_PROTOC_BINARIES=ON'''

[lifecycle.compile]
script = '''
cd source/protobuf-${VERSION}
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/protobuf-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install'''

[[output]]
runtime_deps = ['abseil-cpp']
