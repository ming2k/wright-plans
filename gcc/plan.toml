name = "gcc"
version = "16.1.0"
release = 1
description = "The GNU Compiler Collection - C and C++ frontends"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://gcc.gnu.org/"

[dependencies]
build = ["binutils", "make", "perl", "texinfo"]
link = ["gcc-libs", "gmp", "mpc", "mpfr", "zlib", "glibc"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gcc/gcc-${VERSION}/gcc-${VERSION}.tar.xz"
extract_to = "source"

[options]
ccache = true

[lifecycle.prepare]
script = '''
cd source/gcc-${VERSION}
case $(uname -m) in
    x86_64) sed -e '/m64=/s/lib64/lib/' -i.orig gcc/config/i386/t-linux64 ;;
esac
mkdir -v build'''

[lifecycle.configure]
script = '''
cd source/gcc-${VERSION}/build
SED=sed \
../configure --prefix=/usr \
    LD=ld \
    --enable-languages=c,c++,jit \
    --enable-default-pie \
    --enable-default-ssp \
    --enable-host-pie \
    --enable-host-shared \
    --disable-multilib \
    --disable-bootstrap \
    --disable-fixincludes \
    --enable-shared \
    --enable-threads=posix \
    --enable-__cxa_atexit \
    --enable-clocale=gnu \
    --enable-gnu-indirect-function \
    --enable-linker-build-id \
    --enable-lto \
    --enable-plugin \
    --enable-install-libiberty \
    --with-system-zlib \
    --with-linker-hash-style=gnu \
    --disable-werror'''

[lifecycle.compile]
script = '''
cd source/gcc-${VERSION}/build
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/gcc-${VERSION}/build
make DESTDIR=${PART_DIR} install
ln -sf gcc ${PART_DIR}/usr/bin/cc'''

# Main (catch-all) output — no `include` field
[[output]]
name = "gcc"
description = "The GNU Compiler Collection - C and C++ compiler"
runtime_deps = ["binutils", "gcc-libs", "libstdc++"]

[[output]]
name = "gcc-libs"
include = [
    "/usr/lib/libgcc_s\\.so.*",
    "/usr/lib/libgomp\\.so.*",
    "/usr/lib/libatomic\\.so.*",
    "/usr/lib/libitm\\.so.*",
    "/usr/lib/libasan\\.so.*",
    "/usr/lib/liblsan\\.so.*",
    "/usr/lib/libtsan\\.so.*",
    "/usr/lib/libubsan\\.so.*",
    "/usr/lib/libhwasan\\.so.*",
]
description = "GCC runtime libraries"
runtime_deps = ["glibc"]

[output.hooks]
post_install = "ldconfig"
post_upgrade = "ldconfig"

[[output]]
name = "libstdc++"
include = [
    "/usr/lib/libstdc\\+\\+\\.so.*",
    "/usr/include/c\\+/.*",
    "/usr/share/gdb/auto-load/.*",
]
description = "GNU C++ standard library"
runtime_deps = ["glibc", "gcc-libs"]

[output.hooks]
post_install = "ldconfig"
post_upgrade = "ldconfig"

[[output]]
name = "libgccjit"
include = [
    "/usr/lib/libgccjit\\.so.*",
    "/usr/include/libgccjit.*\\.h",
]
description = "GCC JIT compilation library"
runtime_deps = ["glibc", "gcc-libs"]

[output.hooks]
post_install = "ldconfig"
post_upgrade = "ldconfig"
