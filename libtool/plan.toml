name = "libtool"
version = "2.5.4"
release = 1
description = "GNU generic library support script"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libtool/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/libtool/libtool-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
rm -fv ${PART_DIR}/usr/lib/libltdl.a

'''

[lifecycle.fabricate]
