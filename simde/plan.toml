name = "simde"
version = "0.8.2"
release = 1
description = "Implementations of SIMD instruction sets for non-native platforms"
license = "MIT"
arch = "x86_64"
url = "https://github.com/simd-everywhere/simde"

[dependencies]
build = ["meson", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/simd-everywhere/simde/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D tests=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
