name = "python-babel"
version = "2.18.0"
release = 1
description = "Internationalization utilities for Python"
license = "BSD-3-Clause"
arch = "any"
url = "https://babel.pocoo.org/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/b/babel/babel-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/babel-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
