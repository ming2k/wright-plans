name = "libheif"
version = "1.21.2"
release = 2
description = "HEIF and AVIF file format decoder and encoder"
license = "LGPL-3.0-or-later"
arch = "x86_64"

link_deps = ['libde265', 'dav1d', 'aom', 'libjpeg-turbo', 'libpng']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "75f530b7154bc93e7ecf846edfc0416bf5f490612de8c45983c36385aa742b42"
url = "https://github.com/strukturag/libheif/releases/download/v${VERSION}/libheif-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DENABLE_LIBDE265=ON -DENABLE_DAV1D=ON -DENABLE_AOM=ON -DWITH_EXAMPLES=OFF -DWITH_GDK_PIXBUF=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install'''

[[output]]
runtime_deps = ['libde265', 'dav1d', 'aom', 'libjpeg-turbo', 'libpng']
