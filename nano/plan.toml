name = "nano"
version = "8.7.1"
release = 1
description = "A small, simple text editor aiming to replace Pico"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.nano-editor.org/"

link_deps = ['ncurses']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.nano-editor.org/dist/v8/nano-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/nano-${VERSION}
./configure --prefix=/usr \
--sysconfdir=/etc \
--enable-utf8 \
--docdir=/usr/share/doc/nano-${VERSION}'''

[lifecycle.compile]
script = '''
cd source/nano-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/nano-${VERSION}
make DESTDIR=${STAGING_DIR} install
install -v -m644 doc/{nano.html,sample.nanorc} ${STAGING_DIR}/usr/share/doc/nano-${VERSION}'''

[[output]]
runtime_deps = ['ncurses']
