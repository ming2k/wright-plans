name = "ripgrep"
version = "15.1.0"
release = 1
description = "Fast line-oriented regex search tool"
license = "MIT OR Unlicense"
arch = "x86_64"
url = "https://github.com/BurntSushi/ripgrep"

link_deps = ['gcc:gcc-libs', 'pcre2', 'glibc']
build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/BurntSushi/ripgrep/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/ripgrep-${VERSION}
cargo build --release --locked --features pcre2'''

[pipeline.staging]
script = '''
cd source/ripgrep-${VERSION}
install -Dm755 target/release/rg ${STAGING_DIR}/usr/bin/rg

if [ -f doc/rg.1 ]; then
  install -Dm644 doc/rg.1 ${STAGING_DIR}/usr/share/man/man1/rg.1
fi
if [ -d complete ]; then
  install -Dm644 complete/rg.bash ${STAGING_DIR}/usr/share/bash-completion/completions/rg || true
  install -Dm644 complete/_rg ${STAGING_DIR}/usr/share/zsh/site-functions/_rg || true
  install -Dm644 complete/rg.fish ${STAGING_DIR}/usr/share/fish/vendor_completions.d/rg.fish || true
fi'''

[[output]]
runtime_deps = ['pcre2', 'gcc:gcc-libs', 'glibc']
replaces = ["rg"]
conflicts = ["rg"]
provides = ["rg"]
