name = "openssh"
version = "10.3p1"
release = 7
description = "Free implementation of the SSH protocol suite"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.openssh.com/portable.html"

link_deps = ['glibc:default', 'libedit:default', 'linux-pam:default', 'openssl:default', 'zlib:default', 'libxcrypt:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "sshd.service"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "ssh-agent.service"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "ssh-agent.socket"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "sshd.pam"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "openssh.tmpfiles"

[lifecycle.configure]
script = '''
cd source
# --with-privsep-user=nobody: no dedicated sshd user needed
# --with-security-key-builtin omitted: requires libfido2 (not yet packaged)
# --with-xauth omitted: pure Wayland system, no X11
./configure \
  --prefix=/usr \
  --sysconfdir=/etc/ssh \
  --libexecdir=/usr/lib/ssh \
  --sbindir=/usr/bin \
  --with-privsep-path=/usr/share/empty.sshd \
  --with-privsep-user=nobody \
  --with-pam \
  --with-libedit \
  --with-ssl-engine \
  --disable-lastlog \
  --with-default-path=/usr/bin'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install

# ── Systemd system units ──────────────────────────────────────────────────────
install -Dm644 ${WORKDIR}/sshd.service         ${STAGING_DIR}/usr/lib/systemd/system/sshd.service

# ── Systemd user units (ssh-agent) ────────────────────────────────────────────
install -Dm644 ${WORKDIR}/ssh-agent.service    ${STAGING_DIR}/usr/lib/systemd/user/ssh-agent.service
install -Dm644 ${WORKDIR}/ssh-agent.socket     ${STAGING_DIR}/usr/lib/systemd/user/ssh-agent.socket

# ── tmpfiles (privilege separation chroot) ────────────────────────────────────
install -Dm644 ${WORKDIR}/openssh.tmpfiles     ${STAGING_DIR}/usr/lib/tmpfiles.d/openssh.conf

# ── Factory defaults (pristine upstream configs for reference) ────────────────
install -Dm644 ${STAGING_DIR}/etc/ssh/ssh_config     ${STAGING_DIR}/usr/share/factory/etc/ssh/ssh_config
install -Dm644 ${STAGING_DIR}/etc/ssh/sshd_config    ${STAGING_DIR}/usr/share/factory/etc/ssh/sshd_config

# ── PAM configuration ─────────────────────────────────────────────────────────
install -Dm644 ${WORKDIR}/sshd.pam             ${STAGING_DIR}/etc/pam.d/sshd

# ── Permissions ───────────────────────────────────────────────────────────────
# ssh-keysign needs setuid for host-based authentication
if [ -e ${STAGING_DIR}/usr/lib/ssh/ssh-keysign ]; then
  chmod 4755 ${STAGING_DIR}/usr/lib/ssh/ssh-keysign
fi'''

[output]
backup = ["/etc/ssh/ssh_config", "/etc/ssh/sshd_config", "/etc/pam.d/sshd"]

[hooks]
post_install = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/openssh.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
post_upgrade = '''
systemd-tmpfiles --create /usr/lib/tmpfiles.d/openssh.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''

[output]
runtime_deps = ['shadow:default']
