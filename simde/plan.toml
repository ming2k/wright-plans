name = "simde"
version = "0.8.2"
release = 1
description = "Implementations of SIMD instruction sets for non-native platforms"
license = "MIT"
arch = "x86_64"
url = "https://github.com/simd-everywhere/simde"

[dependencies]
build = ["meson", "ninja"]

[[sources]]
uri = "https://github.com/simd-everywhere/simde/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D tests=false

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
