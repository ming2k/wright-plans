name = "aardvark-dns"
version = "1.17.0"
release = 1
description = "Authoritative DNS server for container networks"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/containers/aardvark-dns"

[dependencies]
build = ["rust", "protobuf"]

[[sources]]
uri = "https://github.com/containers/aardvark-dns/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
cargo build --release --locked

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/aardvark-dns ${PART_DIR}/usr/libexec/podman/aardvark-dns

'''

[lifecycle.fabricate]
