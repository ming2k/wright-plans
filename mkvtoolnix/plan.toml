name = "mkvtoolnix"
version = "98.0"
release = 2
description = "Tools for Matroska files"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://mkvtoolnix.download/"

link_deps = ['boost', 'cmark', 'flac', 'fmt', 'libebml', 'libmatroska', 'libogg', 'libvorbis', 'nlohmann-json', 'zlib']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mkvtoolnix.download/sources/mkvtoolnix-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/mkvtoolnix-${VERSION}
./configure \
  --prefix=/usr \
  --with-boost-libdir=/usr/lib \
  --disable-gui'''

[pipeline.compile]
script = '''
cd source/mkvtoolnix-${VERSION}
rake -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/mkvtoolnix-${VERSION}
rake DESTDIR=${STAGING_DIR} install

# Remove icon directory as MKVToolNix Rakefile installs icons unconditionally even when GUI is disabled
rm -rf ${STAGING_DIR}/usr/share/icons'''

[[output]]
runtime_deps = ['boost', 'cmark', 'flac', 'fmt', 'libebml', 'libmatroska', 'libogg', 'libvorbis', 'nlohmann-json', 'zlib']
