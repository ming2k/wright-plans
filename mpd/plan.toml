name = "mpd"
version = "0.24.8"
release = 1
description = "Flexible, powerful, server-side application for playing music"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.musicpd.org/"

link_deps = ['alsa-lib', 'pipewire', 'ffmpeg', 'sqlite', 'curl', 'dbus', 'libsndfile', 'fmt']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/MusicPlayerDaemon/MPD/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/mpd-${VERSION}
meson setup build       \
  --prefix=/usr         \
  --buildtype=plain     \
  -Db_ndebug=true       \
  -Ddocumentation=disabled \
  -Dtest=false          \
  -Dadplug=disabled     \
  -Daudiofile=disabled  \
  -Dio_uring=disabled   \
  -Dshine=disabled      \
  -Dsndio=disabled      \
  -Dtremor=disabled     \
  -Davahi=disabled      \
  -Dchromaprint=disabled \
  -Dfluidsynth=disabled \
  -Djack=disabled       \
  -Dlame=disabled       \
  -Dlirc=disabled       \
  -Dmikmod=disabled     \
  -Dnfs=disabled        \
  -Dopenal=disabled     \
  -Dopenmpt=disabled    \
  -Dpulse=disabled      \
  -Dsidplay=disabled    \
  -Dshout=disabled      \
  -Dsmbclient=disabled  \
  -Dtwolame=disabled    \
  -Dudisks=disabled     \
  -Dupnp=disabled       \
  -Dwildmidi=disabled   \
  -Dyajl=disabled'''

[pipeline.compile]
script = '''
cd source/mpd-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/mpd-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install

install -vDm644 doc/mpdconf.example \
  ${STAGING_DIR}/usr/share/doc/mpd/mpdconf.example'''

[[output]]
runtime_deps = ['alsa-lib', 'pipewire', 'ffmpeg', 'sqlite', 'curl', 'dbus', 'libsndfile', 'fmt']

[output.hooks]
post_install = "systemctl daemon-reload 2>/dev/null || true"
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
