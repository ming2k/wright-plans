name = "fd"
version = "10.3.0"
release = 1
description = "Simple, fast and user-friendly alternative to find"
license = "Apache-2.0 OR MIT"
arch = "x86_64"
url = "https://github.com/sharkdp/fd"

link_deps = ['gcc:gcc-libs', 'glibc']
build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/sharkdp/fd/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "relaxed"
script = '''
cd source/fd-${VERSION}
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source/fd-${VERSION}
install -Dm755 target/release/fd ${STAGING_DIR}/usr/bin/fd

if [ -f doc/fd.1 ]; then
  install -Dm644 doc/fd.1 ${STAGING_DIR}/usr/share/man/man1/fd.1
fi
if [ -d completions ]; then
  install -Dm644 completions/fd.bash ${STAGING_DIR}/usr/share/bash-completion/completions/fd || true
  install -Dm644 completions/_fd ${STAGING_DIR}/usr/share/zsh/site-functions/_fd || true
  install -Dm644 completions/fd.fish ${STAGING_DIR}/usr/share/fish/vendor_completions.d/fd.fish || true
fi'''

[[output]]
runtime_deps = ['gcc:gcc-libs', 'glibc']
