name = "sphinxcontrib-devhelp"
version = "2.0.0"
release = 1
description = "Sphinx extension for Devhelp output"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/sphinx-doc/sphinxcontrib-devhelp"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/s/sphinxcontrib_devhelp/sphinxcontrib_devhelp-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/sphinxcontrib-devhelp-${VERSION}
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
