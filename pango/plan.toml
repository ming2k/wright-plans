name = "pango"
version = "1.57.0"
release = 1
description = "Text layout and rendering library"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://pango.gnome.org"

[dependencies]
build = [
    "meson",
    "ninja",
    "pkgconf",
    "gobject-introspection",
    "python",
]
link = [
    "glib",
    "cairo",
    "harfbuzz",
    "fontconfig",
    "fribidi",
    "freetype",
]

[[sources]]
uri = "https://download.gnome.org/sources/pango/1.57/pango-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr               \
--buildtype=release         \
--wrap-mode=nofallback      \
-D xft=disabled             \
-D introspection=enabled

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
