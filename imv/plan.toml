[plan]
name = "imv"
version = "5.0.1"
release = 1
description = "Command line image viewer for tiling window managers"
license = "MIT"
arch = "x86_64"
url = "https://git.sr.ht/~exec64/imv"

[dependencies]
runtime = ["wayland"]
build = ["meson", "ninja", "pkgconf", "wayland-protocols"]
link = [
    "pango",
    "libxkbcommon",
    "inih",
    "wayland",
    "mesa",
    "libpng",
    "libjpeg-turbo",
    "libtiff",
    "librsvg",
    "libheif",
    "libjxl",
    "libwebp",
    "icu",
]

[[sources]]
uri = "https://git.sr.ht/~exec64/imv/archive/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "patches/fix-missing-stdio.patch"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
patch -Np1 < ${FILES_DIR}/fix-missing-stdio.patch
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build \
    --prefix=/usr \
    -Dwindows=wayland \
    -Dunicode=icu \
    -Dlibnsgif=disabled \
    -Dlibnsbmp=disabled \
    -Dtest=disabled \
    -Dman=disabled
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
ninja -C build
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} ninja -C build install
'''
