name = "libmnl"
version = "1.0.5"
release = 1
description = "Minimalistic Netlink userspace library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.netfilter.org/projects/libmnl/"

link_deps = ['glibc']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.netfilter.org/pub/libmnl/libmnl-${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libmnl-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libmnl-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libmnl-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['glibc']
