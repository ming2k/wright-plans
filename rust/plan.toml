name = "rust"
version = "1.95.0"
release = 1
description = "The Rust programming language compiler and standard library"
license = "Apache-2.0 AND MIT"
arch = "x86_64"
url = "https://www.rust-lang.org"

link_deps = ['glibc']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://static.rust-lang.org/dist/rust-${VERSION}-x86_64-unknown-linux-gnu.tar.xz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source/rust-${VERSION}-x86_64-unknown-linux-gnu
./install.sh --destdir=${STAGING_DIR} --prefix=/usr --without=rust-docs

# Move non-FHS usr/etc/* to etc/
if [ -d "${STAGING_DIR}/usr/etc" ]; then
    mkdir -p "${STAGING_DIR}/etc"
    cp -r "${STAGING_DIR}/usr/etc/"* "${STAGING_DIR}/etc/"
    rm -rf "${STAGING_DIR}/usr/etc"
fi'''

# Rust outputs: cargo is split out; rest stays in rust catch-all
[[output]]
name = "cargo"
description = "Cargo package manager for Rust"
include = [
    "/usr/bin/cargo",
    "/usr/bin/cargo-.*",
    "/usr/libexec/cargo-.*",
    "/usr/share/cargo/.*",
    "/usr/share/doc/cargo/.*",
    "/usr/share/man/man1/cargo.*",
    "/usr/share/zsh/site-functions/_cargo",
    "/usr/lib/rustlib/src/rust/Cargo\\.lock",
    "/usr/lib/rustlib/src/rust/library/.*/Cargo\\.toml",
]
runtime_deps = ['rust']

[[output]]
name = "rust"
runtime_deps = ['glibc']
# catch-all — rustc, rustdoc, stdlib, rustlib, etc.
