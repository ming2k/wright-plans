name = "libva"
version = "2.23.0"
release = 1
description = "Video Acceleration (VA) API for Linux"
license = "MIT"
arch = "x86_64"
url = "https://github.com/intel/libva"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["libdrm", "mesa", "wayland"]

[[sources]]
sha256 = "b10aceb30e93ddf13b2030eb70079574ba437be9b3b76065caf28a72c07e23e7"
url = "https://github.com/intel/libva/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr \
--buildtype=release \
-D with_x11=no \
-D with_glx=no \
-D with_wayland=yes \
-D with_win32=no'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
