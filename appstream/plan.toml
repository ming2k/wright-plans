name = "appstream"
version = "1.1.2"
release = 11
description = "Tools and libraries to work with AppStream metadata"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Distributions/AppStream/"

link_deps = ['glib', 'libxml2', 'libxmlb', 'curl', 'libfyaml', 'zstd', 'cairo', 'gdk-pixbuf', 'freetype', 'pango', 'fontconfig', 'librsvg']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ximion/appstream/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/appstream-${VERSION}
sanitize_flags() {
    printf "%s" "$1" | sed -E "s/(^|[[:space:]])-I([[:space:]]|$)/ /g; s/[[:space:]]+/ /g; s/^ //; s/ $//"
}
export CPPFLAGS="$(sanitize_flags "${CPPFLAGS:-}")"
export CFLAGS="$(sanitize_flags "${CFLAGS:-}")"
export CXXFLAGS="$(sanitize_flags "${CXXFLAGS:-}")"
meson setup build              \
    --prefix=/usr              \
    --buildtype=release        \
    -Ddocs=false               \
    -Dapidocs=false            \
    -Dstemming=false           \
    -Dsystemd=true             \
    -Dcompose=true             \
    -Dgir=true                 \
    -Dinstall-docs=false       \
    -Dman=false                \
    -Dbash-completion=false'''

[pipeline.compile]
script = '''
cd source/appstream-${VERSION}
sanitize_flags() {
    printf "%s" "$1" | sed -E "s/(^|[[:space:]])-I([[:space:]]|$)/ /g; s/[[:space:]]+/ /g; s/^ //; s/ $//"
}
export CPPFLAGS="$(sanitize_flags "${CPPFLAGS:-}")"
export CFLAGS="$(sanitize_flags "${CFLAGS:-}")"
export CXXFLAGS="$(sanitize_flags "${CXXFLAGS:-}")"
meson compile -C build'''

[pipeline.staging]
script = '''
cd source/appstream-${VERSION}
meson install -C build --destdir ${STAGING_DIR}'''

[[output]]
runtime_deps = ['systemd', 'glib', 'libxml2', 'libxmlb', 'curl', 'libfyaml', 'zstd', 'cairo', 'gdk-pixbuf', 'freetype', 'pango', 'fontconfig', 'librsvg']
