name = "brotli"
version = "1.2.0"
release = 1
description = "Generic-purpose lossless compression algorithm"
license = "MIT"
arch = "x86_64"

[dependencies]
build = ["cmake", "gcc", "make"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/google/brotli/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib'''

[lifecycle.compile]
script = '''
cd source
cmake --build ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} cmake --install ${WORKDIR}/build'''
