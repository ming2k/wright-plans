name = "rust"
version = "1.95.0"
release = 1
description = "The Rust programming language compiler and standard library"
license = "Apache-2.0 AND MIT"
arch = "x86_64"
url = "https://www.rust-lang.org"

[dependencies]
link = ["glibc"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://static.rust-lang.org/dist/rust-${VERSION}-x86_64-unknown-linux-gnu.tar.xz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source/rust-${VERSION}-x86_64-unknown-linux-gnu
./install.sh --destdir=${PART_DIR} --prefix=/usr --without=rust-docs

# Move non-FHS usr/etc/* to etc/
if [ -d "${PART_DIR}/usr/etc" ]; then
    mkdir -p "${PART_DIR}/etc"
    cp -r "${PART_DIR}/usr/etc/"* "${PART_DIR}/etc/"
    rm -rf "${PART_DIR}/usr/etc"
fi'''

# Rust outputs: main compiler + cargo
[[output]]
name = "rust"
# catch-all

[[output]]
name = "cargo"
description = "Cargo package manager for Rust"
include = ["/.*"]
runtime_deps = ["rust"]
