name = "psmisc"
version = "23.7"
release = 1
description = "Programs for displaying information about running processes"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.com/psmisc/psmisc"

link_deps = ['ncurses']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://downloads.sourceforge.net/project/psmisc/psmisc/psmisc-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/psmisc-${VERSION}
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source/psmisc-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/psmisc-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['ncurses']
