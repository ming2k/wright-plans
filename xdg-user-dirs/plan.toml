[plan]
name = "xdg-user-dirs"
version = "0.18"
release = 2
description = "Tool to help manage standard user directories"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/xdg-user-dirs/"

[dependencies]
build = ["gcc", "make", "docbook-xsl", "libxslt"]

[[sources]]
uri = "https://user-dirs.freedesktop.org/releases/xdg-user-dirs-${PKG_VERSION}.tar.gz"
sha256 = "ec6f06d7495cdba37a732039f9b5e1578bcb296576fde0da40edb2f52220df3c"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sysconfdir=/etc
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

if [ -d ${PKG_DIR}/usr/etc ]; then
  mkdir -p ${PKG_DIR}/etc
  cp -a ${PKG_DIR}/usr/etc/. ${PKG_DIR}/etc/
  rm -rf ${PKG_DIR}/usr/etc
fi
'''
