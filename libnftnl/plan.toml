[plan]
name = "libnftnl"
version = "1.3.1"
release = 1
description = "Netfilter nf_tables netlink userspace library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://netfilter.org/projects/libnftnl/"

[dependencies]
build = ["gcc", "libmnl", "make", "pkgconf"]
runtime = ["libmnl >= 1.0.4"]
[sources]
uris = ["https://netfilter.org/projects/libnftnl/files/libnftnl-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[options]
strip = true

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
./configure --prefix=/usr \
--disable-static
"""

[lifecycle.compile]
script = """
cd ${BUILD_DIR}
make -j$(nproc)
"""

[lifecycle.package]
script = """
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
"""
