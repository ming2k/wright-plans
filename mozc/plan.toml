name = "mozc"
version = "3.33.6089"
release = 1
description = "The Open Source edition of Google Japanese Input"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/mozc"

build = ['bazelisk', 'openjdk', 'python', 'gcc']
link = ['qt6-base']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/google/mozc/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "none"
script = '''
cd source/src
bazel --batch build server:mozc_server gui/tool:mozc_tool \
  --config=oss_linux \
  --config=release_build \
  --host_cxxopt=-O2 \
  --host_cxxopt=-pipe \
  --cxxopt=-O2 \
  --cxxopt=-pipe'''

[lifecycle.staging]
script = '''
cd source/src

install -Dm755 bazel-bin/server/mozc_server ${STAGING_DIR}/usr/lib/mozc/mozc_server
install -Dm755 bazel-bin/gui/tool/mozc_tool ${STAGING_DIR}/usr/lib/mozc/mozc_tool

install -Dm644 ${WORKDIR}/LICENSE ${STAGING_DIR}/usr/share/licenses/mozc/LICENSE'''

[output]
runtime_deps = ['qt6-base']
