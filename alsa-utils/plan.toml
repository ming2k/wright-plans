name = "alsa-utils"
version = "1.2.15.2"
release = 1
description = "ALSA utilities including alsactl, amixer, aplay"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.alsa-project.org"

[dependencies]
runtime = ["alsa-ucm-conf"]
link = ["alsa-lib", "ncurses"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.alsa-project.org/files/pub/utils/alsa-utils-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --sbindir=/usr/bin --disable-alsaloop --disable-bat --disable-xmlto --disable-rst2man'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} make install'''

[hooks]
post_install = "alsactl init 2>/dev/null || true"
