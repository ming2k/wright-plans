name = "uchardet"
version = "0.0.8"
release = 1
description = "Universal charset detection library"
license = "MPL-1.1"
arch = "x86_64"
url = "https://www.freedesktop.org/software/uchardet/"


build_deps = ['cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.freedesktop.org/software/uchardet/releases/uchardet-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
mkdir -p ${WORKDIR}/build && cd source/build
cmake -DCMAKE_INSTALL_PREFIX=/usr \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
      -DBUILD_STATIC=OFF \
      ..'''

[pipeline.compile]
script = '''
cd source/uchardet-${VERSION}/build
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/uchardet-${VERSION}/build
make DESTDIR=${STAGING_DIR} install'''

