name = "abseil-cpp"
version = "20260107.1"
release = 1
description = "Abseil C++ library (Google's common C++ utilities)"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/abseil/abseil-cpp"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/abseil/abseil-cpp/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B ${WORKDIR}/build -S ${WORKDIR} -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DCMAKE_CXX_STANDARD=17 \
  -DABSL_PROPAGATE_CXX_STD=ON \
  -DABSL_BUILD_TESTING=OFF \
  -DBUILD_SHARED_LIBS=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
