name = "ccache"
version = "4.13.6"
release = 1
description = "Fast C/C++ compiler cache"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://ccache.dev"

build_deps = ['cmake', 'ninja', 'zstd']
link_deps = ['zstd']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ccache/ccache/releases/download/v${VERSION}/ccache-${VERSION}.tar.xz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/Cyan4973/xxhash/archive/refs/tags/v0.8.3.tar.gz"
extract_to = "source/xxhash-src"

[lifecycle.configure]
script = '''
XXHASH_SRC=$(realpath source/xxhash-src/xxHash-*)
cd source/ccache-${VERSION}
cmake -B build -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_BUILD_TYPE=Release \
  -DENABLE_TESTING=OFF \
  -DCCACHE_DEV_MODE=OFF \
  -DREDIS_STORAGE_BACKEND=OFF \
  -DZSTD_FROM_INTERNET=OFF \
  -DFETCHCONTENT_SOURCE_DIR_XXHASH="$XXHASH_SRC"'''

[lifecycle.compile]
script = '''
cd source/ccache-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/ccache-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['zstd']
