name = "docbook-xsl"
version = "1.79.2"
release = 3
description = "XSL stylesheets for DocBook XML"
license = "MIT"
arch = "any"
url = "https://github.com/docbook/xslt10-stylesheets"

[dependencies]
runtime = ["libxml2"]

[[sources]]
uri = "https://github.com/docbook/xslt10-stylesheets/releases/download/release/${PART_VERSION}/docbook-xsl-nons-${PART_VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
install -dm755 "${PART_DIR}/usr/share/xml/docbook"
cp -r "${BUILD_DIR}/." "${PART_DIR}/usr/share/xml/docbook/xsl-stylesheets-${PART_VERSION}/"
ln -sfn "xsl-stylesheets-${PART_VERSION}" "${PART_DIR}/usr/share/xml/docbook/xsl-stylesheets"
ln -sfn "xsl-stylesheets-${PART_VERSION}" "${PART_DIR}/usr/share/xml/docbook/xsl-stylesheets-nons"

# Write a comprehensive catalog for use inside strict build sandboxes
# (where /etc/xml/catalog is not mounted). Build tools set XML_CATALOG_FILES
# to this file to resolve all common DocBook XSL URIs locally.
cat > "${PART_DIR}/usr/share/xml/docbook/xsl-stylesheets-${PART_VERSION}/catalog.xml" << 'EOF'
<?xml version="1.0"?>
<catalog xmlns="urn:oasis:names:tc:entity:xmlns:xml:catalog">
  <rewriteURI uriStartString="http://cdn.docbook.org/release/xsl/current/"         rewritePrefix="./"/>
  <rewriteURI uriStartString="http://cdn.docbook.org/release/xsl-nons/current/"     rewritePrefix="./"/>
  <rewriteURI uriStartString="http://docbook.sourceforge.net/release/xsl/current/"  rewritePrefix="./"/>
  <rewriteURI uriStartString="http://docbook.sourceforge.net/release/xsl-nons/current/" rewritePrefix="./"/>
</catalog>
EOF

'''

[hooks]
post_install = '''
install -dm755 /etc/xml
[ -f /etc/xml/catalog ] || xmlcatalog --noout --create /etc/xml/catalog
xmlcatalog --noout --add rewriteURI "http://cdn.docbook.org/release/xsl/current/"             "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog
xmlcatalog --noout --add rewriteURI "http://cdn.docbook.org/release/xsl-nons/current/"        "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog
xmlcatalog --noout --add rewriteURI "http://docbook.sourceforge.net/release/xsl/current/"     "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog
xmlcatalog --noout --add rewriteURI "http://docbook.sourceforge.net/release/xsl-nons/current/" "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog

'''
post_upgrade = '''
xmlcatalog --noout --del "http://cdn.docbook.org/release/xsl/current/"              /etc/xml/catalog 2>/dev/null || true
xmlcatalog --noout --del "http://cdn.docbook.org/release/xsl-nons/current/"         /etc/xml/catalog 2>/dev/null || true
xmlcatalog --noout --del "http://docbook.sourceforge.net/release/xsl/current/"      /etc/xml/catalog 2>/dev/null || true
xmlcatalog --noout --del "http://docbook.sourceforge.net/release/xsl-nons/current/" /etc/xml/catalog 2>/dev/null || true
xmlcatalog --noout --add rewriteURI "http://cdn.docbook.org/release/xsl/current/"             "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog
xmlcatalog --noout --add rewriteURI "http://cdn.docbook.org/release/xsl-nons/current/"        "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog
xmlcatalog --noout --add rewriteURI "http://docbook.sourceforge.net/release/xsl/current/"     "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog
xmlcatalog --noout --add rewriteURI "http://docbook.sourceforge.net/release/xsl-nons/current/" "file:///usr/share/xml/docbook/xsl-stylesheets/" /etc/xml/catalog

'''
pre_remove = '''
xmlcatalog --noout --del "http://cdn.docbook.org/release/xsl/current/"              /etc/xml/catalog 2>/dev/null || true
xmlcatalog --noout --del "http://cdn.docbook.org/release/xsl-nons/current/"         /etc/xml/catalog 2>/dev/null || true
xmlcatalog --noout --del "http://docbook.sourceforge.net/release/xsl/current/"      /etc/xml/catalog 2>/dev/null || true
xmlcatalog --noout --del "http://docbook.sourceforge.net/release/xsl-nons/current/" /etc/xml/catalog 2>/dev/null || true

'''
