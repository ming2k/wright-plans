name = "ostree"
version = "2025.7"
release = 2
description = "Operating system and container binary deployment and upgrades"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://ostreedev.github.io/ostree/"

[dependencies]
runtime = ["systemd"]
build = [
    "gcc",
    "make",
    "pkgconf",
    "gettext",
]
link = [
    "glib",
    "libarchive",
    "curl",
    "gpgme",
]

[[sources]]
uri = "https://github.com/ostreedev/ostree/releases/download/v${PART_VERSION}/libostree-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr       \
    --disable-static            \
    --with-curl                 \
    --without-soup              \
    --without-soup3             \
    --disable-man               \
    --disable-gtk-doc           \
    --with-gpgme                \
    --sysconfdir=/etc            \
    --disable-otmpfile          \
    --with-builtin-grub2-mkconfig

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} make install

'''

[lifecycle.fabricate]
