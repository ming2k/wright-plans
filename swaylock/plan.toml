name = "swaylock"
version = "1.8.4"
release = 1
description = "Screen locker for Wayland"
license = "MIT"
arch = "x86_64"
url = "https://github.com/swaywm/swaylock"

link_deps = ['libxkbcommon', 'linux-pam', 'wayland']
build_deps = ['wayland-protocols', 'meson', 'ninja']

[[sources]]
type = "http"
sha256 = "aa251d5a8f335fe2ac9ec3cc2a6ac8772aa4dba2ec710ccd415956c6e89b11d3"
url = "https://github.com/swaywm/swaylock/releases/download/v${VERSION}/swaylock-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/swaylock-${VERSION}
meson setup build --prefix=/usr --buildtype=release -Dpam=enabled -Dgdk-pixbuf=enabled -Dman-pages=disabled'''

[pipeline.compile]
script = '''
cd source/swaylock-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/swaylock-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['cairo', 'gdk-pixbuf', 'libxkbcommon', 'linux-pam', 'wayland']
