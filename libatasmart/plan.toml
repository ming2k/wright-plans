name = "libatasmart"
version = "0.19"
release = 1
description = "ATA S.M.A.R.T. reading and parsing library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "http://0pointer.de/blog/projects/being-smart.html"

[dependencies]
build = ["autoconf", "automake", "gcc", "libtool", "make", "pkgconf"]
link = ["systemd"]

[[sources]]
sha256 = "61f0ea345f63d28ab2ff0dc352c22271661b66bf09642db3a4049ac9dbdb0f8d"
url = "http://0pointer.de/public/libatasmart-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
autoreconf -fi
./configure --prefix=/usr --sbindir=/usr/bin --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
