name = "readline"
version = "8.3"
release = 1
description = "GNU readline library for command-line editing and history"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://tiswww.case.edu/php/chet/readline/rltop.html"

link_deps = ['ncurses']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-001"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-002"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/readline/readline-8.3-patches/readline83-003"

[options]
ccache = true

[pipeline.prepare]
script = '''
cd source/readline-${VERSION}
patch -Np0 < ${WORKDIR}/readline-readline83-001
patch -Np0 < ${WORKDIR}/readline-readline83-002
patch -Np0 < ${WORKDIR}/readline-readline83-003
sed -i '/MV.*old/d' Makefile.in
sed -i '/{OLDSUFF}/c:' support/shlib-install'''

[pipeline.configure]
script = '''
cd source/readline-${VERSION}
./configure --prefix=/usr    --disable-static --with-curses    --docdir=/usr/share/doc/readline-${VERSION}'''

[pipeline.compile]
script = '''
cd source/readline-${VERSION}
make SHLIB_LIBS="-lncursesw"'''

[pipeline.staging]
script = '''
cd source/readline-${VERSION}
make SHLIB_LIBS="-lncursesw" DESTDIR=${STAGING_DIR} install
install -d ${STAGING_DIR}/usr/share/doc/readline-${VERSION}
install -v -m644 doc/*.{ps,pdf,html,dvi} ${STAGING_DIR}/usr/share/doc/readline-${VERSION}/ 2>/dev/null || true'''

[[output]]
runtime_deps = ['ncurses']
backup = ["/etc/inputrc"]
hooks.post_install = "ldconfig 2>/dev/null || true"
hooks.post_upgrade = "ldconfig 2>/dev/null || true"
