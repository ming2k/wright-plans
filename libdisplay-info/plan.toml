name = "libdisplay-info"
version = "0.2.0"
release = 1
description = "EDID and DisplayID library"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/emersion/libdisplay-info"

[dependencies]
build = ["hwdata", "meson", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/emersion/libdisplay-info/-/releases/${VERSION}/downloads/libdisplay-info-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr         \
--buildtype=release'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
