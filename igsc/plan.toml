name = "igsc"
version = "0.9.5"
release = 1
description = "Intel Graphics System Firmware Update Library"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/intel/igsc"

link_deps = ['glibc', 'metee']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
url = "https://github.com/intel/igsc/archive/refs/tags/V${VERSION}.tar.gz"
sha256 = "SKIP"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/igsc-${VERSION}
cmake -B build -S igsc-${VERSION} -GNinja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_BUILD_TYPE=Release -DMETEE_DIR=/usr/lib/cmake/metee'''

[pipeline.compile]
script = '''
cd source/igsc-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/igsc-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['glibc', 'metee']
