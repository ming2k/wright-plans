name = "linux-pam"
version = "1.7.2"
release = 5
description = "Pluggable Authentication Modules for Linux"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/linux-pam/linux-pam"

link_deps = ['glibc']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/linux-pam/linux-pam/releases/download/v${VERSION}/Linux-PAM-${VERSION}.tar.xz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "pam.d/system-account"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "pam.d/system-auth"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "pam.d/system-session"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "pam.d/system-password"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "pam.d/other"

[lifecycle.configure]
script = '''
cd source/Linux-PAM-${VERSION}
mkdir -p build
cd build
meson setup .. \
    --prefix=/usr \
    --buildtype=release \
    -Dsbindir=/usr/bin \
    -Dlogind=enabled \
    -Deconf=disabled \
    -Dselinux=disabled \
    -Delogind=disabled \
    -Dpam_userdb=disabled \
    -Dpwaccess=disabled \
    -Dvendordir='' \
    -Ddocs=disabled \
    -Ddocdir=/usr/share/doc/Linux-PAM-${VERSION}'''

[lifecycle.compile]
script = '''
cd source/Linux-PAM-${VERSION}/build
ninja'''

[lifecycle.staging]
script = '''
cd source/Linux-PAM-${VERSION}/build
DESTDIR=${STAGING_DIR} ninja install

chmod -v 4755 ${STAGING_DIR}/usr/bin/unix_chkpwd

rm -rf ${STAGING_DIR}/usr/lib/systemd

install -vdm755 ${STAGING_DIR}/etc/pam.d
for f in system-account system-auth system-session system-password other; do
    install -Dm644 ${WORKDIR}/linux-pam-${f} ${STAGING_DIR}/etc/pam.d/${f}
done'''

[[output]]
runtime_deps = ['systemd', 'glibc']
backup = ["/etc/pam.d/system-account", "/etc/pam.d/system-auth", "/etc/pam.d/system-session", "/etc/pam.d/system-password", "/etc/pam.d/other"]
hooks.post_install = "ldconfig 2>/dev/null || true"
hooks.post_upgrade = "ldconfig 2>/dev/null || true"
