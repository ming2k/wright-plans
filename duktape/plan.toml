name = "duktape"
version = "2.7.0"
release = 1
description = "Embeddable Javascript engine"
license = "MIT"
arch = "x86_64"
url = "https://duktape.org"

[[sources]]
sha256 = "SKIP"
url = "https://duktape.org/duktape-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo "makefile project"'''

[lifecycle.compile]
script = '''
cd source
sed -i 's/-Wall -Wextra/-Wall -Wextra -fPIC/' Makefile.sharedlibrary
make -f Makefile.sharedlibrary -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
mkdir -p ${PART_DIR}/usr/lib ${PART_DIR}/usr/include ${PART_DIR}/usr/lib/pkgconfig
install -m755 libduktape.so.207.20700 ${PART_DIR}/usr/lib/
ln -sf libduktape.so.207.20700 ${PART_DIR}/usr/lib/libduktape.so.207
ln -sf libduktape.so.207 ${PART_DIR}/usr/lib/libduktape.so
cp src/duktape.h src/duk_config.h ${PART_DIR}/usr/include/
cat > ${PART_DIR}/usr/lib/pkgconfig/duktape.pc << PCEOF
prefix=/usr
exec_prefix=\${prefix}
libdir=\${exec_prefix}/lib
includedir=\${prefix}/include

Name: Duktape
Description: Embeddable Javascript engine
Version: ${VERSION}
Libs: -L\${libdir} -lduktape -lm
Cflags: -I\${includedir}
PCEOF'''
