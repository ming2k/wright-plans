name = "glib-networking"
version = "2.80.1"
release = 1
description = "Network extensions for GLib"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
runtime = ["gnutls", "gsettings-desktop-schemas", "libproxy"]
build = ["gettext", "meson", "ninja", "pkgconf"]
link = ["glib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/glib-networking/2.80/glib-networking-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
env = { GIO_MODULE_DIR = '/usr/lib/gio/modules' }
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Dgnutls=enabled -Dlibproxy=enabled -Dopenssl=disabled'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build
rm -f ${PART_DIR}/usr/lib/gio/modules/giomodule.cache'''

[hooks]
post_install = "gio-querymodules /usr/lib/gio/modules"
post_upgrade = "gio-querymodules /usr/lib/gio/modules"
pre_remove = "gio-querymodules /usr/lib/gio/modules"
