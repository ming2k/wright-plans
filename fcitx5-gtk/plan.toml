name = "fcitx5-gtk"
version = "5.1.5"
release = 1
description = "Gtk input method module for Fcitx5"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/fcitx/fcitx5-gtk"

[dependencies]
runtime = ["fcitx5"]
build = [
    "cmake",
    "extra-cmake-modules",
    "ninja",
    "pkgconf",
]
link = ["fcitx5", "glib", "gtk3"]

[[sources]]
uri = "https://github.com/fcitx/fcitx5-gtk/archive/refs/tags/${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_BUILD_TYPE=Release \
    -DENABLE_GTK2_IM_MODULE=OFF \
    -DENABLE_GTK3_IM_MODULE=ON \
    -DENABLE_GTK4_IM_MODULE=OFF

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[hooks]
post_install = "gtk-query-immodules-3.0 --update-cache 2>/dev/null || true"
post_upgrade = "gtk-query-immodules-3.0 --update-cache 2>/dev/null || true"
