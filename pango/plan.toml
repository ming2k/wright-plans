name = "pango"
version = "1.57.1"
release = 1
description = "Text layout and rendering library"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://pango.gnome.org"

[dependencies]
build = ["meson", "ninja", "pkgconf", "gobject-introspection", "python"]
link = ["glib", "cairo", "harfbuzz", "fontconfig", "fribidi", "freetype"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.gnome.org/sources/pango/1.57/pango-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr               \
--buildtype=release         \
--wrap-mode=nofallback      \
-D xft=disabled             \
-D introspection=enabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
