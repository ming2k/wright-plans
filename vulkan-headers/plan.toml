name = "vulkan-headers"
version = "1.4.344"
release = 1
description = "Vulkan header files and API registry"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/KhronosGroup/Vulkan-Headers"

[[sources]]
sha256 = "SKIP"
url = "https://github.com/KhronosGroup/Vulkan-Headers/archive/v${VERSION}/Vulkan-Headers-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -S ${WORKDIR} -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -GNinja -DCMAKE_CXX_SCAN_FOR_MODULES=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} cmake --install build'''
