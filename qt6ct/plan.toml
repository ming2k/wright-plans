name = "qt6ct"
version = "0.11"
release = 1
description = "Qt 6 Configuration Tool"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.opencode.net/trialuser/qt6ct"

[dependencies]
build = ["cmake", "gcc", "ninja", "pkgconf", "qt6-base", "qt6-svg", "qt6-tools"]
link = ["qt6-base", "qt6-svg"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.opencode.net/trialuser/qt6ct/-/archive/${VERSION}/qt6ct-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release'''

[lifecycle.compile]
script = '''
cd source
ninja -j$(nproc) -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
