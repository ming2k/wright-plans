name = "alacritty"
version = "0.16.1"
release = 1
description = "A fast, cross-platform, OpenGL terminal emulator"
license = "Apache-2.0"
arch = "x86_64"
url = "https://alacritty.org"

[dependencies]
build = ["cargo", "cmake", "gzip", "ncurses", "pkgconf", "python", "rust", "scdoc"]
link = ["fontconfig", "freetype", "libglvnd", "libxkbcommon", "mesa", "wayland"]

[[sources]]
type = "http"
sha256 = "b7240df4a52c004470977237a276185fc97395d59319480d67cad3c4347f395e"
url = "https://github.com/alacritty/alacritty/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo "cargo project, no configure step"'''

[lifecycle.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${BUILD_DIR}/.cargo', CARGO_TARGET_DIR = '${BUILD_DIR}/target' }
script = '''
cd source
# Wright currently ships a Wayland-only graphics stack, so avoid the default X11 feature.
cargo build --release --no-default-features --features wayland --locked'''

[lifecycle.staging]
script = '''
cd source

install -Dm755 target/release/alacritty ${PART_DIR}/usr/bin/alacritty
install -Dm644 extra/logo/alacritty-term.svg ${PART_DIR}/usr/share/pixmaps/Alacritty.svg
install -Dm644 extra/linux/Alacritty.desktop ${PART_DIR}/usr/share/applications/Alacritty.desktop

install -dm755 ${PART_DIR}/usr/share/man/man1
install -dm755 ${PART_DIR}/usr/share/man/man5
scdoc < extra/man/alacritty.1.scd | gzip -c > ${PART_DIR}/usr/share/man/man1/alacritty.1.gz
scdoc < extra/man/alacritty-msg.1.scd | gzip -c > ${PART_DIR}/usr/share/man/man1/alacritty-msg.1.gz
scdoc < extra/man/alacritty.5.scd | gzip -c > ${PART_DIR}/usr/share/man/man5/alacritty.5.gz
scdoc < extra/man/alacritty-bindings.5.scd | gzip -c > ${PART_DIR}/usr/share/man/man5/alacritty-bindings.5.gz

install -Dm644 extra/completions/alacritty.bash ${PART_DIR}/usr/share/bash-completion/completions/alacritty
install -Dm644 extra/completions/_alacritty ${PART_DIR}/usr/share/zsh/site-functions/_alacritty
install -Dm644 extra/completions/alacritty.fish ${PART_DIR}/usr/share/fish/vendor_completions.d/alacritty.fish

install -dm755 ${PART_DIR}/usr/share/terminfo
tic -xe alacritty,alacritty-direct -o ${PART_DIR}/usr/share/terminfo extra/alacritty.info'''

[hooks]
post_install = '''
update-desktop-database -q /usr/share/applications 2>/dev/null || true

'''
post_upgrade = '''
update-desktop-database -q /usr/share/applications 2>/dev/null || true

'''
