name = "yazi"
version = "26.1.22"
release = 1
description = "Blazing fast terminal file manager written in Rust, based on async I/O"
license = "MIT"
arch = "x86_64"
url = "https://github.com/sxyazi/yazi"

link_deps = ['gcc:gcc-libs', 'glibc']
build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/sxyazi/yazi/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
env = { YAZI_GEN_COMPLETIONS = 'true' }
script = '''
cd source/yazi-${VERSION}
cargo build --release --locked'''

[pipeline.staging]
script = '''
cd source/yazi-${VERSION}
install -Dm755 target/release/yazi ${STAGING_DIR}/usr/bin/yazi
install -Dm755 target/release/ya   ${STAGING_DIR}/usr/bin/ya

# Shell completions for yazi
install -Dm644 yazi-boot/completions/yazi.bash ${STAGING_DIR}/usr/share/bash-completion/completions/yazi || true
install -Dm644 yazi-boot/completions/_yazi     ${STAGING_DIR}/usr/share/zsh/site-functions/_yazi || true
install -Dm644 yazi-boot/completions/yazi.fish ${STAGING_DIR}/usr/share/fish/vendor_completions.d/yazi.fish || true

# Shell completions for ya
install -Dm644 yazi-cli/completions/ya.bash ${STAGING_DIR}/usr/share/bash-completion/completions/ya || true
install -Dm644 yazi-cli/completions/_ya     ${STAGING_DIR}/usr/share/zsh/site-functions/_ya || true
install -Dm644 yazi-cli/completions/ya.fish ${STAGING_DIR}/usr/share/fish/vendor_completions.d/ya.fish || true

# Desktop integration
install -Dm644 assets/yazi.desktop ${STAGING_DIR}/usr/share/applications/yazi.desktop || true
install -Dm644 assets/yazi.svg     ${STAGING_DIR}/usr/share/icons/hicolor/scalable/apps/yazi.svg || true'''

[[output]]
runtime_deps = ['gcc:gcc-libs', 'glibc']
