name = "make"
version = "4.4.1"
release = 1
description = "A program for controlling the generation of executables and other non-source files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/make/"

[dependencies]
build = ["gcc"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/make/make-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
