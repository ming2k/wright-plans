name = "cryptsetup"
version = "2.8.4"
release = 1
description = "Userspace setup tool for transparent encryption of block devices using dm-crypt"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.com/cryptsetup/cryptsetup"

[dependencies]
runtime = ["lvm2"]
build = ["pkgconf", "util-linux"]
link = ["glibc", "json-c", "openssl", "popt", "util-linux"]

[[sources]]
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/utils/cryptsetup/v2.8/cryptsetup-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --sbindir=/usr/bin --disable-ssh-token --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install -C ${WORKDIR}'''
