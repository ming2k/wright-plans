[plan]
name = "libvpx"
version = "1.16.0"
release = 1
description = "WebM VP8/VP9 codec SDK"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/webmproject/libvpx"

[dependencies]
build = ["gcc", "make", "nasm"]

[[sources]]
uri = "https://github.com/webmproject/libvpx/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr \
            --enable-shared \
            --disable-static \
            --enable-vp8 \
            --enable-vp9 \
            --enable-runtime-cpu-detect \
            --enable-postproc
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
