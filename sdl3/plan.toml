name = "sdl3"
version = "3.4.4"
release = 1
description = "Simple DirectMedia Layer 3"
license = "Zlib"
arch = "x86_64"
url = "https://www.libsdl.org/"

link_deps = ['alsa-lib:default', 'dbus:default', 'libxkbcommon:default', 'pipewire:default', 'wayland:default']

[[sources]]
type = "http"
url = "https://github.com/libsdl-org/SDL/releases/download/release-${VERSION}/SDL3-${VERSION}.tar.gz"
sha256 = "ee712dbe6a89bb140bbfc2ce72358fb5ee5cc2240abeabd54855012db30b3864"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -S ${WORKDIR} -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_WAYLAND=ON -DSDL_X11=OFF -DSDL_ALSA=ON -DSDL_PIPEWIRE=ON -DSDL_DBUS=ON -DSDL_RPATH=OFF -DSDL_TEST_LIBRARY=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C build install'''

[output]
runtime_deps = ['alsa-lib:default', 'dbus:default', 'libxkbcommon:default', 'pipewire:default', 'wayland:default']
