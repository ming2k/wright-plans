name = "vulkan-headers"
version = "1.4.350.1"
release = 1
description = "Vulkan header files and API registry"
license = "Apache-2.0"
arch = "any"
url = "https://github.com/KhronosGroup/Vulkan-Headers"

build_deps = ['cmake', 'ninja']

[[sources]]
type = "http"
sha256 = "6d1bb65e49520344cc0a48af3dc02e993781efff14c7ebdcb8ae9fa23ddf7e83"
url = "https://github.com/KhronosGroup/Vulkan-Headers/archive/refs/tags/vulkan-sdk-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/Vulkan-Headers-vulkan-sdk-${VERSION}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release'''

[pipeline.staging]
script = '''
cd source/Vulkan-Headers-vulkan-sdk-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build'''
