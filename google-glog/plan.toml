name = "google-glog"
version = "0.7.1"
release = 1
description = "C++ implementation of the Google logging module"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/glog"

[dependencies]
build = ["cmake", "ninja"]
link = ["gflags"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/google/glog/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DBUILD_TESTING=OFF \
    -DWITH_PKGCONFIG=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
