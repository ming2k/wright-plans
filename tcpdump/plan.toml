name = "tcpdump"
version = "4.99.6"
release = 1
description = "Command-line packet analyzer"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://www.tcpdump.org/"

link_deps = ['libpcap']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.tcpdump.org/release/tcpdump-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['libpcap']
