name = "nettle"
version = "3.10.2"
release = 1
description = "Low-level cryptographic library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.lysator.liu.se/~nisse/nettle/"

link_deps = ['gmp']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/nettle/nettle-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/nettle-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/nettle-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/nettle-${VERSION}
make DESTDIR=${STAGING_DIR} install
chmod -v 755 ${STAGING_DIR}/usr/lib/lib{hogweed,nettle}.so'''

[[output]]
runtime_deps = ['gmp']
