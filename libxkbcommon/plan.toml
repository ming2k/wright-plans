name = "libxkbcommon"
version = "1.13.1"
release = 2
description = "Keymap handling library (Wayland Only)"
license = "MIT"
arch = "x86_64"

[dependencies]
build = ["meson", "ninja", "pkgconf", "bison"]
link = ["wayland", "wayland-protocols", "xkeyboard-config"]

[[sources]]
sha256 = "aeb951964c2f7ecc08174cb5517962d157595e9e3f38fc4a130b91dc2f9fec18"
url = "https://github.com/xkbcommon/libxkbcommon/archive/refs/tags/xkbcommon-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Denable-x11=false -Denable-wayland=true -Denable-docs=false'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build'''
