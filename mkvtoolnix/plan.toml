name = "mkvtoolnix"
version = "98.0"
release = 2
description = "Tools for Matroska files"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://mkvtoolnix.download/"

[dependencies]
build = ["gcc", "make", "ruby", "pkgconf", "libxslt", "docbook-xsl"]
link = ["boost", "cmark", "flac", "fmt", "libebml", "libmatroska", "libogg", "libvorbis", "nlohmann-json", "zlib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mkvtoolnix.download/sources/mkvtoolnix-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
  --prefix=/usr \
  --with-boost-libdir=/usr/lib \
  --disable-gui'''

[lifecycle.compile]
script = '''
cd source
rake -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
rake DESTDIR=${PART_DIR} install

# Remove icon directory as MKVToolNix Rakefile installs icons unconditionally even when GUI is disabled
rm -rf ${PART_DIR}/usr/share/icons'''
