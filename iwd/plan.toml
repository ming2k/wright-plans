name = "iwd"
version = "3.11"
release = 1
description = "Intel iNet Wireless Daemon - lightweight wireless daemon"
license = "LGPL-2.1-only"
arch = "x86_64"
url = "https://iwd.wiki.kernel.org/"

[dependencies]
runtime = ["dbus", "ell"]
build = [
    "dbus",
    "ell",
    "gcc",
    "make",
]
link = ["readline"]

[[sources]]
uri = "https://www.kernel.org/pub/linux/network/wireless/iwd-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr            \
--sysconfdir=/etc        \
--localstatedir=/var     \
--libexecdir=/usr/lib    \
--enable-external-ell    \
--enable-systemd-service \
--enable-client          \
--enable-monitor         \
--disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[hooks]
post_install = '''
groupadd -f netdev 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
systemctl enable iwd.service 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
