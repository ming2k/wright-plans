name = "appstream"
version = "1.1.2"
release = 11
description = "Tools and libraries to work with AppStream metadata"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Distributions/AppStream/"

[dependencies]
runtime = ["systemd"]
build = ["meson", "ninja", "pkgconf", "gettext", "gobject-introspection", "itstool", "gperf", "docbook-xsl"]
link = ["glib", "libxml2", "libxmlb", "curl", "libfyaml", "zstd", "cairo", "gdk-pixbuf", "freetype", "pango", "fontconfig", "librsvg"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/ximion/appstream/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
sanitize_flags() {
    printf "%s" "$1" | sed -E "s/(^|[[:space:]])-I([[:space:]]|$)/ /g; s/[[:space:]]+/ /g; s/^ //; s/ $//"
}
export CPPFLAGS="$(sanitize_flags "${CPPFLAGS:-}")"
export CFLAGS="$(sanitize_flags "${CFLAGS:-}")"
export CXXFLAGS="$(sanitize_flags "${CXXFLAGS:-}")"
meson setup build              \
    --prefix=/usr              \
    --buildtype=release        \
    -Ddocs=false               \
    -Dapidocs=false            \
    -Dstemming=false           \
    -Dsystemd=true             \
    -Dcompose=true             \
    -Dgir=true                 \
    -Dinstall-docs=false       \
    -Dman=true                 \
    -Dbash-completion=false'''

[lifecycle.compile]
script = '''
cd source
sanitize_flags() {
    printf "%s" "$1" | sed -E "s/(^|[[:space:]])-I([[:space:]]|$)/ /g; s/[[:space:]]+/ /g; s/^ //; s/ $//"
}
export CPPFLAGS="$(sanitize_flags "${CPPFLAGS:-}")"
export CFLAGS="$(sanitize_flags "${CFLAGS:-}")"
export CXXFLAGS="$(sanitize_flags "${CXXFLAGS:-}")"
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
meson install -C ${WORKDIR}/build --destdir ${PART_DIR}'''
