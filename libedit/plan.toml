name = "libedit"
version = "20251016-3.1"
release = 1
description = "BSD-style command line editing library"
license = "BSD-3-Clause"
arch = "x86_64"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://thrysoee.dk/editline/libedit-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
