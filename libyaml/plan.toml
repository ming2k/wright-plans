name = "libyaml"
version = "0.2.5"
release = 1
description = "YAML 1.1 parser and emitter"
license = "MIT"
arch = "x86_64"
url = "https://pyyaml.org/wiki/LibYAML"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/yaml/libyaml/releases/download/${VERSION}/yaml-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/yaml-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/yaml-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/yaml-${VERSION}
DESTDIR=${STAGING_DIR} make install'''
