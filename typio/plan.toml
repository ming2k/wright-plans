name = "typio"
version = "3.0.1"
release = 1
description = "Native Wayland input method daemon with optional GTK4 control panel"
license = "NOASSERTION"
arch = "x86_64"
url = "https://github.com/ming2k/typio"

[dependencies]
runtime = ["rime-prelude"]
build = [
    "cmake",
    "ninja",
    "pkgconf",
    "python3",
]
link = [
    "dbus",
    "gtk4",
    "librime",
    "libxkbcommon",
    "wayland",
]

[[sources]]
uri = "git+https://github.com/ming2k/typio.git#v${VERSION}"
sha256 = "SKIP"

[[sources]]
uri = "git+https://skia.googlesource.com/skia.git#e7c90ecca9444fe09598f1630ab7cee2c0ee027a"
sha256 = "SKIP"

[lifecycle.prepare]
dockyard = "relaxed"
script = '''
# Find the fetched directories
TYPIO_DIR=$(find ${SRC_DIR} -maxdepth 1 -type d -name "typio-*" | head -n1)
SKIA_EXTRACTED_DIR=$(find ${SRC_DIR} -maxdepth 2 -type d -name "skia-*" | head -n1)

# Move typio contents to the root of BUILD_DIR (/build)
cp -a ${TYPIO_DIR}/. ${BUILD_DIR}/
rm -rf ${TYPIO_DIR}

# Move the fetched skia repo to the expected location
mkdir -p ${BUILD_DIR}/external/skia
cp -a ${SKIA_EXTRACTED_DIR}/. ${BUILD_DIR}/external/skia/
rm -rf ${SKIA_EXTRACTED_DIR}

# Sync skia dependencies using its own script
cd ${BUILD_DIR}/external/skia
for i in {1..5}; do
  python3 tools/git-sync-deps && break || sleep 10
done
./bin/fetch-gn
'''

[lifecycle.configure]
script = '''
# 1. Configure and build Skia (GN)
cd ${BUILD_DIR}/external/skia
./bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_zlib=false skia_use_system_harfbuzz=false skia_use_system_icu=false skia_use_libwebp_encode=false skia_use_libwebp_decode=false skia_enable_skottie=true skia_use_expat=true skia_use_system_expat=false skia_use_vulkan=true skia_use_metal=false skia_use_gl=true skia_use_directx=false skia_use_x11=false skia_use_egl=true extra_cflags=["-fPIC", "-mavx"] extra_cxxflags=["-fPIC", "-mavx"]'

# 2. Compile Skia
# ninja -C out/Release skia skshaper skparagraph skunicode_core skunicode_icu
ninja -C out/Release skia

# 3. Configure Typio (CMake)
cd ${BUILD_DIR}
cmake -S . -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=OFF \
    -DBUILD_TESTS=OFF \
    -DBUILD_CONTROL_PANEL=ON \
    -DBUILD_RIME_ENGINE=ON \
    -DBUILD_WHISPER=ON \
    -DBUILD_SHERPA_ONNX=ON \
    -DBUILD_MOZC_ENGINE=ON \
    -DENABLE_SYSTRAY=OFF
'''

[lifecycle.compile]
script = "cmake --build ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} cmake --install ${BUILD_DIR}/build"
