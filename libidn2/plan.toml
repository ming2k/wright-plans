name = "libidn2"
version = "2.3.7"
release = 1
description = "Library for internationalized domain names (IDNA2008/TR46)"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libidn/#libidn2"

link_deps = ['libunistring']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/libidn/libidn2-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libidn2-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libidn2-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libidn2-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['libunistring']
