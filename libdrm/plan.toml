name = "libdrm"
version = "2.4.134"
release = 1
description = "Direct Rendering Manager library"
license = "MIT"
arch = "x86_64"
url = "https://dri.freedesktop.org/libdrm/"


build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "ac5e74d157830eb8bee44c6a6bf3ad49774ef0dd2a72bdad74a8f20308b52a95"
url = "https://dri.freedesktop.org/libdrm/libdrm-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libdrm-${VERSION}
meson setup build \
--prefix=/usr          \
--buildtype=release    \
-D udev=true           \
-D valgrind=disabled'''

[pipeline.compile]
script = '''
cd source/libdrm-${VERSION}
ninja -C build -j $(nproc)'''

[pipeline.staging]
script = '''
cd source/libdrm-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['glibc']

