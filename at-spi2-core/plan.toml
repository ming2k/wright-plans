name = "at-spi2-core"
version = "2.60.0"
release = 1
description = "Assistive Technology Service Provider Interface (includes ATK)"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://wiki.gnome.org/Accessibility"

[dependencies]
runtime = ["dbus", "systemd"]
build = ["dbus", "gobject-introspection", "meson", "ninja"]
link = ["glib"]

[[sources]]
sha256 = "SKIP"
url = "https://download.gnome.org/sources/at-spi2-core/2.60/at-spi2-core-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr               \
--buildtype=release'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
