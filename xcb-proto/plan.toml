name = "xcb-proto"
version = "1.17.0"
release = 1
description = "XML-XCB protocol descriptions for libxcb"
license = "MIT"
arch = "x86_64"
url = "https://xcb.freedesktop.org"

[dependencies]
build = ["python"]

[[sources]]
uri = "https://xorg.freedesktop.org/archive/individual/proto/xcb-proto-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
