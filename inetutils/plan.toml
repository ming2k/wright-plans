[plan]
name = "inetutils"
version = "2.6"
release = 1
description = "Programs for basic networking"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/inetutils/"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]
[sources]
uris = ["https://ftp.gnu.org/gnu/inetutils/inetutils-2.6.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
sed -i 's/def HAVE_TERMCAP_TGETENT/ 1/' telnet/telnet.c
'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr        \
--bindir=/usr/bin    \
--localstatedir=/var \
--disable-logger     \
--disable-whois      \
--disable-rcp        \
--disable-rexec      \
--disable-rlogin     \
--disable-rsh        \
--disable-servers
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
