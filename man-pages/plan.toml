name = "man-pages"
version = "6.18"
release = 1
description = "Linux man pages - over 2,400 manual pages documenting the Linux kernel and C library interfaces"
license = "GPL-2.0-or-later AND MIT"
arch = "x86_64"
url = "https://www.kernel.org/doc/man-pages/"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/docs/man-pages/man-pages-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source/man-pages-${VERSION}
rm -v man3/crypt*
rm -v man5/tzfile.5
rm -v man8/tzselect.8
rm -v man8/zdump.8
rm -v man8/zic.8'''

[pipeline.staging]
script = '''
cd source/man-pages-${VERSION}
make -R GIT=false prefix=/usr DESTDIR=${STAGING_DIR} install'''
