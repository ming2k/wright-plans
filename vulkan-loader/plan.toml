name = "vulkan-loader"
version = "1.4.343"
release = 2
description = "Vulkan Loader (Wayland Only)"
license = "Apache-2.0"
arch = "x86_64"

link_deps = ['glibc', 'wayland']
build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/KhronosGroup/Vulkan-Loader/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/Vulkan-Loader-${VERSION}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DVULKAN_HEADERS_INSTALL_DIR=/usr -DBUILD_WSI_XCB_SUPPORT=OFF -DBUILD_WSI_XLIB_SUPPORT=OFF -DBUILD_WSI_WAYLAND_SUPPORT=ON'''

[pipeline.compile]
script = '''
cd source/Vulkan-Loader-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/Vulkan-Loader-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['glibc', 'wayland']
provides = ["vulkan-icd-loader"]
