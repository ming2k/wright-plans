name = "pkgname"
version = "1.0.0"
release = 1
description = ""
license = "MIT"
arch = "x86_64"
url = ""

[[sources]]
type = "http"
url = "https://example.com/pkgname-${VERSION}.tar.gz"
sha256 = "SKIP"
extract_to = "source"

[pipeline.configure]
script = """
cd source
./configure --prefix=/usr
"""

[pipeline.compile]
script = """
cd source
make -j$(nproc)
"""

[pipeline.staging]
script = """
cd source
make DESTDIR=${STAGING_DIR} install
"""

