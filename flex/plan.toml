name = "flex"
version = "2.6.4"
release = 1
description = "Utility for generating programs that recognize patterns in text"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/westes/flex"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/westes/flex/releases/download/v${VERSION}/flex-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr \
--docdir=/usr/share/doc/flex-${VERSION} \
--disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make check

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

# Create lex compatibility symlinks
ln -sv flex   ${PART_DIR}/usr/bin/lex
ln -sv flex.1 ${PART_DIR}/usr/share/man/man1/lex.1

rm -f ${PART_DIR}/usr/share/info/dir

'''

[lifecycle.fabricate]
