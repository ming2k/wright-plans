name = "libpng"
version = "1.6.55"
release = 1
description = "PNG reference library (Latest Stable)"
license = "Libpng"
arch = "x86_64"

[dependencies]
build = ["gcc", "make"]
link = ["zlib"]

[[sources]]
sha256 = "71a2c5b1218f60c4c6d2f1954c7eb20132156cae90bdb90b566c24db002782a6"
url = "https://github.com/pnggroup/libpng/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR} DESTDIR=${PART_DIR} install'''
