name = "wayland"
version = "1.24.0"
release = 1
description = "Core Wayland window system code and protocol"
license = "MIT"
arch = "x86_64"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["expat", "libffi", "libxml2"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/wayland/wayland/-/releases/${VERSION}/downloads/wayland-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr -Ddocumentation=false -Dtests=false'''

[lifecycle.compile]
script = "cd source && meson compile -C build"

[lifecycle.staging]
script = "cd source && meson install -C build --destdir ${PART_DIR}"
