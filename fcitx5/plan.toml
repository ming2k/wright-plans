name = "fcitx5"
version = "5.1.17"
release = 1
description = "Next generation of Fcitx input method framework"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/fcitx/fcitx5"

[dependencies]
runtime = ["iso-codes"]
build = [
    "cmake",
    "extra-cmake-modules",
    "ninja",
    "nlohmann-json",
    "pkgconf",
    "wayland-protocols",
]
link = [
    "cairo",
    "enchant",
    "gdk-pixbuf",
    "libxkbcommon",
    "pango",
    "systemd",
    "wayland",
]

[[sources]]
uri = "https://github.com/fcitx/fcitx5/archive/refs/tags/${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_INSTALL_SYSCONFDIR=/etc \
    -DCMAKE_INSTALL_LIBEXECDIR=lib \
    -DCMAKE_BUILD_TYPE=Release \
    -DENABLE_X11=OFF

'''

[lifecycle.compile]
dockyard = "relaxed"
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
