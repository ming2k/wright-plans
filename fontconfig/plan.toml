name = "fontconfig"
version = "2.17.1"
release = 1
description = "Font configuration and customization library"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/fontconfig/"

link_deps = ['freetype', 'expat']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/fontconfig/fontconfig/-/archive/${VERSION}/fontconfig-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/fontconfig-${VERSION}
meson setup build \
    --prefix=/usr                        \
    --buildtype=release                  \
    --wrap-mode=nofallback               \
    -D doc=disabled                      \
    -D tests=disabled'''

[lifecycle.compile]
script = '''
cd source/fontconfig-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/fontconfig-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['freetype', 'expat']

[output.hooks]
post_install = "fc-cache -s 2>/dev/null || true"
post_upgrade = "fc-cache -s 2>/dev/null || true"
