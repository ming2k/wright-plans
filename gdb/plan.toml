name = "gdb"
version = "15.2"
release = 1
description = "The GNU Debugger"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gdb/"

link_deps = ['expat', 'glibc', 'mpfr', 'ncurses', 'readline', 'xz', 'zlib']
build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gdb/gdb-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source/gdb-${VERSION}
mkdir -v build'''

[pipeline.configure]
script = '''
cd source/gdb-${VERSION}/build
../configure --prefix=/usr \
    --with-system-readline \
    --with-python=/usr/bin/python3 \
    --with-system-zlib \
    --with-expat \
    --with-lzma \
    --enable-tui \
    --disable-multilib \
    --disable-werror'''

[pipeline.compile]
script = '''
cd source/gdb-${VERSION}/build
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gdb-${VERSION}/build
make DESTDIR=${STAGING_DIR} install

# Remove static libraries
rm -f ${STAGING_DIR}/usr/lib/libinproctrace.a'''

[[output]]
runtime_deps = ['expat', 'ncurses', 'python', 'readline', 'xz', 'zlib', 'glibc', 'mpfr']
