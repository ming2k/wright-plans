name = "python-pyproject-metadata"
version = "0.11.0"
release = 1
description = "PEP 621 project metadata parser"
license = "MIT"
arch = "any"
url = "https://github.com/pypa/pyproject-metadata"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/p/pyproject_metadata/pyproject_metadata-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/pyproject_metadata-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python', 'python-packaging']
