name = "itstool"
version = "2.0.7"
release = 1
description = "ITS-based XML translation tool"
license = "GPL-3.0-or-later"
arch = "any"
url = "https://itstool.org"

[dependencies]
runtime = ["libxml2", "python"]
build = ["libxml2", "python"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/itstool/itstool/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
autoreconf -fi
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} make install'''
