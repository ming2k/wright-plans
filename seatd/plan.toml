name = "seatd"
version = "0.9.1"
release = 1
description = "Minimal seat management daemon"
license = "MIT"
arch = "x86_64"
url = "https://sr.ht/~kennylevinsen/seatd/"

[dependencies]
build = ["meson", "ninja"]

[[sources]]
sha256 = "SKIP"
url = "https://git.sr.ht/~kennylevinsen/seatd/archive/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr          \
--buildtype=release    \
-D libseat-logind=systemd \
-D libseat-builtin=enabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[hooks]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/seatd.conf 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
