[plan]
name = "openssh"
version = "10.2p1"
release = 1
description = "Free implementation of the SSH protocol suite"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://www.openssh.com/portable.html"

[dependencies]
build = ["gcc", "make", "pkgconf"]
runtime = ["shadow"]
link = ["glibc", "linux-pam", "openssl", "zlib", "libxcrypt"]

[sources]
uris = ["https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure \
  --prefix=/usr \
  --sysconfdir=/etc/ssh \
  --libexecdir=/usr/lib/ssh \
  --with-privsep-path=/var/lib/sshd \
  --with-privsep-user=sshd \
  --with-pam \
  --with-default-path=/usr/bin
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

install -Dm644 /dev/stdin ${PKG_DIR}/usr/lib/systemd/system/sshd.service << 'UNITEOF'
[Unit]
Description=OpenSSH server daemon
Documentation=man:sshd(8) man:sshd_config(5)
After=network.target

[Service]
Type=notify
ExecStart=/usr/sbin/sshd -D $OPTIONS
ExecReload=/usr/sbin/sshd -t
ExecReload=/bin/kill -HUP $MAINPID
KillMode=process
Restart=on-failure
RestartSec=2s

[Install]
WantedBy=multi-user.target
UNITEOF

install -Dm644 /dev/stdin ${PKG_DIR}/usr/lib/sysusers.d/openssh.conf << 'SYSUSERS'
u sshd - "OpenSSH privilege separation user" /var/lib/sshd
SYSUSERS

install -dm700 ${PKG_DIR}/var/lib/sshd

if [ -e ${PKG_DIR}/usr/lib/ssh/ssh-keysign ]; then
  chmod 4755 ${PKG_DIR}/usr/lib/ssh/ssh-keysign
fi
'''

[install_scripts]
post_install = '''
systemd-sysusers /usr/lib/sysusers.d/openssh.conf 2>/dev/null || true
install -d -m 700 /var/lib/sshd
ssh-keygen -A 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
'''
post_upgrade = '''
systemd-sysusers /usr/lib/sysusers.d/openssh.conf 2>/dev/null || true
install -d -m 700 /var/lib/sshd
systemctl daemon-reload 2>/dev/null || true
'''

[backup]
files = [
"/etc/ssh/ssh_config",
"/etc/ssh/sshd_config",
]
