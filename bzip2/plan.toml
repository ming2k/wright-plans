name = "bzip2"
version = "1.0.8"
release = 1
description = "Programs for compressing and decompressing files using the Burrows-Wheeler algorithm"
license = "bzip2-1.0.6"
arch = "x86_64"
url = "https://www.sourceware.org/bzip2/"

[dependencies]
build = ["gcc", "make", "diffutils"]

[[sources]]
sha256 = "SKIP"
url = "https://www.sourceware.org/pub/bzip2/bzip2-${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "patches/bzip2-1.0.8-install_docs-1.patch"

[lifecycle.prepare]
script = '''
cd source

# Apply documentation install patch
patch -Np1 -i ${WORKDIR}/bzip2-1.0.8-install_docs-1.patch

# Ensure symbolic links are relative
sed -i 's@\(ln -s -f \)$(PREFIX)/bin/@\1@' Makefile

# Fix man pages location
sed -i "s@(PREFIX)/man@(PREFIX)/share/man@g" Makefile'''

[lifecycle.compile]
script = '''
cd source

# First build the shared library
make -f Makefile-libbz2_so
make clean

# Then build the rest
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source

# Install programs and static lib
make PREFIX=${PART_DIR}/usr install

# Install shared library
cp -av libbz2.so.* ${PART_DIR}/usr/lib/
ln -sv libbz2.so.${VERSION} ${PART_DIR}/usr/lib/libbz2.so

# Install shared bzip2 binary and create symlinks
cp -v bzip2-shared ${PART_DIR}/usr/bin/bzip2
for i in ${PART_DIR}/usr/bin/{bzcat,bunzip2}; do
ln -sfv bzip2 $i
done

# Remove useless static library
rm -fv ${PART_DIR}/usr/lib/libbz2.a'''
