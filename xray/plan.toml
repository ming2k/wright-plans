name = "xray"
version = "26.2.6"
release = 1
description = "Platform for building proxies to bypass network restrictions"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/XTLS/Xray-core"

[dependencies]
build = ["go"]

[[sources]]
uri = "https://github.com/XTLS/Xray-core/archive/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "xray.service"

[lifecycle.compile]
dockyard = "relaxed"
script = '''
cd ${BUILD_DIR}
export CGO_ENABLED=0
export GOFLAGS="-trimpath"
go build -ldflags "-X github.com/xtls/xray-core.codename=xray -X github.com/xtls/xray-core.version=${PART_VERSION} -buildid=" -o xray ./main

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 xray ${PART_DIR}/usr/bin/xray
install -dm755 ${PART_DIR}/etc/xray
install -Dm644 ${FILES_DIR}/xray.service ${PART_DIR}/usr/lib/systemd/system/xray.service

'''

[hooks]
post_install = '''
systemctl daemon-reload 2>/dev/null || true
echo ":: Create /etc/xray/config.json before starting xray"
echo ":: Enable with: systemctl enable --now xray"

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
pre_remove = '''
systemctl stop xray 2>/dev/null || true
systemctl disable xray 2>/dev/null || true

'''

[output]
backup = ["/etc/xray/config.json"]
