name = "bash"
version = "5.3"
release = 1
description = "The Bourne-Again Shell"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/bash/"

link_deps = ['ncurses', 'readline']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/bash/bash-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/bash-${VERSION}
./configure --prefix=/usr             \
            --without-bash-malloc     \
            --with-installed-readline \
            --docdir=/usr/share/doc/bash-${VERSION}'''

[pipeline.compile]
script = '''
cd source/bash-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/bash-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['ncurses', 'readline']
