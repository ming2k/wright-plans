name = "snappy"
version = "1.2.2"
release = 1
description = "Fast compressor/decompressor library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/snappy"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/google/snappy/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DSNAPPY_BUILD_TESTS=OFF \
    -DSNAPPY_BUILD_BENCHMARKS=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
