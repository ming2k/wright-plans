name = "libdisplay-info"
version = "0.3.0"
release = 1
description = "EDID and DisplayID library"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/emersion/libdisplay-info"


build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "6ae77cd937f9cf7d1321d35c116062c4911e8447010a6a713ac4286f7a9d5987"
url = "https://gitlab.freedesktop.org/emersion/libdisplay-info/-/releases/${VERSION}/downloads/libdisplay-info-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libdisplay-info-${VERSION}
meson setup build \
--prefix=/usr         \
--buildtype=release'''

[pipeline.compile]
script = '''
cd source/libdisplay-info-${VERSION}
ninja -C build -j $(nproc)'''

[pipeline.staging]
script = '''
cd source/libdisplay-info-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['glibc']

