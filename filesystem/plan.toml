name = "filesystem"
version = "1.0"
release = 1
description = "Base FHS directory skeleton and essential system files"
license = "MIT"
arch = "x86_64"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "os-release"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "shells"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "profile"

[options]
skip_fhs_check = true

[lifecycle.staging]
script = '''
# --- FHS directory skeleton ---
install -d -m 0700 ${STAGING_DIR}/boot
install -d -m 0755 ${STAGING_DIR}/etc
install -d -m 0755 ${STAGING_DIR}/{usr,usr/bin,usr/lib,usr/share}
install -d -m 0755 ${STAGING_DIR}/usr/share/man/man{1,2,3,4,5,6,7,8}
install -d -m 0755 ${STAGING_DIR}/{var,var/cache,var/lib,var/log}
install -d -m 0750 ${STAGING_DIR}/root
install -d -m 1777 ${STAGING_DIR}/tmp
install -d -m 1777 ${STAGING_DIR}/var/tmp

# usr-merge: top-level symlinks into /usr
ln -s usr/bin ${STAGING_DIR}/bin
ln -s usr/bin ${STAGING_DIR}/sbin
ln -s usr/lib ${STAGING_DIR}/lib
ln -s usr/lib ${STAGING_DIR}/lib64

# usr-merge: within /usr
ln -s bin ${STAGING_DIR}/usr/sbin
ln -s lib ${STAGING_DIR}/usr/lib64

# /run lives on tmpfs at boot; var entries are compat symlinks
ln -s /run          ${STAGING_DIR}/var/run
ln -s /run/lock     ${STAGING_DIR}/var/lock
ln -s ../proc/self/mounts ${STAGING_DIR}/etc/mtab

# --- /etc files ---
install -m 0644 ${WORKDIR}/os-release ${STAGING_DIR}/etc/os-release
install -m 0644 ${WORKDIR}/shells     ${STAGING_DIR}/etc/shells
install -m 0644 ${WORKDIR}/profile    ${STAGING_DIR}/etc/profile
install -d -m 0755 ${STAGING_DIR}/etc/profile.d'''

[[output]]
backup = ["/etc/shells", "/etc/profile"]
