name = "emacs"
version = "30.2"
release = 8
description = "The extensible, customizable, self-documenting real-time display editor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/emacs/"

[dependencies]
runtime = [
    "giflib",
    "glib",
    "gnutls",
    "gtk3",
    "harfbuzz",
    "libjpeg-turbo",
    "libpng",
    "librsvg",
    "libtiff",
    "libwebp",
    "ncurses",
    "pango",
    "tree-sitter",
]
build = [
    "gcc",
    "gnutls",
    "make",
    "patch",
    "pkgconf",
    "tree-sitter",
]
link = [
    "giflib",
    "glib",
    "glibc",
    "gnutls",
    "gtk3",
    "harfbuzz",
    "libjpeg-turbo",
    "libpng",
    "librsvg",
    "libtiff",
    "libwebp",
    "ncurses",
    "pango",
    "tree-sitter",
]

[[sources]]
uri = "https://ftp.gnu.org/gnu/emacs/emacs-${VERSION}.tar.xz"
sha256 = "SKIP"

[[sources]]
uri = "patches/emacs-30.2-tree-sitter-abi-version-r2.patch"
sha256 = "54737e4f1b6624cf37b54b73b61cc89f5c149745793f29be8b4378cb1083e697"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
patch -Np1 < ${FILES_DIR}/emacs-30.2-tree-sitter-abi-version-r2.patch

'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr                 \
--with-json                               \
--with-tree-sitter                        \
--with-native-compilation=no              \
--with-pgtk                               \
--with-jpeg                               \
--with-tiff                               \
--with-gif                                \
--with-png                                \
--with-rsvg                               \
--with-webp                               \
--without-imagemagick                     \
--without-gconf                           \
--without-gsettings                       \
--with-gnutls

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
