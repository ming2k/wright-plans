name = "mtdev"
version = "1.1.7"
release = 1
description = "Multitouch protocol translation library"
license = "MIT"
arch = "x86_64"
url = "https://bitmath.org/code/mtdev/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://bitmath.org/code/mtdev/mtdev-${VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
