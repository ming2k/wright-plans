name = "meson-python"
version = "0.19.0"
release = 1
description = "Meson PEP 517 Python build backend"
license = "MIT"
arch = "x86_64"
url = "https://github.com/mesonbuild/meson-python"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/m/meson_python/meson_python-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/meson-python-${VERSION}
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python', 'meson', 'python-packaging', 'python-pyproject-metadata']
