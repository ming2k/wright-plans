name = "lcms2"
version = "2.16"
release = 1
description = "Small-footprint color management engine"
license = "MIT"
arch = "x86_64"

link_deps = ['libjpeg-turbo']

[[sources]]
type = "http"
sha256 = "d873d34ad8b9b4cea010631f1a6228d2087475e4dc5e763eb81acc23d9d45a51"
url = "https://github.com/mm2/Little-CMS/releases/download/lcms2.16/lcms2-2.16.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/lcms2-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/lcms2-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/lcms2-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['libjpeg-turbo']
