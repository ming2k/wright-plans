[plan]
name = "alsa-utils"
version = "1.2.15.2"
release = 1
description = "ALSA utilities including alsactl, amixer, aplay"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.alsa-project.org"

[dependencies]
link = ["alsa-lib", "ncurses"]
runtime = ["alsa-ucm-conf"]

[[sources]]
uri = "https://www.alsa-project.org/files/pub/utils/alsa-utils-${PART_VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sbindir=/usr/bin --disable-alsaloop --disable-bat --disable-xmlto --disable-rst2man
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
DESTDIR=${PART_DIR} make install
'''

[lifecycle.fabricate]
hooks.post_install = "alsactl init 2>/dev/null || true"
