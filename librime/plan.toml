name = "librime"
version = "1.16.1"
release = 2
description = "Rime input method engine"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/rime/librime"

[dependencies]
build = ["cmake", "ninja", "pkgconf"]
link = ["boost", "google-glog", "leveldb", "lua", "marisa", "opencc", "yaml-cpp"]

[[sources]]
type = "http"
sha256 = "944909b5d9fb81171b044b7f2ea89922bd73457fcc5105798a259173288cd2d9"
url = "https://github.com/rime/librime/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cmake -B ${WORKDIR}/build -S ${WORKDIR}/source/librime-${VERSION} -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_C_FLAGS="${CFLAGS} -DNDEBUG" \
    -DCMAKE_CXX_FLAGS="${CXXFLAGS} -DNDEBUG -DGLOG_USE_GLOG_EXPORT" \
    -DBUILD_SHARED_LIBS=ON \
    -DBUILD_TEST=OFF \
    -DENABLE_EXTERNAL_PLUGINS=OFF'''

[lifecycle.compile]
script = '''
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
