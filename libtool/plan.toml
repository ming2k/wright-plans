name = "libtool"
version = "2.5.4"
release = 1
description = "GNU generic library support script"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libtool/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/libtool/libtool-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
rm -fv ${PART_DIR}/usr/lib/libltdl.a'''
