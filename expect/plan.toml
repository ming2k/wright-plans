name = "expect"
version = "5.45.4"
release = 1
description = "Tools for automating interactive applications via scripted dialogues"
license = "Public Domain"
arch = "x86_64"
url = "https://core.tcl.tk/expect/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://downloads.sourceforge.net/project/expect/Expect/${VERSION}/expect${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.linuxfromscratch.org/patches/lfs/12.4/expect-${VERSION}-gcc15-1.patch"

[pipeline.prepare]
script = '''
cd source/expect-${VERSION}
patch -Np1 < ${WORKDIR}/expect-${VERSION}-gcc15-1.patch'''

[pipeline.configure]
script = '''
cd source/expect-${VERSION}
./configure --prefix=/usr           \
--with-tcl=/usr/lib     \
--enable-shared         \
--disable-rpath         \
--mandir=/usr/share/man \
--with-tclinclude=/usr/include'''

[pipeline.compile]
script = '''
cd source/expect-${VERSION}
make -j$(nproc)'''

[pipeline.check]
script = '''
cd source/expect-${VERSION}
make test'''

[pipeline.staging]
script = '''
cd source/expect-${VERSION}
make DESTDIR=${STAGING_DIR} install
ln -svf expect${VERSION}/libexpect${VERSION}.so ${STAGING_DIR}/usr/lib'''

[[output]]
runtime_deps = ['tcl']
