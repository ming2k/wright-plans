name = "linux"
version = "6.19.12"
release = 1
description = "The Linux kernel"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://www.kernel.org/"

[dependencies]
runtime = ["kmod", "dracut-ng"]
build = ["bc", "gcc", "make"]

[[sources]]
uri = "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${VERSION}.tar.xz"
sha256 = "SKIP"

[[sources]]
uri = "config"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}

# Configuration policy:
# - ${FILES_DIR}/config is the primary kernel config source and should reflect
#   the baseline that users can inspect and edit directly.
# - Prefer changing config for normal feature choices so the resulting policy is
#   visible in one place.
# - Keep scripts/config usage minimal and limited to a small set of
#   strategy-critical assertions or version-drift guardrails that cannot be
#   expressed cleanly as the maintained config baseline.
cp ${FILES_DIR}/config .config
make olddefconfig

# Branding
scripts/config --set-str LOCALVERSION "-theseus"
scripts/config --set-str DEFAULT_HOSTNAME "theseus"

# Boot-critical: filesystem (no initramfs, must be built-in)
scripts/config --enable EXT4_FS
scripts/config --enable VFAT_FS
scripts/config --enable NLS_CODEPAGE_437
scripts/config --enable NLS_ISO8859_1
scripts/config --enable NLS_UTF8

# Boot-critical: NVMe storage
scripts/config --enable BLK_DEV_NVME
scripts/config --enable NVME_CORE

# UEFI boot
scripts/config --enable EFI
scripts/config --enable EFI_STUB
scripts/config --enable EFI_MIXED
scripts/config --enable EFIVAR_FS
scripts/config --enable EFI_RUNTIME_MAP

# systemd hard requirements
scripts/config --enable DEVTMPFS
scripts/config --enable DEVTMPFS_MOUNT
scripts/config --enable CGROUPS
scripts/config --enable INOTIFY_USER
scripts/config --enable SIGNALFD
scripts/config --enable TIMERFD
scripts/config --enable EPOLL
scripts/config --enable AUTOFS_FS
scripts/config --enable TMPFS
scripts/config --enable TMPFS_POSIX_ACL
scripts/config --enable TMPFS_XATTR
scripts/config --enable SECCOMP
scripts/config --enable SECCOMP_FILTER

# Flatpak/bwrap hard requirements
scripts/config --enable NAMESPACES
scripts/config --enable USER_NS
if grep -q '^CONFIG_USER_NS_UNPRIVILEGED=' .config || grep -q '^# CONFIG_USER_NS_UNPRIVILEGED is not set' .config; then
    scripts/config --enable USER_NS_UNPRIVILEGED
fi

# systemd recommended
scripts/config --enable DMIID
scripts/config --enable NET
scripts/config --enable SYSFS
scripts/config --enable PROC_FS
scripts/config --enable FHANDLE
scripts/config --enable BPF_SYSCALL
scripts/config --enable CGROUP_BPF

# Disable uevent helper (systemd wants udev only)
scripts/config --disable UEVENT_HELPER

make olddefconfig

'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make INSTALL_MOD_PATH=${PART_DIR}/usr modules_install
rm -f ${PART_DIR}/usr/lib/modules/*/build
install -d ${PART_DIR}/boot
cp -v arch/x86/boot/bzImage ${PART_DIR}/boot/vmlinuz-theseus
cp -v System.map ${PART_DIR}/boot/System.map-theseus
cp -v .config ${PART_DIR}/boot/config-theseus

'''

[lifecycle.fabricate]
