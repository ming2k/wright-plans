name = "xmlto"
version = "0.0.29"
release = 1
description = "Tool to transform XML documents into other formats"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://pagure.io/xmlto/"

[dependencies]
runtime = ["bash", "docbook-xsl", "libxslt"]
build = ["autoconf", "automake", "gcc", "make", "docbook-xsl", "libxslt"]

[[sources]]
sha256 = "6000d8e8f0f9040426c4f85d7ad86789bc88d4aeaef585c4d4110adb0b214f21"
url = "https://releases.pagure.org/xmlto/xmlto-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
autoreconf -fi
./configure --prefix=/usr ac_cv_path_BASH=/bin/bash'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
