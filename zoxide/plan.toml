[plan]
name = "zoxide"
version = "0.9.9"
release = 1
description = "A smarter cd command"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ajeetdsouza/zoxide"

[dependencies]
build = ["rust"]

[sources]
uris = ["https://github.com/ajeetdsouza/zoxide/archive/refs/tags/v${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.compile]
dockyard = "none"
env = { CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target" }
script = """
cd ${BUILD_DIR}
cargo build --release --locked
"""

[lifecycle.package]
dockyard = "none"
script = """
cd ${BUILD_DIR}
install -Dm755 target/release/zoxide ${PKG_DIR}/usr/bin/zoxide
install -Dm644 contrib/completions/zoxide.bash ${PKG_DIR}/usr/share/bash-completion/completions/zoxide
install -Dm644 contrib/completions/_zoxide     ${PKG_DIR}/usr/share/zsh/site-functions/_zoxide
install -Dm644 contrib/completions/zoxide.fish ${PKG_DIR}/usr/share/fish/vendor_completions.d/zoxide.fish
install -Dm644 man/man1/*.1 -t ${PKG_DIR}/usr/share/man/man1/
"""
