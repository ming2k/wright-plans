name = "lzo"
version = "2.10"
release = 1
description = "Portable lossless data compression library"
license = "GPL-2.0"
arch = "x86_64"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://www.oberhumer.com/opensource/lzo/download/lzo-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --enable-shared --disable-static --docdir=/usr/share/doc/lzo-${VERSION}'''

[lifecycle.compile]
script = "cd source && make -j$(nproc)"

[lifecycle.staging]
script = "cd source && make DESTDIR=${PART_DIR} install"
