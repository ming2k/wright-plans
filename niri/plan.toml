[plan]
name = "niri"
version = "25.11"
release = 1
description = "Scrollable-tiling Wayland compositor"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://github.com/YaLTeR/niri"

[dependencies]
runtime = [
    "seatd",
    "pipewire",
    "xwayland",
    "polkit-gnome",
    "xdg-desktop-portal",
    "xdg-desktop-portal-gtk",
]
build = ["cargo", "pkgconf", "rust"]
link = [
    "cairo",
    "glib",
    "libinput",
    "mesa",
    "pango",
    "pipewire",
    "seatd",
    "systemd",
    "wayland",
    "libxkbcommon",
]

[[sources]]
uri = "https://github.com/YaLTeR/niri/archive/refs/tags/v25.05.tar.gz"
sha256 = "deb067a8af2febb29bdcf72b98a2e654e3e2a199e7f3b3d622436983071ebe32"

[lifecycle.configure]
script = '''
echo "cargo project, no configure step"
'''

[lifecycle.compile]
dockyard = "relaxed"
env = {CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target"}
script = '''
cd ${BUILD_DIR}
cargo build --release --no-default-features --locked
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
mkdir -p ${PKG_DIR}/usr/bin
cp target/release/niri ${PKG_DIR}/usr/bin/
mkdir -p ${PKG_DIR}/usr/share/wayland-sessions
cp resources/niri.desktop ${PKG_DIR}/usr/share/wayland-sessions/
mkdir -p ${PKG_DIR}/usr/lib/systemd/user
cp resources/niri.service ${PKG_DIR}/usr/lib/systemd/user/
cp resources/niri-shutdown.target ${PKG_DIR}/usr/lib/systemd/user/
install -Dm755 resources/niri-session ${PKG_DIR}/usr/bin/niri-session
install -Dm644 /dev/null ${PKG_DIR}/usr/share/xdg-desktop-portal/niri-portals.conf
cat > ${PKG_DIR}/usr/share/xdg-desktop-portal/niri-portals.conf <<'EOF'
[preferred]
default=gtk;
org.freedesktop.impl.portal.Access=gtk;
org.freedesktop.impl.portal.Notification=gtk;
org.freedesktop.impl.portal.Secret=gnome-keyring;
EOF
'''
