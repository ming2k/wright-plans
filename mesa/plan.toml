name = "mesa"
version = "26.1.3"
release = 1
description = "Open-source OpenGL and Vulkan drivers"
license = "MIT"
arch = "x86_64"
url = "https://mesa3d.org"

link_deps = ['elfutils', 'expat', 'libdisplay-info', 'libdrm', 'libglvnd', 'libunwind', 'llvm:llvm-libs', 'wayland', 'zlib', 'zstd']
# Mesa's meson.build probes for these via pkg-config / find_program when the
# relevant features are enabled. Declaring them as build_deps keeps the
# sandboxed build self-contained instead of relying on the host.
#   - python-mako:       templating for code generation (XML/programmatic)
#   - wayland-protocols: generates wayland-client/server protocol sources
#   - vulkan-headers:    required when -Dvulkan-drivers is non-empty
#   - spirv-headers:     required by the Vulkan runtime
#   - glslang:           used by the Vulkan CTS runtime and shader cache
build_deps = ['meson', 'ninja', 'python-mako', 'wayland-protocols', 'vulkan-headers', 'spirv-headers', 'glslang']

[[sources]]
type = "http"
sha256 = "7725004e724b34c6d4fbaf5c48fc6c6223aa9f2741d6d7782c699b049356fc45"
url = "https://mesa.freedesktop.org/archive/mesa-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/mesa-${VERSION}
# Pure Wayland build for niri / wlroots:
#   -Dplatforms=wayland        keeps EGL/GBM Wayland platform, drops X11
#   -Dglx=disabled             drops X11 GLX (independent of EGL_WL_bind_wayland_display)
#   -Dgallium-va=disabled      Intel VA-API comes from the separate
#                              intel-media-driver package, not mesa's VA
#                              state tracker (which only supports radeonsi/
#                              r600/nouveau/d3d12/virgl anyway)
#   -Dvulkan-drivers=intel,intel_hasvk,swrast
#                              ANV for Gen8+(TGL+), HASVK for Gen7.5-12.x
#                              (legacy IVB/HSW/SKL), lavapipe software fallback
# Mesa >= 26.0.8 contains the WSI Wayland dmabuf-feedback fix that
# previously crashed ANV inside vkAcquireNextImage2KHR on wlroots 0.20.
meson setup build --prefix=/usr --buildtype=release \
    -D platforms=wayland \
    -D gallium-drivers=iris,crocus,llvmpipe \
    -D vulkan-drivers=intel,intel_hasvk,swrast \
    -D egl=enabled -D gbm=enabled \
    -D gles1=disabled -D gles2=enabled \
    -D glx=disabled \
    -D llvm=enabled -D shared-llvm=enabled \
    -D gallium-va=disabled \
    -D vulkan-layers=device-select,overlay \
    -D video-codecs=all \
    -D valgrind=disabled -D libunwind=enabled'''

[pipeline.compile]
script = '''
cd source/mesa-${VERSION}
ninja -j $(nproc) -C build'''

[pipeline.staging]
script = '''
cd source/mesa-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['elfutils', 'expat', 'libdisplay-info', 'libdrm', 'libglvnd', 'libunwind', 'llvm:llvm-libs', 'wayland', 'zlib', 'zstd']
