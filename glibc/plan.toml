name = "glibc"
version = "2.43"
release = 5
description = "The GNU C Library"
license = "LGPL-2.1-or-later AND GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libc/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://mirrors.kernel.org/gnu/glibc/glibc-${VERSION}.tar.xz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "locale.gen"

[pipeline.configure]
script = '''
# Glibc requires an out-of-tree build
mkdir -pv ${WORKDIR}/build
cd ${WORKDIR}/build

# _FORTIFY_SOURCE=3 conflicts with --enable-fortify-source
CFLAGS="${CFLAGS/-Wp,-D_FORTIFY_SOURCE=3/}"

cat > configparms << EOF
slibdir=/usr/lib
rtlddir=/usr/lib
sbindir=/usr/bin
rootsbindir=/usr/bin
EOF

../source/glibc-${VERSION}/configure  \
  --prefix=/usr                       \
  --libdir=/usr/lib                   \
  --libexecdir=/usr/lib               \
  --with-headers=/usr/include         \
  --enable-bind-now                   \
  --enable-cet                        \
  --enable-fortify-source             \
  --enable-kernel=5.4                 \
  --enable-multi-arch                 \
  --enable-stack-protector=strong     \
  --disable-nscd                      \
  --disable-profile                   \
  --disable-werror'''

[pipeline.compile]
isolation = "strict"
script = '''
cd ${WORKDIR}/build
make -O -j$(nproc)'''

# [pipeline.check]
# script = '''
# cd ${WORKDIR}/build
# make -O check || true'''

[pipeline.staging]
script = '''
cd ${WORKDIR}/build

mkdir -p ${STAGING_DIR}/etc

make -O -j$(nproc)
make DESTDIR=${STAGING_DIR} install

# Remove stale cache — regenerated by ldconfig post-install
rm -f ${STAGING_DIR}/etc/ld.so.cache

# tzselect, zdump, zic and their man pages are provided by tzdata
rm -f ${STAGING_DIR}/usr/bin/{tzselect,zdump,zic}
rm -f ${STAGING_DIR}/usr/share/man/man5/tzfile.5
rm -f ${STAGING_DIR}/usr/share/man/man8/{tzselect,zdump,zic}.8

# Fix hardcoded /usr prefix in ldd so it resolves via /lib symlink
sed '/RTLDLIST=/s@/usr@@g' -i ${STAGING_DIR}/usr/bin/ldd

install -Dm644 ${WORKDIR}/glibc-locale.gen ${STAGING_DIR}/etc/locale.gen

# Default system locale
echo 'LANG=en_US.UTF-8' > ${STAGING_DIR}/etc/locale.conf

# nsswitch.conf
cat > ${STAGING_DIR}/etc/nsswitch.conf << "NSEOF"
# Begin /etc/nsswitch.conf

passwd: files
group: files
shadow: files

hosts: files dns
networks: files

protocols: files
services: files
ethers: files
rpc: files

# End /etc/nsswitch.conf
NSEOF

# ld.so.conf
cat > ${STAGING_DIR}/etc/ld.so.conf << "LDEOF"
# Begin /etc/ld.so.conf
/usr/local/lib
/opt/lib

include /etc/ld.so.conf.d/*.conf

LDEOF
mkdir -pv ${STAGING_DIR}/etc/ld.so.conf.d'''

[[output]]
backup = ["/etc/nsswitch.conf", "/etc/ld.so.conf", "/etc/locale.gen", "/etc/locale.conf"]
runtime_deps = ['linux-api-headers >= 4.10', 'tzdata >= 2025c']

[output.hooks]
post_install = '''
ldconfig
mkdir -p /usr/lib/locale
localedef -i C -f UTF-8 C.UTF-8
localedef -i en_US -f UTF-8 en_US.UTF-8

'''
post_upgrade = '''
ldconfig
mkdir -p /usr/lib/locale
localedef -i C -f UTF-8 C.UTF-8
localedef -i en_US -f UTF-8 en_US.UTF-8

'''
