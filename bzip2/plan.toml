name = "bzip2"
version = "1.0.8"
release = 1
description = "Programs for compressing and decompressing files using the Burrows-Wheeler algorithm"
license = "bzip2-1.0.6"
arch = "x86_64"
url = "https://www.sourceware.org/bzip2/"


[[sources]]
type = "http"
sha256 = "ab5a03176ee106d3f0fa90e381da478ddae405918153cca248e682cd0c4a2269"
url = "https://www.sourceware.org/pub/bzip2/bzip2-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source/bzip2-${VERSION}

# Ensure symbolic links are relative
sed -i 's@\(ln -s -f \)$(PREFIX)/bin/@\1@' Makefile

# Fix man pages location
sed -i 's@$(PREFIX)/man@$(PREFIX)/share/man@g' Makefile'''

[pipeline.compile]
script = '''
cd source/bzip2-${VERSION}

# First build the shared library
make -f Makefile-libbz2_so
make clean

# Then build the rest
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/bzip2-${VERSION}

# Install programs and static lib
make PREFIX=${STAGING_DIR}/usr install

# Install shared library
cp -av libbz2.so.* ${STAGING_DIR}/usr/lib/
ln -sv libbz2.so.${VERSION} ${STAGING_DIR}/usr/lib/libbz2.so

# Install shared bzip2 binary and create symlinks
cp -v bzip2-shared ${STAGING_DIR}/usr/bin/bzip2
for i in ${STAGING_DIR}/usr/bin/{bzcat,bunzip2}; do
ln -sfv bzip2 $i
done

# Remove useless static library
rm -fv ${STAGING_DIR}/usr/lib/libbz2.a'''

