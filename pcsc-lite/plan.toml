name = "pcsc-lite"
version = "2.4.1"
release = 4
description = "PC/SC Lite smart card middleware and library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://pcsclite.apdu.fr/"

build_deps = ["meson", "ninja", "flex"]

[[sources]]
type = "http"
url = "https://github.com/LudovicRousseau/PCSC/archive/refs/tags/${VERSION}.tar.gz"
sha256 = "e7b6737f68c3b9a763fb0b0370d899cea091cced9d762ca8a6032c959576d5be"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/PCSC-${VERSION}
meson setup build \
    --prefix=/usr \
    --sbindir=/usr/bin \
    -Dlibsystemd=false \
    -Dlibudev=false \
    -Dpolkit=false \
    -Dlibusb=false \
    -Dusb=false \
    -Dserial=false \
    -Dipcdir=/run/pcscd'''

[pipeline.compile]
script = '''
cd source/PCSC-${VERSION}
ninja -C build'''

[pipeline.staging]
script = '''
cd source/PCSC-${VERSION}
ninja -C build
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
name = "pcsc-lite"
description = "PC/SC Lite smart card middleware and library"
include = [
    "/usr/lib/libpcsclite.so*",
    "/usr/lib/libpcsclite_real.so*",
    "/usr/lib/libpcscspy.so*",
    "/usr/lib/pkgconfig/libpcsclite.pc",
    "/usr/include/PCSC/**",
    "/usr/bin/pcscd",
    "/usr/bin/pcsc-spy",
    "/usr/share/man/man1/pcsc-spy.1*",
    "/usr/share/man/man8/pcscd.8*",
    "/usr/share/doc/pcsc-lite/**",
    "/usr/share/metainfo/**",
]
runtime_deps = ["glibc"]

[[discard]]
include = [
    "/usr/lib/systemd/**",
    "/usr/sysusers.d/**",
    "/etc/default/**",
]
reason = "FHS non-compliant paths generated by upstream meson install"
