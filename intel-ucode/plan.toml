name = "intel-ucode"
version = "20260227"
release = 1
description = "Intel CPU microcode firmware for early microcode update"
license = "LicenseRef-intel-microcode"
arch = "x86_64"
url = "https://github.com/intel/Intel-Linux-Processor-Microcode-Data-Files"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/intel/Intel-Linux-Processor-Microcode-Data-Files/archive/refs/tags/microcode-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/Intel-Linux-Processor-Microcode-Data-Files-microcode-${VERSION}
install -d "${STAGING_DIR}/usr/lib/firmware"
cp -r "intel-ucode" "${STAGING_DIR}/usr/lib/firmware/"
cp -r "intel-ucode-with-caveats" "${STAGING_DIR}/usr/lib/firmware/"

install -Dm644 "license" \
    "${STAGING_DIR}/usr/share/licenses/intel-ucode/LICENSE"'''
