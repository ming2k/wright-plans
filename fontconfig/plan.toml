name = "fontconfig"
version = "2.17.1"
release = 1
description = "Font configuration and customization library"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/fontconfig/"

[dependencies]
build = ["freetype", "meson", "ninja", "pkgconf", "gperf"]
link = ["freetype", "expat"]

[[sources]]
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/fontconfig/fontconfig/-/archive/${VERSION}/fontconfig-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
    --prefix=/usr                        \
    --buildtype=release                  \
    --wrap-mode=nofallback               \
    -D doc=disabled                      \
    -D tests=disabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[hooks]
post_install = "fc-cache -s 2>/dev/null || true"
post_upgrade = "fc-cache -s 2>/dev/null || true"
