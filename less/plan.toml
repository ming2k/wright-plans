[plan]
name = "less"
version = "692"
release = 1
description = "A text file viewer"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.greenwoodsoftware.com/less/"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]

[[sources]]
uri = "https://www.greenwoodsoftware.com/less/less-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --sysconfdir=/etc
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install
'''
