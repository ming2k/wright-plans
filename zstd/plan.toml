name = "zstd"
version = "1.5.7"
release = 1
description = "Zstandard - real-time compression algorithm providing high compression ratios"
license = "BSD-3-Clause AND GPL-2.0-only"
arch = "x86_64"
url = "https://facebook.github.io/zstd/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/facebook/zstd/releases/download/v${VERSION}/zstd-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source/zstd-1.5.7
make prefix=/usr -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/zstd-1.5.7
make prefix=/usr DESTDIR=${STAGING_DIR} install
rm -v ${STAGING_DIR}/usr/lib/libzstd.a'''

