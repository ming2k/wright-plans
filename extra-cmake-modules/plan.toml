name = "extra-cmake-modules"
version = "6.23.0"
release = 1
description = "Extra modules and scripts for CMake"
license = "LGPL-2.0-or-later"
arch = "any"
url = "https://community.kde.org/Frameworks"

[dependencies]
build = ["cmake", "ninja"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.kde.org/stable/frameworks/6.23/extra-cmake-modules-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DBUILD_HTML_DOCS=OFF \
    -DBUILD_QTHELP_DOCS=OFF \
    -DBUILD_TESTING=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
