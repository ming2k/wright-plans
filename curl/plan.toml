name = "curl"
version = "8.18.0"
release = 1
description = "Command line tool and library for transferring data with URLs"
license = "curl"
arch = "x86_64"
url = "https://curl.se/"

[dependencies]
runtime = ["ca-certificates"]
build = ["gcc", "make"]
link = [
    "libidn2",
    "libpsl",
    "nghttp2",
    "openssl",
]

[[sources]]
uri = "https://curl.se/download/curl-${PART_VERSION}.tar.xz"
sha256 = "40df79166e74aa20149365e11ee4c798a46ad57c34e4f68fd13100e2c9a91946"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr                    \
--disable-static                 \
--with-openssl                   \
--enable-threaded-resolver       \
--with-ca-path=/etc/ssl/certs

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
