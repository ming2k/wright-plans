name = "ninja"
version = "1.13.2"
release = 1
description = "Small build system with a focus on speed"
license = "Apache-2.0"
arch = "x86_64"
url = "https://ninja-build.org/"

[dependencies]
runtime = ["python"]
build = ["bash", "gcc", "make", "python"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/ninja-build/ninja/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
script = '''
cd source
python3 configure.py --bootstrap'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 ninja ${PART_DIR}/usr/bin/ninja
install -Dm644 misc/bash-completion ${PART_DIR}/usr/share/bash-completion/completions/ninja'''
