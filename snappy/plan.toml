name = "snappy"
version = "1.2.2"
release = 1
description = "Fast compressor/decompressor library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/snappy"


build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/google/snappy/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/snappy-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=ON \
    -DSNAPPY_BUILD_TESTS=OFF \
    -DSNAPPY_BUILD_BENCHMARKS=OFF'''

[pipeline.compile]
script = '''
cd source/snappy-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/snappy-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

