name = "kbd"
version = "2.9.0"
release = 1
description = "Key-table files, console fonts, and keyboard utilities"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://kbd-project.org/"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/utils/kbd/kbd-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/kbd-${VERSION}
./configure --prefix=/usr --disable-vlock'''

[lifecycle.compile]
script = '''
cd source/kbd-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/kbd-${VERSION}
make DESTDIR=${STAGING_DIR} install
mkdir -p ${STAGING_DIR}/usr/share/doc/kbd-${VERSION}
cp -R -v docs/doc/* ${STAGING_DIR}/usr/share/doc/kbd-${VERSION}'''
