name = "speexdsp"
version = "1.2.1"
release = 1
description = "Digital signal processing library from the Speex project"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://www.speex.org/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
sha256 = "SKIP"
url = "https://downloads.xiph.org/releases/speex/speexdsp-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
