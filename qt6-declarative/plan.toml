[plan]
name = "qt6-declarative"
version = "6.10.2"
release = 1
description = "Qt 6 declarative module (QML/QtQuick)"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"

[dependencies]
build = ["cmake", "gcc", "ninja", "qt6-base", "qt6-shadertools"]
runtime = ["qt6-base", "qt6-shadertools"]
[options]
jobs = 4

[sources]
uris = ["https://download.qt.io/official_releases/qt/6.10/${PKG_VERSION}/submodules/qtdeclarative-everywhere-src-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = """
cd ${BUILD_DIR}
cmake -B build -G Ninja \
-DCMAKE_INSTALL_PREFIX=/usr \
-DCMAKE_BUILD_TYPE=Release \
-DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
-DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-multiple-definition" \
-DCMAKE_SHARED_LINKER_FLAGS="-Wl,--allow-multiple-definition" \
-DCMAKE_MODULE_LINKER_FLAGS="-Wl,--allow-multiple-definition"
"""

[lifecycle.compile]
script = """
cd ${BUILD_DIR}
ninja -j$(nproc) -C build
"""

[lifecycle.package]
script = """
cd ${BUILD_DIR}
DESTDIR=${PKG_DIR} ninja -C build install
"""
