name = "gcc"
version = "15.2.0"
release = 3
description = "The GNU Compiler Collection - C and C++ frontends"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://gcc.gnu.org/"

[dependencies]
runtime = ["binutils"]
build = [
    "binutils",
    "make",
    "perl",
    "texinfo",
]
link = [
    "gcc-libs",
    "gmp",
    "mpc",
    "mpfr",
    "zlib",
]

[[sources]]
uri = "https://ftp.gnu.org/gnu/gcc/gcc-${VERSION}/gcc-${VERSION}.tar.xz"
sha256 = "438fd996826b0c82485a29da03a72d71d6e3541a83ec702df4271f6fe025d24e"

[options]
ccache = true

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
case $(uname -m) in
    x86_64) sed -e '/m64=/s/lib64/lib/' -i.orig gcc/config/i386/t-linux64 ;;
esac
mkdir -v build

'''

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}/build
SED=sed \
../configure --prefix=/usr \
    LD=ld \
    --enable-languages=c,c++ \
    --enable-default-pie \
    --enable-default-ssp \
    --enable-host-pie \
    --disable-multilib \
    --disable-bootstrap \
    --disable-fixincludes \
    --enable-shared \
    --enable-threads=posix \
    --enable-__cxa_atexit \
    --enable-clocale=gnu \
    --enable-gnu-indirect-function \
    --enable-linker-build-id \
    --enable-lto \
    --enable-plugin \
    --enable-install-libiberty \
    --with-system-zlib \
    --with-linker-hash-style=gnu \
    --disable-werror

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}/build
make -j$(nproc)

'''

[lifecycle.fabricate]
script = '''
cd ${BUILD_DIR}/build
make DESTDIR=${PART_DIR} install

# Compatibility symlinks
ln -sfv /usr/bin/cpp "${PART_DIR}/usr/lib/cpp"
ln -sv gcc.1 "${PART_DIR}/usr/share/man/man1/cc.1"

GCC_VER="${VERSION}"
TRIPLET=$(gcc -dumpmachine 2>/dev/null || echo x86_64-pc-linux-gnu)
install -d "${PART_DIR}/usr/lib/bfd-plugins"
ln -sfv "../../libexec/gcc/${TRIPLET}/${GCC_VER}/liblto_plugin.so" "${PART_DIR}/usr/lib/bfd-plugins/"

# Move GDB auto-load scripts
install -d "${PART_DIR}/usr/share/gdb/auto-load/usr/lib"
mv -v "${PART_DIR}"/usr/lib/*gdb.py "${PART_DIR}/usr/share/gdb/auto-load/usr/lib/" 2>/dev/null || true

'''

[output.libgcc]
description = "GCC runtime library (libgcc_s.so)"
script = '''
install -d "${PART_DIR}/usr/lib"
mv -v "${MAIN_PART_DIR}"/usr/lib/libgcc_s.so* "${PART_DIR}/usr/lib/"

'''

[output.libgcc.dependencies]
link = ["glibc"]

[output."libstdc++"]
description = "GNU C++ standard library"
script = '''
install -d "${PART_DIR}/usr/lib"
install -d "${PART_DIR}/usr/share/gdb/auto-load/usr/lib"
install -d "${PART_DIR}/usr/share/gcc-${VERSION}/python"

mv -v "${MAIN_PART_DIR}"/usr/lib/libstdc++.so* "${PART_DIR}/usr/lib/"
mv -v "${MAIN_PART_DIR}"/usr/lib/libstdc++fs.so* "${PART_DIR}/usr/lib/" 2>/dev/null || true
mv -v "${MAIN_PART_DIR}"/usr/lib/libstdc++exp.so* "${PART_DIR}/usr/lib/" 2>/dev/null || true
mv -v "${MAIN_PART_DIR}"/usr/share/gdb/auto-load/usr/lib/libstdc++* "${PART_DIR}/usr/share/gdb/auto-load/usr/lib/" 2>/dev/null || true
mv -v "${MAIN_PART_DIR}"/usr/share/gcc-${VERSION}/python/libstdcxx "${PART_DIR}/usr/share/gcc-${VERSION}/python/" 2>/dev/null || true

'''

[output."libstdc++".dependencies]
runtime = ["libgcc"]
link = ["glibc"]

[output.libgomp]
description = "GNU OpenMP runtime library"
script = '''
install -d "${PART_DIR}/usr/lib"
mv -v "${MAIN_PART_DIR}"/usr/lib/libgomp.so* "${PART_DIR}/usr/lib/"
mv -v "${MAIN_PART_DIR}"/usr/lib/libgomp.spec "${PART_DIR}/usr/lib/" 2>/dev/null || true

'''

[output.libgomp.dependencies]
link = ["glibc"]

[output.libatomic]
description = "GCC atomic operations fallback library"
script = '''
install -d "${PART_DIR}/usr/lib"
mv -v "${MAIN_PART_DIR}"/usr/lib/libatomic.so* "${PART_DIR}/usr/lib/"

'''

[output.libatomic.dependencies]
link = ["glibc"]

[output.libsanitizer]
description = "GCC sanitizer runtime libraries (ASan, LSan, TSan, UBSan)"
script = '''
install -d "${PART_DIR}/usr/lib"
for lib in asan lsan tsan ubsan hwasan; do
    mv -v "${MAIN_PART_DIR}"/usr/lib/lib${lib}.so* "${PART_DIR}/usr/lib/" 2>/dev/null || true
done

'''

[output.libsanitizer.dependencies]
runtime = ["libgcc", "libstdc++"]
link = ["glibc"]

[output.gcc-libs]
description = "GCC runtime libraries (meta-package)"
script = '''
install -d "${PART_DIR}/usr/share/doc/gcc-libs"
echo "gcc-libs: meta-package pulling in libgcc, libstdc++, libgomp, libatomic" > "${PART_DIR}/usr/share/doc/gcc-libs/README"

'''

[output.gcc-libs.dependencies]
runtime = [
    "libatomic",
    "libgcc",
    "libgomp",
    "libstdc++",
]
