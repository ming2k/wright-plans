name = "jemalloc"
version = "5.3.0"
release = 1
description = "General purpose malloc implementation"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/jemalloc/jemalloc"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/jemalloc/jemalloc/releases/download/${PART_VERSION}/jemalloc-${PART_VERSION}.tar.bz2"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
