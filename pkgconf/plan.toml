name = "pkgconf"
version = "2.5.1"
release = 1
description = "Utility for discovering compiler and linker flags"
license = "ISC"
arch = "x86_64"
url = "https://pkgconf.org/"

[dependencies]
build = ["bash", "gcc", "make"]

[[sources]]
uri = "https://distfiles.ariadne.space/pkgconf/pkgconf-${VERSION}.tar.xz"
sha256 = "cd05c9589b9f86ecf044c10a2269822bc9eb001eced2582cfffd658b0a50c243"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[output]
provides = ["pkg-config"]
conflicts = ["pkg-config"]
