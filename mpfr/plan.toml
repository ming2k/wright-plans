name = "mpfr"
version = "4.2.2"
release = 1
description = "C library for multiple-precision floating-point computations"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://www.mpfr.org/"

[dependencies]
build = ["make"]
link = ["gmp"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/mpfr/mpfr-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr        \
--disable-static     \
--enable-thread-safe \
--docdir=/usr/share/doc/mpfr-4.2.2'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)
make html'''

[lifecycle.check]
script = '''
cd source
make check'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install
make DESTDIR=${PART_DIR} install-html'''
