name = "libsndfile"
version = "1.2.2"
release = 1
description = "C library for reading and writing sound files"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://libsndfile.github.io/libsndfile/"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/libsndfile/libsndfile/releases/download/${VERSION}/libsndfile-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libsndfile-${VERSION}
CFLAGS="-std=gnu17" ./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libsndfile-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libsndfile-${VERSION}
DESTDIR=${STAGING_DIR} make install'''
