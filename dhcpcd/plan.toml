name = "dhcpcd"
version = "10.3.2"
release = 1
description = "DHCP/DHCPv6 client with IPv4LL support"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://github.com/NetworkConfiguration/dhcpcd"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/NetworkConfiguration/dhcpcd/releases/download/v${VERSION}/dhcpcd-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/dhcpcd-${VERSION}
./configure --prefix=/usr       \
--sbindir=/usr/bin  \
--sysconfdir=/etc   \
--libexecdir=/usr/lib/dhcpcd \
--dbdir=/var/lib/dhcpcd      \
--runstatedir=/run           \
--disable-privsep'''

[pipeline.compile]
script = '''
cd source/dhcpcd-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/dhcpcd-${VERSION}
make DESTDIR=${STAGING_DIR} install'''
