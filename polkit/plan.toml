name = "polkit"
version = "127"
release = 2
description = "Application-level toolkit for defining and handling authorization"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/polkit-org/polkit"

link_deps = ['glib', 'duktape', 'linux-pam']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/polkit-org/polkit/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/polkit-${VERSION}
meson setup build \
    --prefix=/usr               \
    --buildtype=release         \
    -D authfw=pam               \
    -D session_tracking=logind  \
    -D man=false                \
    -D tests=false              \
    -D introspection=false      \
    -D gtk_doc=false            \
    -D os_type=lfs              \
    -D examples=false'''

[lifecycle.compile]
script = '''
cd source/polkit-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/polkit-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['dbus', 'systemd', 'glib', 'duktape', 'linux-pam']
hooks.post_install = '''
groupadd -fg 27 polkitd 2>/dev/null || true
useradd -r -u 27 -g polkitd -d /var/lib/polkit-1 -s /usr/bin/false \
    -c "PolicyKit Daemon Owner" polkitd 2>/dev/null || true
'''
