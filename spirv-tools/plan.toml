name = "spirv-tools"
version = "1.4.350.1"
release = 1
description = "API and commands for processing SPIR-V modules"
license = "Apache-2.0"
arch = "x86_64"


build_deps = ['cmake', 'ninja', 'spirv-headers']

[[sources]]
type = "http"
sha256 = "6f7b9b9eed9a7aa485918466ea604b4edc7969d94e96c0c13ae266f4ec120f31"
url = "https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/vulkan-sdk-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/SPIRV-Tools-vulkan-sdk-${VERSION}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib -DSPIRV_WERROR=OFF -DSPIRV-Headers_SOURCE_DIR=/usr -DSPIRV_SKIP_TESTS=ON'''

[pipeline.compile]
script = '''
cd source/SPIRV-Tools-vulkan-sdk-${VERSION}
cmake --build build -j $(nproc)'''

[pipeline.staging]
script = '''
cd source/SPIRV-Tools-vulkan-sdk-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build'''

