name = "bash"
version = "5.3"
release = 1
description = "The Bourne-Again Shell"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/bash/"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses", "readline"]

[[sources]]
uri = "https://ftp.gnu.org/gnu/bash/bash-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr             \
            --without-bash-malloc     \
            --with-installed-readline \
            --docdir=/usr/share/doc/bash-${PART_VERSION}

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
