name = "qt6-base"
version = "6.11.0"
release = 3
description = "Qt 6 base module (Wayland Only)"
license = "LGPL-3.0-only"
arch = "x86_64"
url = "https://www.qt.io"

link_deps = ['fontconfig', 'freetype', 'glib', 'harfbuzz', 'libdrm', 'libpng', 'libxkbcommon', 'openssl', 'pcre2', 'zlib']
build_deps = ['vulkan-headers', 'ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtbase-everywhere-src-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/qtbase-everywhere-src-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_CXX_FLAGS="-Wno-error" \
    -DINSTALL_BINDIR=bin \
    -DINSTALL_PUBLICBINDIR=bin \
    -DINSTALL_LIBEXECDIR=lib/qt6 \
    -DINSTALL_INCLUDEDIR=include/qt6 \
    -DINSTALL_MKSPECSDIR=lib/qt6/mkspecs \
    -DINSTALL_ARCHDATADIR=lib/qt6 \
    -DINSTALL_DATADIR=share/qt6 \
    -DFEATURE_xcb=OFF \
    -DFEATURE_xcb_xlib=OFF \
    -DQT_FEATURE_xkbcommon_x11=OFF \
    -DQT_FEATURE_openssl_linked=ON \
    -DQT_FEATURE_system_zlib=ON \
    -DQT_FEATURE_system_freetype=ON \
    -DQT_FEATURE_vulkan=ON \
    -DQT_FEATURE_sql=OFF'''

[lifecycle.compile]
script = '''
cd source/qtbase-everywhere-src-${VERSION}
ninja -j$(nproc) -C build'''

[lifecycle.staging]
script = '''
cd source/qtbase-everywhere-src-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['dbus', 'double-conversion', 'mesa', 'pcre2', 'fontconfig', 'freetype', 'glib', 'harfbuzz', 'libdrm', 'libpng', 'libxkbcommon', 'openssl', 'zlib']
