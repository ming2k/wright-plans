name = "pkgname"
version = "1.0.0"
release = 1
description = ""
license = "MIT"
arch = "x86_64"
url = ""

[dependencies]
build = []
link = []
runtime = []

[[sources]]
type = "http"
url = "https://example.com/pkgname-${VERSION}.tar.gz"
sha256 = "SKIP"
extract_to = "source"

[lifecycle.configure]
script = """
cd source
./configure --prefix=/usr
"""

[lifecycle.compile]
script = """
cd source
make -j$(nproc)
"""

[lifecycle.staging]
script = """
cd source
make DESTDIR=${PART_DIR} install
"""
