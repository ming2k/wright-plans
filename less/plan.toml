name = "less"
version = "692"
release = 1
description = "A text file viewer"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.greenwoodsoftware.com/less/"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://www.greenwoodsoftware.com/less/less-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --sysconfdir=/etc'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
