name = "python-pathspec"
version = "1.0.4"
release = 1
description = "Utility library for gitignore style pattern matching of file paths"
license = "MPL-2.0"
arch = "x86_64"
url = "https://github.com/cpburnz/python-pathspec"

build = ['python', 'flit-core']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/p/pathspec/pathspec-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[output]
runtime_deps = ['python']
