name = "findutils"
version = "4.10.0"
release = 1
description = "Programs to find files and operate on them"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/findutils/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/findutils/findutils-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/findutils-${VERSION}
./configure --prefix=/usr --localstatedir=/var/lib/locate'''

[lifecycle.compile]
script = '''
cd source/findutils-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/findutils-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

