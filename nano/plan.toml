[plan]
name = "nano"
version = "8.6"
release = 1
description = "A small, simple text editor aiming to replace Pico"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.nano-editor.org/"

[dependencies]
build = ["gcc", "make"]
link = ["ncurses"]
[sources]
uris = ["https://www.nano-editor.org/dist/v8/nano-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr \
--sysconfdir=/etc \
--enable-utf8 \
--docdir=/usr/share/doc/nano-${PKG_VERSION}
'''

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
install -v -m644 doc/{nano.html,sample.nanorc} ${PKG_DIR}/usr/share/doc/nano-${PKG_VERSION}
'''
