name = "acl"
version = "2.3.2"
release = 1
description = "Utilities to administer Access Control Lists"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://savannah.nongnu.org/projects/acl"

[dependencies]
build = ["gcc", "make"]
link = ["attr"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://download.savannah.gnu.org/releases/acl/acl-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr    \
--disable-static \
--docdir=/usr/share/doc/acl-${VERSION}'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
