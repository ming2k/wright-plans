name = "swtpm"
version = "0.10.1"
release = 2
description = "Libtpms-based TPM emulator for QEMU and other hypervisors"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/stefanberger/swtpm"

link_deps = ['glib', 'gmp', 'json-glib', 'libtpms', 'openssl']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/stefanberger/swtpm/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/swtpm-${VERSION}
./autogen.sh --prefix=/usr --disable-static --without-cuse --without-selinux --without-seccomp --disable-tests'''

[lifecycle.compile]
script = '''
cd source/swtpm-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/swtpm-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['libtpms', 'glib', 'gmp', 'json-glib', 'openssl']
