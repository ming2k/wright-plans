[plan]
name = "dconf"
version = "0.49.0"
release = 1
description = "Low-level key/value database providing the GSettings backend"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/dconf"

[dependencies]
runtime = ["dbus"]
build = ["meson", "ninja", "pkgconf"]
link = ["glib"]

[[sources]]
uri = "https://download.gnome.org/sources/dconf/0.49/dconf-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dgtk_doc=false -Dvapi=false -Dman=false
'''

[lifecycle.compile]
script = '''
meson compile -C ${BUILD_DIR}/build
'''

[lifecycle.staging]
script = '''
meson install -C ${BUILD_DIR}/build --destdir ${PKG_DIR}

# /etc/dconf/db  — root-only: dconf-update writes compiled .db files here
# /etc/dconf/profile — group-writable: users in the 'dconf' group can add profiles
install -dm755  "${PKG_DIR}/etc/dconf/db"
install -dm2775 "${PKG_DIR}/etc/dconf/profile"
'''


[lifecycle.fabricate]
hooks.post_install = '''
groupadd -r dconf 2>/dev/null || true
chgrp dconf /etc/dconf/profile
'''
