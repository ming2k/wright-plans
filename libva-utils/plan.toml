name = "libva-utils"
version = "2.23.0"
release = 1
description = "Utilities for VA-API, including vainfo"
license = "MIT"
arch = "x86_64"
url = "https://github.com/intel/libva-utils"

link_deps = ['libdrm:default', 'libva:default', 'wayland:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/intel/libva-utils/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr                        \
--buildtype=release                  \
-D tests=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install'''

[output]
runtime_deps = ['libdrm:default', 'libva:default', 'wayland:default']
