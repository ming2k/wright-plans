name = "whisper.cpp"
version = "1.8.3"
release = 1
description = "Automatic speech recognition in C/C++"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ggml-org/whisper.cpp"


build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/whisper.cpp-${VERSION}
cmake -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_PREFIX=/usr/lib/whisper.cpp \
  -DBUILD_SHARED_LIBS=OFF \
  -DGGML_NATIVE=OFF \
  -DWHISPER_SDL2=OFF'''

[pipeline.compile]
script = '''
cd source/whisper.cpp-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/whisper.cpp-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

