name = "fftw"
version = "3.3.10"
release = 1
description = "A library for computing the discrete Fourier transform (DFT)"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "http://www.fftw.org/"

[dependencies]
build = ["gcc", "make"]
link = ["glibc"]

[[sources]]
sha256 = "56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467"
url = "http://www.fftw.org/fftw-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure \
    --prefix=/usr \
    --enable-shared \
    --enable-threads \
    --enable-sse2 \
    --enable-avx'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
