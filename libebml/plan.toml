name = "libebml"
version = "1.4.5"
release = 1
description = "EBML parsing library used by Matroska tools"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.matroska.org/"

[dependencies]
build = ["gcc", "cmake", "ninja"]

[[sources]]
uri = "https://dl.matroska.org/downloads/libebml/libebml-${PART_VERSION}.tar.xz"
sha256 = "4971640b0592da29c2d426f303e137a9b0b3d07e1b81d069c1e56a2f49ab221b"

[lifecycle.configure]
script = '''
cmake -S ${BUILD_DIR} -B ${BUILD_DIR}/build -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
  -DBUILD_SHARED_LIBS=ON

'''

[lifecycle.compile]
script = "cmake --build ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} cmake --install ${BUILD_DIR}/build"

[lifecycle.fabricate]
