[plan]
name = "libpipeline"
version = "1.5.8"
release = 1
description = "A library for manipulating pipelines of subprocesses in a flexible and convenient way"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://libpipeline.nongnu.org/"

[dependencies]
build = ["gcc", "make"]
[sources]
uris = ["https://download.savannah.gnu.org/releases/libpipeline/libpipeline-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
