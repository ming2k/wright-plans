name = "elfutils"
version = "0.194"
release = 1
description = "Collection of utilities and libraries for handling ELF files and DWARF data"
license = "LGPL-3.0-or-later AND GPL-3.0-or-later"
arch = "x86_64"
url = "https://sourceware.org/elfutils/"

link_deps = ['zlib']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://sourceware.org/ftp/elfutils/${VERSION}/elfutils-${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/elfutils-${VERSION}
CFLAGS="-Wno-error=discarded-qualifiers" \
./configure --prefix=/usr        \
            --disable-debuginfod \
            --enable-libdebuginfod=dummy'''

[pipeline.compile]
script = '''
cd source/elfutils-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/elfutils-${VERSION}
make DESTDIR=${STAGING_DIR} install
rm -f ${STAGING_DIR}/usr/lib/lib*.a
rm -rf ${STAGING_DIR}/usr/etc'''

[[output]]
runtime_deps = ['zlib']
