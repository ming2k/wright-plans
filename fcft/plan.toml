name = "fcft"
version = "3.3.1"
release = 1
description = "Simple library for font loading and glyph rasterization"
license = "MIT"
arch = "x86_64"
url = "https://codeberg.org/dnkl/fcft"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://codeberg.org/dnkl/fcft/archive/${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr          \
--buildtype=release    \
-D docs=disabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
