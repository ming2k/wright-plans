name = "rime-prelude"
version = "0.0.20251229"
release = 1
description = "RIME preset configuration (default.yaml, key bindings, punctuation, symbols)"
license = "LGPL-3.0-or-later"
arch = "any"
url = "https://github.com/rime/rime-prelude"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/rime/rime-prelude/archive/db691d2.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
install -d ${PART_DIR}/usr/share/rime-data
install -Dm644 ${WORKDIR}/*.yaml -t ${PART_DIR}/usr/share/rime-data/'''
