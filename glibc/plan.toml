[plan]
name = "glibc"
version = "2.43"
release = 1
description = "The GNU C Library - provides the basic routines for memory allocation, directory searching, file I/O, string handling, and more"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libc/"

[dependencies]
runtime = ["linux-api-headers >= 5.4"]
build = ["bison", "gawk", "gcc", "make", "python", "sed"]
[sources]
uris = [
"https://ftp.gnu.org/gnu/glibc/glibc-${PKG_VERSION}.tar.xz",
"patches/glibc-2.42-fhs-1.patch",
]
sha256 = ["SKIP", "SKIP"]

[lifecycle.prepare]
dockyard = "none"
script = """
cd ${BUILD_DIR}

# FHS compliance patch
patch -Np1 -i ${FILES_DIR}/glibc-2.42-fhs-1.patch

# Fix Valgrind compatibility issue in abort.c
sed -e '/unistd.h/i #include <string.h>' \
-e '/libc_rwlock_init/c\
__libc_rwlock_define_initialized (, reset_lock);\
memcpy (&lock, &reset_lock, sizeof (lock));' \
-i stdlib/abort.c

# Glibc requires an out-of-tree build
mkdir -v build
"""

[lifecycle.configure]
dockyard = "none"
script = """
cd ${BUILD_DIR}/build

echo "rootsbindir=/usr/bin" > configparms

../configure --prefix=/usr                   \
--disable-werror                \
--disable-nscd                  \
libc_cv_slibdir=/usr/lib        \
--enable-stack-protector=strong  \
--enable-kernel=5.4
"""

[lifecycle.compile]
dockyard = "none"
script = """
cd ${BUILD_DIR}/build
make -j$(nproc)
"""

[lifecycle.check]
dockyard = "none"
optional = true
script = """
cd ${BUILD_DIR}/build
make check || true
"""

[lifecycle.package]
dockyard = "none"
script = """
cd ${BUILD_DIR}/build

mkdir -p ${PKG_DIR}/etc

# Prevent warning about missing ld.so.conf
touch ${PKG_DIR}/etc/ld.so.conf

# Skip outdated sanity check
sed '/test-installation/s@$(PERL)@echo not running@' -i ${BUILD_DIR}/Makefile

make DESTDIR=${PKG_DIR} install

# Fix hardcoded path in ldd
sed '/RTLDLIST=/s@/usr@@g' -i ${PKG_DIR}/usr/bin/ldd

# Install nsswitch.conf
cat > ${PKG_DIR}/etc/nsswitch.conf << "NSEOF"
# Begin /etc/nsswitch.conf

passwd: files
group: files
shadow: files

hosts: files dns
networks: files

protocols: files
services: files
ethers: files
rpc: files

# End /etc/nsswitch.conf
NSEOF

# Install timezone data
# tzdata tarball should be pre-downloaded to /sources/
tar -xf /sources/tzdata2025b.tar.gz -C ${BUILD_DIR}/build

ZONEINFO=${PKG_DIR}/usr/share/zoneinfo
mkdir -pv $ZONEINFO/{posix,right}

cd ${BUILD_DIR}/build
for tz in etcetera southamerica northamerica europe africa antarctica \
asia australasia backward; do
zic -L /dev/null   -d $ZONEINFO       ${tz}
zic -L /dev/null   -d $ZONEINFO/posix ${tz}
zic -L leapseconds -d $ZONEINFO/right ${tz}
done

cp -v zone.tab zone1970.tab iso3166.tab $ZONEINFO
zic -d $ZONEINFO -p America/New_York
unset ZONEINFO

# Configure dynamic loader
cat > ${PKG_DIR}/etc/ld.so.conf << "LDEOF"
# Begin /etc/ld.so.conf
/usr/local/lib
/opt/lib

# Add an include directory
include /etc/ld.so.conf.d/*.conf

LDEOF
mkdir -pv ${PKG_DIR}/etc/ld.so.conf.d
"""

[lifecycle.post_package]
dockyard = "none"
script = """
# Generate minimum set of locales for test suite coverage
localedef -i C -f UTF-8 C.UTF-8
localedef -i cs_CZ -f UTF-8 cs_CZ.UTF-8
localedef -i de_DE -f ISO-8859-1 de_DE
localedef -i de_DE@euro -f ISO-8859-15 de_DE@euro
localedef -i de_DE -f UTF-8 de_DE.UTF-8
localedef -i el_GR -f ISO-8859-7 el_GR
localedef -i en_GB -f ISO-8859-1 en_GB
localedef -i en_GB -f UTF-8 en_GB.UTF-8
localedef -i en_HK -f ISO-8859-1 en_HK
localedef -i en_PH -f ISO-8859-1 en_PH
localedef -i en_US -f ISO-8859-1 en_US
localedef -i en_US -f UTF-8 en_US.UTF-8
localedef -i es_ES -f ISO-8859-15 es_ES@euro
localedef -i es_MX -f ISO-8859-1 es_MX
localedef -i fa_IR -f UTF-8 fa_IR
localedef -i fr_FR -f ISO-8859-1 fr_FR
localedef -i fr_FR@euro -f ISO-8859-15 fr_FR@euro
localedef -i fr_FR -f UTF-8 fr_FR.UTF-8
localedef -i is_IS -f ISO-8859-1 is_IS
localedef -i is_IS -f UTF-8 is_IS.UTF-8
localedef -i it_IT -f ISO-8859-1 it_IT
localedef -i it_IT -f ISO-8859-15 it_IT@euro
localedef -i it_IT -f UTF-8 it_IT.UTF-8
localedef -i ja_JP -f EUC-JP ja_JP
localedef -i ja_JP -f UTF-8 ja_JP.UTF-8
localedef -i nl_NL@euro -f ISO-8859-15 nl_NL@euro
localedef -i ru_RU -f KOI8-R ru_RU.KOI8-R
localedef -i ru_RU -f UTF-8 ru_RU.UTF-8
localedef -i se_NO -f UTF-8 se_NO.UTF-8
localedef -i ta_IN -f UTF-8 ta_IN.UTF-8
localedef -i tr_TR -f UTF-8 tr_TR.UTF-8
localedef -i zh_CN -f GB18030 zh_CN.GB18030
localedef -i zh_HK -f BIG5-HKSCS zh_HK.BIG5-HKSCS
localedef -i zh_TW -f UTF-8 zh_TW.UTF-8
"""

[backup]
files = ["/etc/nsswitch.conf", "/etc/ld.so.conf", "/etc/localtime"]

[install_scripts]
post_install = "ldconfig"
post_upgrade = "ldconfig"
