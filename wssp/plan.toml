name = "wssp"
version = "1.1.1"
release = 1
description = "Wayland Secret Service Provider (WSSP) Daemon"
license = "GPL-3.0-only"
arch = "x86_64"
url = "https://github.com/ming2k/wssp"


build_deps = ['rust']

[[sources]]
type = "http"
url = "https://github.com/ming2k/wssp/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
script = '''
cd source/wssp-${VERSION}
cargo build --release'''

[pipeline.staging]
script = '''
cd source/wssp-${VERSION}
# Install binaries
install -Dm755 target/release/wssp-daemon ${STAGING_DIR}/usr/bin/wssp-daemon
install -Dm755 target/release/wssp-prompter ${STAGING_DIR}/usr/bin/wssp-prompter
install -Dm755 target/release/wssp-cli ${STAGING_DIR}/usr/bin/wssp-cli

# Install PAM module
install -Dm755 target/release/libpam_wssp.so ${STAGING_DIR}/usr/lib/security/pam_wssp.so

# Install systemd unit (user)
install -Dm644 systemd/user/wssp-daemon.service ${STAGING_DIR}/usr/lib/systemd/user/wssp-daemon.service

# Install portal file
install -Dm644 systemd/portals/wssp.portal ${STAGING_DIR}/usr/share/xdg-desktop-portal/portals/wssp.portal'''

[[output]]
runtime_deps = ['libadwaita', 'gtk4', 'linux-pam']
