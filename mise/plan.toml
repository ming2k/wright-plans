[plan]
name = "mise"
version = "2026.3.0"
release = 1
description = "Dev tools, env vars, task runner"
license = "MIT"
arch = "x86_64"
url = "https://github.com/jdx/mise"

[dependencies]
build = ["curl", "rust"]
link = ["openssl"]
[sources]
uris = ["https://github.com/jdx/mise/archive/refs/tags/v${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.compile]
dockyard = "relaxed"
env = { CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target" }
script = """
cd ${BUILD_DIR}
cargo build --release --locked
"""

[lifecycle.package]
script = """
cd ${BUILD_DIR}
install -Dm755 target/release/mise ${PKG_DIR}/usr/bin/mise
"""
