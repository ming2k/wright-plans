name = "x264"
version = "0.165.r3222.b35605a"
release = 1
description = "H.264/AVC encoder library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://code.videolan.org/videolan/x264"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://code.videolan.org/videolan/x264/-/archive/b35605ace3ddf7c1a5d67a2eb553f034aef41d55/x264-b35605ace3ddf7c1a5d67a2eb553f034aef41d55.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/x264-*
./configure --prefix=/usr \
            --enable-shared \
            --disable-static \
            --enable-lto \
            --disable-cli'''

[pipeline.compile]
script = '''
cd source/x264-*
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/x264-*
make DESTDIR=${STAGING_DIR} install'''

