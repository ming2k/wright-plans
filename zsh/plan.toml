[plan]
name = "zsh"
version = "5.9"
release = 2
description = "A powerful shell with advanced scripting capabilities"
license = "MIT"
arch = "x86_64"
url = "https://www.zsh.org/"

[dependencies]
build = ["gcc", "make", "ncurses", "libcap", "gdbm"]
link = ["glibc", "ncurses", "libcap", "gdbm"]

[[sources]]
uri = "https://www.zsh.org/pub/zsh-${PKG_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
CFLAGS="${CFLAGS} -DHAVE_BOOLCODES" \
./configure --prefix=/usr \
  --bindir=/usr/bin \
  --sbindir=/usr/bin \
  --sysconfdir=/etc/zsh \
  --enable-etcdir=/etc/zsh \
  --enable-multibyte \
  --enable-maildir-support \
  --enable-function-subdirs \
  --enable-gdbm \
  --enable-pcre \
  --enable-cap \
  --enable-zsh-secure-free \
  --with-tcsetpgrp \
  --with-term-lib='ncursesw ncurses'
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''


[lifecycle.fabricate]
hooks.post_install = '''
if ! grep -q /usr/bin/zsh /etc/shells 2>/dev/null; then
  echo /usr/bin/zsh >> /etc/shells
fi
'''
hooks.post_upgrade = '''
if ! grep -q /usr/bin/zsh /etc/shells 2>/dev/null; then
  echo /usr/bin/zsh >> /etc/shells
fi
'''
hooks.pre_remove = '''
sed -i '\|/usr/bin/zsh|d' /etc/shells 2>/dev/null || true
'''
