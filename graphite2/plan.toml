name = "graphite2"
version = "1.3.14"
release = 2
description = "Rendering engine for complex non-Roman writing systems"
license = "LGPL-2.1-or-later OR GPL-2.0-or-later OR MPL-2.0"
arch = "x86_64"
url = "https://graphite.sil.org/"

[dependencies]
build = ["gcc", "cmake", "ninja"]

[[sources]]
sha256 = "f99d1c13aa5fa296898a181dff9b82fb25f6cc0933dbaa7a475d8109bd54209d"
url = "https://github.com/silnrsi/graphite/releases/download/1.3.14/graphite2-1.3.14.tgz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "gcc15.patch"

[lifecycle.prepare]
script = '''
cd source
patch -Np1 < ${WORKDIR}/gcc15.patch'''

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=None -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_SKIP_INSTALL_RPATH=ON -DGRAPHITE2_COMPARE_RENDERER=OFF -DGRAPHITE2_VM_TYPE=direct'''

[lifecycle.compile]
script = '''
cd source
cmake --build build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} cmake --install build'''
