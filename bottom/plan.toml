name = "bottom"
version = "0.12.3"
release = 1
description = "Yet another cross-platform graphical process/system monitor"
license = "MIT"
arch = "x86_64"
url = "https://github.com/ClementTsang/bottom"


build_deps = ['rust']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/ClementTsang/bottom/archive/refs/tags/${VERSION}.tar.gz"
extract_to = "source"

[pipeline.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${BUILD_DIR}/.cargo', CARGO_TARGET_DIR = '${BUILD_DIR}/target' }
script = '''
cd source/bottom-${VERSION}
cargo build --release --locked'''

[pipeline.staging]
script = '''
cd source/bottom-${VERSION}
install -Dm755 target/release/btm ${STAGING_DIR}/usr/bin/btm'''

