name = "wayland-utils"
version = "1.3.0"
release = 2
description = "Wayland diagnostic utilities (wayland-info)"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/wayland/wayland-utils"

link_deps = ['glibc']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/wayland/wayland-utils/-/archive/${VERSION}/wayland-utils-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/wayland-utils-${VERSION}
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D drm=enabled'''

[lifecycle.compile]
script = '''
cd source/wayland-utils-${VERSION}
ninja -C build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/wayland-utils-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['wayland', 'glibc']
