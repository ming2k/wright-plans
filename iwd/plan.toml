name = "iwd"
version = "3.12"
release = 1
description = "Intel iNet Wireless Daemon - lightweight wireless daemon"
license = "LGPL-2.1-only"
arch = "x86_64"
url = "https://iwd.wiki.kernel.org/"

[dependencies]
runtime = ["dbus", "ell"]
build = ["dbus", "ell", "gcc", "make"]
link = ["readline"]

[[sources]]
sha256 = "SKIP"
url = "https://www.kernel.org/pub/linux/network/wireless/iwd-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr            \
--sysconfdir=/etc        \
--localstatedir=/var     \
--libexecdir=/usr/lib    \
--enable-external-ell    \
--enable-systemd-service \
--enable-client          \
--enable-monitor         \
--disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''

[hooks]
post_install = '''
groupadd -f netdev 2>/dev/null || true
systemctl daemon-reload 2>/dev/null || true
systemctl enable iwd.service 2>/dev/null || true

'''
post_upgrade = "systemctl daemon-reload 2>/dev/null || true"
