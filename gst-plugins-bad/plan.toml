name = "gst-plugins-bad"
version = "1.28.0"
release = 2
description = "GStreamer Bad Plugins"
license = "LGPL-2.0-or-later"
arch = "x86_64"

link_deps = ['openssl']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "32d825041e5775fc9bf9e8c38e3a5c46c1441eee67f8112572450a9c23c835f0"
url = "https://gstreamer.freedesktop.org/src/gst-plugins-bad/gst-plugins-bad-1.28.0.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gst-plugins-bad-${VERSION}
export PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/share/pkgconfig

# 最终配置：
# -Dsctp=disabled: 修复 GCC 15 编译错误
# -Dintrospection=disabled: 修复缺少依赖 GIR 的错误
# -Dgpl=enabled: 启用必要的 GPL 插件
meson setup build --prefix=/usr --libdir=lib -Dtests=disabled -Ddoc=disabled -Dgpl=enabled -Dsctp=disabled -Dintrospection=disabled'''

[pipeline.compile]
script = '''
cd source/gst-plugins-bad-${VERSION}/build
ninja -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gst-plugins-bad-${VERSION}/build
DESTDIR=${STAGING_DIR} ninja install'''

[[output]]
runtime_deps = ['gst-plugins-base', 'gstreamer', 'openssl']
