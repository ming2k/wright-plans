name = "libinput"
version = "1.31.0"
release = 1
description = "Input device management and event handling library"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/libinput/"

[dependencies]
runtime = ["libevdev", "mtdev"]
build = [
    "libevdev",
    "meson",
    "mtdev",
    "ninja",
]

[[sources]]
uri = "https://gitlab.freedesktop.org/libinput/libinput/-/archive/${VERSION}/libinput-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr           \
--buildtype=release     \
-D documentation=false  \
-D tests=false          \
-D debug-gui=false      \
-D libwacom=false

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"

[lifecycle.fabricate]
