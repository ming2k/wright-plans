name = "libnfnetlink"
version = "1.0.2"
release = 1
description = "Low-level library for netfilter kernel/userspace communication"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.netfilter.org/projects/libnfnetlink/"

[dependencies]
build = ["gcc", "make"]
link = ["glibc"]

[[sources]]
type = "http"
sha256 = "b064c7c3d426efb4786e60a8e6859b82ee2f2c5e49ffeea640cfe4fe33cbc376"
url = "https://www.netfilter.org/projects/libnfnetlink/files/libnfnetlink-${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
