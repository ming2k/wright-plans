name = "libogg"
version = "1.3.6"
release = 1
description = "Ogg bitstream and framing library"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/ogg"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://downloads.xiph.org/releases/ogg/libogg-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
