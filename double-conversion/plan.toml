name = "double-conversion"
version = "3.3.0"
release = 1
description = "Binary-decimal and decimal-binary conversion routines for IEEE doubles"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/google/double-conversion"

[dependencies]
build = ["cmake", "gcc", "ninja"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/google/double-conversion/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
