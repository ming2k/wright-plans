name = "python-yaml"
version = "6.0.3"
release = 1
description = "YAML parser and emitter for Python"
license = "MIT"
arch = "x86_64"
url = "https://pyyaml.org/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/p/pyyaml/pyyaml-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source/python-yaml-${VERSION}
pip3 install --break-system-packages --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

