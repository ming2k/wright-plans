name = "libcap"
version = "2.76"
release = 3
description = "POSIX 1003.1e capabilities userspace interface"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://sites.google.com/site/fullycapable/"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://www.kernel.org/pub/linux/libs/security/linux-privs/libcap2/libcap-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${BUILD_DIR}
sed -i '/install -m.*STA/d' libcap/Makefile

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make prefix=/usr lib=lib SBINDIR=/usr/bin -j$(nproc)

'''

[lifecycle.check]
script = '''
cd ${BUILD_DIR}
make test

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make prefix=/usr lib=lib SBINDIR=/usr/bin DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
