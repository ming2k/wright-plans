name = "libslirp"
version = "4.9.1"
release = 1
description = "User-mode networking library used by QEMU"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/slirp/libslirp"

[dependencies]
build = ["bash", "python", "meson", "ninja", "pkgconf"]
link = ["glib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/slirp/libslirp/-/archive/v${VERSION}/libslirp-v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build --prefix=/usr --buildtype=release -Ddefault_library=shared'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build'''
