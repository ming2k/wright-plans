name = "slirp4netns"
version = "1.3.3"
release = 1
description = "User-mode networking for unprivileged network namespaces"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://github.com/rootless-containers/slirp4netns"

[dependencies]
build = ["autoconf", "automake", "pkgconf"]
link = [
    "glib",
    "libcap",
    "libseccomp",
    "libslirp",
]

[[sources]]
uri = "https://github.com/rootless-containers/slirp4netns/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./autogen.sh
./configure --prefix=/usr

'''

[lifecycle.compile]
script = "make -j$(nproc) -C ${BUILD_DIR}"

[lifecycle.staging]
script = "make DESTDIR=${PART_DIR} install -C ${BUILD_DIR}"
