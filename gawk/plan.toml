name = "gawk"
version = "5.4.0"
release = 1
description = "Programs for manipulating text files"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/gawk/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/gawk/gawk-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source/gawk-${VERSION}
sed -i 's/extras//' Makefile.in'''

[pipeline.configure]
script = '''
cd source/gawk-${VERSION}
./configure --prefix=/usr'''

[pipeline.compile]
script = '''
cd source/gawk-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gawk-${VERSION}
make DESTDIR=${STAGING_DIR} install'''
