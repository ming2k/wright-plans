[plan]
name = "libunwind"
version = "1.8.1"
release = 2
description = "Portable and efficient C programming interface (API) to determine the call-chain of a program"
license = "MIT"
arch = "x86_64"

[dependencies]
build = ["gcc", "make", "pkgconf"]

[[sources]]
uri = "https://github.com/libunwind/libunwind/releases/download/v1.8.1/libunwind-1.8.1.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
# CFLAGS修复:
# -Wno-error: 防止 'unreachable' 重定义警告变成错误
# -std=gnu99: 使用旧标准以获得更好的兼容性
export CFLAGS="$CFLAGS -Wno-error -std=gnu99"

./configure --prefix=/usr --libdir=/usr/lib --disable-static

# 关键修复：修改生成的 Makefile，从 SUBDIRS 中删除 'tests'
# 这样 make 就不会进入 tests 目录编译那些报错的文件了
sed -i 's/ tests//g' Makefile
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
'''
