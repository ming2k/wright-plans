name = "talloc"
version = "2.4.4"
release = 1
description = "Hierarchical memory allocator"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://talloc.samba.org/"

[dependencies]
build = ["docbook-xml", "docbook-xsl", "gcc", "libxslt", "make", "python"]

[[sources]]
sha256 = "55e47994018c13743485544e7206780ffbb3c8495e704a99636503e6e77abf59"
url = "https://download.samba.org/pub/talloc/talloc-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr --disable-python'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
