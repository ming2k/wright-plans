[plan]
name = "python-alabaster"
version = "1.0.0"
release = 1
description = "Light, configurable Sphinx theme"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://alabaster.readthedocs.io/"

[dependencies]
build = ["python", "flit-core"]
runtime = ["python"]

[sources]
uris = ["https://pypi.org/packages/source/a/alabaster/alabaster-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PKG_DIR} --no-build-isolation .
'''
