name = "popt"
version = "1.19"
release = 1
description = "C library for parsing command line parameters"
license = "MIT"
arch = "x86_64"
url = "https://github.com/rpm-software-management/popt"

[dependencies]
link = ["glibc"]

[[sources]]
sha256 = "SKIP"
url = "https://ftp.osuosl.org/pub/rpm/popt/releases/popt-1.x/popt-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc) -C ${WORKDIR}'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install -C ${WORKDIR}'''
