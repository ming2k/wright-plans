name = "v4l-utils"
version = "1.28.1"
release = 1
description = "Userspace tools and libraries for Video4Linux"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"
arch = "x86_64"
url = "https://linuxtv.org/wiki/index.php/V4l-utils"

link_deps = ['systemd', 'elfutils', 'json-c']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://linuxtv.org/downloads/v4l-utils/v4l-utils-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/v4l-utils-${VERSION}
meson setup build \
--prefix=/usr                        \
--buildtype=release                  \
-D gconv=disabled                    \
-D v4l2-tracer=disabled              \
-D qv4l2=disabled                    \
-D qvidcap=disabled                  \
-D bpf=disabled'''

[pipeline.compile]
script = '''
cd source/v4l-utils-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/v4l-utils-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install
if [ -d ${STAGING_DIR}/usr/sbin ]; then
    mv ${STAGING_DIR}/usr/sbin/* ${STAGING_DIR}/usr/bin/
    rmdir ${STAGING_DIR}/usr/sbin
fi'''

[[output]]
runtime_deps = ['systemd', 'elfutils', 'json-c']
