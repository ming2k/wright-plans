name = "go-bootstrap"
version = "1.26.2"
release = 1
description = "Bootstrap Go toolchain used to build Go from source"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://go.dev"

[[sources]]
sha256 = "SKIP"
url = "https://go.dev/dl/go${VERSION}.linux-amd64.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
install -d ${PART_DIR}/usr/lib
cp -a ${WORKDIR} ${PART_DIR}/usr/lib/go-bootstrap
install -d ${PART_DIR}/usr/bin
ln -sf ../lib/go-bootstrap/bin/go ${PART_DIR}/usr/bin/go-bootstrap'''
