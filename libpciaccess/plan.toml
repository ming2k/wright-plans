name = "libpciaccess"
version = "0.18.1"
release = 1
description = "X11 PCI access library"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/xorg/lib/libpciaccess"

link_deps = ['glibc', 'zlib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "4af43444b38adb5545d0ed1c2ce46d9608cc47b31c2387fc5181656765a6fa76"
url = "https://xorg.freedesktop.org/releases/individual/lib/libpciaccess-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libpciaccess-${VERSION}
meson setup build \
    --prefix=/usr \
    --buildtype=release'''

[pipeline.compile]
script = '''
cd source/libpciaccess-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libpciaccess-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['glibc', 'zlib']
