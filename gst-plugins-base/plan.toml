name = "gst-plugins-base"
version = "1.28.2"
release = 1
description = "GStreamer Base Plugins"
license = "LGPL-2.0-or-later"
arch = "x86_64"

link_deps = ['glib', 'wayland']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "4db76b3619280037a4047de7d9dbb38613a4272dcc40efb333257124635a888d"
url = "https://gstreamer.freedesktop.org/src/gst-plugins-base/gst-plugins-base-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/gst-plugins-base-${VERSION}
# 确保能找到 gstreamer-1.0.pc
export PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/share/pkgconfig

meson setup build --prefix=/usr -Dtests=disabled -Ddoc=disabled -Dintrospection=disabled -Dgl=enabled'''

[pipeline.compile]
script = '''
cd source/gst-plugins-base-${VERSION}/build
ninja -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/gst-plugins-base-${VERSION}/build
DESTDIR=${STAGING_DIR} ninja install'''

[[output]]
runtime_deps = ['gstreamer', 'libglvnd', 'libgudev', 'glib', 'wayland']
