name = "python-idna"
version = "3.18"
release = 1
description = "Internationalized Domain Names in Applications (IDNA)"
license = "BSD-3-Clause"
arch = "any"
url = "https://github.com/kjd/idna"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "ffb385a7e039654cef1ab9ef32c6fafe283c0c0467bba1d9029738ce4a14a848"
url = "https://pypi.org/packages/source/i/idna/idna-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/idna-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
