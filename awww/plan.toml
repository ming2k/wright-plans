name = "awww"
version = "0.11.2"
release = 1
description = "An Answer to your Wayland Wallpaper Woes"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://codeberg.org/LGFae/awww"

link_deps = ['lz4', 'wayland']
build_deps = ['wayland-protocols', 'rust']

[[sources]]
type = "http"
sha256 = "0bd1d3a7461b1bc0b99f49aa64ce01d3e84412c5afd6534a1221c4aa3341ccd6"
url = "https://codeberg.org/LGFae/awww/archive/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.compile]
isolation = "relaxed"
env = { CARGO_HOME = '${BUILD_DIR}/.cargo', CARGO_TARGET_DIR = '${BUILD_DIR}/target' }
script = '''
cd source
cargo build --release --locked'''

[lifecycle.staging]
script = '''
cd source
install -Dm755 target/release/swww ${STAGING_DIR}/usr/bin/swww
install -Dm755 target/release/swww-daemon ${STAGING_DIR}/usr/bin/swww-daemon

install -Dm644 completions/swww.bash ${STAGING_DIR}/usr/share/bash-completion/completions/swww
install -Dm644 completions/swww.fish ${STAGING_DIR}/usr/share/fish/vendor_completions.d/swww.fish
install -Dm644 completions/_swww ${STAGING_DIR}/usr/share/zsh/site-functions/_swww'''

[[output]]
runtime_deps = ['lz4', 'wayland']
