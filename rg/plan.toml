[plan]
name = "rg"
version = "15.1.0"
release = 1
description = "Fast line-oriented regex search tool (ripgrep)"
license = "MIT OR Unlicense"
arch = "x86_64"
url = "https://github.com/BurntSushi/ripgrep"

[dependencies]
build = ["rust"]
runtime = ["pcre2"]
link = ["gcc", "pcre2", "glibc"]

[sources]
uris = ["https://github.com/BurntSushi/ripgrep/archive/refs/tags/${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
cargo build --release --locked --features pcre2
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/rg ${PKG_DIR}/usr/bin/rg

# Install man page and shell completions if generated by this release.
if [ -f doc/rg.1 ]; then
  install -Dm644 doc/rg.1 ${PKG_DIR}/usr/share/man/man1/rg.1
fi
if [ -d complete ]; then
  install -Dm644 complete/rg.bash ${PKG_DIR}/usr/share/bash-completion/completions/rg || true
  install -Dm644 complete/_rg ${PKG_DIR}/usr/share/zsh/site-functions/_rg || true
  install -Dm644 complete/rg.fish ${PKG_DIR}/usr/share/fish/vendor_completions.d/rg.fish || true
fi
'''
