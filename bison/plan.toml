name = "bison"
version = "3.8.2"
release = 1
description = "Parser generator"
license = "GPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/bison/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/bison/bison-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/bison-${VERSION}
./configure --prefix=/usr --docdir=/usr/share/doc/bison-${VERSION}'''

[lifecycle.compile]
script = '''
cd source/bison-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/bison-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

