name = "python-pluggy"
version = "1.6.0"
release = 1
description = "Plugin and hook calling mechanisms for Python"
license = "MIT"
arch = "x86_64"
url = "https://github.com/pytest-dev/pluggy"

[dependencies]
runtime = ["python"]
build = ["python", "setuptools"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/p/pluggy/pluggy-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.staging]
script = '''
cd source
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .'''
