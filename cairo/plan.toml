name = "cairo"
version = "1.18.4"
release = 1
description = "Multi-platform 2D graphics library (X11 backends disabled)"
license = "LGPL-2.1-only OR MPL-1.1"
arch = "x86_64"
url = "https://cairographics.org/"

link_deps = ['pixman', 'libpng', 'fontconfig', 'freetype', 'glib', 'zlib']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "445ed8208a6e4823de1226a74ca319d3600e83f6369f99b14265006599c32ccb"
url = "https://cairographics.org/releases/cairo-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/cairo-${VERSION}
meson setup build \
    --prefix=/usr            \
    --buildtype=release      \
    --wrap-mode=nofallback   \
    -Ddefault_library=shared \
    -Dpng=enabled            \
    -Dzlib=enabled           \
    -Dfontconfig=enabled     \
    -Dfreetype=enabled       \
    -Dglib=enabled           \
    -Dxcb=disabled           \
    -Dxlib=disabled          \
    -Dxlib-xcb=disabled      \
    -Dtests=disabled         \
    -Dsymbol-lookup=disabled \
    -Dspectre=disabled       \
    -Dlzo=disabled'''

[pipeline.compile]
script = "cd source/cairo-${VERSION} && meson compile -C build"

[pipeline.staging]
script = "cd source/cairo-${VERSION} && meson install -C build --destdir ${STAGING_DIR}"

[[output]]
runtime_deps = ['pixman', 'libpng', 'fontconfig', 'freetype', 'glib', 'zlib']
