name = "openssl"
version = "3.6.2"
release = 1
description = "Management tools and libraries relating to cryptography"
license = "Apache-2.0"
arch = "x86_64"
url = "https://www.openssl.org/"

build_deps = ['perl']
link_deps = ['zlib']

[[sources]]
type = "http"
sha256 = "aaf51a1fe064384f811daeaeb4ec4dce7340ec8bd893027eee676af31e83a04f"
url = "https://github.com/openssl/openssl/releases/download/openssl-${VERSION}/openssl-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/openssl-${VERSION}
./Configure linux-x86_64       \
         --prefix=/usr         \
         --openssldir=/etc/ssl \
         --libdir=lib          \
         shared                \
         zlib-dynamic'''

[pipeline.compile]
script = '''
cd source/openssl-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/openssl-${VERSION}
sed -i '/INSTALL_LIBS/s/libcrypto.a libssl.a//' Makefile
make MANSUFFIX=ssl DESTDIR=${STAGING_DIR} install
mv -v ${STAGING_DIR}/usr/share/doc/openssl ${STAGING_DIR}/usr/share/doc/openssl-${VERSION}'''

[[output]]
name = "openssl"
runtime_deps = ['zlib']

[output.hooks]
post_upgrade = '''
# Critical: after upgrading OpenSSL, rebuild all reverse dependencies
# to ensure binaries link against the new soname. Run:
#   wright rebuild --reverse-deps openssl
# See /var/lib/wright/plans/README.md for core library upgrade guidelines.
'''
