name = "libass"
version = "0.17.4"
release = 1
description = "Portable subtitle renderer for ASS/SSA subtitle format"
license = "ISC"
arch = "x86_64"
url = "https://github.com/libass/libass"

[dependencies]
build = ["gcc", "make", "pkgconf"]
link = [
    "freetype",
    "fribidi",
    "harfbuzz",
    "fontconfig",
]

[[sources]]
uri = "https://github.com/libass/libass/releases/download/${PART_VERSION}/libass-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
