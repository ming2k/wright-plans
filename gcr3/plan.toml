name = "gcr3"
version = "3.41.2"
release = 1
description = "Crypto services and certificate UI library for GNOME 3 consumers"
license = "LGPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.gnome.org/GNOME/gcr"

[dependencies]
runtime = ["libsecret", "p11-kit"]
build = [
    "gettext",
    "gobject-introspection",
    "libxslt",
    "meson",
    "ninja",
    "pkgconf",
    "vala",
]
link = [
    "dbus",
    "glib",
    "gtk3",
    "libgcrypt",
    "p11-kit",
]

[[sources]]
uri = "https://download.gnome.org/sources/gcr/3.41/gcr-${VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dgtk_doc=false -Dintrospection=true

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
meson compile -C build

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
meson install -C build --destdir ${PART_DIR}

'''

[lifecycle.fabricate]
