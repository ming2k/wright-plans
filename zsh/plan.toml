[plan]
name = "zsh"
version = "5.9"
release = 1
description = "A powerful shell with advanced scripting capabilities"
license = "MIT"
arch = "x86_64"
url = "https://www.zsh.org/"

[dependencies]
build = ["gcc", "make", "ncurses", "pcre2"]
link = ["glibc", "ncurses", "pcre2"]

[sources]
uris = ["https://downloads.sourceforge.net/project/zsh/zsh/${PKG_VERSION}/zsh-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
CFLAGS="${CFLAGS} -DHAVE_BOOLCODES" \
./configure --prefix=/usr \
  --bindir=/usr/bin \
  --sbindir=/usr/bin \
  --sysconfdir=/etc/zsh \
  --enable-etcdir=/etc/zsh \
  --enable-multibyte \
  --enable-pcre \
  --enable-cap \
  --enable-zsh-secure-free \
  --with-tcsetpgrp
'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)
'''

[lifecycle.package]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install

# Register zsh as a valid login shell
install -d ${PKG_DIR}/etc
grep -q /usr/bin/zsh ${PKG_DIR}/etc/shells 2>/dev/null || {
  install -Dm644 /dev/stdin ${PKG_DIR}/usr/share/zsh/shells.entry << 'EOF'
/usr/bin/zsh
EOF
}
'''

[install_scripts]
post_install = '''
if ! grep -q /usr/bin/zsh /etc/shells 2>/dev/null; then
  echo /usr/bin/zsh >> /etc/shells
fi
'''
