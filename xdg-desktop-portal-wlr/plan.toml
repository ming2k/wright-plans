name = "xdg-desktop-portal-wlr"
version = "0.7.1"
release = 1
description = "XDG Desktop Portal backend for wlroots-based Wayland compositors (including niri)"
license = "MIT"
arch = "x86_64"
url = "https://github.com/emersion/xdg-desktop-portal-wlr"

[dependencies]
runtime = ["xdg-desktop-portal", "pipewire"]
build = ["meson", "ninja", "pkgconf", "scdoc"]
link = ["pipewire", "wayland", "inih"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/emersion/xdg-desktop-portal-wlr/releases/download/v${VERSION}/xdg-desktop-portal-wlr-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
  --prefix=/usr \
  --sysconfdir=/etc \
  --buildtype=release \
  -Dsd-bus-provider=libsystemd \
  -Dman-pages=enabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C build install'''
