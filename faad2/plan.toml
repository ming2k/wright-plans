name = "faad2"
version = "2.11.2"
release = 1
description = "ISO AAC audio decoder"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://github.com/knik0/faad2"

link_deps = ['libsndfile']
build_deps = ['cmake']

[[sources]]
type = "http"
url = "https://github.com/knik0/faad2/archive/refs/tags/${VERSION}.tar.gz"
sha256 = "3fcbd305e4abd34768c62050e18ca0986f7d9c5eca343fb98275418013065c0e"
extract_to = "source"

[pipeline.configure]
script = '''
mkdir -p ${WORKDIR}/build
cd source/faad2-${VERSION}/build
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_SHARED_LIBS=ON'''

[pipeline.compile]
script = '''
cd source/faad2-${VERSION}/build
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/faad2-${VERSION}/build
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['libsndfile']
