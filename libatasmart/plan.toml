name = "libatasmart"
version = "0.19"
release = 1
description = "ATA S.M.A.R.T. reading and parsing library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "http://0pointer.de/blog/projects/being-smart.html"

link_deps = ['systemd']
build_deps = ['autoconf', 'automake', 'libtool']

[[sources]]
type = "http"
sha256 = "61f0ea345f63d28ab2ff0dc352c22271661b66bf09642db3a4049ac9dbdb0f8d"
url = "http://0pointer.de/public/libatasmart-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libatasmart-${VERSION}
autoreconf -fi
./configure --prefix=/usr --sbindir=/usr/bin --disable-static'''

[pipeline.compile]
script = '''
cd source/libatasmart-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libatasmart-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['systemd']
