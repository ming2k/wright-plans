name = "mbedtls"
version = "3.6.4"
release = 1
description = "Portable cryptographic and TLS library"
license = "Apache-2.0"
arch = "x86_64"
url = "https://www.trustedfirmware.org/projects/mbed-tls/"


build_deps = ['ninja', 'cmake']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-${VERSION}/mbedtls-${VERSION}.tar.bz2"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/mbedtls-${VERSION}
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DUSE_SHARED_MBEDTLS_LIBRARY=ON \
    -DUSE_STATIC_MBEDTLS_LIBRARY=OFF \
    -DENABLE_PROGRAMS=OFF \
    -DENABLE_TESTING=OFF'''

[pipeline.compile]
script = '''
cd source/mbedtls-${VERSION}
ninja -j$(nproc) -C ${WORKDIR}/build'''

[pipeline.staging]
script = '''
cd source/mbedtls-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C ${WORKDIR}/build install'''

