[plan]
name = "libsecret"
version = "0.21.6"
release = 1
description = "Library for storing and retrieving passwords and other secrets"
license = "LGPL-2.1-or-later"
arch = "x86_64"

[dependencies]
build = ["gettext", "glib", "gobject-introspection", "meson", "ninja", "pkgconf"]
link = ["glib", "libgcrypt"]

[[sources]]
uri = "https://download.gnome.org/sources/libsecret/0.21/libsecret-${PART_VERSION}.tar.xz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
meson setup build --prefix=/usr --buildtype=release -Dvapi=false -Dgtk_doc=false -Dmanpage=false -Dcrypto=libgcrypt
'''

[lifecycle.compile]
script = "meson compile -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} meson install -C ${BUILD_DIR}/build"
