name = "rnnoise"
version = "0.2"
release = 1
description = "Recurrent neural network for audio noise reduction"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/xiph/rnnoise"

[dependencies]
build = ["gcc", "make", "autoconf", "automake", "libtool"]

[[sources]]
uri = "https://github.com/xiph/rnnoise/archive/refs/tags/v${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://media.xiph.org/rnnoise/models/rnnoise_data-0b50c45.tar.gz"
sha256 = "SKIP"

[lifecycle.prepare]
script = '''
cd ${SRC_DIR}/rnnoise-${PART_VERSION}
cp ${SRC_DIR}/src/rnnoise_data* src/
autoreconf -fi

'''

[lifecycle.configure]
script = '''
cd ${SRC_DIR}/rnnoise-${PART_VERSION}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${SRC_DIR}/rnnoise-${PART_VERSION}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${SRC_DIR}/rnnoise-${PART_VERSION}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
