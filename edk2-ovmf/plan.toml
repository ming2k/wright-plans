name = "edk2-ovmf"
version = "202602"
release = 1
description = "OVMF UEFI firmware images for QEMU virtual machines"
license = "BSD-2-Clause-Patent"
arch = "x86_64"
url = "https://github.com/tianocore/edk2"

[dependencies]
build = [
    "acpica",
    "bash",
    "gcc",
    "make",
    "nasm",
    "python",
    "util-linux",
]

[[sources]]
uri = "https://github.com/tianocore/edk2/archive/refs/tags/edk2-stable202602.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/google/brotli/archive/e230f474b87134e8c6c85b630084c612057f253e.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/openssl/openssl/archive/aea7aaf2abb04789f5868cbabec406ea43aa84bf.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/kkos/oniguruma/archive/4ef89209a239c1aea328cf13c05a2807e5c146d1.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/akheron/jansson/archive/e9ebfa7e77a6bee77df44e096b100e7131044059.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/devicetree-org/pylibfdt/archive/cfff805481bdea27f900c32698171286542b8d3c.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/MIPI-Alliance/public-mipi-sys-t/archive/370b5944c046bab043dd8b133727b2135af7747a.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/ARMmbed/mbedtls/archive/e185d7fd85499c8ce5ca2a54f5cf8fe7dbe3f8df.tar.gz"
sha256 = "SKIP"

[[sources]]
uri = "https://github.com/DMTF/libspdm/archive/1be116c7b7713fa9003e1bd53b53a34758549eb9.tar.gz"
sha256 = "SKIP"

[options]
timeout = 14400

[lifecycle.compile]
script = '''
src_root=${BUILD_DIR}
edk2_dir=$(find "${src_root}" -maxdepth 1 -mindepth 1 -type d -name 'edk2-*' | head -n1)
if [ -z "${edk2_dir}" ]; then
    echo "ERROR: edk2 source directory not found" >&2
    exit 1
fi
cd "${edk2_dir}"

# Helper to find an extracted source dir and place it as a submodule
place_submodule() {
    local pattern="$1"
    local target="$2"
    local src_dir
    src_dir=$(find "${src_root}" -maxdepth 1 -mindepth 1 -type d -name "${pattern}" | head -n1)
    if [ -z "${src_dir}" ]; then
        echo "ERROR: source directory matching '${pattern}' not found" >&2
        exit 1
    fi
    rm -rf "${target}"
    mkdir -p "${target}"
    cp -a "${src_dir}/." "${target}/"
}

# Place all submodules
place_submodule 'brotli-*' BaseTools/Source/C/BrotliCompress/brotli
place_submodule 'brotli-*' MdeModulePkg/Library/BrotliCustomDecompressLib/brotli
place_submodule 'openssl-*' CryptoPkg/Library/OpensslLib/openssl
place_submodule 'oniguruma-*' MdeModulePkg/Universal/RegularExpressionDxe/oniguruma
place_submodule 'jansson-*' RedfishPkg/Library/JsonLib/jansson
place_submodule 'pylibfdt-*' MdePkg/Library/BaseFdtLib/libfdt
place_submodule 'public-mipi-sys-t-*' MdePkg/Library/MipiSysTLib/mipisyst
place_submodule 'mbedtls-*' CryptoPkg/Library/MbedTlsLib/mbedtls
place_submodule 'libspdm-*' SecurityPkg/DeviceSecurity/SpdmLib/libspdm

export WORKSPACE=${edk2_dir}
export PACKAGES_PATH=${edk2_dir}
export EDK_TOOLS_PATH=${edk2_dir}/BaseTools
export PYTHON_COMMAND=/usr/bin/python3
make -C BaseTools -j1 EXTRA_OPTFLAGS='-Wno-error=vla-parameter'
. ./edksetup.sh --reconfig
build -a X64 -b RELEASE -t GCC5 -p OvmfPkg/OvmfPkgX64.dsc -D TPM2_ENABLE
cp -av Build/OvmfX64/RELEASE_GCC5/FV/OVMF_CODE.fd OVMF_CODE.fd
cp -av Build/OvmfX64/RELEASE_GCC5/FV/OVMF_VARS.fd OVMF_VARS.fd
build -a X64 -b RELEASE -t GCC5 -p OvmfPkg/OvmfPkgX64.dsc -D TPM2_ENABLE -D SECURE_BOOT_ENABLE -D SMM_REQUIRE -D FD_SIZE_4MB
cp -av Build/OvmfX64/RELEASE_GCC5/FV/OVMF_CODE.fd OVMF_CODE.secboot.4m.fd
cp -av Build/OvmfX64/RELEASE_GCC5/FV/OVMF_VARS.fd OVMF_VARS.4m.fd

'''

[lifecycle.staging]
script = '''
edk2_dir=$(find "${BUILD_DIR}" -maxdepth 1 -mindepth 1 -type d -name 'edk2-*' | head -n1)
cd "${edk2_dir}"
install -Dm644 OVMF_CODE.fd ${PART_DIR}/usr/share/edk2/x64/OVMF_CODE.fd
install -Dm644 OVMF_VARS.fd ${PART_DIR}/usr/share/edk2/x64/OVMF_VARS.fd
install -Dm644 OVMF_CODE.secboot.4m.fd ${PART_DIR}/usr/share/edk2/x64/OVMF_CODE.secboot.4m.fd
install -Dm644 OVMF_VARS.4m.fd ${PART_DIR}/usr/share/edk2/x64/OVMF_VARS.4m.fd

'''

[lifecycle.fabricate]
