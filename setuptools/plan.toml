name = "setuptools"
version = "80.9.0"
release = 1
description = "Python package development process library"
license = "MIT"
arch = "x86_64"
url = "https://setuptools.pypa.io/"

[dependencies]
build = ["python", "wheel"]

[[sources]]
uri = "https://pypi.org/packages/source/s/setuptools/setuptools-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
pip3 install --no-index --no-user --no-deps --root=${PART_DIR} --no-build-isolation .

'''
