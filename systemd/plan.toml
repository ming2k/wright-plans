name = "systemd"
version = "260.1"
release = 5
description = "System and Service Manager"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/systemd/systemd"

[dependencies]
build = ["gcc", "gperf", "llvm", "python-jinja2", "meson", "ninja", "pkgconf", "python"]
link = ["acl", "cryptsetup", "glibc", "libcap", "libgcrypt", "libidn2", "libseccomp", "libxcrypt", "linux-pam", "lz4", "openssl", "p11-kit", "pcre2", "tpm2-tss", "util-linux", "xz", "zstd"]
runtime = ["acl", "bash", "cryptsetup", "dbus", "glibc", "hwdata", "kbd", "kmod", "libcap", "libgcrypt", "libidn2", "libseccomp", "libxcrypt", "linux-pam", "lz4", "openssl", "p11-kit", "pcre2", "tpm2-tss", "util-linux", "xz", "zstd"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/systemd/systemd/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "90-theseus.preset"

[[sources]]
sha256 = "SKIP"
type = "local"
path = "network-wait-online.conf"

[lifecycle.prepare]
script = '''
cd source
sed -i -e 's/GROUP="render"/GROUP="video"/' \
       -e 's/GROUP="sgx", //' \
       rules.d/50-udev-default.rules.in'''

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -D libdir=lib \
    -D split-bin=false \
    -D dbuspolicydir=/usr/share/dbus-1/system.d \
    -D pamconfdir=/usr/lib/pam.d \
    -D docdir=/usr/share/doc/systemd-${VERSION} \
    -D version-tag="${VERSION}-theseus" \
    -D vcs-tag=false \
    -D shared-lib-tag="${VERSION}" \
    -D mode=release \
    -D install-tests=false \
    -D ldconfig=false \
    -D man=disabled \
    -D rpmmacrosdir=no \
    -D sysvinit-path= \
    -D sysvrcnd-path= \
    -D firstboot=true \
    -D sysusers=true \
    -D pam=enabled \
    -D logind=true \
    -D networkd=true \
    -D resolve=true \
    -D seccomp=enabled \
    -D libidn2=enabled \
    -D lz4=enabled \
    -D dns-over-tls=openssl \
    -D tpm2=enabled \
    -D bootloader=enabled \
    -D homed=disabled \
    -D sysupdate=disabled \
    -D audit=disabled \
    -D selinux=disabled \
    -D default-dnssec=no \
    -D default-kill-user-processes=false \
    -D default-locale='C.UTF-8' \
    -D fallback-hostname='theseus' \
    -D nologin-path=/usr/bin/nologin \
    -D dev-kvm-mode=0660 \
    -D nobody-group=nogroup \
    -D sbat-distro=theseus \
    -D sbat-distro-pkgname=systemd \
    -D sbat-distro-url=https://github.com/ming2k/wright'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install

# Preset only the services we opt into.
install -Dm644 ${WORKDIR}/90-theseus.preset ${PART_DIR}/usr/lib/systemd/system-preset/90-theseus.preset

# wait-online: single-NIC laptop policy — any interface online is enough,
# and cap the wait at 20s so a missing secondary link never pins boot.
install -Dm644 ${WORKDIR}/network-wait-online.conf \
    ${PART_DIR}/usr/lib/systemd/system/systemd-networkd-wait-online.service.d/10-theseus.conf'''

[output]
backup = ["/etc/issue", "/etc/locale.conf", "/etc/nsswitch.conf", "/etc/vconsole.conf", "/etc/systemd/coredump.conf", "/etc/systemd/journald.conf", "/etc/systemd/logind.conf", "/etc/systemd/networkd.conf", "/etc/systemd/oomd.conf", "/etc/systemd/resolved.conf", "/etc/systemd/sleep.conf", "/etc/systemd/system.conf", "/etc/systemd/timesyncd.conf", "/etc/systemd/user.conf", "/etc/udev/iocost.conf", "/etc/udev/udev.conf"]

[hooks]
post_install = '''
ldconfig 2>/dev/null || true
systemd-machine-id-setup 2>/dev/null || true
systemctl preset-all 2>/dev/null || true
systemctl daemon-reexec 2>/dev/null || true

'''
post_upgrade = '''
ldconfig 2>/dev/null || true
systemctl daemon-reexec 2>/dev/null || true

'''
