name = "dbus"
version = "1.16.2"
release = 4
description = "D-Bus message bus system"
license = "AFL-2.1 OR GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/dbus/"

link_deps = ['expat', 'systemd', 'glibc']
build_deps = ['meson', 'ninja']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://dbus.freedesktop.org/releases/dbus/dbus-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/dbus-${VERSION}
mkdir -p build
cd build
meson setup --prefix=/usr \
    --sysconfdir=/etc \
    --localstatedir=/var \
    --buildtype=release \
    --wrap-mode=nofallback \
    -Dapparmor=disabled \
    -Dkqueue=disabled \
    -Dlaunchd=disabled \
    -Drelocation=disabled \
    -Dselinux=disabled \
    -Dsystemd=enabled \
    -Dx11_autolaunch=disabled \
    -Druntime_dir=/run \
    -Dmodular_tests=disabled \
    ..'''

[pipeline.compile]
script = '''
cd source/dbus-${VERSION}/build
ninja'''

[pipeline.staging]
script = '''
cd source/dbus-${VERSION}/build
DESTDIR=${STAGING_DIR} ninja install

# Symlink so D-Bus and systemd share machine-id
ln -sfv /etc/machine-id ${STAGING_DIR}/var/lib/dbus

# Set dbus-daemon-launch-helper setuid root:messagebus in the package.
# Use GID 18 directly so this works even when the messagebus group
# doesn't exist in the build environment.
chown 0:18 ${STAGING_DIR}/usr/libexec/dbus-daemon-launch-helper
chmod 4750 ${STAGING_DIR}/usr/libexec/dbus-daemon-launch-helper'''

# D-Bus outputs: libdbus library split out; rest stays in dbus catch-all
[[output]]
name = "libdbus"
description = "D-Bus low-level shared library"
runtime_deps = ['expat', 'glibc']
include = [
    "/usr/lib/libdbus-1.so*",
    "/usr/lib/libdbus-1.a",
    "/usr/lib/pkgconfig/dbus-1.pc",
    "/usr/include/dbus-1.0/**",
    "/usr/lib/cmake/dbus-1/**",
]

[[output]]
name = "dbus"
runtime_deps = ['dbus:libdbus', 'systemd', 'glibc']
# catch-all — daemon, configs, tools, etc.
hooks.post_install = '''
if [ -f /usr/libexec/dbus-daemon-launch-helper ]; then
    chown root:messagebus /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
    chmod 4750 /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
fi

'''
hooks.post_upgrade = '''
if [ -f /usr/libexec/dbus-daemon-launch-helper ]; then
    chown root:messagebus /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
    chmod 4750 /usr/libexec/dbus-daemon-launch-helper 2>/dev/null || true
fi

'''
