name = "libevent"
version = "2.1.12-stable"
release = 1
description = "An event notification library for developing asynchronous applications"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://libevent.org/"

[dependencies]
build = ["gcc", "make"]
link = ["openssl"]

[[sources]]
uri = "https://github.com/libevent/libevent/releases/download/release-${PART_VERSION}/libevent-${PART_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''
