name = "vulkan-loader"
version = "1.4.343"
release = 2
description = "Vulkan Loader (Wayland Only)"
license = "Apache-2.0"
arch = "x86_64"

[dependencies]
build = ["cmake", "ninja", "vulkan-headers", "python"]
link = ["glibc", "wayland"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://github.com/KhronosGroup/Vulkan-Loader/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DVULKAN_HEADERS_INSTALL_DIR=/usr -DBUILD_WSI_XCB_SUPPORT=OFF -DBUILD_WSI_XLIB_SUPPORT=OFF -DBUILD_WSI_WAYLAND_SUPPORT=ON'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[output]
provides = ["vulkan-icd-loader"]
