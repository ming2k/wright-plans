name = "automake"
version = "1.18.1"
release = 1
description = "Programs for generating Makefiles for use with Autoconf"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/automake/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/automake/automake-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/automake-${VERSION}
./configure --prefix=/usr --docdir=/usr/share/doc/automake-${VERSION}'''

[pipeline.compile]
script = '''
cd source/automake-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/automake-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

