name = "cargo-c"
version = "0.10.20"
release = 1
description = "Helper to build and install C-ABI compatible dynamic and static libraries from Rust"
license = "MIT"
arch = "x86_64"
url = "https://github.com/lu-zero/cargo-c"

[dependencies]
build = ["rust", "pkgconf"]
link = ["openssl"]

[[sources]]
uri = "https://github.com/lu-zero/cargo-c/archive/refs/tags/v${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.compile]
dockyard = "relaxed"
env = { CARGO_HOME = "${BUILD_DIR}/.cargo", CARGO_TARGET_DIR = "${BUILD_DIR}/target" }
script = '''
cd ${BUILD_DIR}
LIBGIT2_NO_PKG_CONFIG=1 cargo build --release

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
install -Dm755 target/release/cargo-cbuild   ${PART_DIR}/usr/bin/cargo-cbuild
install -Dm755 target/release/cargo-cinstall ${PART_DIR}/usr/bin/cargo-cinstall
install -Dm755 target/release/cargo-capi     ${PART_DIR}/usr/bin/cargo-capi
install -Dm755 target/release/cargo-ctest    ${PART_DIR}/usr/bin/cargo-ctest

'''

[lifecycle.fabricate]
