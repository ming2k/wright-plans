name = "linux-api-headers"
version = "6.18.15"
release = 1
description = "Sanitized Linux kernel headers for userspace"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://www.kernel.org"

[dependencies]
build = ["make", "zlib"]

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo preparing linux-api-headers'''

[lifecycle.compile]
script = '''
cd source
echo no compile stage for linux-api-headers'''

[lifecycle.staging]
script = '''
cd source
make mrproper
make headers
find usr/include -name '.*' -delete
rm -f usr/include/Makefile
install -d ${PART_DIR}/usr
cp -a usr/include ${PART_DIR}/usr/
# Remove any stray files that leak into ${PART_DIR}
find ${PART_DIR} -maxdepth 2 -name '*.pl' -delete'''
