name = "usbutils"
version = "019"
release = 1
description = "USB device utilities including lsusb"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://github.com/gregkh/usbutils"

[dependencies]
build = ["gcc", "meson", "ninja", "pkgconf"]
link = ["glibc", "libusb", "systemd"]
runtime = ["hwdata"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/gregkh/usbutils/archive/v${VERSION}/usbutils-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup build \
    --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
meson compile -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} meson install -C ${WORKDIR}/build'''
