name = "python-ply"
version = "3.11"
release = 1
description = "Python Lex-Yacc parsing tool"
license = "BSD-3-Clause"
arch = "any"
url = "https://www.dabeaz.com/ply/"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://files.pythonhosted.org/packages/source/p/ply/ply-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/ply-${VERSION}
pip3 install --no-index --no-user --no-deps --ignore-installed --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
