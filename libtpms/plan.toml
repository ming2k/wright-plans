name = "libtpms"
version = "0.10.2"
release = 1
description = "Trusted Platform Module library for virtual machines"
license = "BSD-3-Clause"
arch = "x86_64"
url = "https://github.com/stefanberger/libtpms"

[dependencies]
build = ["autoconf", "automake", "bash", "gcc", "libtool", "make", "pkgconf"]
link = ["openssl"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/stefanberger/libtpms/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./autogen.sh
./configure --prefix=/usr --disable-static --with-openssl CFLAGS="${CFLAGS:--O2} -Wno-error=discarded-qualifiers"'''

[lifecycle.compile]
script = '''
cd source
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
