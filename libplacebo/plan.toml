name = "libplacebo"
version = "7.360.0"
release = 1
description = "Reusable library for GPU-accelerated image/video processing"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/haasn/libplacebo"

[dependencies]
build = ["meson", "ninja", "pkgconf"]
link = ["glslang", "lcms2", "shaderc", "spirv-cross", "vulkan-loader", "vulkan-headers"]

[[sources]]
sha256 = "SKIP"
url = "https://code.videolan.org/videolan/libplacebo/-/archive/v${VERSION}/libplacebo-v${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
--prefix=/usr \
--buildtype=release \
-D demos=false \
-D tests=false \
-D glslang=enabled \
-D shaderc=enabled \
-D vulkan=enabled \
-D lcms=enabled \
-D opengl=disabled'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''
