name = "shared-mime-info"
version = "2.4"
release = 1
description = "Shared MIME info database"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/xdg/shared-mime-info"

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://gitlab.freedesktop.org/xdg/shared-mime-info/-/archive/${VERSION}/shared-mime-info-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
meson setup ${WORKDIR}/build ${WORKDIR} \
    --prefix=/usr          \
    --buildtype=release    \
    -D update-mimedb=false'''

[lifecycle.compile]
script = '''
cd source
ninja -C ${WORKDIR}/build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${PART_DIR} ninja -C ${WORKDIR}/build install'''

[hooks]
post_install = "update-mime-database /usr/share/mime 2>/dev/null || true"
post_upgrade = "update-mime-database /usr/share/mime 2>/dev/null || true"
