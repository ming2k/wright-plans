name = "libpciaccess"
version = "0.18.1"
release = 1
description = "X11 PCI access library"
license = "MIT"
arch = "x86_64"
url = "https://gitlab.freedesktop.org/xorg/lib/libpciaccess"

[dependencies]
build = ["meson", "ninja"]
link = ["glibc", "zlib"]

[[sources]]
uri = "https://xorg.freedesktop.org/releases/individual/lib/libpciaccess-${PART_VERSION}.tar.xz"
sha256 = "4af43444b38adb5545d0ed1c2ce46d9608cc47b31c2387fc5181656765a6fa76"

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
    --prefix=/usr \
    --buildtype=release

'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.staging]
script = "DESTDIR=${PART_DIR} ninja -C ${BUILD_DIR}/build install"
