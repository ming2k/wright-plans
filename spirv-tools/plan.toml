name = "spirv-tools"
version = "2026.1"
release = 1
description = "API and commands for processing SPIR-V modules"
license = "Apache-2.0"
arch = "x86_64"


build_deps = ['cmake', 'ninja']

[[sources]]
type = "http"
sha256 = "35dc16cf2dc64be5b6bbbe86d210e6f4a82b070cffd751605a3365cd8bce2d7e"
url = "https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/SPIRV-Tools-${VERSION}
cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib -DSPIRV_WERROR=OFF -DSPIRV-Headers_SOURCE_DIR=/usr -DSPIRV_SKIP_TESTS=ON'''

[pipeline.compile]
script = '''
cd source/SPIRV-Tools-${VERSION}
cmake --build build'''

[pipeline.staging]
script = '''
cd source/SPIRV-Tools-${VERSION}
DESTDIR=${STAGING_DIR} cmake --install build'''

[[output]]
provides = ["spirv-opt"]

