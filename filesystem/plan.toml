[plan]
name = "filesystem"
version = "1.0"
release = 1
description = "Base FHS directory skeleton and essential system files"
license = "MIT"
arch = "x86_64"

[[sources]]
uri = "os-release"
sha256 = "SKIP"

[[sources]]
uri = "shells"
sha256 = "SKIP"

[[sources]]
uri = "profile"
sha256 = "SKIP"

[options]
skip_fhs_check = true

[lifecycle.staging]
backup = ["/etc/shells", "/etc/profile"]
script = '''
# --- FHS directory skeleton ---
install -d -m 0700 ${PKG_DIR}/boot
install -d -m 0755 ${PKG_DIR}/etc
install -d -m 0755 ${PKG_DIR}/{usr,usr/bin,usr/lib,usr/share}
install -d -m 0755 ${PKG_DIR}/usr/share/man/man{1,2,3,4,5,6,7,8}
install -d -m 0755 ${PKG_DIR}/{var,var/cache,var/lib,var/log}
install -d -m 0750 ${PKG_DIR}/root
install -d -m 1777 ${PKG_DIR}/tmp
install -d -m 1777 ${PKG_DIR}/var/tmp

# usr-merge: top-level symlinks into /usr
ln -s usr/bin ${PKG_DIR}/bin
ln -s usr/bin ${PKG_DIR}/sbin
ln -s usr/lib ${PKG_DIR}/lib
ln -s usr/lib ${PKG_DIR}/lib64

# usr-merge: within /usr
ln -s bin ${PKG_DIR}/usr/sbin
ln -s lib ${PKG_DIR}/usr/lib64

# /run lives on tmpfs at boot; var entries are compat symlinks
ln -s /run          ${PKG_DIR}/var/run
ln -s /run/lock     ${PKG_DIR}/var/lock
ln -s ../proc/self/mounts ${PKG_DIR}/etc/mtab

# --- /etc files ---
install -m 0644 ${FILES_DIR}/os-release ${PKG_DIR}/etc/os-release
install -m 0644 ${FILES_DIR}/shells     ${PKG_DIR}/etc/shells
install -m 0644 ${FILES_DIR}/profile    ${PKG_DIR}/etc/profile
install -d -m 0755 ${PKG_DIR}/etc/profile.d
'''
