name = "libseccomp"
version = "2.6.0"
release = 1
description = "Enhanced seccomp library"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://github.com/seccomp/libseccomp"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/seccomp/libseccomp/releases/download/v${VERSION}/libseccomp-${VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static

'''

[lifecycle.compile]
script = '''
cd ${BUILD_DIR}
make -j$(nproc)

'''

[lifecycle.staging]
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PART_DIR} install

'''

[lifecycle.fabricate]
