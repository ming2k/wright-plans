name = "xapian-core"
version = "2.0.0"
release = 1
description = "Probabilistic information retrieval library"
license = "GPL-2.0-or-later"
arch = "x86_64"
url = "https://xapian.org/"

link_deps = ['util-linux', 'zlib']

[[sources]]
type = "http"
sha256 = "6cea3f49952a47224439a40bdb3608f928d121ad8721b9921cc42802d548ecf8"
url = "https://oligarchy.co.uk/xapian/${VERSION}/xapian-core-${VERSION}.tar.xz"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source/xapian-core-${VERSION}
./configure --prefix=/usr --disable-static'''

[lifecycle.compile]
script = '''
cd source/xapian-core-${VERSION}
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source/xapian-core-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['util-linux', 'zlib']
