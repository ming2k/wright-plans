[plan]
name = "libevdev"
version = "1.13.3"
release = 1
description = "Wrapper library for evdev input devices"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/libevdev/"

[dependencies]
build = ["meson", "ninja"]
[sources]
uris = ["https://www.freedesktop.org/software/libevdev/libevdev-${PKG_VERSION}.tar.xz"]
sha256 = ["SKIP"]

[lifecycle.configure]
script = '''
meson setup ${BUILD_DIR}/build ${BUILD_DIR} \
--prefix=/usr         \
--buildtype=release   \
-D documentation=disabled \
-D tests=disabled
'''

[lifecycle.compile]
script = "ninja -C ${BUILD_DIR}/build -j$(nproc)"

[lifecycle.package]
script = "DESTDIR=${PKG_DIR} ninja -C ${BUILD_DIR}/build install"
