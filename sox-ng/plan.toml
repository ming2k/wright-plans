name = "sox-ng"
version = "14.7.1"
release = 1
description = "The Swiss Army knife of sound processing tools"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://codeberg.org/sox_ng/sox_ng"

link_deps = ['alsa-lib', 'ffmpeg', 'libpng', 'libsndfile', 'libvorbis', 'libogg', 'zlib']
build_deps = ['autoconf', 'automake', 'libtool']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://codeberg.org/sox_ng/sox_ng/archive/sox_ng-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.prepare]
script = '''
cd source/sox-ng-${VERSION}
autoreconf -fi'''

[pipeline.configure]
script = '''
cd source/sox-ng-${VERSION}
./configure \
    --prefix=/usr \
    --sysconfdir=/etc \
    --with-ffmpeg \
    --without-gsm \
    --without-ao \
    --without-id3tag \
    --without-mad \
    --without-twolame \
    --without-wavpack \
    --without-opus'''

[pipeline.compile]
script = '''
cd source/sox-ng-${VERSION}
make -C ${WORKDIR} -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/sox-ng-${VERSION}
make -C ${WORKDIR} DESTDIR=${STAGING_DIR} install'''

[[output]]
runtime_deps = ['alsa-lib', 'ffmpeg', 'libpng', 'libsndfile', 'libvorbis', 'libogg', 'zlib']
