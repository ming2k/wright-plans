name = "inter-font"
version = "4.1"
release = 2
description = "Inter - typeface designed for computer screens"
license = "OFL-1.1"
arch = "any"
url = "https://rsms.me/inter/"

[dependencies]
build = ["libarchive"]

[[sources]]
sha256 = "SKIP"
url = "https://github.com/rsms/inter/releases/download/v${VERSION}/Inter-${VERSION}.zip"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
echo preparing inter-font'''

[lifecycle.compile]
script = '''
cd source
rm -rf inter-extracted
mkdir -p inter-extracted
bsdtar xf ${WORKDIR}/Inter-${VERSION}.zip -C inter-extracted'''

[lifecycle.staging]
script = '''
cd source
mkdir -p ${PART_DIR}/usr/share/fonts/inter
find ${WORKDIR}/inter-extracted -name '*.ttf' -exec cp {} ${PART_DIR}/usr/share/fonts/inter/ \;'''

[hooks]
post_install = "fc-cache -s 2>/dev/null || true"
post_upgrade = "fc-cache -s 2>/dev/null || true"
