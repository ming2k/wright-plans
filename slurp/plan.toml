name = "slurp"
version = "1.5.0"
release = 1
description = "Select a region in a Wayland compositor"
license = "MIT"
arch = "x86_64"
url = "https://wayland.emersion.fr/slurp/"

link_deps = ['cairo', 'libxkbcommon', 'wayland']
build_deps = ['wayland-protocols', 'meson', 'ninja']

[[sources]]
type = "http"
sha256 = "0fa880d4a93e1c795e3b5929fbea47546df0955bea34fc2f7ffeb1751678f663"
url = "https://github.com/emersion/slurp/archive/v${VERSION}.tar.gz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/slurp-${VERSION}
meson setup build \
  --prefix=/usr \
  --buildtype=release'''

[pipeline.compile]
script = '''
cd source/slurp-${VERSION}
ninja -C build -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/slurp-${VERSION}
DESTDIR=${STAGING_DIR} ninja -C build install'''

[[output]]
runtime_deps = ['cairo', 'libxkbcommon', 'wayland']
