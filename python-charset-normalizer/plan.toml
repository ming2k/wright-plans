name = "python-charset-normalizer"
version = "3.4.7"
release = 1
description = "The real First Universal Charset Detector"
license = "MIT"
arch = "x86_64"
url = "https://github.com/Ousret/charset_normalizer"


build_deps = ['python']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://pypi.org/packages/source/c/charset_normalizer/charset_normalizer-${VERSION}.tar.gz"
extract_to = "source"

[pipeline.staging]
script = '''
cd source/python-charset-normalizer-${VERSION}
pip3 install --no-index --no-user --no-deps --root=${STAGING_DIR} --no-build-isolation .'''

[[output]]
runtime_deps = ['python']
