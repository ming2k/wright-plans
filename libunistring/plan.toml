name = "libunistring"
version = "1.4.2"
release = 1
description = "Library for manipulating Unicode strings"
license = "LGPL-3.0-or-later"
arch = "x86_64"
url = "https://www.gnu.org/software/libunistring/"


[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://ftp.gnu.org/gnu/libunistring/libunistring-${VERSION}.tar.xz"
extract_to = "source"

[pipeline.configure]
script = '''
cd source/libunistring-${VERSION}
./configure --prefix=/usr --disable-static'''

[pipeline.compile]
script = '''
cd source/libunistring-${VERSION}
make -j$(nproc)'''

[pipeline.staging]
script = '''
cd source/libunistring-${VERSION}
make DESTDIR=${STAGING_DIR} install'''

