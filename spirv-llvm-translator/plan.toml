name = "spirv-llvm-translator"
version = "22.1.2"
release = 1
description = "Bi-directional translation between SPIR-V and LLVM IR"
license = "UoI-NCSA"
arch = "x86_64"
url = "https://github.com/KhronosGroup/SPIRV-LLVM-Translator"

link_deps = ['glibc:default', 'libgcc:default', 'libstdc++:default', 'llvm:default']

[[sources]]
type = "http"
sha256 = "b37196b1a1a60282a24cf937ab7d6807d7d54dc718f2a37a78e211be26df57ac"
url = "https://github.com/KhronosGroup/SPIRV-LLVM-Translator/archive/refs/tags/v${VERSION}.tar.gz"
extract_to = "source"

[options]
ccache = true

[lifecycle.configure]
script = '''
cd source
cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_LIBDIR=lib -DBUILD_SHARED_LIBS=ON -DLLVM_EXTERNAL_SPIRV_HEADERS_SOURCE_DIR=/usr -DLLVM_SPIRV_INCLUDE_TESTS=OFF'''

[lifecycle.compile]
script = '''
cd source
cmake --build build -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
DESTDIR=${STAGING_DIR} cmake --install build'''

[output]
runtime_deps = ['glibc:default', 'libgcc:default', 'libstdc++:default', 'llvm:default']
