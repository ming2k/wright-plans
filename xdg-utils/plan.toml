name = "xdg-utils"
version = "1.2.1"
release = 1
description = "Tools to assist applications with desktop integration tasks"
license = "MIT"
arch = "x86_64"
url = "https://www.freedesktop.org/wiki/Software/xdg-utils/"

[dependencies]
build = ["gcc", "make", "lynx", "xmlto", "docbook-xml"]

[[sources]]
sha256 = "93d510dccf328378f012fe195b4574c2fac1cd65a74d0852d6eaa72e5a2065a7"
url = "https://gitlab.freedesktop.org/xdg/xdg-utils/-/archive/v${VERSION}/xdg-utils-v${VERSION}.tar.bz2"
extract_to = "source"

[lifecycle.configure]
script = '''
cd source
./configure --prefix=/usr'''

[lifecycle.compile]
script = '''
cd source
sed -i 's#^XMLTO[[:space:]]*=.*#XMLTO           = /usr/bin/xmlto --skip-validation#' scripts/Makefile
export LYNX_CFG=/etc/lynx.cfg
make -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make DESTDIR=${PART_DIR} install'''
