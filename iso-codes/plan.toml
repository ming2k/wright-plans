[plan]
name = "iso-codes"
version = "4.17.0"
release = 1
description = "Lists of country, language and currency names"
license = "LGPL-2.1-or-later"
arch = "x86_64"
url = "https://salsa.debian.org/iso-codes-team/iso-codes"

[dependencies]
build = ["python"]
[sources]
uris = ["https://salsa.debian.org/iso-codes-team/iso-codes/-/archive/v${PKG_VERSION}/iso-codes-v${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.configure]
dockyard = "none"
script = """
cd ${BUILD_DIR}
./configure --prefix=/usr
"""

[lifecycle.compile]
dockyard = "none"
script = """
cd ${BUILD_DIR}
make -j$(nproc)
"""

[lifecycle.package]
dockyard = "none"
script = """
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} install
"""
