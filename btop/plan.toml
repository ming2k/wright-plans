[plan]
name = "btop"
version = "1.4.6"
release = 1
description = "A monitor of system resources, bpytop ported to C++"
license = "Apache-2.0"
arch = "x86_64"
url = "https://github.com/aristocratos/btop"

[dependencies]
build = ["gcc", "make", "libcap"]

[sources]
uris = ["https://github.com/aristocratos/btop/archive/refs/tags/v${PKG_VERSION}/btop-${PKG_VERSION}.tar.gz"]
sha256 = ["SKIP"]

[lifecycle.compile]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make all -j$(nproc)
'''

[lifecycle.package]
dockyard = "none"
script = '''
cd ${BUILD_DIR}
make DESTDIR=${PKG_DIR} PREFIX=/usr install
make DESTDIR=${PKG_DIR} PREFIX=/usr setcap
'''
