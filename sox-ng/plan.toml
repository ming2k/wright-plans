name = "sox-ng"
version = "14.7.1"
release = 1
description = "The Swiss Army knife of sound processing tools"
license = "GPL-2.0-only"
arch = "x86_64"
url = "https://codeberg.org/sox_ng/sox_ng"

link_deps = ['alsa-lib:default', 'ffmpeg:default', 'libpng:default', 'libsndfile:default', 'libvorbis:default', 'libogg:default', 'zlib:default']

[[sources]]
type = "http"
sha256 = "SKIP"
url = "https://codeberg.org/sox_ng/sox_ng/archive/sox_ng-${VERSION}.tar.gz"
extract_to = "source"

[lifecycle.prepare]
script = '''
cd source
autoreconf -fi'''

[lifecycle.configure]
script = '''
cd source
./configure \
    --prefix=/usr \
    --sysconfdir=/etc \
    --with-ffmpeg \
    --without-gsm \
    --without-ao \
    --without-id3tag \
    --without-mad \
    --without-twolame \
    --without-wavpack \
    --without-opus'''

[lifecycle.compile]
script = '''
cd source
make -C ${WORKDIR} -j$(nproc)'''

[lifecycle.staging]
script = '''
cd source
make -C ${WORKDIR} DESTDIR=${STAGING_DIR} install'''

