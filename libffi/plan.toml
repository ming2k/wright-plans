[plan]
name = "libffi"
version = "3.5.2"
release = 1
description = "Portable Foreign Function Interface library"
license = "MIT"
arch = "x86_64"

[dependencies]
build = ["gcc", "make"]

[[sources]]
uri = "https://github.com/libffi/libffi/releases/download/v${PKG_VERSION}/libffi-${PKG_VERSION}.tar.gz"
sha256 = "SKIP"

[lifecycle.configure]
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static --with-gcc-arch=native
'''

[lifecycle.compile]
script = "cd ${BUILD_DIR} && make -j$(nproc)"

[lifecycle.staging]
script = "cd ${BUILD_DIR} && make DESTDIR=${PKG_DIR} install"
