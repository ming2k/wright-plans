name = "sqlite"
version = "3.51.2"
release = 1
description = "Self-contained, serverless, zero-configuration, transactional SQL database engine"
license = "Blessing"
arch = "x86_64"

[dependencies]
build = ["gcc", "make"]
link = ["readline", "zlib"]

[[sources]]
uri = "https://www.sqlite.org/2026/sqlite-autoconf-3510200.tar.gz"
sha256 = "fbd89f866b1403bb66a143065440089dd76100f2238314d92274a082d4f2b7bb"

[lifecycle.configure]
env = { CFLAGS = "-g -O2 -DSQLITE_ENABLE_FTS5 -DSQLITE_ENABLE_COLUMN_METADATA -DSQLITE_SECURE_DELETE -DSQLITE_ENABLE_UNLOCK_NOTIFY -DSQLITE_ENABLE_DBSTAT_VTAB" }
script = '''
cd ${BUILD_DIR}
./configure --prefix=/usr --disable-static --enable-fts5 --enable-readline --enable-threadsafe

'''

[lifecycle.compile]
script = "cd ${BUILD_DIR} && make -j$(nproc)"

[lifecycle.staging]
script = "cd ${BUILD_DIR} && make DESTDIR=${PART_DIR} install"

[lifecycle.fabricate]
